    // ===== CUBE PAY CLIENT DETAIL =====
    const renderCubePayClient = (client) => {
      const deals = cubePayDeals[client.id] || [];
      const data = cubePayMonthlyData[client.id] || {};
      const clientRevenue = deals.reduce((s, d) => s + calcDealRevenue(d, client.id), 0);
      const hasProfitShare = deals.some(d => d.type === "Profit Share");
      const deps = parseFloat(data.deposits) || 0;
      const wds = parseFloat(data.withdrawals) || 0;
      const totalProcessed = deps + wds;
      const netHold = calcNetHold(client.id);

      // Provider volume breakdown from markup deals
      const providerVolumes = {};
      deals.filter(d => d.type === "Provider Mark Up").forEach(d => {
        (d.markups || []).forEach(mu => {
          const vol = parseFloat(mu.volume) || 0;
          if (!mu.providerSvcId || vol === 0) return;
          const isGroup = mu.providerSvcId.startsWith("grp-");
          const label = isGroup ? (providerGroups.find(pg => `grp-${pg.id}` === mu.providerSvcId) || {}).name || "Group" : (() => { const ps = allProviderServices.find(s => s.svcId === mu.providerSvcId); return ps ? `${ps.provName} — ${ps.svcName}` : mu.providerSvcId; })();
          providerVolumes[label] = (providerVolumes[label] || 0) + vol;
        });
      });

      const addDeal = (type) => {
        const base = { id: `deal-${Date.now()}`, type };
        if (type === "Net Hold") base.netHoldPct = "";
        if (type === "Provider Mark Up") base.markups = [];
        if (type === "Profit Share") base.profitSharePct = "";
        setCubePayDeals({ ...cubePayDeals, [client.id]: [...deals, base] });
      };
      const updateDeal = (dealId, field, val) => {
        setCubePayDeals({ ...cubePayDeals, [client.id]: deals.map(d => d.id === dealId ? { ...d, [field]: val } : d) });
      };
      const removeDeal = (dealId) => {
        setCubePayDeals({ ...cubePayDeals, [client.id]: deals.filter(d => d.id !== dealId) });
      };
      const updateData = (field, val) => {
        setCubePayMonthlyData({ ...cubePayMonthlyData, [client.id]: { ...data, [field]: val } });
      };

      return (
        <div>
          <button onClick={() => setSelectedRevenueClient(null)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 8, padding: "6px 16px", cursor: "pointer", fontSize: 12, marginBottom: 16 }}>← Back to Cube Pay</button>

          <div style={{ marginBottom: 20 }}>
            <h3 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 4px" }}>{client.name}</h3>
            <p style={{ color: c.textSecondary, fontSize: 12, margin: 0 }}>{deals.length} deal{deals.length !== 1 ? "s" : ""} configured · Current month</p>
          </div>

          {/* KPI Cards — pretty gradient style */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
            <div style={{ background: "linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.04))", border: "1px solid rgba(34,197,94,0.25)", borderRadius: 14, padding: "18px 14px", textAlign: "center" }}>
              <div style={{ fontSize: 10, color: "#22c55e", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Total Revenue</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#22c55e" }}>{fmtCurrency(clientRevenue)}</div>
            </div>
            <div style={{ background: "linear-gradient(135deg, rgba(99,102,241,0.12), rgba(99,102,241,0.04))", border: "1px solid rgba(99,102,241,0.25)", borderRadius: 14, padding: "18px 14px", textAlign: "center" }}>
              <div style={{ fontSize: 10, color: c.accent, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Deposits</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: c.accent }}>{fmtCurrency(deps)}</div>
            </div>
            <div style={{ background: "linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.04))", border: "1px solid rgba(245,158,11,0.25)", borderRadius: 14, padding: "18px 14px", textAlign: "center" }}>
              <div style={{ fontSize: 10, color: "#f59e0b", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Withdrawals</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#f59e0b" }}>{fmtCurrency(wds)}</div>
            </div>
            <div style={{ background: "linear-gradient(135deg, rgba(236,72,153,0.12), rgba(236,72,153,0.04))", border: "1px solid rgba(236,72,153,0.25)", borderRadius: 14, padding: "18px 14px", textAlign: "center" }}>
              <div style={{ fontSize: 10, color: "#ec4899", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Total Processed</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#ec4899" }}>{fmtCurrency(totalProcessed)}</div>
            </div>
          </div>

          {/* Provider Volume Breakdown — collapsible */}
          {Object.keys(providerVolumes).length > 0 && (() => {
            const sortedPV = Object.entries(providerVolumes).sort((a, b) => b[1] - a[1]);
            const maxVol = sortedPV.length > 0 ? sortedPV[0][1] : 1;
            return (
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, marginBottom: 16, overflow: "hidden" }}>
                <div onClick={() => setPvBreakdownOpen(!pvBreakdownOpen)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px", cursor: "pointer" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: c.text }}>Provider Breakdown</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 11, color: c.textMuted }}>{sortedPV.length} provider{sortedPV.length !== 1 ? "s" : ""}</span>
                    <span style={{ fontSize: 10, color: c.textMuted }}>{pvBreakdownOpen ? "▴" : "▾"}</span>
                  </div>
                </div>
                {pvBreakdownOpen && (
                  <div style={{ padding: "0 18px 16px" }}>
                    {sortedPV.map(([label, vol]) => (
                      <div key={label} style={{ marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                          <span style={{ fontSize: 12, color: c.text }}>{label}</span>
                          <span style={{ fontSize: 12, fontWeight: 700, color: c.accent }}>{fmtCurrency(vol)}</span>
                        </div>
                        <div style={{ height: 6, background: c.surface, borderRadius: 3, overflow: "hidden" }}>
                          <div style={{ height: "100%", width: `${(vol / maxVol) * 100}%`, background: `linear-gradient(90deg, ${c.accent}, #8b5cf6)`, borderRadius: 3, transition: "width 0.3s" }} />
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })()}

          {/* Transaction Data — Metabase powered */}
          {(() => {
            const mbConfig = metabaseConfigs[client.id] || {};
            const mbConnected = !!mbConfig.sessionToken;
            const hasNetHoldDeal = deals.some(d => d.type === "Net Hold" || d.type === "Profit Share");
            const txData = mbCurrentData[client.id] || data;
            const viewDeps = parseFloat(txData.deposits) || 0;
            const viewWds = parseFloat(txData.withdrawals) || 0;
            const viewDepFees = parseFloat(txData.depositFees) || 0;
            const viewWdFees = parseFloat(txData.withdrawalFees) || 0;
            const depMethods = txData.depositMethods || {};
            const wdMethods = txData.withdrawalMethods || {};

            // Combine all methods for unified breakdown
            const allMethodNames = [...new Set([...Object.keys(depMethods), ...Object.keys(wdMethods)])];
            const methodBreakdown = allMethodNames.map(m => ({
              name: m,
              deposits: (depMethods[m] || {}).gross || 0,
              withdrawals: (wdMethods[m] || {}).gross || 0,
              depCount: (depMethods[m] || {}).count || 0,
              wdCount: (wdMethods[m] || {}).count || 0,
            })).sort((a, b) => (b.deposits + b.withdrawals) - (a.deposits + a.withdrawals));
            const maxMethodVol = methodBreakdown.length > 0 ? Math.max(...methodBreakdown.map(m => m.deposits + m.withdrawals)) : 1;

            // Refresh handler
            const refreshData = async () => {
              const defaults = METABASE_DEFAULTS[client.name.toLowerCase()];
              if (!defaults || !mbConfig.sessionToken) return;
              setMbFetchStatus("Refreshing...");
              try {
                const proxyCall = async (path, method, body, token) => {
                  const resp = await fetch("/.netlify/functions/metabase-proxy", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ metabaseUrl: defaults.url, path, method: method || "GET", body, sessionToken: token }),
                  });
                  return resp.json();
                };
                const parseSummaryRows = (rows) => {
                  const methods = {};
                  let totalGross = 0, totalFees = 0;
                  (rows || []).forEach(r => {
                    const currency = r["Currency"] || "EUR";
                    const method = r["Core Account - Account → Account"] || "Unknown";
                    const grossRaw = Math.abs(parseFloat(r["Sum of Amount"]) || 0);
                    const feesRaw = Math.abs(parseFloat(r["Sum of Fee"]) || 0);
                    const count = parseInt(r["Count"]) || 0;
                    const grossEUR = toEUR(grossRaw, currency);
                    const feesEUR = toEUR(feesRaw, currency);
                    totalGross += grossEUR; totalFees += feesEUR;
                    if (!methods[method]) methods[method] = { gross: 0, fees: 0, count: 0 };
                    methods[method].gross += grossEUR; methods[method].fees += feesEUR; methods[method].count += count;
                  });
                  return { totalGross, totalFees, methods };
                };
                const [depRows, wdRows] = await Promise.all([
                  defaults.depositCard ? proxyCall(`/api/card/${defaults.depositCard}/query/json`, "POST", {}, mbConfig.sessionToken) : [],
                  defaults.withdrawalCard ? proxyCall(`/api/card/${defaults.withdrawalCard}/query/json`, "POST", {}, mbConfig.sessionToken) : [],
                ]);
                const depData = parseSummaryRows(Array.isArray(depRows) ? depRows : []);
                const wdData = parseSummaryRows(Array.isArray(wdRows) ? wdRows : []);
                const result = { deposits: depData.totalGross.toFixed(2), withdrawals: wdData.totalGross.toFixed(2), depositFees: depData.totalFees.toFixed(2), withdrawalFees: wdData.totalFees.toFixed(2), depositMethods: depData.methods, withdrawalMethods: wdData.methods };
                setMbCurrentData(prev => ({ ...prev, [client.id]: result }));
                setCubePayMonthlyData(prev => ({ ...prev, [client.id]: result }));
                setMbFetchStatus("");
              } catch (e) { setMbFetchStatus("Error: " + e.message); }
            };

            return (
              <div style={{ marginBottom: 16 }}>
                {/* Status Bar */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, padding: "8px 14px", background: c.card, borderRadius: 10, border: `1px solid ${mbConnected ? "rgba(34,197,94,0.15)" : c.border}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: mbConnected ? "#22c55e" : mbLoading ? "#f59e0b" : "#6b7280", animation: mbLoading ? "pulse 1.5s infinite" : "none" }} />
                    <span style={{ fontSize: 10, color: c.textMuted }}>{mbLoading ? "Loading data..." : mbConnected ? "Live — Metabase" : "No data source"}</span>
                    {mbFetchStatus && <span style={{ fontSize: 10, color: mbFetchStatus.startsWith("Error") ? "#ef4444" : "#22c55e", marginLeft: 4 }}>{mbFetchStatus}</span>}
                    {mbError && <span style={{ fontSize: 10, color: "#ef4444", marginLeft: 4 }}>{mbError}</span>}
                  </div>
                  {mbConnected && <button onClick={refreshData} style={{ fontSize: 10, padding: "3px 10px", borderRadius: 6, cursor: "pointer", border: "1px solid rgba(34,197,94,0.3)", background: "rgba(34,197,94,0.1)", color: "#22c55e", fontWeight: 600 }}>Refresh</button>}
                </div>

                {/* Gross Totals */}
                <div style={{ background: c.card, borderRadius: 14, border: `1px solid ${c.border}`, padding: 18, marginBottom: 14 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: c.accent, textTransform: "uppercase", marginBottom: 14 }}>Transaction Summary (Gross)</div>
                  <div style={{ display: "grid", gridTemplateColumns: hasNetHoldDeal ? "1fr 1fr 1fr 1fr" : "1fr 1fr 1fr", gap: 12 }}>
                    <div style={{ background: "linear-gradient(135deg, rgba(99,102,241,0.1), rgba(99,102,241,0.03))", borderRadius: 10, padding: 14, textAlign: "center", border: "1px solid rgba(99,102,241,0.15)" }}>
                      <div style={{ fontSize: 9, color: c.accent, fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Deposits</div>
                      <div style={{ fontSize: 20, fontWeight: 800, color: c.accent }}>{fmtCurrency(viewDeps)}</div>
                    </div>
                    <div style={{ background: "linear-gradient(135deg, rgba(245,158,11,0.1), rgba(245,158,11,0.03))", borderRadius: 10, padding: 14, textAlign: "center", border: "1px solid rgba(245,158,11,0.15)" }}>
                      <div style={{ fontSize: 9, color: "#f59e0b", fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Withdrawals</div>
                      <div style={{ fontSize: 20, fontWeight: 800, color: "#f59e0b" }}>{fmtCurrency(viewWds)}</div>
                    </div>
                    <div style={{ background: "linear-gradient(135deg, rgba(236,72,153,0.1), rgba(236,72,153,0.03))", borderRadius: 10, padding: 14, textAlign: "center", border: "1px solid rgba(236,72,153,0.15)" }}>
                      <div style={{ fontSize: 9, color: "#ec4899", fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Total Processed</div>
                      <div style={{ fontSize: 20, fontWeight: 800, color: "#ec4899" }}>{fmtCurrency(viewDeps + viewWds)}</div>
                    </div>
                    {hasNetHoldDeal && (
                      <div style={{ background: "linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.03))", borderRadius: 10, padding: 14, textAlign: "center", border: "1px solid rgba(34,197,94,0.15)" }}>
                        <div style={{ fontSize: 9, color: "#22c55e", fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Net Hold</div>
                        <div style={{ fontSize: 20, fontWeight: 800, color: (viewDeps - viewWds - viewDepFees - viewWdFees) >= 0 ? "#22c55e" : "#ef4444" }}>{fmtCurrency(viewDeps - viewWds - viewDepFees - viewWdFees)}</div>
                      </div>
                    )}
                  </div>
                  {/* Fee totals row */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 10 }}>
                    <div style={{ background: c.surface, borderRadius: 8, padding: 8, textAlign: "center" }}>
                      <div style={{ fontSize: 9, color: c.textMuted, fontWeight: 600, marginBottom: 2 }}>DEPOSIT FEES</div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: c.textSecondary }}>{fmtCurrency(viewDepFees)}</div>
                    </div>
                    <div style={{ background: c.surface, borderRadius: 8, padding: 8, textAlign: "center" }}>
                      <div style={{ fontSize: 9, color: c.textMuted, fontWeight: 600, marginBottom: 2 }}>WITHDRAWAL FEES</div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: c.textSecondary }}>{fmtCurrency(viewWdFees)}</div>
                    </div>
                    <div style={{ background: c.surface, borderRadius: 8, padding: 8, textAlign: "center" }}>
                      <div style={{ fontSize: 9, color: c.textMuted, fontWeight: 600, marginBottom: 2 }}>TOTAL FEES</div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: c.textSecondary }}>{fmtCurrency(viewDepFees + viewWdFees)}</div>
                    </div>
                  </div>
                </div>

                {/* Method Breakdown */}
                {methodBreakdown.length > 0 && (
                  <div style={{ background: c.card, borderRadius: 14, border: `1px solid ${c.border}`, overflow: "hidden" }}>
                    <div onClick={() => setCubePayProvOpen(!cubePayProvOpen)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px", cursor: "pointer" }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: c.text }}>Payment Method Breakdown</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 11, color: c.textMuted }}>{methodBreakdown.length} method{methodBreakdown.length !== 1 ? "s" : ""}</span>
                        <span style={{ fontSize: 10, color: c.textMuted }}>{cubePayProvOpen ? "▴" : "▾"}</span>
                      </div>
                    </div>
                    {cubePayProvOpen && (
                      <div style={{ padding: "0 18px 16px" }}>
                        {/* Table header */}
                        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 8, marginBottom: 8, paddingBottom: 6, borderBottom: `1px solid ${c.border}` }}>
                          <div style={{ fontSize: 9, fontWeight: 700, color: c.textMuted, textTransform: "uppercase" }}>Method</div>
                          <div style={{ fontSize: 9, fontWeight: 700, color: c.textMuted, textTransform: "uppercase", textAlign: "right" }}>Deposits</div>
                          <div style={{ fontSize: 9, fontWeight: 700, color: c.textMuted, textTransform: "uppercase", textAlign: "right" }}>Withdrawals</div>
                          <div style={{ fontSize: 9, fontWeight: 700, color: c.textMuted, textTransform: "uppercase", textAlign: "right" }}>Total</div>
                        </div>
                        {methodBreakdown.map(m => (
                          <div key={m.name} style={{ marginBottom: 8 }}>
                            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 8, alignItems: "center", marginBottom: 4 }}>
                              <div>
                                <span style={{ fontSize: 12, color: c.text, fontWeight: 500 }}>{m.name}</span>
                                <span style={{ fontSize: 9, color: c.textMuted, marginLeft: 6 }}>{m.depCount + m.wdCount} txns</span>
                              </div>
                              <div style={{ fontSize: 12, fontWeight: 600, color: c.accent, textAlign: "right" }}>{fmtCurrency(m.deposits)}</div>
                              <div style={{ fontSize: 12, fontWeight: 600, color: "#f59e0b", textAlign: "right" }}>{fmtCurrency(m.withdrawals)}</div>
                              <div style={{ fontSize: 12, fontWeight: 700, color: c.text, textAlign: "right" }}>{fmtCurrency(m.deposits + m.withdrawals)}</div>
                            </div>
                            <div style={{ height: 5, background: c.surface, borderRadius: 3, overflow: "hidden", display: "flex" }}>
                              <div style={{ height: "100%", width: `${(m.deposits / maxMethodVol) * 100}%`, background: `linear-gradient(90deg, ${c.accent}, #818cf8)`, transition: "width 0.3s" }} />
                              <div style={{ height: "100%", width: `${(m.withdrawals / maxMethodVol) * 100}%`, background: `linear-gradient(90deg, #f59e0b, #fbbf24)`, transition: "width 0.3s" }} />
                            </div>
                          </div>
                        ))}
                        {/* Totals row */}
                        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 8, paddingTop: 8, borderTop: `1px solid ${c.border}`, marginTop: 4 }}>
                          <div style={{ fontSize: 12, fontWeight: 700, color: c.text }}>Total</div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: c.accent, textAlign: "right" }}>{fmtCurrency(viewDeps)}</div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: "#f59e0b", textAlign: "right" }}>{fmtCurrency(viewWds)}</div>
                          <div style={{ fontSize: 12, fontWeight: 800, color: c.text, textAlign: "right" }}>{fmtCurrency(viewDeps + viewWds)}</div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })()}

          {/* Deal Information */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: c.text }}>Deal Information</div>
            <div style={{ display: "flex", gap: 6 }}>
              {DEAL_TYPES.map(dt => (
                <button key={dt} onClick={() => addDeal(dt)} style={{ fontSize: 11, padding: "6px 14px", borderRadius: 8, cursor: "pointer", fontWeight: 600, border: `1px solid ${c.accent}40`, background: `${c.accent}10`, color: c.accent, transition: "all 0.15s" }}
                  onMouseEnter={e => { e.currentTarget.style.background = `${c.accent}25`; }}
                  onMouseLeave={e => { e.currentTarget.style.background = `${c.accent}10`; }}>+ {dt}</button>
              ))}
            </div>
          </div>

          {deals.length === 0 && <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 30, textAlign: "center", color: c.textMuted, fontSize: 13 }}>No deals configured. Add a deal type above.</div>}

          {deals.map(deal => (
            <div key={deal.id} style={{ background: c.card, borderRadius: 14, border: `1px solid ${deal.type === "Net Hold" ? "rgba(34,197,94,0.2)" : deal.type === "Provider Mark Up" ? "rgba(99,102,241,0.2)" : "rgba(245,158,11,0.2)"}`, padding: 18, marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 11, fontWeight: 700, padding: "4px 12px", borderRadius: 6, background: deal.type === "Net Hold" ? "rgba(34,197,94,0.15)" : deal.type === "Provider Mark Up" ? "rgba(99,102,241,0.15)" : "rgba(245,158,11,0.15)", color: deal.type === "Net Hold" ? "#22c55e" : deal.type === "Provider Mark Up" ? c.accent : "#f59e0b" }}>{deal.type}</span>
                  <span style={{ fontSize: 16, fontWeight: 800, color: calcDealRevenue(deal, client.id) >= 0 ? "#22c55e" : "#ef4444" }}>{fmtCurrency(calcDealRevenue(deal, client.id))}</span>
                </div>
                <button onClick={() => removeDeal(deal.id)} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Remove</button>
              </div>

              {/* Net Hold config */}
              {deal.type === "Net Hold" && (
                <div style={{ display: "flex", alignItems: "end", gap: 12 }}>
                  <div>
                    <label style={labelStyle4}>Cube Pay % of Net Hold</label>
                    <input value={deal.netHoldPct || ""} onChange={e => updateDeal(deal.id, "netHoldPct", e.target.value)} placeholder="e.g. 20" style={{ ...inputStyle4, width: 120 }} />
                  </div>
                  <div style={{ fontSize: 11, color: c.textMuted, paddingBottom: 6 }}>Net Hold {fmtCurrency(netHold)} × {deal.netHoldPct || "0"}% = <strong style={{ color: "#22c55e" }}>{fmtCurrency(calcDealRevenue(deal, client.id))}</strong></div>
                </div>
              )}

              {/* Provider Mark Up config */}
              {deal.type === "Provider Mark Up" && (
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ fontSize: 11, color: c.textMuted }}>Configure markup per provider method</div>
                    <button onClick={() => updateDeal(deal.id, "markups", [...(deal.markups || []), { id: `mu-${Date.now()}`, providerSvcId: "", rate: "", volume: "", discountType: "", tiers: [], targets: [] }])} style={{ fontSize: 10, padding: "5px 12px", borderRadius: 6, cursor: "pointer", border: `1px solid ${c.accent}40`, background: `${c.accent}10`, color: c.accent, fontWeight: 600 }}>+ Add Method</button>
                  </div>
                  {(deal.markups || []).map((mu, mi) => {
                    const updateMu = (field, val) => {
                      const newMarkups = [...(deal.markups || [])];
                      newMarkups[mi] = { ...newMarkups[mi], [field]: val };
                      updateDeal(deal.id, "markups", newMarkups);
                    };
                    return (
                      <div key={mu.id} style={{ background: c.surface, borderRadius: 10, padding: 14, marginBottom: 8, border: `1px solid ${c.border}` }}>
                        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr auto", gap: 8, marginBottom: 8 }}>
                          <div>
                            <label style={labelStyle4}>Provider / Method</label>
                            <select value={mu.providerSvcId || ""} onChange={e => updateMu("providerSvcId", e.target.value)} style={{ ...inputStyle4, width: "100%" }}>
                              <option value="">— Select —</option>
                              {allProviderServices.map(ps => <option key={ps.svcId} value={ps.svcId}>{ps.provName} — {ps.svcName}</option>)}
                              {providerGroups.map(pg => <option key={`grp-${pg.id}`} value={`grp-${pg.id}`}>📦 {pg.name} (Group)</option>)}
                            </select>
                          </div>
                          <div><label style={labelStyle4}>Mark Up (%)</label><input value={mu.rate || ""} onChange={e => updateMu("rate", e.target.value)} placeholder="%" style={{ ...inputStyle4, width: "100%" }} /></div>
                          <div><label style={labelStyle4}>Volume ($)</label><input value={mu.volume || ""} onChange={e => updateMu("volume", e.target.value)} placeholder="0.00" style={{ ...inputStyle4, width: "100%" }} /></div>
                          <button onClick={() => updateDeal(deal.id, "markups", (deal.markups || []).filter((_, i) => i !== mi))} style={{ background: "transparent", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14, alignSelf: "end", padding: "6px" }}>✕</button>
                        </div>

                        {/* Volume Discount */}
                        <div style={{ marginTop: 6 }}>
                          <label style={labelStyle4}>Volume Discount</label>
                          <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                            {["None", "Tiers", "Targets"].map(dt => (
                              <button key={dt} onClick={() => updateMu("discountType", dt === "None" ? "" : dt)} style={{ fontSize: 10, padding: "4px 10px", borderRadius: 6, cursor: "pointer", fontWeight: 600, border: (mu.discountType || "") === (dt === "None" ? "" : dt) ? `1px solid ${c.accent}` : `1px solid ${c.border}`, background: (mu.discountType || "") === (dt === "None" ? "" : dt) ? `${c.accent}20` : "transparent", color: (mu.discountType || "") === (dt === "None" ? "" : dt) ? c.accent : c.textMuted }}>{dt}</button>
                            ))}
                          </div>

                          {mu.discountType === "Tiers" && (
                            <div>
                              {(mu.tiers || []).map((tier, ti) => (
                                <div key={ti} style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 6, marginBottom: 4 }}>
                                  <div><label style={{ ...labelStyle4, fontSize: 9 }}>Up To ($)</label><input value={tier.upTo || ""} onChange={e => { const t = [...(mu.tiers || [])]; t[ti] = { ...t[ti], upTo: e.target.value }; updateMu("tiers", t); }} placeholder="100000" style={{ ...inputStyle4, width: "100%", fontSize: 11 }} /></div>
                                  <div><label style={{ ...labelStyle4, fontSize: 9 }}>Rate (%)</label><input value={tier.rate || ""} onChange={e => { const t = [...(mu.tiers || [])]; t[ti] = { ...t[ti], rate: e.target.value }; updateMu("tiers", t); }} placeholder="2.0" style={{ ...inputStyle4, width: "100%", fontSize: 11 }} /></div>
                                  <button onClick={() => updateMu("tiers", (mu.tiers || []).filter((_, i) => i !== ti))} style={{ background: "transparent", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 12, alignSelf: "end", padding: "4px" }}>✕</button>
                                </div>
                              ))}
                              <button onClick={() => updateMu("tiers", [...(mu.tiers || []), { upTo: "", rate: "" }])} style={{ fontSize: 10, color: c.accent, background: "transparent", border: `1px dashed ${c.accent}40`, borderRadius: 4, padding: "3px 10px", cursor: "pointer", marginTop: 4 }}>+ Add Tier</button>
                            </div>
                          )}

                          {mu.discountType === "Targets" && (
                            <div>
                              {(mu.targets || []).map((tgt, tgi) => (
                                <div key={tgi} style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 6, marginBottom: 4 }}>
                                  <div><label style={{ ...labelStyle4, fontSize: 9 }}>Threshold ($)</label><input value={tgt.threshold || ""} onChange={e => { const t = [...(mu.targets || [])]; t[tgi] = { ...t[tgi], threshold: e.target.value }; updateMu("targets", t); }} placeholder="100000" style={{ ...inputStyle4, width: "100%", fontSize: 11 }} /></div>
                                  <div><label style={{ ...labelStyle4, fontSize: 9 }}>Rate (%)</label><input value={tgt.rate || ""} onChange={e => { const t = [...(mu.targets || [])]; t[tgi] = { ...t[tgi], rate: e.target.value }; updateMu("targets", t); }} placeholder="1.5" style={{ ...inputStyle4, width: "100%", fontSize: 11 }} /></div>
                                  <button onClick={() => updateMu("targets", (mu.targets || []).filter((_, i) => i !== tgi))} style={{ background: "transparent", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 12, alignSelf: "end", padding: "4px" }}>✕</button>
                                </div>
                              ))}
                              <button onClick={() => updateMu("targets", [...(mu.targets || []), { threshold: "", rate: "" }])} style={{ fontSize: 10, color: c.accent, background: "transparent", border: `1px dashed ${c.accent}40`, borderRadius: 4, padding: "3px 10px", cursor: "pointer", marginTop: 4 }}>+ Add Target</button>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Profit Share config — includes operating costs inline */}
              {deal.type === "Profit Share" && (
                <div>
                  <div style={{ display: "flex", gap: 12, alignItems: "end", marginBottom: 14 }}>
                    <div>
                      <label style={labelStyle4}>Cube Pay Profit Share %</label>
                      <input value={deal.profitSharePct || ""} onChange={e => updateDeal(deal.id, "profitSharePct", e.target.value)} placeholder="e.g. 20" style={{ ...inputStyle4, width: 120 }} />
                    </div>
                    <div style={{ fontSize: 11, color: c.textMuted, paddingBottom: 6 }}>({fmtCurrency(netHold)} net hold - costs) × {deal.profitSharePct || "0"}%</div>
                  </div>
                  <div style={{ background: c.surface, borderRadius: 10, padding: 14, border: `1px solid ${c.border}` }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#f59e0b", textTransform: "uppercase", marginBottom: 8 }}>Operating Costs</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <div>
                        <label style={labelStyle4}>Placeholder Cost % (used during month)</label>
                        <input value={cubePayPlaceholderCostPct[client.id] || ""} onChange={e => setCubePayPlaceholderCostPct({ ...cubePayPlaceholderCostPct, [client.id]: e.target.value })} placeholder="e.g. 15" style={{ ...inputStyle4, width: "100%" }} />
                      </div>
                      <div>
                        <label style={labelStyle4}>Actual Costs for {currentMonth} ($)</label>
                        <input value={(cubePayOperatingCosts[currentMonth] || {})[client.id] || ""} onChange={e => setCubePayOperatingCosts({ ...cubePayOperatingCosts, [currentMonth]: { ...(cubePayOperatingCosts[currentMonth] || {}), [client.id]: e.target.value } })} placeholder="Enter after month ends" style={{ ...inputStyle4, width: "100%" }} />
                      </div>
                    </div>
                    {(() => {
                      const actualCost = parseFloat((cubePayOperatingCosts[currentMonth] || {})[client.id]) || 0;
                      const placeholderPct = parseFloat(cubePayPlaceholderCostPct[client.id]) || 0;
                      const estimatedCost = actualCost > 0 ? actualCost : netHold * (placeholderPct / 100);
                      return (
                        <div style={{ marginTop: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div style={{ fontSize: 10, color: actualCost > 0 ? "#22c55e" : placeholderPct > 0 ? "#f59e0b" : c.textMuted }}>
                            {actualCost > 0 ? "Using actual costs" : placeholderPct > 0 ? `Using ${placeholderPct}% estimate` : "No costs configured"}
                          </div>
                          <div style={{ fontSize: 11, fontWeight: 600, color: c.text }}>Costs: {fmtCurrency(estimatedCost)} · Profit: <span style={{ color: "#22c55e" }}>{fmtCurrency(calcDealRevenue(deal, client.id))}</span></div>
                        </div>
                      );
                    })()}
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      );
    };

    // ===== CUBE PAY LIST VIEW =====
    const renderCubePay = () => {
      if (selectedRevenueClient) {
        const cl = cubePayClients.find(c2 => c2.id === selectedRevenueClient);
        if (cl) return renderCubePayClient(cl);
      }

      // Per-provider volume totals across all clients
      const provTotals = {};
      cubePayClients.forEach(cl => {
        (cubePayDeals[cl.id] || []).filter(d => d.type === "Provider Mark Up").forEach(d => {
          (d.markups || []).forEach(mu => {
            const vol = parseFloat(mu.volume) || 0;
            if (!mu.providerSvcId || vol === 0) return;
            const isGroup = mu.providerSvcId.startsWith("grp-");
            const label = isGroup ? (providerGroups.find(pg => `grp-${pg.id}` === mu.providerSvcId) || {}).name || "Group" : (() => { const ps = allProviderServices.find(s => s.svcId === mu.providerSvcId); return ps ? `${ps.provName} — ${ps.svcName}` : mu.providerSvcId; })();
            provTotals[label] = (provTotals[label] || 0) + vol;
          });
        });
      });
      const sortedProvTotals = Object.entries(provTotals).sort((a, b) => b[1] - a[1]);
      const maxProvVol = sortedProvTotals.length > 0 ? sortedProvTotals[0][1] : 1;

      // Totals
      const totalDeposits = cubePayClients.reduce((s, cl) => s + (parseFloat((cubePayMonthlyData[cl.id] || {}).deposits) || 0), 0);
      const totalWithdrawals = cubePayClients.reduce((s, cl) => s + (parseFloat((cubePayMonthlyData[cl.id] || {}).withdrawals) || 0), 0);

      return (
        <div>
          {/* KPI Cards — gradient style */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12, marginBottom: 24 }}>
            <div style={{ background: "linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.04))", border: "1px solid rgba(34,197,94,0.3)", borderRadius: 14, padding: "20px 12px", textAlign: "center" }}>
              <div style={{ fontSize: 9, color: "#22c55e", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Total Revenue</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#22c55e" }}>{fmtCurrency(totalCubePayRevenue)}</div>
            </div>
            <div style={{ background: "linear-gradient(135deg, rgba(99,102,241,0.12), rgba(99,102,241,0.04))", border: "1px solid rgba(99,102,241,0.25)", borderRadius: 14, padding: "20px 12px", textAlign: "center" }}>
              <div style={{ fontSize: 9, color: c.accent, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Total Deposits</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: c.accent }}>{fmtCurrency(totalDeposits)}</div>
            </div>
            <div style={{ background: "linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.04))", border: "1px solid rgba(245,158,11,0.25)", borderRadius: 14, padding: "20px 12px", textAlign: "center" }}>
              <div style={{ fontSize: 9, color: "#f59e0b", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Total Withdrawals</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#f59e0b" }}>{fmtCurrency(totalWithdrawals)}</div>
            </div>
            <div style={{ background: "linear-gradient(135deg, rgba(236,72,153,0.12), rgba(236,72,153,0.04))", border: "1px solid rgba(236,72,153,0.25)", borderRadius: 14, padding: "20px 12px", textAlign: "center" }}>
              <div style={{ fontSize: 9, color: "#ec4899", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Total Processed</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#ec4899" }}>{fmtCurrency(totalVolume)}</div>
            </div>
            <div style={{ background: "linear-gradient(135deg, rgba(20,184,166,0.12), rgba(20,184,166,0.04))", border: "1px solid rgba(20,184,166,0.25)", borderRadius: 14, padding: "20px 12px", textAlign: "center" }}>
              <div style={{ fontSize: 9, color: "#14b8a6", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Total Fees</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#14b8a6" }}>{fmtCurrency(totalFees)}</div>
            </div>
          </div>

          {/* Provider Breakdown — collapsible bar chart */}
          {(() => {
            return (
              <div style={{ background: c.card, borderRadius: 14, border: `1px solid ${c.border}`, marginBottom: 20, overflow: "hidden" }}>
                <div onClick={() => setCubePayProvOpen(!cubePayProvOpen)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px", cursor: "pointer" }}
                  onMouseEnter={e => e.currentTarget.style.background = c.surfaceHover} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: c.text }}>Provider Breakdown</div>
                    {sortedProvTotals.length > 0 && <span style={{ fontSize: 10, color: c.textMuted, background: c.surface, padding: "2px 8px", borderRadius: 4 }}>{sortedProvTotals.length} provider{sortedProvTotals.length !== 1 ? "s" : ""}</span>}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: c.accent }}>{fmtCurrency(sortedProvTotals.reduce((s, [, v]) => s + v, 0))} total</span>
                    <span style={{ fontSize: 10, color: c.textMuted }}>{cubePayProvOpen ? "▴" : "▾"}</span>
                  </div>
                </div>
                {cubePayProvOpen && (
                  <div style={{ padding: "0 18px 16px" }}>
                    {sortedProvTotals.length === 0 && <div style={{ fontSize: 12, color: c.textMuted, textAlign: "center", padding: 12 }}>No provider volume data yet. Configure Provider Mark Up deals on individual clients.</div>}
                    {sortedProvTotals.map(([label, vol]) => (
                      <div key={label} style={{ marginBottom: 10 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                          <span style={{ fontSize: 12, color: c.text, fontWeight: 500 }}>{label}</span>
                          <span style={{ fontSize: 12, fontWeight: 700, color: c.accent }}>{fmtCurrency(vol)}</span>
                        </div>
                        <div style={{ height: 8, background: c.surface, borderRadius: 4, overflow: "hidden" }}>
                          <div style={{ height: "100%", width: `${(vol / maxProvVol) * 100}%`, background: `linear-gradient(90deg, ${c.accent}, #8b5cf6)`, borderRadius: 4, transition: "width 0.4s" }} />
                        </div>
                      </div>
                    ))}

                    {/* Provider Groups management */}
                    <div style={{ borderTop: `1px solid ${c.border}`, marginTop: 12, paddingTop: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                        <div style={{ fontSize: 11, fontWeight: 600, color: c.textMuted }}>MANAGE PROVIDER GROUPS</div>
                        <button onClick={() => setProviderGroups([...providerGroups, { id: `pg-${Date.now()}`, name: "", providerServiceIds: [] }])} style={{ fontSize: 10, padding: "4px 10px", borderRadius: 4, cursor: "pointer", border: `1px solid ${c.accent}40`, background: `${c.accent}10`, color: c.accent, fontWeight: 600 }}>+ Create Group</button>
                      </div>
                      {providerGroups.map((pg, pgi) => (
                        <div key={pg.id} style={{ background: c.surface, borderRadius: 8, border: `1px solid ${c.border}`, padding: 10, marginBottom: 6 }}>
                          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
                            <input value={pg.name} onChange={e => { const g = [...providerGroups]; g[pgi] = { ...g[pgi], name: e.target.value }; setProviderGroups(g); }} placeholder="Group name (e.g. Rapyd Combined)" style={{ ...inputStyle4, flex: 1 }} />
                            <button onClick={() => setProviderGroups(providerGroups.filter(g => g.id !== pg.id))} style={{ background: "transparent", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 12 }}>✕</button>
                          </div>
                          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                            {allProviderServices.map(ps => {
                              const sel = (pg.providerServiceIds || []).includes(ps.svcId);
                              return <button key={ps.svcId} onClick={() => { const g = [...providerGroups]; const ids = sel ? (pg.providerServiceIds || []).filter(id => id !== ps.svcId) : [...(pg.providerServiceIds || []), ps.svcId]; g[pgi] = { ...g[pgi], providerServiceIds: ids }; setProviderGroups(g); }} style={{ fontSize: 10, padding: "3px 8px", borderRadius: 4, cursor: "pointer", border: sel ? `1px solid ${c.accent}` : `1px solid ${c.border}`, background: sel ? `${c.accent}20` : "transparent", color: sel ? c.accent : c.textMuted }}>{ps.provName} — {ps.svcName}</button>;
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

          {/* Client List */}
          <div style={{ fontSize: 13, fontWeight: 700, color: c.text, marginBottom: 10 }}>Clients ({cubePayClients.length})</div>
          {cubePayClients.length === 0 && <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 30, textAlign: "center", color: c.textMuted, fontSize: 13 }}>No eligible clients. Clients marked "Tech Only" or "Onboarding" are excluded.</div>}
          {cubePayClients.map(cl => {
            const deals = cubePayDeals[cl.id] || [];
            const rev = deals.reduce((s, d) => s + calcDealRevenue(d, cl.id), 0);
            const data = cubePayMonthlyData[cl.id] || {};
            const vol = (parseFloat(data.deposits) || 0) + (parseFloat(data.withdrawals) || 0);
            return (
              <div key={cl.id} onClick={() => setSelectedRevenueClient(cl.id)} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, marginBottom: 6, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", transition: "border-color 0.15s" }} onMouseEnter={e => e.currentTarget.style.borderColor = c.accent} onMouseLeave={e => e.currentTarget.style.borderColor = c.border}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{cl.name}</div>
                  <div style={{ fontSize: 11, color: c.textMuted, marginTop: 2 }}>{deals.length} deal{deals.length !== 1 ? "s" : ""} · Vol: {fmtCurrency(vol)}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: rev >= 0 ? "#22c55e" : "#ef4444" }}>{fmtCurrency(rev)}</div>
                  <div style={{ fontSize: 10, color: c.textMuted }}>revenue</div>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    // ===== GATEWAY.IO REVENUE =====
    const renderGatewayRev = () => {
      const totalGatewayFees = allGatewayRevClients.reduce((sum, cl) => {
        const cfg = gatewayRevFees[cl.id] || {};
        if (cfg.hidden) return sum;
        return sum + (parseFloat(cfg.monthlyFee) || 0);
      }, 0);

      return (
        <div>
          <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: 20, textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: "#22c55e" }}>{fmtCurrency(totalGatewayFees)}</div>
            <div style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textTransform: "uppercase", marginTop: 4 }}>Total Monthly Gateway Fees</div>
          </div>

          <div style={{ fontSize: 13, fontWeight: 700, color: c.text, marginBottom: 10 }}>Client Monthly Fees ({allGatewayRevClients.length})</div>

          {allGatewayRevClients.map(cl => {
            const cfg = gatewayRevFees[cl.id] || {};
            const updateFee = (field, val) => setGatewayRevFees({ ...gatewayRevFees, [cl.id]: { ...cfg, [field]: val } });
            return (
              <div key={cl.id} style={{ background: cfg.hidden ? `${c.card}80` : c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 14, marginBottom: 6, opacity: cfg.hidden ? 0.5 : 1, display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{cl.name}</div>
                  <div style={{ fontSize: 10, color: c.textMuted }}>{cl.clientType || "Standard"}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <select value={cfg.currency || "USD"} onChange={e => updateFee("currency", e.target.value)} style={{ ...inputStyle4, width: 70, fontSize: 11 }}>
                    {["USD", "EUR", "GBP"].map(cur => <option key={cur} value={cur}>{cur}</option>)}
                  </select>
                  <input value={cfg.monthlyFee || ""} onChange={e => updateFee("monthlyFee", e.target.value)} placeholder="0.00" style={{ ...inputStyle4, width: 100, textAlign: "right" }} />
                  <label style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer", fontSize: 10, color: c.textMuted }}>
                    <input type="checkbox" checked={!!cfg.hidden} onChange={e => updateFee("hidden", e.target.checked)} style={{ accentColor: c.accent }} />
                    Hide
                  </label>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    // ===== BETTING BRANDS REVENUE =====
    const renderBettingRev = () => {
      return (
        <div>
          <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: 40, textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🎰</div>
            <h3 style={{ fontSize: 18, fontWeight: 700, color: c.text, margin: "0 0 8px" }}>Our Betting Brands</h3>
            <p style={{ color: c.textMuted, fontSize: 13, margin: "0 0 16px", lineHeight: 1.6 }}>This section will connect directly to back office systems to pull revenue data from our betting brands — the same approach as the Ledger project.</p>
            <div style={{ display: "inline-block", background: c.surface, borderRadius: 8, padding: "8px 16px", fontSize: 11, color: c.accent, fontWeight: 600 }}>Back Office Integration — Coming Soon</div>
          </div>
        </div>
      );
    };

    // ===== REVENUE OVERVIEW =====
    const renderRevenueOverview = () => {
      const totalGatewayFees = allGatewayRevClients.reduce((sum, cl) => {
        const cfg = gatewayRevFees[cl.id] || {};
        if (cfg.hidden) return sum;
        return sum + (parseFloat(cfg.monthlyFee) || 0);
      }, 0);
      const totalRev = totalCubePayRevenue + totalGatewayFees;

      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 24 }}>
            <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: 20, textAlign: "center" }}>
              <div style={{ fontSize: 24, fontWeight: 800, color: "#22c55e" }}>{fmtCurrency(totalRev)}</div>
              <div style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textTransform: "uppercase", marginTop: 4 }}>Total Revenue</div>
            </div>
            <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: 20, textAlign: "center" }}>
              <div style={{ fontSize: 24, fontWeight: 800, color: c.accent }}>{fmtCurrency(totalCubePayRevenue)}</div>
              <div style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textTransform: "uppercase", marginTop: 4 }}>Cube Pay Revenue</div>
            </div>
            <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: 20, textAlign: "center" }}>
              <div style={{ fontSize: 24, fontWeight: 800, color: "#f59e0b" }}>{fmtCurrency(totalGatewayFees)}</div>
              <div style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textTransform: "uppercase", marginTop: 4 }}>Gateway.io Fees</div>
            </div>
          </div>

          <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: 24 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: c.text, marginBottom: 12 }}>Revenue Breakdown</div>
            {cubePayClients.map(cl => {
              const deals = cubePayDeals[cl.id] || [];
              const rev = deals.reduce((s, d) => s + calcDealRevenue(d, cl.id), 0);
              if (rev === 0 && deals.length === 0) return null;
              return (
                <div key={cl.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${c.border}` }}>
                  <span style={{ fontSize: 12, color: c.text }}>{cl.name} <span style={{ color: c.textMuted, fontSize: 10 }}>(Cube Pay)</span></span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: rev >= 0 ? "#22c55e" : "#ef4444" }}>{fmtCurrency(rev)}</span>
                </div>
              );
            })}
            {allGatewayRevClients.filter(cl => !((gatewayRevFees[cl.id] || {}).hidden) && parseFloat((gatewayRevFees[cl.id] || {}).monthlyFee) > 0).map(cl => (
              <div key={`gw-${cl.id}`} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${c.border}` }}>
                <span style={{ fontSize: 12, color: c.text }}>{cl.name} <span style={{ color: c.textMuted, fontSize: 10 }}>(Gateway Fee)</span></span>
                <span style={{ fontSize: 12, fontWeight: 600, color: "#f59e0b" }}>{fmtCurrency(parseFloat((gatewayRevFees[cl.id] || {}).monthlyFee) || 0)}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    return (
      <div>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 6px 0" }}>Revenue</h2>
        <p style={{ color: c.textSecondary, fontSize: 13, margin: "0 0 20px 0" }}>Track revenue across Cube Pay, Gateway.io fees, and Betting Brands</p>

        {/* Sub-tabs */}
        <div style={{ display: "flex", gap: 4, marginBottom: 24, background: c.surface, borderRadius: 10, padding: 4 }}>
          {subTabs.map(tab => (
            <button key={tab.key} onClick={() => { setSub(tab.key); setSelectedRevenueClient(null); }} style={{ flex: 1, padding: "10px 16px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, background: sub === tab.key ? c.accent : "transparent", color: sub === tab.key ? "#fff" : c.textMuted, transition: "all 0.15s" }}>{tab.label}</button>
          ))}
        </div>

        {sub === "overview" && renderRevenueOverview()}
        {sub === "cubepay" && renderCubePay()}
        {sub === "gatewayrev" && renderGatewayRev()}
        {sub === "bettingrev" && renderBettingRev()}
      </div>
    );
  };

  // ===== NAVIGATION GROUPS =====
  const sectionGroups = {
    david: { label: "DAVID CALENDAR", sections: ["calendar", "quickjobs", "signal", "sophie", "personal", "notes", "progress"] },
    gateway: { label: "GATEWAY.IO", sections: ["clients", "roadmap", "providers"] },
    corporate: { label: "CORPORATE MATRIX", sections: ["entities", "moneyflow", "banks", "brands"] },
    revenue: { label: "REVENUE", sections: ["revenue"] },
    settings: { label: "SETTINGS", sections: ["settings"] },
  };

  const getSectionGroup = (s) => {
    for (const [key, group] of Object.entries(sectionGroups)) {
      if (group.sections.includes(s)) return key;
    }
    return null;
  };

  const activeGroup = getSectionGroup(section);

  const allNavItems = [
    { section: "david", label: "DAVID", isHeader: true, group: "david" },
    { section: "calendar", icon: "calendar", label: "David Calendar", group: "david" },
    { section: "quickjobs", icon: "zap", label: "Quick Jobs", group: "david" },
    { section: "signal", icon: "signal", label: "Signal Tasks", group: "david" },
    { section: "sophie", icon: "delegate", label: "Sophie Tasks", group: "david" },
    { section: "personal", icon: "list", label: "Personal Jobs", group: "david" },
    { section: "notes", icon: "list", label: "Notes", group: "david" },
    { section: "progress", icon: "signal", label: "Daily Progress", group: "david" },
    { section: "gateway", label: "GATEWAY.IO", isHeader: true, group: "gateway" },
    { section: "clients", icon: "gateway", label: "Client Portal", group: "gateway" },
    { section: "roadmap", icon: "roadmap", label: "Integration Roadmap", group: "gateway" },
    { section: "providers", icon: "bank", label: "Providers", group: "gateway" },
    { section: "corporate", label: "CORPORATE MATRIX", isHeader: true, group: "corporate" },
    { section: "entities", icon: "building", label: "Entity Matrix", group: "corporate" },
    { section: "moneyflow", icon: "flow", label: "Corporate Flow", group: "corporate" },
    { section: "banks", icon: "bank", label: "Bank Accounts", group: "corporate" },
    { section: "brands", icon: "grid", label: "Gaming Brands", group: "corporate" },
    { section: "revenue_header", label: "REVENUE", isHeader: true, group: "revenue" },
    { section: "revenue", icon: "signal", label: "Revenue Dashboard", group: "revenue" },
    { section: "settings_header", label: "SETTINGS", isHeader: true, group: "settings" },
    { section: "settings", icon: "bank", label: "Settings", group: "settings" },
  ];

  const navItems = section === "home" ? [] : allNavItems.filter(item => item.group === activeGroup);

  const sections = { home: renderHome, calendar: renderCalendar, quickjobs: renderQuickJobs, signal: renderSignal, sophie: renderSophie, personal: renderPersonalJobs, notes: renderNotes, progress: renderDailyProgress, clients: renderClients, roadmap: renderRoadmap, providers: renderProviders, entities: renderEntities, moneyflow: renderMoneyFlow, banks: renderBanks, brands: renderBrands, revenue: renderRevenue, settings: renderSettings };

  // ===== AUTH LOADING =====
  if (authLoading) {
    return (
      <div style={{ display: "flex", height: "100vh", background: c.bg, alignItems: "center", justifyContent: "center", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ width: 60, height: 60, borderRadius: 16, background: "linear-gradient(135deg, #6366f1, #8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 28, color: "#fff", margin: "0 auto 16px", boxShadow: "0 8px 32px rgba(99,102,241,0.3)" }}>A</div>
          <div style={{ fontSize: 14, color: c.textMuted }}>Loading...</div>
        </div>
      </div>
    );
  }

  // ===== LOGIN SCREEN =====
  if (!authUser) {
    return (
      <div style={{ display: "flex", height: "100vh", background: c.bg, alignItems: "center", justifyContent: "center", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
        <div style={{ width: 400, textAlign: "center" }}>
          <div style={{ width: 80, height: 80, borderRadius: 20, background: "linear-gradient(135deg, #6366f1, #8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 36, color: "#fff", margin: "0 auto 20px", boxShadow: "0 8px 32px rgba(99,102,241,0.3)" }}>A</div>
          <h1 style={{ fontSize: 28, fontWeight: 800, color: c.text, margin: "0 0 4px 0" }}>The Aviro Group</h1>
          <p style={{ fontSize: 14, color: c.textMuted, margin: "0 0 32px 0", letterSpacing: "0.15em", textTransform: "uppercase", fontWeight: 500 }}>Global Enterprise</p>

          <div style={{ background: c.card, borderRadius: 16, border: `1px solid ${c.border}`, padding: 32, textAlign: "left" }}>
            <h2 style={{ fontSize: 18, fontWeight: 700, color: c.text, margin: "0 0 20px 0", textAlign: "center" }}>Sign In</h2>
            {loginError && <div style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 12, color: "#ef4444" }}>{loginError}</div>}
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: c.textMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>Email</label>
              <input value={loginEmail} onChange={e => setLoginEmail(e.target.value)} placeholder="you@aviro-group.com" type="email" onKeyDown={e => { if (e.key === "Enter") handleLogin(); }}
                style={{ width: "100%", padding: "10px 14px", background: c.surface, border: `1px solid ${c.border}`, borderRadius: 8, color: c.text, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: c.textMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>Password</label>
              <input value={loginPassword} onChange={e => setLoginPassword(e.target.value)} placeholder="Enter password" type="password" onKeyDown={e => { if (e.key === "Enter") handleLogin(); }}
                style={{ width: "100%", padding: "10px 14px", background: c.surface, border: `1px solid ${c.border}`, borderRadius: 8, color: c.text, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
            </div>
            <button onClick={handleLogin} disabled={loginLoading} style={{ width: "100%", padding: "12px", background: loginLoading ? c.textMuted : "linear-gradient(135deg, #6366f1, #8b5cf6)", border: "none", borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 700, cursor: loginLoading ? "wait" : "pointer", letterSpacing: "0.02em" }}>
              {loginLoading ? "Signing in..." : "Sign In"}
            </button>
          </div>
          <p style={{ fontSize: 11, color: c.textMuted, marginTop: 20 }}>Aviro Group Dashboard · Secure Login</p>
        </div>
      </div>
    );
  }

  // ===== MAIN AUTHENTICATED APP =====
  return (
    <div style={{ display: "flex", height: "100vh", background: c.bg, fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: c.text, overflow: "hidden" }}>
      {section !== "home" && (
      <div style={{ width: collapsed ? 60 : 220, background: c.surface, borderRight: `1px solid ${c.border}`, display: "flex", flexDirection: "column", transition: "width 0.2s", flexShrink: 0, overflow: "hidden" }}>
        <div style={{ padding: collapsed ? "20px 10px" : "20px 16px", borderBottom: `1px solid ${c.border}`, display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }} onClick={() => setCollapsed(!collapsed)}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #6366f1, #8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14, color: "#fff", flexShrink: 0 }}>A</div>
          {!collapsed && <div style={{ fontWeight: 700, fontSize: 14, color: c.text, whiteSpace: "nowrap" }}>AVIRO GROUP</div>}
        </div>
        {/* Back to Homepage */}
        <div onClick={() => setSection("home")} style={{ display: "flex", alignItems: "center", gap: 8, padding: collapsed ? "10px 16px" : "10px 16px", margin: "8px 6px 2px", borderRadius: 6, cursor: "pointer", background: "transparent", color: c.textMuted, fontSize: 12, fontWeight: 500 }}
          onMouseEnter={e => { e.currentTarget.style.background = c.surfaceHover; }}
          onMouseLeave={e => { e.currentTarget.style.background = "transparent"; }}>
          <span style={{ fontSize: 14 }}>←</span>
          {!collapsed && <span>Back to Homepage</span>}
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "4px 0" }}>
          {navItems.map((item, i) => {
            if (item.isHeader) {
              if (collapsed) return <div key={i} style={{ height: 1, background: c.border, margin: "8px 10px" }} />;
              return <div key={i} style={{ padding: "12px 16px 6px", fontSize: 10, fontWeight: 700, color: c.textMuted, letterSpacing: "0.1em" }}>{item.label}</div>;
            }
            const isAct = section === item.section;
            return (
              <div key={i} onClick={() => setSection(item.section)} style={{
                display: "flex", alignItems: "center", gap: 10, padding: collapsed ? "10px 18px" : "8px 16px", margin: "1px 6px", borderRadius: 6, cursor: "pointer",
                background: isAct ? c.accentBg : "transparent", color: isAct ? c.accent : c.textSecondary, fontSize: 13, fontWeight: isAct ? 600 : 400,
              }}
              onMouseEnter={e => { if (!isAct) e.currentTarget.style.background = c.surfaceHover; }}
              onMouseLeave={e => { if (!isAct) e.currentTarget.style.background = "transparent"; }}>
                <Icon type={item.icon} size={16} />
                {!collapsed && <span style={{ whiteSpace: "nowrap" }}>{item.label}</span>}
              </div>
            );
          })}
        </div>
        {/* User info + logout at bottom of sidebar */}
        {!collapsed && (
          <div style={{ padding: 12, borderTop: `1px solid ${c.border}` }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{ width: 28, height: 28, borderRadius: 7, background: c.accentBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: c.accent, flexShrink: 0 }}>{getAuthUserName().charAt(0).toUpperCase()}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: c.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{getAuthUserName()}</div>
                <div style={{ fontSize: 10, color: c.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{authUser.email}</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => setShowChangePassword(!showChangePassword)} style={{ flex: 1, background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 6, padding: "5px 8px", cursor: "pointer", fontSize: 10, fontWeight: 500 }}>Password</button>
              <button onClick={handleLogout} style={{ flex: 1, background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 6, padding: "5px 8px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Sign Out</button>
            </div>
            {showChangePassword && (
              <div style={{ marginTop: 8, padding: 8, background: c.surface, borderRadius: 6, border: `1px solid ${c.border}` }}>
                <input value={changePasswordVal} onChange={e => setChangePasswordVal(e.target.value)} type="password" placeholder="New password (min 6 chars)" style={{ width: "100%", padding: "6px 8px", background: c.bg, border: `1px solid ${c.border}`, borderRadius: 4, color: c.text, fontSize: 11, boxSizing: "border-box", marginBottom: 6 }} onKeyDown={e => { if (e.key === "Enter") handleChangePassword(); }} />
                <button onClick={handleChangePassword} style={{ width: "100%", background: c.accent, border: "none", color: "#fff", borderRadius: 4, padding: "5px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Update Password</button>
                {changePasswordMsg && <div style={{ fontSize: 10, color: changePasswordMsg.includes("updated") ? c.success : "#ef4444", marginTop: 4 }}>{changePasswordMsg}</div>}
              </div>
            )}
          </div>
        )}
        {!collapsed && (
          <div style={{ padding: "8px 16px 16px", fontSize: 11, color: c.textMuted }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 8, height: 8, borderRadius: 4, background: c.success }} /> ClickUp Synced</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}><div style={{ width: 8, height: 8, borderRadius: 4, background: c.accent }} /> Gmail Connected</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}><div style={{ width: 8, height: 8, borderRadius: 4, background: dbConnected ? c.success : supabaseUrl ? c.warning : c.textMuted }} /> {dbConnected ? "Database Synced" : supabaseUrl ? "DB Not Connected" : "No Database"}</div>
          </div>
        )}
      </div>
      )}
      <div style={{ flex: 1, overflowY: "auto", padding: section === "home" ? 0 : 32 }}>
        {/* Top bar on homepage with user info */}
        {section === "home" && (
          <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", padding: "16px 24px", gap: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: c.accentBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: c.accent }}>{getAuthUserName().charAt(0).toUpperCase()}</div>
              <span style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{getAuthUserName()}</span>
            </div>
            <button onClick={() => setShowChangePassword(!showChangePassword)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 11, fontWeight: 500 }}>Change Password</button>
            {authUser.email === "david@aviro-group.com" && <button onClick={() => setShowUserAdmin(!showUserAdmin)} style={{ background: c.accentBg, border: `1px solid ${c.accent}40`, color: c.accent, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Manage Users</button>}
            <button onClick={handleLogout} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Sign Out</button>
          </div>
        )}
        {/* Change password modal on homepage */}
        {section === "home" && showChangePassword && (
          <div style={{ maxWidth: 400, margin: "-8px auto 0", padding: "0 24px" }}>
            <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
              <h3 style={{ fontSize: 14, fontWeight: 700, color: c.text, margin: "0 0 12px 0" }}>Change Password</h3>
              <input value={changePasswordVal} onChange={e => setChangePasswordVal(e.target.value)} type="password" placeholder="New password (min 6 chars)" style={{ width: "100%", padding: "8px 12px", background: c.surface, border: `1px solid ${c.border}`, borderRadius: 6, color: c.text, fontSize: 13, boxSizing: "border-box", marginBottom: 10 }} onKeyDown={e => { if (e.key === "Enter") handleChangePassword(); }} />
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={handleChangePassword} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Update</button>
                <button onClick={() => { setShowChangePassword(false); setChangePasswordMsg(""); }} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 6, padding: "8px 16px", cursor: "pointer", fontSize: 12 }}>Cancel</button>
              </div>
              {changePasswordMsg && <div style={{ fontSize: 11, color: changePasswordMsg.includes("updated") ? c.success : "#ef4444", marginTop: 8 }}>{changePasswordMsg}</div>}
            </div>
          </div>
        )}
        {/* User admin panel on homepage (David only) */}
        {section === "home" && showUserAdmin && (
          <div style={{ maxWidth: 600, margin: "0 auto", padding: "0 24px 16px" }}>
            <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 24 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: c.text, margin: 0 }}>User Management</h3>
                <button onClick={() => setShowUserAdmin(false)} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer", fontSize: 18 }}>✕</button>
              </div>
              <p style={{ fontSize: 12, color: c.textMuted, margin: "0 0 16px 0" }}>Manage users from your <a href="https://supabase.com/dashboard/project/iosvevycvqviaonsxsnq/auth/users" target="_blank" rel="noopener" style={{ color: c.accent, textDecoration: "none", fontWeight: 600 }}>Supabase Dashboard → Authentication → Users</a>. Add new users with "Add user" → "Create new user" and set their email + password.</p>
              <div style={{ background: c.surface, borderRadius: 8, padding: 16, border: `1px solid ${c.border}` }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: c.text, marginBottom: 10 }}>Team Directory</div>
                {[
                  { name: "davidaviro", email: "david@aviro-group.com", role: "Admin" },
                  { name: "sophieaviro", email: "sophie@aviro-group.com", role: "User" },
                  { name: "aleksandra", email: "aleksandra@aviro-group.com", role: "User" },
                  { name: "charlieaviro", email: "charlie@aviro-group.com", role: "User" },
                  { name: "chrisaviro", email: "chris.d@aviro-group.com", role: "User" },
                  { name: "jamesaviro", email: "james@aviro-group.com", role: "User" },
                  { name: "tomaviro", email: "tom@aviro-group.com", role: "User" },
                  { name: "tommoaviro", email: "martin@aviro-group.com", role: "User" },
                  { name: "russaviro", email: "russ@aviro-group.com", role: "User" },
                ].map(u => (
                  <div key={u.email} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: `1px solid ${c.border}` }}>
                    <div style={{ width: 28, height: 28, borderRadius: 7, background: u.role === "Admin" ? "linear-gradient(135deg, #6366f1, #8b5cf6)" : c.accentBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: u.role === "Admin" ? "#fff" : c.accent, flexShrink: 0 }}>{u.name.charAt(0).toUpperCase()}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{u.name}</div>
                      <div style={{ fontSize: 11, color: c.textMuted }}>{u.email}</div>
                    </div>
                    <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: u.role === "Admin" ? c.accentBg : c.surface, color: u.role === "Admin" ? c.accent : c.textMuted, fontWeight: 600, border: `1px solid ${u.role === "Admin" ? c.accent + "40" : c.border}` }}>{u.role}</span>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 16, padding: 12, background: `${c.accent}10`, borderRadius: 8, border: `1px solid ${c.accent}30` }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: c.accent, marginBottom: 4 }}>How to add/remove users:</div>
                <ol style={{ fontSize: 11, color: c.textSecondary, margin: 0, paddingLeft: 16, lineHeight: 1.8 }}>
                  <li>Go to your <a href="https://supabase.com/dashboard/project/iosvevycvqviaonsxsnq/auth/users" target="_blank" rel="noopener" style={{ color: c.accent }}>Supabase Auth Dashboard</a></li>
                  <li>Click "Add user" → "Create new user"</li>
                  <li>Enter the user's email and a temporary password</li>
                  <li>The user can change their password after first login</li>
                </ol>
              </div>
            </div>
          </div>
        )}
        <div style={{ maxWidth: section === "home" ? "100%" : section === "signal" ? 1400 : 1100, margin: "0 auto" }}>{(sections[section] || renderHome)()}</div>
      </div>
      {copiedText && (
        <div style={{ position: "fixed", bottom: 24, right: 24, background: c.success, color: "#fff", padding: "10px 20px", borderRadius: 8, fontSize: 12, fontWeight: 600, boxShadow: "0 4px 12px rgba(0,0,0,0.3)", zIndex: 1000 }}>Copied to clipboard</div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AviroDashboard));
</script>
</body>
</html>
