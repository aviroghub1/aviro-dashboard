                  <div style={{ fontSize: 14, fontWeight: 600, color: c.text, marginBottom: 4 }}>No providers assigned</div>
                  <div style={{ fontSize: 12, color: c.textMuted }}>Add a provider to configure pricing, fees, and settlement terms</div>
                </div>
              )}

              {clProviders.map((cp, cpIdx) => {
                const linkedProv = providers.find(p => p.id === cp.providerId);
                const linkedSvcs = linkedProv ? (linkedProv.services || []) : [];
                const linkedSvc = linkedSvcs.find(s => s.id === cp.serviceId);

                // Provider base cost from provider config
                const provPayinPct = linkedSvc ? parseFloat(linkedSvc.payinPct) || 0 : 0;
                const provPayinTx = linkedSvc ? parseFloat(linkedSvc.payinTxFee) || 0 : 0;
                const provSettlementFee = linkedSvc ? parseFloat(linkedSvc.settlementFee) || 0 : 0;

                // Markup calc for Direct
                const clientRate = parseFloat(cp.clientPayinPct) || 0;
                const clientTx = parseFloat(cp.clientPayinTxFee) || 0;
                const marginPct = clientRate - provPayinPct;
                const marginTx = clientTx - provPayinTx;
                const marginColor = (v) => parseFloat(v) > 0 ? "#34d399" : parseFloat(v) < 0 ? "#f87171" : c.textMuted;

                // Tiers renderer (reusable) — now tier-type-aware
                const tierTypeVal = cp.tierType || "tiers";
                const renderTiers = (tiers, field) => (
                  <div style={{ marginTop: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 9, fontWeight: 700, color: c.textMuted, textTransform: "uppercase" }}>Volume Tiers</span>
                        <select value={tierTypeVal} onChange={e => updateClProv(cpIdx, "tierType", e.target.value)} style={{ ...inputStyle, fontSize: 10, padding: "2px 6px", width: "auto" }}>
                          <option value="tiers">Incremental (Tiers)</option>
                          <option value="targets">Entire Volume (Targets)</option>
                        </select>
                      </div>
                      <button onClick={() => addTier(cpIdx, tiers, field)} style={{ fontSize: 9, background: "transparent", border: `1px solid ${c.accent}40`, color: c.accent, borderRadius: 4, padding: "2px 6px", cursor: "pointer" }}>+ Tier</button>
                    </div>
                    <div style={{ fontSize: 9, color: c.textMuted, marginBottom: 4, fontStyle: "italic" }}>
                      {tierTypeVal === "tiers" ? "Base rate for first chunk; tier rate applies to volume within each tier range" : "Once threshold reached, entire volume is charged at that rate"}
                    </div>
                    {(tiers || []).map(tier => (
                      <div key={tier.id} style={{ display: "flex", gap: 6, marginBottom: 4, alignItems: "center" }}>
                        <span style={{ fontSize: 10, color: c.textMuted }}>{tierTypeVal === "tiers" ? "Up to" : "At"}</span>
                        <input value={tier.upTo || ""} onChange={e => updateTier(cpIdx, tiers, field, tier.id, "upTo", e.target.value)} placeholder="Volume" style={{ ...inputStyle, width: 100, fontSize: 11 }} />
                        <span style={{ fontSize: 10, color: c.textMuted }}>{"→"}</span>
                        <input value={tier.rate || ""} onChange={e => updateTier(cpIdx, tiers, field, tier.id, "rate", e.target.value)} placeholder="Rate %" style={{ ...inputStyle, width: 80, fontSize: 11 }} />
                        <span style={{ fontSize: 10, color: c.textMuted }}>%{tierTypeVal === "targets" ? " (entire vol.)" : ""}</span>
                        <button onClick={() => removeTier(cpIdx, tiers, field, tier.id)} style={{ background: "transparent", border: "none", color: "#f87171", cursor: "pointer", fontSize: 11 }}>{"✕"}</button>
                      </div>
                    ))}
                  </div>
                );

                // Available regions & currencies from linked service
                const svcRegions = linkedSvc ? (linkedSvc.regions || []) : [];
                const svcProcCurrencies = linkedSvc && (linkedSvc.processingCurrencies || []).length > 0 ? linkedSvc.processingCurrencies : CLIENT_CURRENCIES;

                return (
                  <div key={cp.id} style={{ ...sectionCard, borderColor: `${c.accent}20`, marginBottom: 14 }}>
                    {/* 1. Header */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 10, fontWeight: 700, color: c.accent, background: c.accentBg, padding: "2px 8px", borderRadius: 4 }}>PROVIDER {cpIdx + 1}</span>
                        {linkedProv && <span style={{ fontSize: 14, fontWeight: 700, color: c.text }}>{linkedProv.name}</span>}
                        {linkedSvc && <span style={{ fontSize: 11, color: c.textMuted }}>{"—"} {linkedSvc.name || "Unnamed"}</span>}
                        {cp.feeModel && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, fontWeight: 600, background: cp.feeModel === "Direct" ? "rgba(34,197,94,0.1)" : cp.feeModel === "Profit Share" ? "rgba(139,92,246,0.1)" : "rgba(245,158,11,0.1)", color: cp.feeModel === "Direct" ? "#34d399" : cp.feeModel === "Profit Share" ? "#a78bfa" : "#fbbf24" }}>{cp.feeModel}</span>}
                      </div>
                      <button onClick={() => { if (confirm("Remove this provider?")) removeClProv(cpIdx); }} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Remove</button>
                    </div>

                    {/* 2. Provider & Service & Fee Model Selection */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 14 }}>
                      <div>
                        <label style={labelStyle}>Provider</label>
                        <select value={cp.providerId || ""} onChange={e => updateClProvMulti(cpIdx, { providerId: e.target.value, serviceId: "", enabledRegions: [], processingCurrencies: [] })} style={{ ...inputStyle, width: "100%" }}>
                          <option value="">{"—"} Select Provider {"—"}</option>
                          {providers.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label style={labelStyle}>Service</label>
                        <select value={cp.serviceId || ""} onChange={e => updateClProvMulti(cpIdx, { serviceId: e.target.value, enabledRegions: [], processingCurrencies: [] })} style={{ ...inputStyle, width: "100%" }} disabled={!cp.providerId}>
                          <option value="">{"—"} Select Service {"—"}</option>
                          {linkedSvcs.map(s => <option key={s.id} value={s.id}>{s.name || "Unnamed"} {s.serviceType2 ? `(${s.serviceType2})` : ""}</option>)}
                        </select>
                      </div>
                      <div>
                        <label style={labelStyle}>Fee Model</label>
                        <select value={cp.feeModel || ""} onChange={e => updateClProv(cpIdx, "feeModel", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                          <option value="">{"—"} Select {"—"}</option>
                          <option value="Direct">Direct</option>
                          <option value="Profit Share">Profit Share</option>
                          <option value="Referral">Referral</option>
                        </select>
                      </div>
                    </div>

                    {/* 3. Service Info Badges (no static regions badge) */}
                    {linkedSvc && (
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
                        {linkedSvc.serviceType1 && <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 5, background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, fontWeight: 600 }}>{linkedSvc.serviceType1}</span>}
                        {linkedSvc.serviceType2 && <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 5, background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.2)", color: c.accent, fontWeight: 600 }}>{linkedSvc.serviceType2}</span>}
                        {linkedSvc.serviceType2 === "Cards" && linkedSvc.cardType && <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 5, background: "rgba(236,72,153,0.08)", border: "1px solid rgba(236,72,153,0.2)", color: "#ec4899", fontWeight: 600 }}>MCC: {linkedSvc.cardType}</span>}
                        {linkedSvc.serviceType2 === "Open Banking" && (
                          linkedSvc.providesC2B === true
                            ? <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 5, background: "rgba(34,197,94,0.08)", border: "1px solid rgba(34,197,94,0.2)", color: "#34d399", fontWeight: 600 }}>C2B Account: Provider</span>
                            : linkedSvc.providesC2B === false
                              ? <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 5, background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.2)", color: "#fbbf24", fontWeight: 600 }}>C2B Account: Our Bank</span>
                              : <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 5, background: c.surface, border: `1px solid ${c.border}`, color: c.textMuted, fontWeight: 600 }}>C2B: Not set</span>
                        )}
                        {linkedSvc.agreementType && <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 5, background: c.surface, border: `1px solid ${c.border}`, color: c.textMuted, fontWeight: 600 }}>{linkedSvc.agreementType}</span>}
                      </div>
                    )}

                    {/* 4. Regions — toggle buttons from linked service's available regions */}
                    <div style={{ marginBottom: 14 }}>
                      <label style={{ ...labelStyle, marginBottom: 4 }}>Regions</label>
                      {svcRegions.length > 0 ? (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                          {svcRegions.map(r => {
                            const sel = (cp.enabledRegions || []).includes(r);
                            return <button key={r} onClick={() => { const regs = cp.enabledRegions || []; updateClProv(cpIdx, "enabledRegions", sel ? regs.filter(x => x !== r) : [...regs, r]); }} style={{ padding: "3px 8px", borderRadius: 5, fontSize: 10, fontWeight: sel ? 600 : 400, cursor: "pointer", background: sel ? c.accentBg : c.surface, color: sel ? c.accent : c.textMuted, border: `1px solid ${sel ? c.accent + "40" : c.border}` }}>{r}</button>;
                          })}
                        </div>
                      ) : (
                        <div style={{ fontSize: 11, color: c.textMuted, fontStyle: "italic" }}>{linkedSvc ? "No regions defined for this service" : "Select a service to see available regions"}</div>
                      )}
                      {(cp.enabledRegions || []).length > 0 && (
                        <div style={{ marginTop: 6 }}>
                          <input value={cp.specificCountries || ""} onChange={e => updateClProv(cpIdx, "specificCountries", e.target.value)} placeholder="Specific countries, e.g. Poland, Czech Republic" style={{ ...inputStyle, width: "100%", fontSize: 11 }} />
                        </div>
                      )}
                    </div>

                    {/* 5. Processing Currencies — toggle buttons */}
                    <div style={{ marginBottom: 14 }}>
                      <label style={{ ...labelStyle, marginBottom: 4 }}>Processing Currencies</label>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                        {svcProcCurrencies.map(cur => {
                          const sel = (cp.processingCurrencies || []).includes(cur);
                          return <button key={cur} onClick={() => { const curs = cp.processingCurrencies || []; updateClProv(cpIdx, "processingCurrencies", sel ? curs.filter(x => x !== cur) : [...curs, cur]); }} style={{ padding: "3px 8px", borderRadius: 5, fontSize: 10, fontWeight: sel ? 600 : 400, cursor: "pointer", background: sel ? "rgba(34,197,94,0.1)" : c.surface, color: sel ? "#34d399" : c.textMuted, border: `1px solid ${sel ? "rgba(34,197,94,0.3)" : c.border}` }}>{cur}</button>;
                        })}
                      </div>
                    </div>

                    {/* 6. ICC++ toggle + Apple Pay / Google Pay */}
                    {linkedSvc && cp.feeModel && (
                      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14, flexWrap: "wrap" }}>
                        <label style={{ fontSize: 11, color: c.textSecondary, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="checkbox" checked={!!cp.iccPlusPlus} onChange={e => updateClProv(cpIdx, "iccPlusPlus", e.target.checked)} style={{ accentColor: c.accent }} />
                          ICC++
                        </label>
                        {cp.iccPlusPlus && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 4, background: "rgba(251,191,36,0.1)", border: "1px solid rgba(251,191,36,0.25)", color: "#fbbf24" }}>ICC++ ENABLED</span>}
                        <div style={{ width: 1, height: 16, background: c.border }} />
                        <label style={{ fontSize: 11, color: c.textSecondary, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="checkbox" checked={!!cp.applePay} onChange={e => updateClProv(cpIdx, "applePay", e.target.checked)} style={{ accentColor: "#a78bfa" }} />
                          Apple Pay
                        </label>
                        <label style={{ fontSize: 11, color: c.textSecondary, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="checkbox" checked={!!cp.googlePay} onChange={e => updateClProv(cpIdx, "googlePay", e.target.checked)} style={{ accentColor: "#a78bfa" }} />
                          Google Pay
                        </label>
                      </div>
                    )}

                    {/* 7. Provider base cost reference (Direct only) */}
                    {linkedSvc && cp.feeModel === "Direct" && (
                      <div style={{ background: `${c.accent}08`, borderRadius: 8, padding: 10, marginBottom: 14, border: `1px solid ${c.accent}15` }}>
                        <div style={{ fontSize: 9, fontWeight: 700, color: c.accent, textTransform: "uppercase", marginBottom: 4 }}>Provider Cost (from {linkedProv.name})</div>
                        <div style={{ display: "flex", gap: 16, fontSize: 11, color: c.textMuted }}>
                          <span>Rate: <strong style={{ color: c.text }}>{provPayinPct}%</strong>{provPayinTx > 0 && <> + <strong style={{ color: c.text }}>{linkedSvc.payinTxCurrency || "USD"} {provPayinTx}</strong>/tx</>}</span>
                          {provSettlementFee > 0 && <span>Settlement: <strong style={{ color: c.text }}>{provSettlementFee}%</strong></span>}
                        </div>
                      </div>
                    )}

                    {/* 8. ===== DIRECT RATES ===== */}
                    {cp.feeModel === "Direct" && (
                      <div>
                        <div style={{ fontSize: 10, fontWeight: 700, color: c.textMuted, textTransform: "uppercase", marginBottom: 8 }}>Client Rates</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 8 }}>
                          <div><label style={labelStyle}>Rate %</label><input value={cp.clientPayinPct || ""} onChange={e => updateClProv(cpIdx, "clientPayinPct", e.target.value)} placeholder="e.g. 4.5" style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>Tx Fee</label><input value={cp.clientPayinTxFee || ""} onChange={e => updateClProv(cpIdx, "clientPayinTxFee", e.target.value)} placeholder="e.g. 0.20" style={{ ...inputStyle, width: "100%" }} /></div>
                        </div>
                        {linkedSvc && clientRate > 0 && (
                          <div style={{ display: "flex", gap: 16, padding: "8px 12px", background: "rgba(34,197,94,0.05)", borderRadius: 6, border: "1px solid rgba(34,197,94,0.15)", marginBottom: 8 }}>
                            <span style={{ fontSize: 10, fontWeight: 700, color: c.textMuted, textTransform: "uppercase" }}>Our Markup:</span>
                            <span style={{ fontSize: 11 }}>Rate <strong style={{ color: marginColor(marginPct) }}>{marginPct >= 0 ? "+" : ""}{marginPct.toFixed(3)}%</strong></span>
                            {marginTx !== 0 && <span style={{ fontSize: 11 }}>Tx <strong style={{ color: marginColor(marginTx) }}>{marginTx >= 0 ? "+" : ""}{marginTx.toFixed(2)}</strong>/tx</span>}
                          </div>
                        )}
                        {renderTiers(cp.payinTiers, "payinTiers")}
                      </div>
                    )}

                    {/* 8. ===== PROFIT SHARE RATES ===== */}
                    {cp.feeModel === "Profit Share" && (
                      <div>
                        <div style={{ fontSize: 10, fontWeight: 700, color: c.textMuted, textTransform: "uppercase", marginBottom: 8 }}>Client Rates</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                          <div><label style={labelStyle}>Rate %</label><input value={cp.clientPayinPct || ""} onChange={e => updateClProv(cpIdx, "clientPayinPct", e.target.value)} placeholder="e.g. 6.0" style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>Tx Fee</label><input value={cp.clientPayinTxFee || ""} onChange={e => updateClProv(cpIdx, "clientPayinTxFee", e.target.value)} placeholder="e.g. 0.20" style={{ ...inputStyle, width: "100%" }} /></div>
                        </div>
                        <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${c.border}` }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: "#a78bfa", textTransform: "uppercase", marginBottom: 8 }}>Provider Hard Cost & Profit Share</div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 8 }}>
                            <div><label style={labelStyle}>Hard Cost %</label><input value={cp.hardCostPayinPct || ""} onChange={e => updateClProv(cpIdx, "hardCostPayinPct", e.target.value)} placeholder="e.g. 2.0" style={{ ...inputStyle, width: "100%" }} /></div>
                            <div><label style={labelStyle}>Profit Share %</label><input value={cp.profitSharePct || ""} onChange={e => updateClProv(cpIdx, "profitSharePct", e.target.value)} placeholder="e.g. 50" style={{ ...inputStyle, width: "100%" }} /></div>
                          </div>
                          {(parseFloat(cp.clientPayinPct) && parseFloat(cp.hardCostPayinPct) && parseFloat(cp.profitSharePct)) ? (() => {
                            const cr = parseFloat(cp.clientPayinPct), hc = parseFloat(cp.hardCostPayinPct), sh = parseFloat(cp.profitSharePct);
                            const profit = cr - hc, providerGets = profit * (sh / 100), weKeep = profit - providerGets;
                            return (
                              <div style={{ padding: "10px 12px", background: "rgba(139,92,246,0.05)", borderRadius: 6, border: "1px solid rgba(139,92,246,0.15)" }}>
                                <div style={{ fontSize: 11, color: c.textSecondary }}>
                                  Client <strong>{cr}%</strong> {"—"} Cost <strong>{hc}%</strong> = <strong>{profit.toFixed(2)}%</strong> profit {"—"} Provider gets <strong>{providerGets.toFixed(2)}%</strong> ({sh}%) {"—"} <strong style={{ color: "#34d399" }}>We keep {weKeep.toFixed(2)}%</strong>
                                </div>
                              </div>
                            );
                          })() : null}
                        </div>
                        {renderTiers(cp.payinTiers, "payinTiers")}
                      </div>
                    )}

                    {/* 8. ===== REFERRAL RATES ===== */}
                    {cp.feeModel === "Referral" && (
                      <div>
                        <div style={{ fontSize: 10, fontWeight: 700, color: c.textMuted, textTransform: "uppercase", marginBottom: 8 }}>Rates Charged to Merchant</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                          <div><label style={labelStyle}>Rate %</label><input value={cp.referralPayinPct || ""} onChange={e => updateClProv(cpIdx, "referralPayinPct", e.target.value)} placeholder="e.g. 4.5" style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>Tx Fee</label><input value={cp.referralPayinTxFee || ""} onChange={e => updateClProv(cpIdx, "referralPayinTxFee", e.target.value)} placeholder="e.g. 0.20" style={{ ...inputStyle, width: "100%" }} /></div>
                        </div>
                        {renderTiers(cp.payinTiers, "payinTiers")}
                      </div>
                    )}

                    {/* 10. Monthly Minimum */}
                    {cp.feeModel && (
                      <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${c.border}` }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: c.textMuted, textTransform: "uppercase", marginBottom: 6 }}>Monthly Minimum</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 4 }}>
                          <div><label style={labelStyle}>Amount</label><input value={cp.monthlyMinAmount || ""} onChange={e => updateClProv(cpIdx, "monthlyMinAmount", e.target.value)} placeholder="e.g. 5000" style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>Currency</label><select value={cp.monthlyMinCurrency || "EUR"} onChange={e => updateClProv(cpIdx, "monthlyMinCurrency", e.target.value)} style={{ ...inputStyle, width: "100%" }}>{CLIENT_CURRENCIES.map(cur => <option key={cur} value={cur}>{cur}</option>)}</select></div>
                          <div><label style={labelStyle}>Term</label><select value={cp.monthlyMinTerm || "Monthly"} onChange={e => updateClProv(cpIdx, "monthlyMinTerm", e.target.value)} style={{ ...inputStyle, width: "100%" }}><option value="Monthly">Monthly</option><option value="Quarterly">Quarterly</option></select></div>
                        </div>
                        <div style={{ fontSize: 9, color: c.textMuted, fontStyle: "italic" }}>If volume-generated fees are below this amount, the minimum fee applies</div>
                      </div>
                    )}

                    {/* 11. Settlement (Merchant) */}
                    {cp.feeModel && (
                      <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${c.border}` }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: c.textMuted, textTransform: "uppercase", marginBottom: 6 }}>Terms</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10 }}>
                          <div><label style={labelStyle}>Settlement Terms</label><select value={cp.settlementTerms || ""} onChange={e => updateClProv(cpIdx, "settlementTerms", e.target.value)} style={{ ...inputStyle, width: "100%" }}><option value="">{"—"} Select {"—"}</option>{SETTLEMENT_TERMS.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                          <div><label style={labelStyle}>Settlement Fee (%)</label><input value={cp.settlementFee || ""} onChange={e => updateClProv(cpIdx, "settlementFee", e.target.value)} placeholder="e.g. 0.5" style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>Method</label><select value={cp.settlementMethod || ""} onChange={e => updateClProv(cpIdx, "settlementMethod", e.target.value)} style={{ ...inputStyle, width: "100%" }}><option value="">{"—"} Select {"—"}</option><option value="Fiat">Fiat</option><option value="Crypto">Crypto</option></select></div>
                          <div><label style={labelStyle}>Currency</label><select value={cp.currency || "USD"} onChange={e => updateClProv(cpIdx, "currency", e.target.value)} style={{ ...inputStyle, width: "100%" }}>{CLIENT_CURRENCIES.map(cur => <option key={cur} value={cur}>{cur}</option>)}</select></div>
                        </div>
                      </div>
                    )}

                    {/* 12. Rolling Reserve */}
                    {cp.feeModel && (
                      <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${c.border}` }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: c.textMuted, textTransform: "uppercase" }}>Rolling Reserve</div>
                          <label style={{ fontSize: 11, color: c.textSecondary, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                            <input type="checkbox" checked={cp.rollingReserveEnabled !== false} onChange={e => updateClProv(cpIdx, "rollingReserveEnabled", e.target.checked)} style={{ accentColor: c.accent }} />
                            Enabled
                          </label>
                        </div>
                        {cp.rollingReserveEnabled !== false && (<>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 8 }}>
                            <div><label style={labelStyle}>Reserve %</label><input value={cp.rollingReservePct || ""} onChange={e => updateClProv(cpIdx, "rollingReservePct", e.target.value)} placeholder="e.g. 10" style={{ ...inputStyle, width: "100%" }} /></div>
                            <div><label style={labelStyle}>Term (days)</label><input value={cp.rollingReserveTerm || ""} onChange={e => updateClProv(cpIdx, "rollingReserveTerm", e.target.value)} placeholder="e.g. 180" style={{ ...inputStyle, width: "100%" }} /></div>
                            <div><label style={labelStyle}>Cap Amount</label><input value={cp.rollingReserveCap || ""} onChange={e => updateClProv(cpIdx, "rollingReserveCap", e.target.value)} placeholder="e.g. 50000" style={{ ...inputStyle, width: "100%" }} /></div>
                            <div><label style={labelStyle}>Cap Currency</label><select value={cp.rollingReserveCapCurrency || "EUR"} onChange={e => updateClProv(cpIdx, "rollingReserveCapCurrency", e.target.value)} style={{ ...inputStyle, width: "100%" }}>{CLIENT_CURRENCIES.map(cur => <option key={cur} value={cur}>{cur}</option>)}</select></div>
                          </div>
                          <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: c.surface, borderRadius: 6, border: `1px solid ${c.border}`, cursor: "pointer", fontSize: 11, color: c.textSecondary }}>
                            <input type="checkbox" checked={!!cp.shareRollingReserve} onChange={e => updateClProv(cpIdx, "shareRollingReserve", e.target.checked)} style={{ accentColor: c.accent }} />
                            Share RR terms with other services from the same provider
                          </label>
                        </>)}
                      </div>
                    )}

                    {/* 13. Our Referral % (Referral model only) — at the very bottom */}
                    {cp.feeModel === "Referral" && (
                      <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${c.border}` }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: "#fbbf24", textTransform: "uppercase", marginBottom: 6 }}>Our Referral</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 10 }}>
                          <div><label style={labelStyle}>Our Referral %</label><input value={cp.referralPct || ""} onChange={e => updateClProv(cpIdx, "referralPct", e.target.value)} placeholder="e.g. 10" style={{ ...inputStyle, width: "100%" }} /></div>
                          {(parseFloat(cp.referralPct) && parseFloat(cp.referralPayinPct)) ? (
                            <div style={{ display: "flex", alignItems: "end", paddingBottom: 6 }}>
                              <div style={{ fontSize: 11, color: c.textSecondary }}>
                                {cp.referralPct}% of volume {"—"} on <strong>{cp.referralPayinPct}%</strong> rate = <strong style={{ color: "#34d399" }}>{((parseFloat(cp.referralPayinPct)) * (parseFloat(cp.referralPct)) / 100).toFixed(3)}%</strong> effective earning
                              </div>
                            </div>
                          ) : null}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Bank Accounts */}
              <div style={sectionCard}>
                <SectionHeader sectionKey="banks" title="Bank Accounts" badge={`${(cl.bankAccounts || []).length}`} extra={
                  !collapsed.banks && <button onClick={() => {
                    const newBA = { id: `clba-${Date.now()}`, bankName: "", accountType: "", feeIncoming: "", feeOutgoing: "" };
                    updateClient(cl.id, "bankAccounts", [...(cl.bankAccounts || []), newBA]);
                  }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>+ Add</button>
                } />
                {!collapsed.banks && (<>
                  {(cl.bankAccounts || []).length === 0 && <div style={{ fontSize: 12, color: c.textMuted }}>No bank accounts</div>}
                  {(cl.bankAccounts || []).map(ba => (
                    <div key={ba.id} style={{ background: c.surface, borderRadius: 8, border: `1px solid ${c.border}`, padding: 12, marginBottom: 8 }}>
                      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr auto", gap: 10, alignItems: "end" }}>
                        <div><label style={labelStyle}>Bank Name</label><input value={ba.bankName || ""} onChange={e => { const upd = (cl.bankAccounts || []).map(b => b.id === ba.id ? { ...b, bankName: e.target.value } : b); updateClient(cl.id, "bankAccounts", upd); }} placeholder="Bank name" style={{ ...inputStyle, width: "100%" }} /></div>
                        <div><label style={labelStyle}>Account Type</label><select value={ba.accountType || ""} onChange={e => { const upd = (cl.bankAccounts || []).map(b => b.id === ba.id ? { ...b, accountType: e.target.value } : b); updateClient(cl.id, "bankAccounts", upd); }} style={{ ...inputStyle, width: "100%" }}><option value="">— Type —</option>{BANK_ACCT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                        <div><label style={labelStyle}>Fee In (%)</label><input value={ba.feeIncoming || ""} onChange={e => { const upd = (cl.bankAccounts || []).map(b => b.id === ba.id ? { ...b, feeIncoming: e.target.value } : b); updateClient(cl.id, "bankAccounts", upd); }} placeholder="%" style={{ ...inputStyle, width: "100%" }} /></div>
                        <div><label style={labelStyle}>Fee Out (%)</label><input value={ba.feeOutgoing || ""} onChange={e => { const upd = (cl.bankAccounts || []).map(b => b.id === ba.id ? { ...b, feeOutgoing: e.target.value } : b); updateClient(cl.id, "bankAccounts", upd); }} placeholder="%" style={{ ...inputStyle, width: "100%" }} /></div>
                        <button onClick={() => updateClient(cl.id, "bankAccounts", (cl.bankAccounts || []).filter(b => b.id !== ba.id))} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 4, padding: "3px 6px", cursor: "pointer", fontSize: 10, marginBottom: 2 }}>✕</button>
                      </div>
                    </div>
                  ))}
                </>)}
              </div>


              </>);
            })()}



          </>);
          })()}
        </div>
      );
    }

    // ===== CLIENT LIST VIEW =====
    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0, letterSpacing: "-0.02em" }}>Gateway.io Client Portal</h2>
            <p style={{ color: c.textSecondary, fontSize: 13, margin: "4px 0 0 0" }}>{gatewayClients.filter(x => x.status === "active").length} active · {gatewayClients.filter(x => x.status === "onboarding" || !x.status).length} onboarding · {gatewayClients.filter(x => x.status === "discussion").length} in discussion · {gatewayClients.filter(x => x.status === "inactive").length} inactive</p>
          </div>
          <button onClick={() => setShowAddClient(!showAddClient)} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ Add Client</button>
        </div>

        {/* Add Client Form */}
        {showAddClient && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.accent}40`, padding: 16, marginBottom: 16, display: "flex", gap: 10, alignItems: "end" }}>
            <div style={{ flex: 1 }}>
              <label style={labelStyle}>Client Name</label>
              <input value={newClientName} onChange={e => setNewClientName(e.target.value)} placeholder="Enter client name..." style={{ ...inputStyle, width: "100%" }} onKeyDown={e => {
                if (e.key === "Enter" && newClientName.trim()) {
                  const newCl = { id: `cl-${Date.now()}`, name: newClientName.trim(), clientType: "", clientEntities: [], agreements: [], introduction: "", introductionDeal: "", monthlyFee: "", monthlyFeeCurrency: "USD", revenueSharePct: "", revenueShareFrom: "", settlementGroup: "", settlementTerms: "", settlementFee: "", bankAccounts: [], clientProviders: [], contacts: [], groups: [], notes: [], actionPoints: [], proposedProviders: [], targetRegions: [], targetCountries: [], clientProfile: "", targetVolume: "" };
                  setGatewayClients([...gatewayClients, newCl]);
                  setNewClientName(""); setShowAddClient(false);
                }
              }} />
            </div>
            <button onClick={() => {
              if (!newClientName.trim()) return;
              const newCl = { id: `cl-${Date.now()}`, name: newClientName.trim(), clientType: "", clientEntities: [], agreements: [], introduction: "", introductionDeal: "", monthlyFee: "", monthlyFeeCurrency: "USD", revenueSharePct: "", revenueShareFrom: "", settlementGroup: "", settlementTerms: "", settlementFee: "", bankAccounts: [], clientProviders: [], contacts: [], groups: [], notes: [], actionPoints: [], proposedProviders: [], targetRegions: [], targetCountries: [], clientProfile: "", targetVolume: "" };
              setGatewayClients([...gatewayClients, newCl]);
              setNewClientName(""); setShowAddClient(false);
            }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "6px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap" }}>Create</button>
            <button onClick={() => { setShowAddClient(false); setNewClientName(""); }} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 12 }}>Cancel</button>
          </div>
        )}

        {/* Client Grid */}
        {gatewayClients.length === 0 && !showAddClient && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 40, textAlign: "center", color: c.textMuted, fontSize: 13 }}>No clients yet. Click "+ Add Client" to get started.</div>
        )}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14 }}>
          {gatewayClients.map(cl => {
            const typeColor = cl.clientType === "Full Cashier Management" ? "#818cf8" : cl.clientType === "VIP Gateway" ? "#ec4899" : cl.clientType === "Gateway" ? "#34d399" : cl.clientType === "Tech Only" ? "#06b6d4" : cl.clientType === "Another PSP" ? "#fbbf24" : c.accent;
            return (
              <div key={cl.id} onClick={() => { setSelectedClient(cl.id); setEditingClientField(null); }}
                style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 14, padding: 22, cursor: "pointer", borderLeft: `4px solid ${typeColor}`, transition: "all 0.15s", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}
                onMouseEnter={e => { e.currentTarget.style.background = c.cardHover; e.currentTarget.style.transform = "translateY(-1px)"; }} onMouseLeave={e => { e.currentTarget.style.background = c.card; e.currentTarget.style.transform = "none"; }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: c.text }}>{cl.name}</div>
                  {(() => { const sc = { active: "#34d399", onboarding: "#fbbf24", discussion: "#60a5fa", inactive: "#6b7280" }; const sl = { active: "Active", onboarding: "Onboarding", discussion: "In Discussion", inactive: "Inactive" }; const st = cl.status || "onboarding"; return <span style={{ fontSize: 9, color: sc[st] || c.textMuted, background: `${sc[st] || c.textMuted}15`, border: `1px solid ${sc[st] || c.textMuted}40`, padding: "2px 8px", borderRadius: 4, fontWeight: 700, textTransform: "uppercase" }}>{sl[st] || st}</span>; })()}
                </div>
                <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  {cl.clientType && <span style={{ fontSize: 11, color: typeColor, background: `${typeColor}15`, border: `1px solid ${typeColor}40`, padding: "4px 10px", borderRadius: 6, fontWeight: 600 }}>{cl.clientType}</span>}
                  {cl.clientProfile && <span style={{ fontSize: 10, color: c.accent, background: `${c.accent}15`, border: `1px solid ${c.accent}40`, padding: "3px 8px", borderRadius: 5, fontWeight: 600 }}>{cl.clientProfile}</span>}
                  {(() => { const ap = (cl.actionPoints || []).filter(a => a.status !== "Done").length; return ap > 0 ? <span style={{ fontSize: 10, color: "#fff", background: "#f87171", padding: "2px 7px", borderRadius: 10, fontWeight: 700, minWidth: 18, textAlign: "center" }}>{ap}</span> : null; })()}
                </div>
                <div style={{ marginTop: 10, fontSize: 12, color: c.textMuted }}>
                  {(cl.agreements || []).length > 0 && <span>{(cl.agreements || []).length} contract{(cl.agreements || []).length !== 1 ? "s" : ""}</span>}
                  {cl.monthlyFee && <span>{(cl.agreements || []).length > 0 ? " · " : ""}{cl.monthlyFeeCurrency || "USD"} {cl.monthlyFee}/mo</span>}
                  {cl.revenueSharePct && <span> · {cl.revenueSharePct}% rev share</span>}
                  {cl.targetVolume && <span>{((cl.agreements || []).length > 0 || cl.monthlyFee || cl.revenueSharePct) ? " · " : ""}Target: {cl.targetVolume}/mo</span>}
                </div>
                {(cl.clientEntities || []).length > 0 && (
                  <div style={{ marginTop: 6, display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {(cl.clientEntities || []).slice(0, 3).map((ent, i) => <span key={i} style={{ fontSize: 9, color: c.textMuted, background: c.surface, padding: "1px 6px", borderRadius: 3 }}>{ent}</span>)}
                    {(cl.clientEntities || []).length > 3 && <span style={{ fontSize: 9, color: c.textMuted }}>+{(cl.clientEntities || []).length - 3}</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ===== INTEGRATION ROADMAP =====
  const renderRoadmap = () => {
    const STAGES = ["Roadmap", "Planning", "Execution", "Testing", "Deployed"];
    const STAGE_COLORS = { "Roadmap": { bg: "rgba(139,92,246,0.12)", border: "rgba(139,92,246,0.4)", text: "#a78bfa" }, "Planning": { bg: "rgba(59,130,246,0.12)", border: "rgba(59,130,246,0.4)", text: "#3b82f6" }, "Execution": { bg: "rgba(245,158,11,0.12)", border: "rgba(245,158,11,0.4)", text: "#fbbf24" }, "Testing": { bg: "rgba(234,179,8,0.12)", border: "rgba(234,179,8,0.4)", text: "#eab308" }, "Deployed": { bg: "rgba(34,197,94,0.12)", border: "rgba(34,197,94,0.4)", text: "#34d399" } };
    const METHOD_TYPES = ["Payin", "Payout", "Both"];
    const METHOD_CHANNELS = ["Cards", "Non Cards", "Crypto"];
    const PAYMENT_REGIONS = ["Global", "UK", "West Europe", "East Europe", "Scandinavia", "Turkey", "MENA", "GCC", "CIS", "Africa", "LATAM", "North America", "Oceania", "India", "Asia", "South East Asia", "Japan"];
    const PACE_OPTIONS = ["Behind Pace", "On Pace", "Ahead Of Pace"];
    const GROUP_PLATFORMS = ["Signal", "Telegram", "WhatsApp", "Lark", "Teams", "Other"];
    const inputStyle2 = { fontSize: 12, padding: "7px 10px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" };
    const labelStyle2 = { display: "block", fontSize: 10, fontWeight: 600, color: c.textMuted, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.05em" };

    const updateIntegration = (id, field, val) => setIntegrations(integrations.map(ig => ig.id === id ? { ...ig, [field]: val } : ig));

    const getEstimatedDeployDate = (ig) => {
      if (!ig.startDate || !ig.weeksToDeployment) return null;
      const d = new Date(ig.startDate);
      let weeks = parseInt(ig.weeksToDeployment) || 0;
      if (ig.pace === "Behind Pace" && ig.behindDelayWeeks) weeks += parseInt(ig.behindDelayWeeks) || 0;
      if (ig.pace === "Ahead Of Pace" && ig.aheadWeeks) weeks -= parseInt(ig.aheadWeeks) || 0;
      d.setDate(d.getDate() + weeks * 7);
      return d;
    };

    // ===== DETAIL VIEW =====
    if (selectedIntegration) {
      const ig = integrations.find(i => i.id === selectedIntegration);
      if (!ig) { setSelectedIntegration(null); return null; }
      const stageIdx = STAGES.indexOf(ig.stage);
      const deployDate = getEstimatedDeployDate(ig);
      const isEarlyStage = ig.stage === "Roadmap" || ig.stage === "Planning";

      return (
        <div>
          <div style={{ position: "sticky", top: 0, zIndex: 20, background: c.bg, paddingTop: 8, paddingBottom: 8, marginBottom: 8, borderBottom: `1px solid ${c.border}`, display: "flex", alignItems: "center", gap: 12 }}>
            <button onClick={() => setSelectedIntegration(null)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>← Back to List</button>
            <h2 style={{ fontSize: 20, fontWeight: 700, color: c.text, margin: 0 }}>{ig.name}</h2>
            <span style={{ fontSize: 11, padding: "4px 12px", borderRadius: 6, background: (STAGE_COLORS[ig.stage] || STAGE_COLORS.Roadmap).bg, color: (STAGE_COLORS[ig.stage] || STAGE_COLORS.Roadmap).text, border: `1px solid ${(STAGE_COLORS[ig.stage] || STAGE_COLORS.Roadmap).border}`, fontWeight: 700 }}>{ig.stage}</span>
          </div>

          {/* Estimated Deployment Date banner */}
          {deployDate ? (
            <div style={{ background: ig.deployedSuccessfully ? "rgba(34,197,94,0.1)" : ig.pace === "Behind Pace" ? "rgba(248,113,113,0.06)" : ig.pace === "Ahead Of Pace" ? "rgba(59,130,246,0.08)" : c.card, border: `1px solid ${ig.deployedSuccessfully ? "rgba(34,197,94,0.3)" : ig.pace === "Behind Pace" ? "rgba(248,113,113,0.15)" : ig.pace === "Ahead Of Pace" ? "rgba(59,130,246,0.25)" : c.border}`, borderRadius: 12, padding: "16px 24px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: c.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 2 }}>{ig.deployedSuccessfully ? "Deployed" : isEarlyStage ? "Estimated Deployment" : "Target Deployment Date"}</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: ig.deployedSuccessfully ? c.success : ig.pace === "Behind Pace" ? "#f87171" : ig.pace === "Ahead Of Pace" ? "#3b82f6" : c.text }}>{ig.deployedSuccessfully && ig.deployedDate ? new Date(ig.deployedDate + "T00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" }) : deployDate.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                {ig.pace === "Behind Pace" && ig.behindDelayWeeks && <div style={{ fontSize: 12, fontWeight: 600, color: "#f87171" }}>+{ig.behindDelayWeeks}w delay</div>}
                {ig.pace === "Ahead Of Pace" && ig.aheadWeeks && <div style={{ fontSize: 12, fontWeight: 600, color: "#3b82f6" }}>{ig.aheadWeeks}w ahead</div>}
                {ig.weeksToDeployment && <div style={{ fontSize: 11, color: c.textMuted }}>{ig.weeksToDeployment}w estimated{ig.pace === "Behind Pace" && ig.behindDelayWeeks ? ` + ${ig.behindDelayWeeks}w delay` : ig.pace === "Ahead Of Pace" && ig.aheadWeeks ? ` - ${ig.aheadWeeks}w ahead` : ""}</div>}
              </div>
            </div>
          ) : (
            <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: "16px 24px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: c.textMuted, textTransform: "uppercase" }}>Estimated Deployment</span>
              <span style={{ fontSize: 13, color: c.textMuted, fontStyle: "italic" }}>Set a start date and estimated weeks below</span>
            </div>
          )}

          {/* Stage pipeline */}
          <div style={{ display: "flex", gap: 4, marginBottom: 24 }}>
            {STAGES.map((st, i) => {
              const sc = STAGE_COLORS[st];
              const isActive = i <= stageIdx;
              const isCurrent = st === ig.stage;
              return (
                <div key={st} onClick={() => {
                  const updates = { stage: st };
                  if (st === "Testing") updates.testStarted = true;
                  if (st === "Deployed") { updates.deployedSuccessfully = true; updates.testStarted = true; updates.deployedDate = new Date().toISOString().split("T")[0]; }
                  if (st === "Roadmap" || st === "Planning" || st === "Execution") { updates.testStarted = false; updates.deployedSuccessfully = false; }
                  if (st === "Roadmap" || st === "Planning") { updates.pace = ""; }
                  setIntegrations(integrations.map(x => x.id === ig.id ? { ...x, ...updates } : x));
                }} style={{ flex: 1, padding: "10px 8px", borderRadius: 8, textAlign: "center", cursor: "pointer", background: isActive ? sc.bg : c.surface, border: `2px solid ${isCurrent ? sc.text : isActive ? sc.border : c.border}`, transition: "all 0.15s" }}>
                  <div style={{ fontSize: 12, fontWeight: isCurrent ? 700 : 500, color: isActive ? sc.text : c.textMuted }}>{st}</div>
                </div>
              );
            })}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {/* Left column */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* Provider & Method */}
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Provider & Method</h3>
                <div style={{ marginBottom: 10 }}><label style={labelStyle2}>Provider</label><input value={ig.provider || ""} onChange={e => updateIntegration(ig.id, "provider", e.target.value)} placeholder="Provider name..." style={{ ...inputStyle2, width: "100%" }} /></div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                  <div><label style={labelStyle2}>Type</label><select value={ig.methodType || ""} onChange={e => updateIntegration(ig.id, "methodType", e.target.value)} style={{ ...inputStyle2, width: "100%" }}><option value="">— Select —</option>{METHOD_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                  <div><label style={labelStyle2}>Channel</label><select value={ig.methodChannel || ""} onChange={e => updateIntegration(ig.id, "methodChannel", e.target.value)} style={{ ...inputStyle2, width: "100%" }}><option value="">— Select —</option>{METHOD_CHANNELS.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                </div>
                <div style={{ marginBottom: 10 }}>
                  <label style={labelStyle2}>Regions</label>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {PAYMENT_REGIONS.map(r => {
                      const sel = (ig.regions || []).includes(r);
                      return <button key={r} onClick={() => { const regs = ig.regions || []; updateIntegration(ig.id, "regions", sel ? regs.filter(x => x !== r) : [...regs, r]); }} style={{ padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: sel ? 600 : 400, cursor: "pointer", background: sel ? c.accentBg : c.surface, color: sel ? c.accent : c.textMuted, border: `1px solid ${sel ? c.accent + "40" : c.border}`, transition: "all 0.15s" }}>{r}</button>;
                    })}
                  </div>
                </div>
                <div style={{ marginBottom: 10 }}>
                  <label style={labelStyle2}>API Docs URL</label>
                  <div style={{ display: "flex", gap: 6 }}>
                    <input value={ig.apiDocs || ""} onChange={e => updateIntegration(ig.id, "apiDocs", e.target.value)} placeholder="https://docs.provider.com/api" style={{ ...inputStyle2, flex: 1 }} />
                    {ig.apiDocs && <button onClick={() => { navigator.clipboard.writeText(ig.apiDocs); setCopiedText(true); setTimeout(() => setCopiedText(null), 1500); }} style={{ background: c.accentBg, border: `1px solid ${c.accent}40`, color: c.accent, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600, flexShrink: 0 }}>Copy</button>}
                  </div>
                </div>
                <div><label style={labelStyle2}>Main Contact</label><input value={ig.mainContact || ""} onChange={e => updateIntegration(ig.id, "mainContact", e.target.value)} placeholder="Contact name / email" style={{ ...inputStyle2, width: "100%" }} /></div>
              </div>

              {/* Integration Group */}
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Integration Group</h3>
                <div style={{ marginBottom: 10 }}><label style={labelStyle2}>Group Name</label><input value={ig.groupName || ""} onChange={e => updateIntegration(ig.id, "groupName", e.target.value)} placeholder="Group name..." style={{ ...inputStyle2, width: "100%" }} /></div>
                <div style={{ marginBottom: 10 }}>
                  <label style={labelStyle2}>Platform</label>
                  <select value={ig.groupPlatform || ""} onChange={e => updateIntegration(ig.id, "groupPlatform", e.target.value)} style={{ ...inputStyle2, width: "100%" }}>
                    <option value="">— Select —</option>
                    {GROUP_PLATFORMS.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                {ig.groupPlatform === "Other" && (
                  <div><label style={labelStyle2}>Platform Name</label><input value={ig.groupPlatformOther || ""} onChange={e => updateIntegration(ig.id, "groupPlatformOther", e.target.value)} placeholder="Specify platform..." style={{ ...inputStyle2, width: "100%" }} /></div>
                )}
              </div>
            </div>

            {/* Right column */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* Timeline */}
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Timeline</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                  <div><label style={labelStyle2}>{isEarlyStage ? "Estimated Start Date" : "Integration Start Date"}</label><input type="date" value={ig.startDate || ""} onChange={e => updateIntegration(ig.id, "startDate", e.target.value)} style={{ ...inputStyle2, width: "100%" }} /></div>
                  <div><label style={labelStyle2}>Est. Time to Deployment</label>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" min="1" value={ig.weeksToDeployment || ""} onChange={e => updateIntegration(ig.id, "weeksToDeployment", e.target.value)} placeholder="#" style={{ ...inputStyle2, width: 60 }} />
                      <span style={{ fontSize: 12, color: c.textMuted }}>weeks</span>
                    </div>
                  </div>
                </div>
                {deployDate && (
                  <div style={{ background: c.surface, borderRadius: 8, padding: "10px 14px", marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: c.textMuted }}>Estimated Deployment</span>
                    <span style={{ fontSize: 13, fontWeight: 700, color: ig.deployedSuccessfully ? c.success : c.text }}>{deployDate.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}</span>
                  </div>
                )}

                {/* Integration Progress — show for Execution and Testing stages */}
                {(ig.stage === "Execution" || ig.stage === "Testing") && (<>
                  <div style={{ marginBottom: 10 }}>
                    <label style={labelStyle2}>Integration Progress</label>
                    <div style={{ display: "flex", gap: 6 }}>
                      {PACE_OPTIONS.map(p => {
                        const sel = ig.pace === p;
                        const paceColor = p === "Behind Pace" ? "#f87171" : p === "On Pace" ? "#34d399" : "#3b82f6";
                        return <button key={p} onClick={() => updateIntegration(ig.id, "pace", p)} style={{ flex: 1, padding: "8px 6px", borderRadius: 8, fontSize: 11, fontWeight: sel ? 700 : 400, cursor: "pointer", background: sel ? paceColor + "18" : c.surface, color: sel ? paceColor : c.textMuted, border: `2px solid ${sel ? paceColor : c.border}`, transition: "all 0.15s" }}>{p}</button>;
                      })}
                    </div>
                  </div>
                  {ig.pace === "Behind Pace" && (
                    <div style={{ background: "rgba(248,113,113,0.06)", borderRadius: 8, padding: 12, border: "1px solid rgba(239,68,68,0.2)", marginBottom: 10 }}>
                      <div style={{ marginBottom: 8 }}><label style={{ ...labelStyle2, color: "#f87171" }}>Reason for Delay</label><textarea value={ig.behindReason || ""} onChange={e => updateIntegration(ig.id, "behindReason", e.target.value)} placeholder="What's causing the delay..." rows={2} style={{ ...inputStyle2, width: "100%", resize: "vertical" }} /></div>
                      <div><label style={{ ...labelStyle2, color: "#f87171" }}>Estimated Delay</label>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="number" min="1" value={ig.behindDelayWeeks || ""} onChange={e => updateIntegration(ig.id, "behindDelayWeeks", e.target.value)} placeholder="#" style={{ ...inputStyle2, width: 60 }} />
                          <span style={{ fontSize: 12, color: c.textMuted }}>weeks</span>
                        </div>
                      </div>
                    </div>
                  )}
                  {ig.pace === "Ahead Of Pace" && (
                    <div style={{ background: "rgba(59,130,246,0.08)", borderRadius: 8, padding: 12, border: "1px solid rgba(59,130,246,0.2)", marginBottom: 10 }}>
                      <div><label style={{ ...labelStyle2, color: "#3b82f6" }}>Weeks Ahead</label>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="number" min="1" value={ig.aheadWeeks || ""} onChange={e => updateIntegration(ig.id, "aheadWeeks", e.target.value)} placeholder="#" style={{ ...inputStyle2, width: 60 }} />
                          <span style={{ fontSize: 12, color: c.textMuted }}>weeks ahead of schedule</span>
                        </div>
                      </div>
                    </div>
                  )}
                </>)}
              </div>

              {/* Status */}
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Status</h3>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: `1px solid ${c.border}` }}>
                  <span style={{ fontSize: 13, color: c.text }}>Testing Started</span>
                  <div onClick={() => { if (ig.stage === "Testing" || ig.stage === "Deployed") return; if (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") return; updateIntegration(ig.id, "testStarted", !ig.testStarted); }} style={{ width: 40, height: 22, borderRadius: 11, background: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? c.surface : ig.testStarted ? c.success : c.surface, border: `1px solid ${(ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? c.border : ig.testStarted ? c.success : c.border}`, cursor: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution" || ig.stage === "Testing" || ig.stage === "Deployed") ? "default" : "pointer", position: "relative", transition: "all 0.2s", opacity: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? 0.4 : 1 }}>
                    <div style={{ width: 16, height: 16, borderRadius: 8, background: "#fff", position: "absolute", top: 2, left: ig.testStarted ? 21 : 2, transition: "left 0.2s" }} />
                  </div>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0" }}>
                  <span style={{ fontSize: 13, color: c.text }}>Deployed Successfully</span>
                  <div onClick={() => {
                    if (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") return;
                    if (!ig.deployedSuccessfully) {
                      setIntegrations(integrations.map(x => x.id === ig.id ? { ...x, deployedSuccessfully: true, stage: "Deployed", testStarted: true, deployedDate: x.deployedDate || new Date().toISOString().split("T")[0] } : x));
                    } else {
                      updateIntegration(ig.id, "deployedSuccessfully", false);
                    }
                  }} style={{ width: 40, height: 22, borderRadius: 11, background: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? c.surface : ig.deployedSuccessfully ? c.success : c.surface, border: `1px solid ${(ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? c.border : ig.deployedSuccessfully ? c.success : c.border}`, cursor: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? "default" : "pointer", position: "relative", transition: "all 0.2s", opacity: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? 0.4 : 1 }}>
                    <div style={{ width: 16, height: 16, borderRadius: 8, background: "#fff", position: "absolute", top: 2, left: ig.deployedSuccessfully ? 21 : 2, transition: "left 0.2s" }} />
                  </div>
                </div>
                {ig.deployedSuccessfully && (
                  <div style={{ padding: "10px 0 0", borderTop: `1px solid ${c.border}`, marginTop: 10 }}>
                    <label style={labelStyle2}>Deployment Date</label>
                    <input type="date" value={ig.deployedDate || ""} onChange={e => updateIntegration(ig.id, "deployedDate", e.target.value)} style={{ ...inputStyle2, width: "100%" }} />
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Delete */}
          <div style={{ marginTop: 24, textAlign: "right" }}>
            <button onClick={() => { if (confirm("Delete this integration?")) { setIntegrations(integrations.filter(x => x.id !== ig.id)); setSelectedIntegration(null); } }} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 8, padding: "8px 20px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Delete Integration</button>
          </div>
        </div>
      );
    }

    // ===== LIST VIEW =====
    const stageCounts = {};
    STAGES.forEach(s => { stageCounts[s] = integrations.filter(ig => ig.stage === s).length; });

    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0, letterSpacing: "-0.02em" }}>Integration Roadmap</h2>
            <p style={{ color: c.textSecondary, fontSize: 13, margin: "4px 0 0 0" }}>{integrations.length} integration{integrations.length !== 1 ? "s" : ""}</p>
          </div>
          <button onClick={() => setShowAddIntegration(!showAddIntegration)} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ New Integration</button>
        </div>

        {/* Add Integration Form */}
        {showAddIntegration && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.accent}40`, padding: 16, marginBottom: 16, display: "flex", gap: 10, alignItems: "end" }}>
            <div style={{ flex: 1 }}>
              <label style={labelStyle2}>Integration Name</label>
              <input value={newIntegrationName} onChange={e => setNewIntegrationName(e.target.value)} placeholder="Enter integration name..." style={{ ...inputStyle2, width: "100%" }} onKeyDown={e => {
                if (e.key === "Enter" && newIntegrationName.trim()) {
                  const newIg = { id: `ig-${Date.now()}`, name: newIntegrationName.trim(), stage: "Roadmap", provider: "", methodType: "", methodChannel: "", regions: [], apiDocs: "", mainContact: "", groupName: "", groupPlatform: "", groupPlatformOther: "", startDate: "", weeksToDeployment: "", pace: "", behindReason: "", behindDelayWeeks: "", aheadWeeks: "", testStarted: false, deployedSuccessfully: false };
                  setIntegrations([...integrations, newIg]);
                  setNewIntegrationName(""); setShowAddIntegration(false);
                  setSelectedIntegration(newIg.id);
                }
              }} />
            </div>
            <button onClick={() => {
              if (!newIntegrationName.trim()) return;
              const newIg = { id: `ig-${Date.now()}`, name: newIntegrationName.trim(), stage: "Roadmap", provider: "", methodType: "", methodChannel: "", regions: [], apiDocs: "", mainContact: "", groupName: "", groupPlatform: "", groupPlatformOther: "", startDate: "", weeksToDeployment: "", pace: "", behindReason: "", behindDelayWeeks: "", aheadWeeks: "", testStarted: false, deployedSuccessfully: false };
              setIntegrations([...integrations, newIg]);
              setNewIntegrationName(""); setShowAddIntegration(false);
              setSelectedIntegration(newIg.id);
            }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap" }}>Create</button>
          </div>
        )}

        {/* Stage summary bar */}
        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {STAGES.map(st => {
            const sc = STAGE_COLORS[st];
            const count = stageCounts[st];
            return (
              <div key={st} style={{ flex: 1, background: sc.bg, borderRadius: 10, padding: "12px 10px", textAlign: "center", border: `1px solid ${sc.border}` }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: sc.text }}>{count}</div>
                <div style={{ fontSize: 10, color: sc.text, fontWeight: 600, marginTop: 2 }}>{st}</div>
              </div>
            );
          })}
        </div>

        {/* Integration list grouped by stage */}
        {STAGES.map(stage => {
          const stageItems = integrations.filter(ig => ig.stage === stage);
          if (stageItems.length === 0) return null;
          const sc = STAGE_COLORS[stage];
          return (
            <div key={stage} style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: sc.text }} />
                <h3 style={{ fontSize: 14, fontWeight: 700, color: c.text, margin: 0 }}>{stage}</h3>
                <span style={{ fontSize: 11, color: c.textMuted }}>({stageItems.length})</span>
              </div>
              {stageItems.map(ig => {
                const deployDate = getEstimatedDeployDate(ig);
                return (
                  <div key={ig.id} onClick={() => setSelectedIntegration(ig.id)}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = sc.text; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = c.border; }}
                    style={{ background: c.card, border: `1px solid ${c.border}`, borderLeft: `4px solid ${sc.text}`, borderRadius: "0 10px 10px 0", padding: "14px 18px", marginBottom: 6, cursor: "pointer", transition: "border-color 0.15s" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, minWidth: 0 }}>
                        <span style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{ig.name}</span>
                        {ig.provider && <span style={{ fontSize: 11, color: c.textMuted }}>· {ig.provider}</span>}
                        {ig.methodType && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: c.surface, color: c.textSecondary, fontWeight: 500 }}>{ig.methodType}{ig.methodChannel ? " · " + ig.methodChannel : ""}</span>}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                        {(ig.regions || []).length > 0 && <span style={{ fontSize: 10, color: c.textMuted }}>{ig.regions.slice(0, 3).join(", ")}{ig.regions.length > 3 ? ` +${ig.regions.length - 3}` : ""}</span>}
                        {ig.stage === "Execution" && ig.pace && (
                          <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, fontWeight: 600, background: ig.pace === "Behind Pace" ? "rgba(239,68,68,0.12)" : ig.pace === "On Pace" ? "rgba(34,197,94,0.12)" : "rgba(59,130,246,0.12)", color: ig.pace === "Behind Pace" ? "#f87171" : ig.pace === "On Pace" ? "#34d399" : "#3b82f6" }}>{ig.pace}</span>
                        )}
                        {deployDate && <span style={{ fontSize: 11, color: c.textMuted }}>{deployDate.toLocaleDateString("en-GB", { day: "numeric", month: "short" })}</span>}
                        <span style={{ fontSize: 12, color: c.accent }}>→</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}

        {integrations.length === 0 && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 40, textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🔌</div>
            <div style={{ fontSize: 16, fontWeight: 600, color: c.text, marginBottom: 4 }}>No integrations yet</div>
            <div style={{ fontSize: 13, color: c.textMuted }}>Click "New Integration" to add your first integration to the roadmap</div>
          </div>
        )}
      </div>
    );
  };

  // ===== PROVIDERS =====
  const renderProviders = () => {
    const SERVICE_TYPES_1 = ["Payin", "Payout", "Both"];
    const SERVICE_TYPES_2 = ["Cards", "Open Banking", "APM", "Crypto", "Other"];
    const AGREEMENT_TYPES = ["MOR", "PayFac", "Payment Agent", "Direct to Merchant"];
    const PROVIDER_REGIONS = ["Global", "UK", "West Europe", "East Europe", "Scandinavia", "Turkey", "MENA", "GCC", "CIS", "Africa", "LATAM", "North America", "Oceania", "India", "Asia", "South East Asia", "Japan"];
    const REGION_COUNTRIES = {
      "UK": ["England", "Scotland", "Wales", "Northern Ireland"],
      "West Europe": ["Germany", "France", "Netherlands", "Belgium", "Austria", "Switzerland", "Luxembourg", "Ireland", "Spain", "Portugal", "Italy"],
      "East Europe": ["Poland", "Czech Republic", "Hungary", "Romania", "Bulgaria", "Slovakia", "Slovenia", "Croatia", "Serbia", "Bosnia", "Lithuania", "Latvia", "Estonia"],
      "Scandinavia": ["Sweden", "Norway", "Denmark", "Finland", "Iceland"],
      "Turkey": ["Turkey"],
      "MENA": ["Egypt", "Morocco", "Tunisia", "Algeria", "Lebanon", "Jordan", "Iraq"],
      "GCC": ["UAE", "Saudi Arabia", "Qatar", "Bahrain", "Kuwait", "Oman"],
      "CIS": ["Russia", "Ukraine", "Kazakhstan", "Belarus", "Georgia", "Armenia", "Azerbaijan", "Uzbekistan"],
      "Africa": ["South Africa", "Nigeria", "Kenya", "Ghana", "Tanzania", "Uganda"],
      "LATAM": ["Brazil", "Mexico", "Argentina", "Colombia", "Chile", "Peru", "Uruguay"],
      "North America": ["USA", "Canada"],
      "Oceania": ["Australia", "New Zealand"],
      "India": ["India"],
      "Asia": ["China", "South Korea", "Hong Kong", "Taiwan", "Mongolia"],
      "South East Asia": ["Thailand", "Vietnam", "Indonesia", "Malaysia", "Philippines", "Singapore", "Cambodia", "Myanmar"],
      "Japan": ["Japan"]
    };
    const GROUP_PLATFORMS_P = ["Signal", "Telegram", "WhatsApp", "Lark", "Teams", "Other"];
    const SETTLEMENT_TERMS_P = ["T+0", "T+1", "T+2", "T+3", "T+4", "T+5", "T+7", "Weekly", "Bi-Weekly", "Monthly"];
    const FEE_CURRENCIES = ["USD", "EUR", "GBP", "CAD", "AUD", "CHF", "AED", "BTC", "USDT"];
    const inputStyle3 = { fontSize: 13, padding: "8px 11px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" };
    const labelStyle3 = { display: "block", fontSize: 11, fontWeight: 600, color: c.textMuted, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.05em" };
    const sectionHeader3 = { fontSize: 12, fontWeight: 700, color: c.accent, marginBottom: 8, textTransform: "uppercase" };

    const entityNames = corporateEntities.map(e => e.name);

    const updateProvider = (provId, field, val) => setProviders(prev => prev.map(p => p.id === provId ? { ...p, [field]: val } : p));
    const updateService = (provId, svcId, field, val) => {
      setProviders(prev => prev.map(p => p.id === provId ? { ...p, services: (p.services || []).map(s => s.id === svcId ? { ...s, [field]: val } : s) } : p));
    };
    const updateServiceMulti = (provId, svcId, updates) => {
      setProviders(prev => prev.map(p => p.id === provId ? { ...p, services: (p.services || []).map(s => s.id === svcId ? { ...s, ...updates } : s) } : p));
    };
    const fmtNum = (v) => { if (v == null || v === "") return v; const s = String(v); return s.replace(/\B(?=(\d{3})+(?!\d))/g, ","); };

    // ===== PROVIDER DETAIL VIEW =====
    if (selectedProvider) {
      const prov = providers.find(p => p.id === selectedProvider);
      if (!prov) { setSelectedProvider(null); return null; }
      const svcs = prov.services || [];

      // Agreement helpers for provider-level agreements
      const provAgreements = prov.agreements || [];
      const addProvAgreement = () => {
        const newAgr = { id: `agr-${Date.now()}`, entity: "", startDate: "", endDate: "", noEndDate: false, fileName: "", fileData: "" };
        updateProvider(prov.id, "agreements", [...provAgreements, newAgr]);
      };
      const updateProvAgreement = (agrId, field, val) => {
        updateProvider(prov.id, "agreements", provAgreements.map(a => a.id === agrId ? { ...a, [field]: val } : a));
      };
      const deleteProvAgreement = (agrId) => {
        updateProvider(prov.id, "agreements", provAgreements.filter(a => a.id !== agrId));
      };

      return (
        <div>
          <div style={{ position: "sticky", top: 0, zIndex: 20, background: c.bg, paddingTop: 8, paddingBottom: 8, marginBottom: 8, borderBottom: `1px solid ${c.border}`, display: "flex", alignItems: "center", gap: 12 }}>
            <button onClick={() => setSelectedProvider(null)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>← Back to Providers</button>
            <h2 style={{ fontSize: 20, fontWeight: 700, color: c.text, margin: 0 }}>{prov.name}</h2>
            <span style={{ fontSize: 11, padding: "4px 10px", borderRadius: 6, background: c.accentBg, color: c.accent, fontWeight: 600 }}>{svcs.length} service{svcs.length !== 1 ? "s" : ""}</span>
          </div>

          {/* Provider-level info */}
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20, marginBottom: 16 }}>
            <div style={sectionHeader3}>Provider Info</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
              {/* Contact */}
              <div style={{ background: c.surface, borderRadius: 8, padding: 14, border: `1px solid ${c.border}` }}>
                <div style={sectionHeader3}>Contact</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                  <div><label style={labelStyle3}>Main Contact</label><input value={prov.mainContact || ""} onChange={e => updateProvider(prov.id, "mainContact", e.target.value)} placeholder="Contact name" style={{ ...inputStyle3, width: "100%" }} /></div>
                  <div><label style={labelStyle3}>Contact Details</label><input value={prov.contactDetails || ""} onChange={e => updateProvider(prov.id, "contactDetails", e.target.value)} placeholder="Email / phone" style={{ ...inputStyle3, width: "100%" }} /></div>
                </div>
              </div>
              {/* Support */}
              <div style={{ background: c.surface, borderRadius: 8, padding: 14, border: `1px solid ${c.border}` }}>
                <div style={sectionHeader3}>Support</div>
                <div style={{ marginBottom: 8 }}><label style={labelStyle3}>Group Name</label><input value={prov.supportGroup || ""} onChange={e => updateProvider(prov.id, "supportGroup", e.target.value)} placeholder="Support group name" style={{ ...inputStyle3, width: "100%" }} /></div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <div><label style={labelStyle3}>Platform</label><select value={prov.supportPlatform || ""} onChange={e => updateProvider(prov.id, "supportPlatform", e.target.value)} style={{ ...inputStyle3, width: "100%" }}><option value="">— Select —</option>{GROUP_PLATFORMS_P.map(p2 => <option key={p2} value={p2}>{p2}</option>)}</select></div>

                              })}

                          )}

                      <label style={labelStyle3}>Processing Currencies</label>

                    {(() => {

                        <div>

    const ovFilters = providerOverviewFilters || {};

    const filteredOvServices = allServices.filter(s => {

      if (ovFilters.channel && s.serviceType2 !== ovFilters.channel) return false;
