              const ACTION_STATUSES = ["Done", "Ongoing", "Waiting on Client", "Not Started"];
              const ACTION_STATUS_COLORS = { "Done": "#34d399", "Ongoing": "#fbbf24", "Waiting on Client": "#f97316", "Not Started": "#6b7280" };
              const CONTACT_VIA_OPTIONS = ["Introducer", "David", "Direct", "Groups"];
              const GROUP_TYPE_OPTIONS = ["Top Level", "Commercial", "Technical", "Support"];
              const GROUP_PLATFORM_OPTIONS = ["WhatsApp", "Signal", "Telegram"];
              const actionPoints = cl.actionPoints || [];
              const sortedActions = [...actionPoints.filter(a => a.status !== "Done"), ...actionPoints.filter(a => a.status === "Done")];
              const pendingActions = actionPoints.filter(a => a.status !== "Done").length;
              const proposedProviders = cl.proposedProviders || [];
              const showOnboarding = cl.status === "onboarding" || cl.status === "discussion";

              return (<>
              {/* Summary Tile */}
              <div style={{ ...sectionCard, borderLeft: `4px solid ${c.accent}`, background: `linear-gradient(135deg, ${c.card} 0%, ${c.surface} 100%)` }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: c.accent, margin: "0 0 14px 0", textTransform: "uppercase", letterSpacing: "0.03em" }}>Client Summary</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {cl.clientProfile && <div><span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textTransform: "uppercase" }}>Profile</span><div style={{ fontSize: 14, color: c.text, fontWeight: 600, marginTop: 2 }}>{cl.clientProfile}</div></div>}
                  {cl.targetVolume && <div><span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textTransform: "uppercase" }}>Target Volume</span><div style={{ fontSize: 14, color: c.text, fontWeight: 600, marginTop: 2 }}>{cl.targetVolume}/mo</div></div>}
                </div>
                {(cl.targetRegions || []).length > 0 && <div style={{ marginTop: 12 }}><span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textTransform: "uppercase" }}>Target Regions</span><div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 4 }}>{(cl.targetRegions || []).map(r => <span key={r} style={{ fontSize: 11, color: c.accent, background: `${c.accent}15`, border: `1px solid ${c.accent}40`, padding: "2px 8px", borderRadius: 4, fontWeight: 500 }}>{r}</span>)}</div></div>}
                {proposedProviders.length > 0 && <div style={{ marginTop: 12 }}><span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textTransform: "uppercase" }}>Proposed Providers & Services</span><div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 4 }}>{proposedProviders.map(pp => { const prov = providers.find(p => p.id === pp.providerId); const svc = prov ? (prov.services || []).find(s => s.id === pp.serviceId) : null; return <span key={pp.id} style={{ fontSize: 11, color: "#818cf8", background: "rgba(129,140,248,0.1)", border: "1px solid rgba(129,140,248,0.3)", padding: "2px 8px", borderRadius: 4, fontWeight: 500 }}>{prov ? prov.name : "?"}{svc ? ` / ${svc.name}` : ""}{pp.region ? ` (${pp.region})` : ""}</span>; })}</div></div>}
                {showOnboarding && <div style={{ marginTop: 14, display: "flex", gap: 16 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: cl.proposalSent ? "#34d399" : "#6b7280", display: "inline-block" }}></span><span style={{ fontSize: 12, color: c.textMuted }}>Proposal Sent</span></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: cl.contractsSigned ? "#34d399" : "#6b7280", display: "inline-block" }}></span><span style={{ fontSize: 12, color: c.textMuted }}>Contracts Signed</span></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: cl.midsCreated ? "#34d399" : "#6b7280", display: "inline-block" }}></span><span style={{ fontSize: 12, color: c.textMuted }}>MIDs Created</span></div>
                </div>}
              </div>

              {/* Key Action Points */}
              <div style={{ ...sectionCard, borderLeft: pendingActions > 0 ? "3px solid #f87171" : `1px solid ${c.border}` }}>
                <SectionHeader sectionKey="homeActions" title="Key Action Points" badge={pendingActions > 0 ? `${pendingActions} pending` : `${actionPoints.length} total`} extra={
                  !collapsed.homeActions && <button onClick={() => updateClient(cl.id, "actionPoints", [...actionPoints, { id: `ap-${Date.now()}`, person: "", action: "", status: "Not Started" }])} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>+ Add Action Point</button>
                } />
                {!collapsed.homeActions && (<>
                  {sortedActions.length === 0 && <div style={{ color: c.textMuted, fontSize: 12, padding: "8px 0" }}>No action points yet.</div>}
                  {sortedActions.map(ap => {
                    const sc = ACTION_STATUS_COLORS[ap.status] || "#6b7280";
                    return (
                      <div key={ap.id} style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 10, padding: 14, marginBottom: 8, borderLeft: `3px solid ${sc}`, opacity: ap.status === "Done" ? 0.6 : 1 }}>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr 1fr auto", gap: 10, alignItems: "center" }}>
                          <select value={ap.person || ""} onChange={e => updateClient(cl.id, "actionPoints", actionPoints.map(a => a.id === ap.id ? { ...a, person: e.target.value } : a))} style={{ ...inputStyle, fontSize: 12 }}>
                            <option value="">-- Person --</option>
                            {ACTION_PEOPLE.map(p => <option key={p} value={p}>{p}</option>)}
                          </select>
                          <input value={ap.action || ""} onChange={e => updateClient(cl.id, "actionPoints", actionPoints.map(a => a.id === ap.id ? { ...a, action: e.target.value } : a))} placeholder="Action description..." style={{ ...inputStyle, fontSize: 12 }} />
                          <select value={ap.status || "Not Started"} onChange={e => updateClient(cl.id, "actionPoints", actionPoints.map(a => a.id === ap.id ? { ...a, status: e.target.value } : a))} style={{ ...inputStyle, fontSize: 12, color: sc, fontWeight: 600 }}>
                            {ACTION_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                          <button onClick={() => updateClient(cl.id, "actionPoints", actionPoints.filter(a => a.id !== ap.id))} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontSize: 11 }}>Delete</button>
                        </div>
                      </div>
                    );
                  })}
                </>)}
              </div>

              {/* Contact Information */}
              <div style={sectionCard}>
                <SectionHeader sectionKey="homeContacts" title="Contact Information" badge={`${(cl.contacts || []).length} contacts · ${(cl.groups || []).length} groups`} />
                {!collapsed.homeContacts && (<>
                  {/* Contacts */}
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: c.textSecondary, textTransform: "uppercase" }}>Contacts</span>
                      <button onClick={() => updateClient(cl.id, "contacts", [...(cl.contacts || []), { id: `ct-${Date.now()}`, name: "", role: "", contactVia: "", platform: "", handle: "" }])} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>+ Add Contact</button>
                    </div>
                    {(cl.contacts || []).length === 0 && <div style={{ color: c.textMuted, fontSize: 12, padding: "4px 0" }}>No contacts added.</div>}
                    {(cl.contacts || []).map(ct => (
                      <div key={ct.id} style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 10, padding: 12, marginBottom: 6 }}>
                        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                          <input value={ct.name || ""} onChange={e => updateClient(cl.id, "contacts", (cl.contacts || []).map(x => x.id === ct.id ? { ...x, name: e.target.value } : x))} placeholder="Name" style={{ ...inputStyle, fontSize: 12, flex: 1, minWidth: 120 }} />
                          <input value={ct.role || ""} onChange={e => updateClient(cl.id, "contacts", (cl.contacts || []).map(x => x.id === ct.id ? { ...x, role: e.target.value } : x))} placeholder="Role" style={{ ...inputStyle, fontSize: 12, flex: 1, minWidth: 120 }} />
                          <select value={ct.contactVia || ""} onChange={e => updateClient(cl.id, "contacts", (cl.contacts || []).map(x => x.id === ct.id ? { ...x, contactVia: e.target.value } : x))} style={{ ...inputStyle, fontSize: 12 }}>
                            <option value="">-- Contact Via --</option>
                            {CONTACT_VIA_OPTIONS.map(v => <option key={v} value={v}>{v}</option>)}
                          </select>
                          {ct.contactVia === "Groups" && (<>
                            <select value={ct.platform || ""} onChange={e => updateClient(cl.id, "contacts", (cl.contacts || []).map(x => x.id === ct.id ? { ...x, platform: e.target.value } : x))} style={{ ...inputStyle, fontSize: 12 }}>
                              <option value="">-- Platform --</option>
                              {GROUP_PLATFORM_OPTIONS.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                            <input value={ct.handle || ""} onChange={e => updateClient(cl.id, "contacts", (cl.contacts || []).map(x => x.id === ct.id ? { ...x, handle: e.target.value } : x))} placeholder="Handle / username" style={{ ...inputStyle, fontSize: 12, minWidth: 120 }} />
                          </>)}
                          <button onClick={() => updateClient(cl.id, "contacts", (cl.contacts || []).filter(x => x.id !== ct.id))} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontSize: 11 }}>Delete</button>
                        </div>
                      </div>
                    ))}
                  </div>
                  {/* Groups */}
                  <div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: c.textSecondary, textTransform: "uppercase" }}>Groups</span>
                      <button onClick={() => updateClient(cl.id, "groups", [...(cl.groups || []), { id: `gr-${Date.now()}`, groupType: "", platform: "", groupName: "" }])} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>+ Add Group</button>
                    </div>
                    {(cl.groups || []).length === 0 && <div style={{ color: c.textMuted, fontSize: 12, padding: "4px 0" }}>No groups added.</div>}
                    {(cl.groups || []).map(gr => (
                      <div key={gr.id} style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 10, padding: 12, marginBottom: 6 }}>
                        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                          <select value={gr.groupType || ""} onChange={e => updateClient(cl.id, "groups", (cl.groups || []).map(x => x.id === gr.id ? { ...x, groupType: e.target.value } : x))} style={{ ...inputStyle, fontSize: 12 }}>
                            <option value="">-- Type --</option>
                            {GROUP_TYPE_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                          </select>
                          <select value={gr.platform || ""} onChange={e => updateClient(cl.id, "groups", (cl.groups || []).map(x => x.id === gr.id ? { ...x, platform: e.target.value } : x))} style={{ ...inputStyle, fontSize: 12 }}>
                            <option value="">-- Platform --</option>
                            {GROUP_PLATFORM_OPTIONS.map(p => <option key={p} value={p}>{p}</option>)}
                          </select>
                          <input value={gr.groupName || ""} onChange={e => updateClient(cl.id, "groups", (cl.groups || []).map(x => x.id === gr.id ? { ...x, groupName: e.target.value } : x))} placeholder="Group name" style={{ ...inputStyle, fontSize: 12, flex: 1 }} />
                          <button onClick={() => updateClient(cl.id, "groups", (cl.groups || []).filter(x => x.id !== gr.id))} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontSize: 11 }}>Delete</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </>)}
              </div>

              {/* Client Overview */}
              <div style={sectionCard}>
                <SectionHeader sectionKey="homeOverview" title="Client Overview" />
                {!collapsed.homeOverview && (<>
                  <div style={{ marginBottom: 16 }}>
                    <label style={labelStyle}>Client Profile</label>
                    <select value={cl.clientProfile || ""} onChange={e => updateClient(cl.id, "clientProfile", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                      <option value="">-- Select Profile --</option>
                      {CLIENT_PROFILES.map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: c.textSecondary, textTransform: "uppercase" }}>Notes</span>
                      <button onClick={() => updateClient(cl.id, "notes", [...(cl.notes || []), { id: `nt-${Date.now()}`, title: "", text: "", createdAt: new Date().toISOString() }])} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>+ Add Note</button>
                    </div>
                    {(cl.notes || []).length === 0 && <div style={{ color: c.textMuted, fontSize: 12, padding: "4px 0" }}>No notes yet.</div>}
                    {(cl.notes || []).map(nt => (
                      <div key={nt.id} style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 10, padding: 14, marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                          <input value={nt.title || ""} onChange={e => updateClient(cl.id, "notes", (cl.notes || []).map(x => x.id === nt.id ? { ...x, title: e.target.value } : x))} placeholder="Note title..." style={{ ...inputStyle, fontSize: 13, fontWeight: 700, border: "none", background: "transparent", padding: 0, flex: 1 }} />
                          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                            {nt.createdAt && <span style={{ fontSize: 10, color: c.textMuted }}>{new Date(nt.createdAt).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}</span>}
                            <button onClick={() => updateClient(cl.id, "notes", (cl.notes || []).filter(x => x.id !== nt.id))} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontSize: 11 }}>Delete</button>
                          </div>
                        </div>
                        <textarea value={nt.text || ""} onChange={e => updateClient(cl.id, "notes", (cl.notes || []).map(x => x.id === nt.id ? { ...x, text: e.target.value } : x))} placeholder="Note content..." rows={3} style={{ ...inputStyle, width: "100%", fontSize: 12, resize: "vertical", fontFamily: "inherit" }} />
                      </div>
                    ))}
                  </div>
                </>)}
              </div>

              {/* Client Targets */}
              <div style={sectionCard}>
                <SectionHeader sectionKey="homeTargets" title="Client Targets" />
                {!collapsed.homeTargets && (<>
                  <div style={{ marginBottom: 16 }}>
                    <label style={labelStyle}>Estimated Target Volume (Monthly)</label>
                    <input value={cl.targetVolume || ""} onChange={e => updateClient(cl.id, "targetVolume", e.target.value)} placeholder="e.g. $500,000" style={{ ...inputStyle, width: "100%" }} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <label style={labelStyle}>Target Regions</label>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 4 }}>
                      {HOME_REGIONS.map(r => {
                        const sel = (cl.targetRegions || []).includes(r);
                        return <button key={r} onClick={() => {
                          const cur = cl.targetRegions || [];
                          if (sel) {
                            const removed = cur.filter(x => x !== r);
                            const countriesInRegion = HOME_REGION_COUNTRIES[r] || [];
                            const filteredCountries = (cl.targetCountries || []).filter(tc => !countriesInRegion.includes(tc));
                            updateClient(cl.id, "targetRegions", removed);
                            updateClient(cl.id, "targetCountries", filteredCountries);
                          } else {
                            updateClient(cl.id, "targetRegions", [...cur, r]);
                          }
                        }} style={{ background: sel ? `${c.accent}20` : "transparent", border: `1px solid ${sel ? c.accent : c.border}`, color: sel ? c.accent : c.textMuted, borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: sel ? 600 : 400, transition: "all 0.15s" }}>{r}</button>;
                      })}
                    </div>
                  </div>
                  {(cl.targetRegions || []).length > 0 && (() => {
                    const availableCountries = (cl.targetRegions || []).flatMap(r => HOME_REGION_COUNTRIES[r] || []);
                    const selectedCountries = cl.targetCountries || [];
                    const showCountries = !collapsed.homeTargetCountries;
                    return (
                      <div style={{ marginBottom: 16 }}>
                        <div onClick={() => toggleSection("homeTargetCountries")} style={{ cursor: "pointer", display: "flex", alignItems: "center", gap: 6, marginBottom: showCountries ? 8 : 0 }}>
                          <span style={{ fontSize: 13, color: c.textMuted, transition: "transform 0.15s", display: "inline-block", transform: showCountries ? "rotate(0deg)" : "rotate(-90deg)" }}>▾</span>
                          <label style={{ ...labelStyle, margin: 0, cursor: "pointer" }}>Specific Target Countries ({selectedCountries.length}/{availableCountries.length})</label>
                        </div>
                        {showCountries && <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                          {availableCountries.map(co => {
                            const sel = selectedCountries.includes(co);
                            return <button key={co} onClick={() => {
                              const cur = cl.targetCountries || [];
                              updateClient(cl.id, "targetCountries", sel ? cur.filter(x => x !== co) : [...cur, co]);
                            }} style={{ background: sel ? `${c.accent}15` : "transparent", border: `1px solid ${sel ? c.accent : c.border}`, color: sel ? c.accent : c.textMuted, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: sel ? 600 : 400, transition: "all 0.15s" }}>{co}</button>;
                          })}
                        </div>}
                      </div>
                    );
                  })()}
                  {/* Proposed Providers */}
                  <div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: c.textSecondary, textTransform: "uppercase" }}>Proposed Providers</span>
                      <button onClick={() => updateClient(cl.id, "proposedProviders", [...proposedProviders, { id: `pp-${Date.now()}`, providerId: "", serviceId: "", region: "" }])} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>+ Add Provider</button>
                    </div>
                    {proposedProviders.length === 0 && <div style={{ color: c.textMuted, fontSize: 12, padding: "4px 0" }}>No proposed providers yet.</div>}
                    {proposedProviders.map(pp => {
                      const selProv = providers.find(p => p.id === pp.providerId);
                      const selSvcs = selProv ? (selProv.services || []) : [];
                      const selSvc = selSvcs.find(s => s.id === pp.serviceId);
                      const regionOptions = selSvc ? [...(selSvc.regions || []), ...(selSvc.specificCountries || [])] : (cl.targetRegions || []);
                      return (
                        <div key={pp.id} style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 10, padding: 12, marginBottom: 6 }}>
                          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                            <select value={pp.providerId || ""} onChange={e => updateClient(cl.id, "proposedProviders", proposedProviders.map(x => x.id === pp.id ? { ...x, providerId: e.target.value, serviceId: "", region: "" } : x))} style={{ ...inputStyle, fontSize: 12, flex: 1, minWidth: 140 }}>
                              <option value="">-- Provider --</option>
                              {providers.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>
                            <select value={pp.serviceId || ""} onChange={e => updateClient(cl.id, "proposedProviders", proposedProviders.map(x => x.id === pp.id ? { ...x, serviceId: e.target.value, region: "" } : x))} style={{ ...inputStyle, fontSize: 12, flex: 1, minWidth: 140 }}>
                              <option value="">-- Service --</option>
                              {selSvcs.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                            </select>
                            <select value={pp.region || ""} onChange={e => updateClient(cl.id, "proposedProviders", proposedProviders.map(x => x.id === pp.id ? { ...x, region: e.target.value } : x))} style={{ ...inputStyle, fontSize: 12, flex: 1, minWidth: 120 }}>
                              <option value="">-- Region --</option>
                              {regionOptions.map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                            <button onClick={() => updateClient(cl.id, "proposedProviders", proposedProviders.filter(x => x.id !== pp.id))} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontSize: 11 }}>Delete</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>)}
              </div>

              {/* Onboarding Status */}
              {showOnboarding && (
                <div style={sectionCard}>
                  <SectionHeader sectionKey="homeOnboarding" title="Onboarding Status" />
                  {!collapsed.homeOnboarding && (
                    <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                      {[{ key: "proposalSent", label: "Proposal Sent" }, { key: "contractsSigned", label: "Contracts Signed" }, { key: "midsCreated", label: "MIDs Created" }].map(item => {
                        const val = cl[item.key] || false;
                        return (
                          <div key={item.key} style={{ flex: 1, minWidth: 140 }}>
                            <label style={labelStyle}>{item.label}</label>
                            <div style={{ display: "flex", gap: 4 }}>
                              <button onClick={() => updateClient(cl.id, item.key, true)} style={{ flex: 1, background: val ? "rgba(52,211,153,0.15)" : "transparent", border: `1px solid ${val ? "#34d399" : c.border}`, color: val ? "#34d399" : c.textMuted, borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Yes</button>
                              <button onClick={() => updateClient(cl.id, item.key, false)} style={{ flex: 1, background: !val ? "rgba(107,114,128,0.15)" : "transparent", border: `1px solid ${!val ? "#6b7280" : c.border}`, color: !val ? "#6b7280" : c.textMuted, borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>No</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              </>);
            })()}

            {/* ===== ENTITY INFORMATION & KYB TAB ===== */}
            {clientDetailTab === "corporate" && (<>

            {/* Client Type */}
            <div style={sectionCard}>
              <div style={{ fontSize: 14, fontWeight: 700, color: c.accent, margin: "0 0 14px 0", textTransform: "uppercase", letterSpacing: "0.03em" }}>Client Type</div>
              <select value={cl.clientType || ""} onChange={e => updateClient(cl.id, "clientType", e.target.value)} style={{ ...inputStyle, width: "100%", fontSize: 14, padding: "10px 14px", borderRadius: 8 }}>
                <option value="">— Select Type —</option>
                {CLIENT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            {/* Entity Details (combined: details + licensed + UBO + director + KYB per entity) */}
            <div style={sectionCard}>
              <SectionHeader sectionKey="entity" title="Entity Details" badge={`${(cl.entities || [{ id: "primary" }]).length} ${(cl.entities || [{ id: "primary" }]).length === 1 ? "entity" : "entities"}`} extra={
                !collapsed.entity && <button onClick={() => updateClient(cl.id, "entities", [...(cl.entities || [{ id: "primary", jurisdiction: cl.jurisdiction || "", companyNumber: cl.companyNumber || "", registeredAddress: cl.registeredAddress || "", isLicensed: cl.isLicensed || false, licenseJurisdiction: cl.licenseJurisdiction || "", licenseNumber: cl.licenseNumber || "", licenseExpiry: cl.licenseExpiry || "", uboIsEntity: cl.uboIsEntity || false, uboEntityName: cl.uboEntityName || "", ubo: cl.ubo || "", director: cl.director || "", kybDocuments: cl.kybDocuments || [] }]), { id: `ent-${Date.now()}`, entityName: "", jurisdiction: "", companyNumber: "", registeredAddress: "", isLicensed: false, licenseJurisdiction: "", licenseNumber: "", licenseExpiry: "", uboIsEntity: false, uboEntityName: "", uboEntity: null, ubo: "", director: "", kybDocuments: [] }])} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "8px 18px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>+ Add Entity</button>
              } />
              {!collapsed.entity && (() => {
                const ents = cl.entities || [{ id: "primary", entityName: "", jurisdiction: cl.jurisdiction || "", companyNumber: cl.companyNumber || "", registeredAddress: cl.registeredAddress || "", isLicensed: cl.isLicensed || false, licenseJurisdiction: cl.licenseJurisdiction || "", licenseNumber: cl.licenseNumber || "", licenseExpiry: cl.licenseExpiry || "", uboIsEntity: cl.uboIsEntity || false, uboEntityName: cl.uboEntityName || "", uboEntity: null, ubo: cl.ubo || "", director: cl.director || "", kybDocuments: cl.kybDocuments || [] }];
                const updateEnt = (entId, field, val) => {
                  const updated = ents.map(e => e.id === entId ? { ...e, [field]: val } : e);
                  updateClient(cl.id, "entities", updated);
                };

                // KYB upload handler for a specific entity
                const handleEntKybUpload = async (entId, docId, file) => {
                  if (!file) return;
                  if (!supabaseUrl || !supabaseKey) { alert("Connect to Supabase database first"); return; }
                  const ent = ents.find(e => e.id === entId);
                  const docs = ent?.kybDocuments || [];
                  const safeName = cl.name.replace(/[^a-zA-Z0-9]/g, "_");
                  const filePath = "clients/" + safeName + "/" + entId + "/kyb/" + docId + "_" + Date.now() + "_" + file.name;
                  updateEnt(entId, "kybDocuments", docs.map(d => d.id === docId ? { ...d, uploadStatus: "uploading" } : d));
                  try {
                    const resp = await fetch(supabaseUrl + "/storage/v1/object/documents/" + filePath, {
                      method: "POST", headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" }, body: file,
                    });
                    if (!resp.ok) throw new Error("Upload failed: " + resp.status);
                    const publicUrl = supabaseUrl + "/storage/v1/object/public/documents/" + filePath;
                    const updatedDocs = docs.map(d => d.id === docId ? { ...d, fileName: file.name, fileSize: file.size, fileUrl: publicUrl, uploadedAt: new Date().toISOString(), uploadStatus: null } : d);
                    updateEnt(entId, "kybDocuments", updatedDocs);
                  } catch (e) {
                    alert("Upload error: " + e.message);
                    updateEnt(entId, "kybDocuments", docs.map(d => d.id === docId ? { ...d, uploadStatus: null } : d));
                  }
                };

                const KYB_STD = ["Certificate of Incorporation/Registration", "Articles of Association/Memorandum of Association", "Certificate of Incumbency", "Corporate Structure Chart", "Register of Shareholders", "Register of Directors", "ID Documents for UBOs/Directors", "Proof of Address for UBOs/Directors"];
                const formatFileSize = (bytes) => { if (!bytes) return ""; if (bytes < 1024) return bytes + " B"; if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB"; return (bytes / 1048576).toFixed(1) + " MB"; };

                // Reusable entity fields block (used for main entity AND for UBO-owned-by-entity sub-entity)
                const renderEntityFields = (ent, entId, isSubEntity) => {
                  const docs = ent.kybDocuments || [];
                  const existingNames = new Set(docs.map(d => d.name));
                  const missingDocs = KYB_STD.filter(d => !existingNames.has(d));
                  const updateEntDoc = (docId, field, val) => updateEnt(entId, "kybDocuments", docs.map(d => d.id === docId ? { ...d, [field]: val } : d));

                  return (<>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      {isSubEntity && <div style={{ gridColumn: "1 / -1" }}><label style={labelStyle}>Entity Name</label><input value={ent.uboEntityName || ""} onChange={e => updateEnt(entId, "uboEntityName", e.target.value)} placeholder="Entity name..." style={{ ...inputStyle, width: "100%" }} /></div>}
                      {!isSubEntity && <div style={{ gridColumn: "1 / -1" }}><label style={labelStyle}>Entity Name</label><input value={ent.entityName || ""} onChange={e => updateEnt(entId, "entityName", e.target.value)} placeholder="Entity name..." style={{ ...inputStyle, width: "100%" }} /></div>}
                      <div><label style={labelStyle}>Jurisdiction</label><input value={ent.jurisdiction || ""} onChange={e => updateEnt(entId, "jurisdiction", e.target.value)} placeholder="Jurisdiction..." style={{ ...inputStyle, width: "100%" }} /></div>
                      <div><label style={labelStyle}>Company Number</label><input value={ent.companyNumber || ""} onChange={e => updateEnt(entId, "companyNumber", e.target.value)} placeholder="Company number..." style={{ ...inputStyle, width: "100%" }} /></div>
                      <div style={{ gridColumn: "1 / -1" }}><label style={labelStyle}>Registered Address</label><input value={ent.registeredAddress || ""} onChange={e => updateEnt(entId, "registeredAddress", e.target.value)} placeholder="Registered address..." style={{ ...inputStyle, width: "100%" }} /></div>

                      {/* Licensed */}
                      <div style={{ gridColumn: "1 / -1" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                          <label style={labelStyle}>Licensed</label>
                          <div style={{ display: "flex", gap: 4 }}>
                            {["Yes", "No"].map(opt => (
                              <button key={opt} onClick={() => updateEnt(entId, "isLicensed", opt === "Yes")} style={{
                                background: (ent.isLicensed === true && opt === "Yes") || (ent.isLicensed === false && opt === "No") ? `${c.accent}20` : "transparent",
                                border: `1px solid ${(ent.isLicensed === true && opt === "Yes") || (ent.isLicensed === false && opt === "No") ? c.accent : c.border}`,
                                color: (ent.isLicensed === true && opt === "Yes") || (ent.isLicensed === false && opt === "No") ? c.accent : c.textMuted,
                                borderRadius: 6, padding: "5px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600,
                              }}>{opt}</button>
                            ))}
                          </div>
                        </div>
                        {ent.isLicensed && (
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                            <div><label style={labelStyle}>License Jurisdiction</label><input value={ent.licenseJurisdiction || ""} onChange={e => updateEnt(entId, "licenseJurisdiction", e.target.value)} style={{ ...inputStyle, width: "100%" }} /></div>
                            <div><label style={labelStyle}>License Number</label><input value={ent.licenseNumber || ""} onChange={e => updateEnt(entId, "licenseNumber", e.target.value)} style={{ ...inputStyle, width: "100%" }} /></div>
                            <div>
                              <label style={labelStyle}>License Expiry</label>
                              <input type="date" value={ent.licenseExpiry || ""} onChange={e => updateEnt(entId, "licenseExpiry", e.target.value)} style={{ ...inputStyle, width: "100%" }} />
                              {ent.licenseExpiry && (() => {
                                const exp = new Date(ent.licenseExpiry); const now = new Date(); const daysLeft = Math.ceil((exp - now) / (1000*60*60*24));
                                const ac = daysLeft <= 0 ? "#f87171" : daysLeft <= 30 ? "#fbbf24" : daysLeft <= 90 ? "#eab308" : "#34d399";
                                const at = daysLeft <= 0 ? "EXPIRED" : daysLeft <= 30 ? `${daysLeft}d — EXPIRING` : daysLeft <= 90 ? `${daysLeft}d — Review` : `${daysLeft}d`;
                                return <span style={{ fontSize: 9, color: ac, fontWeight: 700, marginTop: 2, display: "block" }}>{at}</span>;
                              })()}
                            </div>
                          </div>
                        )}
                      </div>

                      {/* UBO */}
                      <div>
                        <label style={labelStyle}>UBO</label>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                          <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: c.textMuted, cursor: "pointer" }}>
                            <input type="checkbox" checked={ent.uboIsEntity || false} onChange={e => updateEnt(entId, "uboIsEntity", e.target.checked)} style={{ accentColor: c.accent }} /> Owned by entity
                          </label>
                        </div>
                        {!ent.uboIsEntity && <input value={ent.ubo || ""} onChange={e => updateEnt(entId, "ubo", e.target.value)} placeholder="UBO name..." style={{ ...inputStyle, width: "100%" }} />}
                      </div>

                      {/* Director */}
                      <div><label style={labelStyle}>Director</label><input value={ent.director || ""} onChange={e => updateEnt(entId, "director", e.target.value)} placeholder="Director name..." style={{ ...inputStyle, width: "100%" }} /></div>
                    </div>

                    {/* UBO owned by entity — show full nested entity fields */}
                    {ent.uboIsEntity && (
                      <div style={{ marginTop: 10, background: `${c.accent}08`, border: `1px solid ${c.accent}25`, borderRadius: 8, padding: 14 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: c.accent, marginBottom: 8, textTransform: "uppercase" }}>UBO Entity Details</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                          {[["uboEntityName", "Entity Name"], ["uboEntJurisdiction", "Jurisdiction"], ["uboEntCompanyNumber", "Company Number"]].map(([key, label]) => (
                            <div key={key}><label style={labelStyle}>{label}</label><input value={ent[key] || ""} onChange={e => updateEnt(entId, key, e.target.value)} placeholder={`${label}...`} style={{ ...inputStyle, width: "100%" }} /></div>
                          ))}
                          <div style={{ gridColumn: "1 / -1" }}><label style={labelStyle}>Registered Address</label><input value={ent.uboEntAddress || ""} onChange={e => updateEnt(entId, "uboEntAddress", e.target.value)} placeholder="Address..." style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>UBO</label><input value={ent.uboEntUbo || ""} onChange={e => updateEnt(entId, "uboEntUbo", e.target.value)} placeholder="UBO of parent entity..." style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>Director</label><input value={ent.uboEntDirector || ""} onChange={e => updateEnt(entId, "uboEntDirector", e.target.value)} placeholder="Director..." style={{ ...inputStyle, width: "100%" }} /></div>
                        </div>
                        {/* UBO Entity KYB Documents */}
                        <div style={{ marginTop: 10, borderTop: `1px solid ${c.border}`, paddingTop: 10 }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: c.accent, marginBottom: 6, textTransform: "uppercase" }}>UBO Entity — KYB Documents</div>
                          {(ent.uboEntKybDocs || []).map(doc => (
                            <div key={doc.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: `1px solid ${c.border}` }}>
                              <span style={{ fontSize: 12, color: c.text, flex: 1 }}>{doc.name || "Untitled"}</span>
                              {doc.fileUrl ? <a href={doc.fileUrl} target="_blank" rel="noopener" style={{ fontSize: 10, color: c.accent, fontWeight: 600, textDecoration: "none" }}>↓ {doc.fileName}</a> : <span style={{ fontSize: 10, color: c.textMuted }}>No file</span>}
                              <label style={{ cursor: "pointer" }}><input type="file" style={{ display: "none" }} onChange={ev => {
                                if (!ev.target.files[0] || !supabaseUrl || !supabaseKey) return;
                                const file = ev.target.files[0];
                                const safeName = cl.name.replace(/[^a-zA-Z0-9]/g, "_");
                                const filePath = "clients/" + safeName + "/ubo_ent/" + doc.id + "_" + Date.now() + "_" + file.name;
                                fetch(supabaseUrl + "/storage/v1/object/documents/" + filePath, { method: "POST", headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" }, body: file }).then(r => {
                                  if (r.ok) { const url = supabaseUrl + "/storage/v1/object/public/documents/" + filePath; updateEnt(entId, "uboEntKybDocs", (ent.uboEntKybDocs || []).map(d => d.id === doc.id ? { ...d, fileName: file.name, fileUrl: url } : d)); }
                                });
                              }} /><span style={{ fontSize: 10, color: c.accent, border: `1px solid ${c.accent}`, borderRadius: 4, padding: "2px 6px" }}>Upload</span></label>
                              <button onClick={() => updateEnt(entId, "uboEntKybDocs", (ent.uboEntKybDocs || []).filter(d => d.id !== doc.id))} style={{ background: "transparent", border: "none", color: "#f87171", cursor: "pointer", fontSize: 12 }}>✕</button>
                            </div>
                          ))}
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
                            {KYB_STD.filter(d => !(ent.uboEntKybDocs || []).some(x => x.name === d)).slice(0, 4).map(d => (
                              <button key={d} onClick={() => updateEnt(entId, "uboEntKybDocs", [...(ent.uboEntKybDocs || []), { id: `ukd-${Date.now()}-${Math.random().toString(36).slice(2,5)}`, name: d, fileName: "", fileUrl: "" }])} style={{ background: "transparent", border: `1px solid ${c.accent}40`, color: c.accent, borderRadius: 4, padding: "2px 6px", cursor: "pointer", fontSize: 9 }}>+ {d.length > 30 ? d.slice(0,28) + "..." : d}</button>
                            ))}
                            <button onClick={() => updateEnt(entId, "uboEntKybDocs", [...(ent.uboEntKybDocs || []), { id: `ukd-${Date.now()}`, name: "", fileName: "", fileUrl: "" }])} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 9, fontWeight: 600 }}>+ Add</button>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* KYB Documents for this entity */}
                    <div style={{ marginTop: 16, borderTop: `1px solid ${c.border}`, paddingTop: 16 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: c.accent, textTransform: "uppercase", letterSpacing: "0.03em" }}>KYB Documents <span style={{ fontWeight: 500, color: c.textMuted, textTransform: "none", fontSize: 12 }}>{docs.filter(d => d.fileUrl).length}/{docs.length} uploaded</span></div>
                        <button onClick={async () => {
                          if (!window.JSZip) { alert("JSZip not loaded"); return; }
                          const zip = new window.JSZip();
                          const withFiles = docs.filter(d => d.fileUrl);
                          if (withFiles.length === 0) { alert("No documents uploaded yet"); return; }
                          for (const doc of withFiles) { try { const r = await fetch(doc.fileUrl); if (r.ok) zip.file(doc.fileName || doc.name + ".pdf", await r.blob()); } catch(e){} }
                          const blob = await zip.generateAsync({ type: "blob" });
                          window.saveAs(blob, cl.name.replace(/[^a-zA-Z0-9]/g, "_") + "_Entity" + (isSubEntity ? "_UBO" : "") + "_KYB.zip");
                        }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>↓ Download KYB Pack</button>
                      </div>
                      {/* Missing docs quick-add */}
                      {missingDocs.length > 0 && (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                          {missingDocs.map(d => (
                            <button key={d} onClick={() => updateEnt(entId, "kybDocuments", [...docs, { id: `kd-${Date.now()}-${Math.random().toString(36).slice(2,5)}`, name: d, startDate: "", renewalMonths: "", fileName: "", fileSize: 0, fileUrl: "", uploadStatus: null }])} style={{ background: "transparent", border: `1px solid ${c.accent}40`, color: c.accent, borderRadius: 6, padding: "5px 10px", cursor: "pointer", fontSize: 11, fontWeight: 500 }}>+ {d.length > 35 ? d.slice(0,33) + "..." : d}</button>
                          ))}
                        </div>
                      )}
                      {docs.length === 0 && <div style={{ fontSize: 11, color: c.textMuted, marginBottom: 6 }}>No KYB documents — use buttons above to add standard docs</div>}
                      {docs.map(doc => {
                        const isEd = editingClientField === `kd-${doc.id}`;
                        const renewal = doc.startDate && doc.renewalMonths ? (() => { const d = new Date(doc.startDate); d.setMonth(d.getMonth() + parseInt(doc.renewalMonths)); return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }); })() : null;
                        const sc = doc.fileUrl ? "#34d399" : "#fbbf24";
                        return (
                          <div key={doc.id}
                            onDragOver={e => { e.preventDefault(); e.currentTarget.style.outline = `2px solid ${c.accent}`; }}
                            onDragLeave={e => { e.currentTarget.style.outline = "none"; }}
                            onDrop={e => { e.preventDefault(); e.currentTarget.style.outline = "none"; if (e.dataTransfer.files[0]) handleEntKybUpload(entId, doc.id, e.dataTransfer.files[0]); }}
                            style={{ borderLeft: `3px solid ${sc}`, padding: "12px 16px", marginBottom: 8, background: `${sc}08`, borderRadius: "0 8px 8px 0", border: `1px solid ${sc}25` }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                              <div style={{ flex: 1 }}>
                                <div style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{doc.name || "Untitled"}</div>
                                {!isEd && <div style={{ fontSize: 12, color: c.textMuted, marginTop: 2 }}>
                                  {doc.startDate && <span>{doc.startDate}</span>}{renewal && <span> · Renews {renewal}</span>}
                                  {doc.fileName && <span> · <a href={doc.fileUrl} target="_blank" rel="noopener" style={{ color: c.accent, textDecoration: "none" }}>↓ {doc.fileName}</a> {formatFileSize(doc.fileSize)}</span>}
                                </div>}
                              </div>
                              <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                                {doc.fileUrl && <a href={doc.fileUrl} target="_blank" rel="noopener" style={{ fontSize: 11, color: c.accent, fontWeight: 600, textDecoration: "none", padding: "5px 10px", border: `1px solid ${c.accent}`, borderRadius: 6 }}>↓</a>}
                                <button onClick={() => setEditingClientField(isEd ? null : `kd-${doc.id}`)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, cursor: "pointer", fontSize: 11, borderRadius: 6, padding: "5px 10px", fontWeight: 600 }}>{isEd ? "Done" : "Edit"}</button>
                                <button onClick={() => updateEnt(entId, "kybDocuments", docs.filter(d => d.id !== doc.id))} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 6, padding: "5px 8px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>✕</button>
                              </div>
                            </div>
                            {isEd && (
                              <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 6 }}>
                                <div><label style={labelStyle}>Document Name</label><input value={doc.name || ""} onChange={e => updateEntDoc(doc.id, "name", e.target.value)} style={{ ...inputStyle, width: "100%" }} /></div>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                                  <div><label style={labelStyle}>Start Date</label><input type="date" value={doc.startDate || ""} onChange={e => updateEntDoc(doc.id, "startDate", e.target.value)} style={{ ...inputStyle, width: "100%" }} /></div>
                                  <div><label style={labelStyle}>Renewal (months)</label><input type="number" min="0" value={doc.renewalMonths || ""} onChange={e => updateEntDoc(doc.id, "renewalMonths", e.target.value)} placeholder="No renewal" style={{ ...inputStyle, width: "100%" }} />{renewal && <div style={{ fontSize: 9, color: c.accent, marginTop: 2 }}>Renews: {renewal}</div>}</div>
                                </div>
                                <div
                                  onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.accent; }}
                                  onDragLeave={e => { e.currentTarget.style.borderColor = c.border; }}
                                  onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.border; if (e.dataTransfer.files[0]) handleEntKybUpload(entId, doc.id, e.dataTransfer.files[0]); }}
                                  style={{ border: `2px dashed ${c.border}`, borderRadius: 6, padding: "10px 12px", textAlign: "center", cursor: "pointer" }}
                                  onClick={() => { const inp = document.createElement("input"); inp.type = "file"; inp.onchange = ev => { if (ev.target.files[0]) handleEntKybUpload(entId, doc.id, ev.target.files[0]); }; inp.click(); }}
                                >
                                  {doc.uploadStatus === "uploading" ? <span style={{ fontSize: 11, color: c.accent }}>Uploading...</span> : doc.fileName ? <span style={{ fontSize: 11, color: "#34d399" }}>{doc.fileName} — click to replace</span> : <span style={{ fontSize: 11, color: c.textMuted }}>Drop file or click to upload</span>}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                      <button onClick={() => {
                        const newDoc = { id: `kd-${Date.now()}`, name: "", startDate: "", renewalMonths: "", fileName: "", fileSize: 0, fileUrl: "", uploadStatus: null };
                        updateEnt(entId, "kybDocuments", [...docs, newDoc]);
                        setEditingClientField(`kd-${newDoc.id}`);
                      }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "8px 18px", cursor: "pointer", fontSize: 12, fontWeight: 600, marginTop: 8 }}>+ Add Document</button>
                    </div>
                  </>);
                };

                return ents.map((ent, idx) => (
                  <div key={ent.id} style={{ background: c.surface, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20, marginBottom: idx < ents.length - 1 ? 14 : 0 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 4, height: 24, borderRadius: 2, background: c.accent }} />
