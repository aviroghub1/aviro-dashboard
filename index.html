                    <div style={{ fontSize: 13, color: c.text, fontWeight: 500 }}>{rel ? rel.bankName : "Unknown Bank"}</div>
                    <div style={{ fontSize: 11, color: c.textMuted }}>{(acct.accountPurpose || []).join(", ") || "No purpose set"}{acct.dateOpened ? ` · Opened ${acct.dateOpened}` : ""}</div>
                  </div>
                  {rel && rel.mainContact && <span style={{ fontSize: 10, color: c.textMuted }}>{rel.mainContact}</span>}
                </div>
              );
            })}
          </div>
          );
        })()}
      </div>
    );
  };

  // ===== ENTITIES =====
  const [showAddEntity, setShowAddEntity] = useState(false);
  const [newEntityName, setNewEntityName] = useState("");
  const [newEntityType, setNewEntityType] = useState("");

  const handleAddEntity = () => {
    if (!newEntityName.trim() || !newEntityType) return;
    const newEnt = {
      id: `ent-${Date.now()}`, name: newEntityName.trim(), category: newEntityType,
      jurisdiction: "", companyNumber: "", address: "", ubo: "", director: "", licenseNumber: "",
      footerText: "", domains: [], sealCodes: {}, contracts: [], agreements: [], documents: [], bankAccounts: [],
    };
    setCorporateEntities([...corporateEntities, newEnt]);
    setNewEntityName("");
    setNewEntityType("");
    setShowAddEntity(false);
  };

  const renderEntities = () => {
    if (selectedEntity && selectedCategory) {
      const ent = CORPORATE_ENTITIES[selectedCategory]?.find(e => e.name === selectedEntity);
      if (ent) return renderEntityDetail(ent, selectedCategory);
    }
    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0, letterSpacing: "-0.02em" }}>Corporate Entity Matrix</h2>
            <p style={{ color: c.textSecondary, fontSize: 13, margin: "4px 0 0 0" }}>{corporateEntities.length} entities across {Object.keys(CORPORATE_ENTITIES).length} categories</p>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {dbConnected && (
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                {dbSyncStatus === "syncing" && <span style={{ fontSize: 11, color: c.accent }}>⟳ Syncing...</span>}
                {dbSyncStatus === "success" && <span style={{ fontSize: 11, color: c.success }}>{dbSyncMessage}</span>}
                {dbSyncStatus === "error" && <span style={{ fontSize: 11, color: c.danger }}>{dbSyncMessage}</span>}
                <button onClick={syncFromDb} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, fontSize: 11, padding: "5px 10px", borderRadius: 6, cursor: "pointer" }}>↓ Pull</button>
                <button onClick={syncToDb} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, fontSize: 11, padding: "5px 10px", borderRadius: 6, cursor: "pointer" }}>↑ Push</button>
              </div>
            )}
            <button onClick={() => setShowDbSetup(!showDbSetup)}
              style={{ background: dbConnected ? c.accentBg : c.surface, border: `1px solid ${dbConnected ? c.accent + "40" : c.border}`, color: dbConnected ? c.accent : c.textSecondary, fontSize: 11, padding: "5px 12px", borderRadius: 6, cursor: "pointer", fontWeight: 500 }}>
              {dbConnected ? "⚙ Database Connected" : supabaseUrl ? "⚙ Database Setup" : "⚙ Connect Database"}
            </button>
          </div>
        </div>

        {showDbSetup && (
          <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ fontSize: 13, fontWeight: 600, color: c.text, margin: 0 }}>Database Connection</h3>
              <button onClick={() => setShowDbSetup(false)} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer", fontSize: 16 }}>✕</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
              <div>
                <label style={{ fontSize: 10, color: c.textMuted, display: "block", marginBottom: 3 }}>Project URL</label>
                <input value={supabaseUrl} onChange={e => setSupabaseUrl(e.target.value.trim())} placeholder="https://xxxxx.supabase.co" style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, padding: "6px 10px", borderRadius: 6, fontSize: 11, outline: "none", boxSizing: "border-box" }} />
              </div>
              <div>
                <label style={{ fontSize: 10, color: c.textMuted, display: "block", marginBottom: 3 }}>Anon Key</label>
                <input value={supabaseKey} onChange={e => setSupabaseKey(e.target.value.trim())} placeholder="eyJhbGci..." style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, padding: "6px 10px", borderRadius: 6, fontSize: 11, outline: "none", fontFamily: "monospace", boxSizing: "border-box" }} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <button onClick={async () => {
                if (!supabaseUrl || !supabaseKey) { setDbSyncStatus("error"); setDbSyncMessage("Enter both URL and Key"); setTimeout(() => setDbSyncStatus("idle"), 3000); return; }
                setDbSyncStatus("syncing"); setDbSyncMessage("Testing...");
                try {
                  const r = await fetch(supabaseUrl + "/rest/v1/entity_documents?select=count&limit=0", { headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey } });
                  if (r.ok) { setDbConnected(true); setDbSyncStatus("success"); setDbSyncMessage("Connected!"); }
                  else { const t = await r.text(); setDbConnected(false); setDbSyncStatus("error"); setDbSyncMessage("Error " + r.status + ": " + (t.includes("does not exist") ? "Run the SQL schema first" : t.slice(0, 60))); }
                } catch (err) { setDbConnected(false); setDbSyncStatus("error"); setDbSyncMessage("Failed: " + err.message); }
                setTimeout(() => setDbSyncStatus("idle"), 5000);
              }} style={{ background: c.accent, border: "none", color: "#fff", padding: "6px 14px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontWeight: 600 }}>Test Connection</button>
              {dbConnected && <button onClick={syncFromDb} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, padding: "6px 14px", borderRadius: 6, fontSize: 11, cursor: "pointer" }}>↓ Pull</button>}
              {dbConnected && <button onClick={syncToDb} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, padding: "6px 14px", borderRadius: 6, fontSize: 11, cursor: "pointer" }}>↑ Push</button>}
              {dbSyncStatus !== "idle" && <span style={{ fontSize: 11, color: dbSyncStatus === "success" ? c.success : dbSyncStatus === "error" ? c.danger : c.accent }}>{dbSyncMessage}</span>}
            </div>
          </div>
        )}
        {allDocAlerts.length > 0 && (
          <div style={{ background: c.card, border: `1px solid rgba(248,113,113,0.15)`, borderRadius: 10, marginBottom: 20, overflow: "hidden" }}>
            <div onClick={() => setEntityAlertsCollapsed(!entityAlertsCollapsed)}
              style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", cursor: "pointer", background: "rgba(239,68,68,0.06)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <Icon type="alert" size={14} />
                <span style={{ fontSize: 13, fontWeight: 600, color: c.danger }}>{allDocAlerts.length} Document{allDocAlerts.length !== 1 ? "s" : ""} Need Attention</span>
              </div>
              <span style={{ fontSize: 11, color: c.textMuted }}>{entityAlertsCollapsed ? "▸ Show" : "▾ Hide"}</span>
            </div>
            {!entityAlertsCollapsed && (
              <div style={{ padding: "8px 16px 12px" }}>
                {allDocAlerts.map((a, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: i < allDocAlerts.length - 1 ? `1px solid ${c.border}` : "none" }}>
                    <span style={{ width: 6, height: 6, borderRadius: "50%", flexShrink: 0, background: a.status === "expired" ? "#f87171" : a.status === "expiring" ? "#fbbf24" : "#3b82f6" }} />
                    <span style={{ fontSize: 12, color: c.text, flex: 1 }}>
                      <span style={{ fontWeight: 600 }}>{a.entity}</span>
                      <span style={{ color: c.textMuted }}> — </span>
                      <span>{a.doc}</span>
                      <span style={{ color: c.textMuted }}> — </span>
                      <span style={{ fontWeight: 500, color: a.status === "expired" ? "#f87171" : a.status === "expiring" ? "#fbbf24" : "#3b82f6" }}>
                        {a.status === "expired" ? "Expired" : a.status === "expiring" ? "Expiring Soon" : "Review Soon"}
                      </span>
                      {a.renewalDate && a.renewalDate !== "No date" && (
                        <span style={{ color: c.textMuted }}> — renew by {a.renewalDate}</span>
                      )}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
        {/* Add Entity button + form */}
        <div style={{ marginBottom: 20 }}>
          {!showAddEntity ? (
            <button onClick={() => setShowAddEntity(true)} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ Add Entity</button>
          ) : (
            <div style={{ background: c.card, border: `1px solid ${c.accent}40`, borderRadius: 10, padding: 20, display: "flex", gap: 10, alignItems: "flex-end" }}>
              <div style={{ flex: 1 }}>
                <label style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, textTransform: "uppercase", display: "block", marginBottom: 3 }}>Entity Name</label>
                <input value={newEntityName} onChange={e => setNewEntityName(e.target.value)} onKeyDown={e => e.key === "Enter" && handleAddEntity()} autoFocus placeholder="e.g. Astor Holdings Limited" style={{ width: "100%", fontSize: 13, padding: "8px 12px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none", boxSizing: "border-box" }} />
              </div>
              <div style={{ flex: 1 }}>
                <label style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, textTransform: "uppercase", display: "block", marginBottom: 3 }}>Entity Type</label>
                <select value={newEntityType} onChange={e => setNewEntityType(e.target.value)} style={{ width: "100%", fontSize: 13, padding: "8px 12px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none", boxSizing: "border-box" }}>
                  <option value="">— Select Type —</option>
                  {ENTITY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <button onClick={handleAddEntity} disabled={!newEntityName.trim() || !newEntityType} style={{ background: newEntityName.trim() && newEntityType ? c.accent : c.surface, border: "none", color: newEntityName.trim() && newEntityType ? "#fff" : c.textMuted, borderRadius: 6, padding: "8px 20px", cursor: newEntityName.trim() && newEntityType ? "pointer" : "default", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap" }}>Create</button>
              <button onClick={() => { setShowAddEntity(false); setNewEntityName(""); setNewEntityType(""); }} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 6, padding: "8px 14px", cursor: "pointer", fontSize: 12 }}>Cancel</button>
            </div>
          )}
        </div>

        {corporateEntities.length === 0 && <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 40, textAlign: "center", color: c.textMuted, fontSize: 13 }}>No entities added yet. Click "+ Add Entity" to get started.</div>}

        {Object.entries(CORPORATE_ENTITIES).map(([category, entities]) => (
          <div key={category} style={{ marginBottom: 24 }}>
            <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase", letterSpacing: "0.05em", borderBottom: `1px solid ${c.border}`, paddingBottom: 8 }}>
              {category} <span style={{ color: c.textMuted, fontWeight: 400 }}>({entities.length})</span>
            </h3>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 10 }}>
              {entities.map(entity => {
                const eDocs = entityDocs[entity.name] || [];
                const ac = eDocs.filter(d => { const s = getDocStatusGlobal(d); return s === "expired" || s === "expiring" || s === "review_soon"; }).length;
                return (
                  <div key={entity.name || entity.id} style={{ background: c.card, border: `1px solid ${ac > 0 ? "rgba(248,113,113,0.2)" : c.border}`, borderRadius: 10, padding: 16, cursor: "pointer", position: "relative" }}
                    onMouseEnter={e => e.currentTarget.style.background = c.cardHover} onMouseLeave={e => e.currentTarget.style.background = c.card}>
                    <button onClick={e => { e.stopPropagation(); if (confirm("Delete " + entity.name + "?")) setCorporateEntities(corporateEntities.filter(ce => ce.id !== entity.id)); }} style={{ position: "absolute", top: 8, right: 8, background: "transparent", border: "none", color: c.textMuted, cursor: "pointer", fontSize: 10, opacity: 0.5, padding: "2px 6px" }} title="Delete entity">✕</button>
                    <div onClick={() => { setSelectedEntity(entity.name); setSelectedCategory(category); }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, paddingRight: 16 }}>
                        <div style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{entity.name}</div>
                        {ac > 0 && <span style={{ background: c.dangerBg, color: c.danger, fontSize: 10, padding: "2px 6px", borderRadius: 4, fontWeight: 700 }}>{ac} alert{ac > 1 ? "s" : ""}</span>}
                      </div>
                      <div style={{ fontSize: 12, color: c.textSecondary }}>{entity.jurisdiction || "No jurisdiction set"}</div>
                      <div style={{ fontSize: 11, color: c.textMuted }}>{entity.companyNumber || ""}</div>
                      <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                        {bankAccountsList.filter(a => a.entityName === entity.name).length > 0 && <span style={{ fontSize: 10, color: c.textMuted, background: c.surface, padding: "2px 6px", borderRadius: 3 }}>{bankAccountsList.filter(a => a.entityName === entity.name).length} bank</span>}
                        {(entityDocs[entity.name] || []).length > 0 && <span style={{ fontSize: 10, color: c.textMuted, background: c.surface, padding: "2px 6px", borderRadius: 3 }}>{(entityDocs[entity.name] || []).length} docs</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    );
  };

  // ===== MONEY FLOW =====
  const typeColors = { "Payment Processing": "#818cf8", "Software License": "#34d399", "Management Fee": "#fbbf24", "Payment Gateway": "#06b6d4", "Revenue Distribution": "#ec4899", "Subsidiary Distribution": "#a78bfa" };
  const AGREEMENT_TYPES = ["Payment Processing", "Software License", "Management Fee", "Revenue Share", "Sub-License", "Service Agreement", "Payment Gateway", "Foundation Agreement", "Other"];
  const CURRENCIES = ["USD", "EUR", "GBP", "CAD", "AUD", "CHF", "AED", "BTC", "USDT", "Other"];
  const TERMS = ["Weekly", "Monthly", "Quarterly", "6 Months", "Yearly"];
  const agreementTypeColors = { "Payment Processing": "#818cf8", "Software License": "#34d399", "Management Fee": "#fbbf24", "Revenue Share": "#ec4899", "Sub-License": "#a78bfa", "Service Agreement": "#06b6d4", "Payment Gateway": "#14b8a6", "Foundation Agreement": "#f97316", "Other": "#6b7280" };

  const renderMoneyFlow = () => {
    const allNames = corporateEntities.map(e => e.name);
    const updateAg = (id, field, val) => setEntityIntraAgreements(entityIntraAgreements.map(a => a.id === id ? { ...a, [field]: val } : a));

    // Upload handler for agreement docs
    const handleFlowDocUpload = async (agId, file) => {
      if (!file) return;
      if (!supabaseUrl || !supabaseKey) { alert("Connect to Supabase database first"); return; }
      const filePath = "corporate_flow/" + agId + "_" + Date.now() + "_" + file.name;
      updateAg(agId, "uploadStatus", "uploading");
      try {
        const resp = await fetch(supabaseUrl + "/storage/v1/object/documents/" + filePath, {
          method: "POST", headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" }, body: file,
        });
        if (!resp.ok) throw new Error("Upload failed: " + resp.status);
        const publicUrl = supabaseUrl + "/storage/v1/object/public/documents/" + filePath;
        setEntityIntraAgreements(entityIntraAgreements.map(a => a.id === agId ? { ...a, fileName: file.name, fileUrl: publicUrl, uploadStatus: null } : a));
      } catch (e) {
        alert("Upload error: " + e.message);
        updateAg(agId, "uploadStatus", null);
      }
    };

    // Build flow chart data: unique entities involved + connections
    const connectedEntities = new Set();
    entityIntraAgreements.forEach(ag => { if (ag.fromEntity) connectedEntities.add(ag.fromEntity); if (ag.toEntity) connectedEntities.add(ag.toEntity); });
    const nodes = [...connectedEntities];
    const nodeCount = nodes.length;

    // Circular layout for the flowchart
    const chartW = 800, chartH = Math.max(400, nodeCount * 40);
    const centerX = chartW / 2, centerY = chartH / 2;
    const radius = Math.min(centerX, centerY) - 80;
    const nodePositions = {};
    nodes.forEach((name, i) => {
      const angle = (2 * Math.PI * i / nodeCount) - Math.PI / 2;
      nodePositions[name] = { x: centerX + radius * Math.cos(angle), y: centerY + radius * Math.sin(angle) };
    });

    const inputStyle = { fontSize: 12, padding: "6px 10px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none", boxSizing: "border-box" };
    const labelStyle = { fontSize: 10, color: c.textMuted, fontWeight: 600, textTransform: "uppercase", display: "block", marginBottom: 3 };

    return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0, letterSpacing: "-0.02em" }}>Corporate Flow</h2>
          <p style={{ color: c.textSecondary, fontSize: 13, margin: "4px 0 0 0" }}>{entityIntraAgreements.length} intra-company agreement{entityIntraAgreements.length !== 1 ? "s" : ""} across {connectedEntities.size} entities</p>
        </div>
        <button onClick={() => {
          const newAg = { id: `cf-${Date.now()}`, name: "", fromEntity: "", toEntity: "", agreementType: "", amount: "", currency: "USD", term: "", notes: "", fileName: "", fileUrl: "", startDate: "", renewalMonths: "", collapsed: false, uploadStatus: null };
          setEntityIntraAgreements([...entityIntraAgreements, newAg]);
        }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ Add Agreement</button>
      </div>

      {/* Visual Flow Chart */}
      {nodeCount > 0 && (
        <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20, marginBottom: 24, overflow: "auto" }}>
          <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Entity Relationship Map</h3>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
            {Object.entries(agreementTypeColors).filter(([type]) => entityIntraAgreements.some(a => a.agreementType === type)).map(([type, color]) => (
              <span key={type} style={{ fontSize: 10, color, background: `${color}15`, border: `1px solid ${color}40`, padding: "2px 8px", borderRadius: 4 }}>{type}</span>
            ))}
          </div>
          <svg width={chartW} height={chartH} style={{ display: "block", margin: "0 auto" }}>
            {/* Connection lines */}
            {entityIntraAgreements.filter(ag => ag.fromEntity && ag.toEntity && nodePositions[ag.fromEntity] && nodePositions[ag.toEntity]).map((ag, i) => {
              const from = nodePositions[ag.fromEntity];
              const to = nodePositions[ag.toEntity];
              const color = agreementTypeColors[ag.agreementType] || "#6b7280";
              const midX = (from.x + to.x) / 2;
              const midY = (from.y + to.y) / 2;
              // Offset curved lines slightly so multiple connections between same nodes don't overlap
              const dx = to.x - from.x, dy = to.y - from.y;
              const perpX = -dy * 0.1, perpY = dx * 0.1;
              return (
                <g key={ag.id + "-line"}>
                  <path d={`M ${from.x} ${from.y} Q ${midX + perpX} ${midY + perpY} ${to.x} ${to.y}`} fill="none" stroke={color} strokeWidth="2" strokeOpacity="0.6" markerEnd={`url(#arrow-${ag.id})`} />
                  <defs><marker id={`arrow-${ag.id}`} viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill={color} fillOpacity="0.6" /></marker></defs>
                  <text x={midX + perpX} y={midY + perpY - 6} textAnchor="middle" style={{ fontSize: 9, fill: color, fontWeight: 600 }}>{ag.agreementType || ""}</text>
                </g>
              );
            })}
            {/* Entity nodes */}
            {nodes.map(name => {
              const pos = nodePositions[name];
              const entObj = corporateEntities.find(ce => ce.name === name);
              const catColor = entObj?.category === "Gaming License" ? "#818cf8" : entObj?.category === "Payment Agent" ? "#34d399" : entObj?.category === "Technology Company" ? "#06b6d4" : entObj?.category === "Management Company" ? "#fbbf24" : c.accent;
              return (
                <g key={name}>
                  <circle cx={pos.x} cy={pos.y} r={28} fill={c.card} stroke={catColor} strokeWidth="2.5" />
                  <text x={pos.x} y={pos.y - 34} textAnchor="middle" style={{ fontSize: 10, fill: c.text, fontWeight: 600 }}>{name.length > 25 ? name.slice(0, 22) + "..." : name}</text>
                  <text x={pos.x} y={pos.y + 4} textAnchor="middle" style={{ fontSize: 8, fill: catColor, fontWeight: 600 }}>{entObj?.category?.split(" ")[0] || ""}</text>
                </g>
              );
            })}
          </svg>
        </div>
      )}

      {/* Agreements List */}
      {entityIntraAgreements.length === 0 && <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 30, textAlign: "center", color: c.textMuted, fontSize: 13 }}>No intra-company agreements yet. Click "+ Add Agreement" to get started.</div>}

      {entityIntraAgreements.map(ag => {
        const isEditing = !ag.collapsed;
        const renewalDate = ag.startDate && ag.renewalMonths ? (() => { const d = new Date(ag.startDate); d.setMonth(d.getMonth() + parseInt(ag.renewalMonths)); return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }); })() : null;
        const typeColor = agreementTypeColors[ag.agreementType] || "#6b7280";
        return (
        <div key={ag.id} style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 18, marginBottom: 10 }}>
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1 }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{ag.fromEntity || "?"}</span>
              <span style={{ color: typeColor, fontSize: 14 }}>→</span>
              <span style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{ag.toEntity || "?"}</span>
              {ag.agreementType && <span style={{ fontSize: 10, color: typeColor, background: `${typeColor}15`, padding: "2px 8px", borderRadius: 4, fontWeight: 600 }}>{ag.agreementType}</span>}
              {ag.amount && <span style={{ fontSize: 11, color: c.textMuted }}>{ag.currency || ""} {ag.amount}{ag.term ? ` / ${ag.term}` : ""}</span>}
              {ag.fileUrl && <span style={{ fontSize: 9, color: "#34d399", fontWeight: 600 }}>DOC ✓</span>}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              {ag.fileUrl && <a href={ag.fileUrl} target="_blank" rel="noopener" style={{ fontSize: 10, color: c.accent, fontWeight: 600, textDecoration: "none", padding: "3px 8px", border: `1px solid ${c.accent}`, borderRadius: 4 }}>↓</a>}
              <button onClick={() => updateAg(ag.id, "collapsed", !ag.collapsed)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, cursor: "pointer", fontSize: 10, borderRadius: 4, padding: "3px 10px" }}>{ag.collapsed ? "Edit ▾" : "Collapse ▴"}</button>
              <button onClick={() => setEntityIntraAgreements(entityIntraAgreements.filter(a => a.id !== ag.id))} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 10 }}>✕</button>
            </div>
          </div>

          {/* Collapsed summary */}
          {ag.collapsed && (ag.name || ag.notes || ag.startDate) && (
            <div style={{ marginTop: 6, fontSize: 11, color: c.textMuted }}>
              {ag.name && <span style={{ fontWeight: 500, color: c.textSecondary }}>{ag.name}</span>}
              {ag.startDate && <span> · Started {ag.startDate}</span>}
              {renewalDate && <span> · Renews {renewalDate}</span>}
              {ag.notes && <span> · {ag.notes.slice(0, 60)}{ag.notes.length > 60 ? "..." : ""}</span>}
            </div>
          )}

          {/* Edit form */}
          {isEditing && (
            <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 10 }}>
              {/* Row 1: From → To */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 10, alignItems: "end" }}>
                <div>
                  <label style={labelStyle}>From Entity</label>
                  <select value={ag.fromEntity || ""} onChange={e => updateAg(ag.id, "fromEntity", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                    <option value="">— Select —</option>
                    {allNames.map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <span style={{ color: c.accent, fontSize: 18, paddingBottom: 6 }}>→</span>
                <div>
                  <label style={labelStyle}>To Entity</label>
                  <select value={ag.toEntity || ""} onChange={e => updateAg(ag.id, "toEntity", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                    <option value="">— Select —</option>
                    {allNames.filter(n => n !== ag.fromEntity).map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
              </div>

              {/* Row 2: Name + Type */}
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 10 }}>
                <div><label style={labelStyle}>Agreement Name</label><input value={ag.name || ""} onChange={e => updateAg(ag.id, "name", e.target.value)} placeholder="e.g. Payment Processing Agreement" style={{ ...inputStyle, width: "100%" }} /></div>
                <div>
                  <label style={labelStyle}>Agreement Type</label>
                  <select value={ag.agreementType || ""} onChange={e => updateAg(ag.id, "agreementType", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                    <option value="">— Select Type —</option>
                    {AGREEMENT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
              </div>

              {/* Row 3: Amount + Currency + Term */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 100px 120px", gap: 10 }}>
                <div><label style={labelStyle}>Amount</label><input value={ag.amount || ""} onChange={e => updateAg(ag.id, "amount", e.target.value)} placeholder="e.g. 5,000" style={{ ...inputStyle, width: "100%" }} /></div>
                <div>
                  <label style={labelStyle}>Currency</label>
                  <select value={ag.currency || "USD"} onChange={e => updateAg(ag.id, "currency", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                    {CURRENCIES.map(cur => <option key={cur} value={cur}>{cur}</option>)}
                  </select>
                </div>
                <div>
                  <label style={labelStyle}>Term</label>
                  <select value={ag.term || ""} onChange={e => updateAg(ag.id, "term", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                    <option value="">— Select —</option>
                    {TERMS.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
              </div>

              {/* Row 4: Notes */}
              <div><label style={labelStyle}>Notes</label><textarea value={ag.notes || ""} onChange={e => updateAg(ag.id, "notes", e.target.value)} placeholder="Agreement notes..." style={{ ...inputStyle, width: "100%", minHeight: 50, resize: "vertical", fontFamily: "system-ui" }} /></div>

              {/* Row 5: Dates */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <div><label style={labelStyle}>Document Start Date</label><input type="date" value={ag.startDate || ""} onChange={e => updateAg(ag.id, "startDate", e.target.value)} style={{ ...inputStyle, width: "100%" }} /></div>
                <div>
                  <label style={labelStyle}>Renewal (months)</label>
                  <input type="number" min="0" value={ag.renewalMonths || ""} onChange={e => updateAg(ag.id, "renewalMonths", e.target.value)} placeholder="Leave blank = no renewal" style={{ ...inputStyle, width: "100%" }} />
                  {renewalDate && <div style={{ fontSize: 10, color: c.accent, marginTop: 3 }}>Renews: {renewalDate}</div>}
                </div>
              </div>

              {/* Row 6: Document upload */}
              <div>
                <label style={labelStyle}>Document</label>
                {ag.fileUrl ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: "rgba(34,197,94,0.08)", borderRadius: 6, border: "1px solid rgba(34,197,94,0.2)" }}>
                    <span style={{ fontSize: 12, color: "#34d399", fontWeight: 500, flex: 1 }}>📄 {ag.fileName || "document"}</span>
                    <a href={ag.fileUrl} target="_blank" rel="noopener" style={{ fontSize: 10, color: c.accent, fontWeight: 600, textDecoration: "none", padding: "3px 8px", border: `1px solid ${c.accent}`, borderRadius: 4 }}>Download</a>
                    <button onClick={() => { updateAg(ag.id, "fileUrl", ""); updateAg(ag.id, "fileName", ""); }} style={{ fontSize: 10, color: "#f87171", background: "transparent", border: "1px solid rgba(248,113,113,0.2)", borderRadius: 4, padding: "3px 8px", cursor: "pointer" }}>Remove</button>
                  </div>
                ) : (
                  <div
                    onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.accent; }}
                    onDragLeave={e => { e.currentTarget.style.borderColor = c.border; }}
                    onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.border; handleFlowDocUpload(ag.id, e.dataTransfer.files[0]); }}
                    style={{ border: `2px dashed ${c.border}`, borderRadius: 8, padding: "12px 16px", textAlign: "center", cursor: "pointer", transition: "border-color 0.15s" }}
                    onClick={() => { const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".doc,.docx,.pdf,.png,.jpg,.jpeg,.xlsx"; inp.onchange = (ev) => handleFlowDocUpload(ag.id, ev.target.files[0]); inp.click(); }}
                  >
                    {ag.uploadStatus === "uploading" ? <span style={{ fontSize: 11, color: c.accent }}>⟳ Uploading...</span> : <span style={{ fontSize: 11, color: c.textMuted }}>Drop document here or click to upload</span>}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
        );
      })}
    </div>
    );
  };

  // ===== BANK ACCOUNTS =====
  const SERVICE_OPTIONS = ["C2B", "B2C", "B2B", "Treasury", "Internal"];
  const FEE_TYPES = ["B2B", "B2C", "C2B", "FX"];
  const allEntityNames = Object.values(CORPORATE_ENTITIES).flat().map(e => e.name);

  const renderBankRelationships = () => {
    const updateRel = (id, field, val) => setBankRelationships(bankRelationships.map(r => r.id === id ? { ...r, [field]: val } : r));
    const updateRelFee = (id, feeType, feeField, val) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        const fees = { ...(r.fees || {}) };
        fees[feeType] = { ...(fees[feeType] || { pct: "", tx: "" }), [feeField]: val };
        return { ...r, fees };
      }));
    };
    const toggleRelService = (id, svc) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        const svcs = r.offeredServices || [];
        return { ...r, offeredServices: svcs.includes(svc) ? svcs.filter(s => s !== svc) : [...svcs, svc] };
      }));
    };
    const addSupportChannel = (id) => {
      setBankRelationships(bankRelationships.map(r => r.id === id ? { ...r, supportChannels: [...(r.supportChannels || []), ""] } : r));
    };
    const updateSupportChannel = (id, idx, val) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        const ch = [...(r.supportChannels || [])];
        ch[idx] = val;
        return { ...r, supportChannels: ch };
      }));
    };
    const removeSupportChannel = (id, idx) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        return { ...r, supportChannels: (r.supportChannels || []).filter((_, i) => i !== idx) };
      }));
    };
    const addNote = (id, text) => {
      if (!text || !text.trim()) return;
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        var notes = r.notes || [];
        return { ...r, notes: [...notes, { id: "note-" + Date.now(), text: text.trim(), createdAt: new Date().toISOString().slice(0, 10) }] };
      }));
    };
    const updateNote = (id, noteId, text) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        return { ...r, notes: (r.notes || []).map(n => n.id === noteId ? { ...n, text: text } : n) };
      }));
    };
    const removeNote = (id, noteId) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        return { ...r, notes: (r.notes || []).filter(n => n.id !== noteId) };
      }));
    };
    // bankNoteDrafts and editingBankNoteId are declared at component level

    const inputStyle = { fontSize: 13, padding: "9px 14px", borderRadius: 8, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none", boxSizing: "border-box" };
    const labelStyle = { display: "block", fontSize: 11, fontWeight: 600, color: c.textMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" };
    const sectionHeader = { fontSize: 12, fontWeight: 700, color: c.accent, marginBottom: 10, textTransform: "uppercase" };
    var uniqueEntities = new Set();
    bankRelationships.forEach(function(r) { (r.onboardedEntities || []).forEach(function(e) { uniqueEntities.add(e); }); });
    var entityCount = uniqueEntities.size;

    var levelColor = function(lvl) {
      if (lvl >= 8) return "#34d399";
      if (lvl >= 5) return "#fbbf24";
      return "#f87171";
    };

    return (
    <div>
      {/* Page Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 6px 0" }}>Bank Relationships</h2>
          <p style={{ color: c.textSecondary, fontSize: 13, margin: 0 }}>{bankRelationships.length} bank relationship{bankRelationships.length !== 1 ? "s" : ""} &middot; {entityCount} entit{entityCount !== 1 ? "ies" : "y"} onboarded</p>
        </div>
        <button onClick={() => {
          setBankRelationships([...bankRelationships, {
            id: "br-" + Date.now(), bankName: "", mainContact: "", relationshipLevel: 5, contactEmail: "", contactPhone: "",
            offeredServices: [], supportEmail: "", supportChannels: [],
            fees: { B2B: { pct: "", tx: "" }, B2C: { pct: "", tx: "" }, C2B: { pct: "", tx: "" }, FX: { pct: "", tx: "" } },
            onboardedEntities: [], notes: [],
            collapsed: false,
          }]);
        }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ Add Bank Relationship</button>
      </div>

      {bankRelationships.length === 0 && (
        <div style={{ background: c.card, borderRadius: 14, border: `1px solid ${c.border}`, padding: 40, textAlign: "center", boxShadow: "0 2px 12px rgba(0,0,0,0.15)" }}>
          <div style={{ fontSize: 16, fontWeight: 600, color: c.text, marginBottom: 4 }}>No bank relationships yet</div>
          <div style={{ fontSize: 13, color: c.textMuted }}>Click "+ Add Bank Relationship" to get started</div>
        </div>
      )}

      {bankRelationships.map(rel => {
        var lvl = rel.relationshipLevel || 5;
        var lc = levelColor(lvl);
        var services = rel.offeredServices || [];


        return (
        <div key={rel.id} style={{ background: c.card, borderRadius: 14, border: `1px solid ${c.border}`, padding: 0, marginBottom: 14, boxShadow: "0 2px 12px rgba(0,0,0,0.15)", overflow: "hidden" }}>
          {/* Collapsed Header */}
          <div style={{ padding: "16px 22px", display: "flex", justifyContent: "space-between", alignItems: "center", borderLeft: `4px solid ${c.accent}` }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, flex: 1, minWidth: 0 }}>
              <span style={{ fontSize: 16, fontWeight: 700, color: c.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{rel.bankName || "New Bank"}</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: lc, background: lc + "18", padding: "3px 10px", borderRadius: 6, whiteSpace: "nowrap", border: `1px solid ${lc}30` }}>{lvl}/10</span>
              {services.length > 0 && (
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {services.map(function(svc) { return <span key={svc} style={{ fontSize: 10, fontWeight: 600, color: c.accent, background: c.accentBg, padding: "2px 8px", borderRadius: 4 }}>{svc}</span>; })}
                </div>
              )}
              {rel.canOpenNamedAccounts === true && <span style={{ fontSize: 10, fontWeight: 600, color: "#34d399", background: "rgba(34,197,94,0.1)", padding: "3px 8px", borderRadius: 4, border: "1px solid rgba(34,197,94,0.3)" }}>Named Accounts</span>}
            </div>
            <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
              <button onClick={() => updateRel(rel.id, "collapsed", !rel.collapsed)} style={{ background: rel.collapsed ? c.accentBg : c.surface, border: `1px solid ${rel.collapsed ? c.accent + "40" : c.border}`, color: rel.collapsed ? c.accent : c.textMuted, cursor: "pointer", fontSize: 11, fontWeight: 600, borderRadius: 6, padding: "6px 14px" }}>{rel.collapsed ? "Edit" : "Collapse"}</button>
              <button onClick={() => { if (confirm("Delete this bank relationship?")) setBankRelationships(bankRelationships.filter(r => r.id !== rel.id)); }} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", borderRadius: 6, padding: "6px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Delete</button>
            </div>
          </div>

          {/* Expanded Content */}
          {!rel.collapsed && (
            <div style={{ padding: "0 22px 22px 22px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>

              {/* === LEFT COLUMN === */}
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

                {/* Bank Details */}
                <div style={{ background: c.surface, borderRadius: 10, padding: 16, border: `1px solid ${c.border}` }}>
                  <div style={sectionHeader}>Bank Details</div>
                  <div style={{ marginBottom: 12 }}>
                    <label style={labelStyle}>Bank Name</label>
                    <input value={rel.bankName || ""} onChange={e => updateRel(rel.id, "bankName", e.target.value)} placeholder="e.g. Privalgo" style={{ ...inputStyle, width: "100%" }} />
                  </div>
                  <div>
                    <label style={labelStyle}>Relationship Level</label>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <input type="range" min="1" max="10" value={lvl} onChange={e => updateRel(rel.id, "relationshipLevel", parseInt(e.target.value))} style={{ flex: 1, accentColor: c.accent }} />
                      <span style={{ fontSize: 16, fontWeight: 700, color: lc, minWidth: 32, textAlign: "center", background: lc + "15", padding: "2px 8px", borderRadius: 6 }}>{lvl}</span>
                    </div>
                  </div>
                </div>

                {/* Contact Information */}
                <div style={{ background: c.surface, borderRadius: 10, padding: 16, border: `1px solid ${c.border}` }}>
                  <div style={sectionHeader}>Contact Information</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                    <div><label style={labelStyle}>Main Contact</label><input value={rel.mainContact || ""} onChange={e => updateRel(rel.id, "mainContact", e.target.value)} placeholder="Contact name" style={{ ...inputStyle, width: "100%" }} /></div>
                    <div><label style={labelStyle}>Contact Email</label><input type="email" value={rel.contactEmail || ""} onChange={e => updateRel(rel.id, "contactEmail", e.target.value)} placeholder="contact@bank.com" style={{ ...inputStyle, width: "100%" }} /></div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <div><label style={labelStyle}>Contact Phone</label><input value={rel.contactPhone || ""} onChange={e => updateRel(rel.id, "contactPhone", e.target.value)} placeholder="+44..." style={{ ...inputStyle, width: "100%" }} /></div>
                    <div><label style={labelStyle}>Support Email</label><input type="email" value={rel.supportEmail || ""} onChange={e => updateRel(rel.id, "supportEmail", e.target.value)} placeholder="support@bank.com" style={{ ...inputStyle, width: "100%" }} /></div>
                  </div>
                </div>

                {/* Support Channels */}
                <div style={{ background: c.surface, borderRadius: 10, padding: 16, border: `1px solid ${c.border}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div style={sectionHeader}>Support Channels</div>
                    <button onClick={() => addSupportChannel(rel.id)} style={{ fontSize: 11, color: c.accent, background: c.accentBg, border: `1px solid ${c.accent}40`, borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontWeight: 600 }}>+ Add</button>
                  </div>
                  {(rel.supportChannels || []).map((ch, ci) => (
                    <div key={ci} style={{ display: "flex", gap: 8, marginBottom: 6, alignItems: "center" }}>
                      <input value={ch} onChange={e => updateSupportChannel(rel.id, ci, e.target.value)} placeholder="e.g. Slack #bank-support, WhatsApp group..." style={{ ...inputStyle, flex: 1 }} />
                      <button onClick={() => removeSupportChannel(rel.id, ci)} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", cursor: "pointer", fontSize: 12, padding: "6px 10px", borderRadius: 6 }}>&#10005;</button>
                    </div>
                  ))}
                  {(rel.supportChannels || []).length === 0 && <div style={{ fontSize: 12, color: c.textMuted, fontStyle: "italic" }}>No channels added</div>}
                </div>

              </div>

              {/* === RIGHT COLUMN === */}
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

                {/* Offered Services */}
                <div style={{ background: c.surface, borderRadius: 10, padding: 16, border: `1px solid ${c.border}` }}>
                  <div style={sectionHeader}>Offered Services</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {SERVICE_OPTIONS.map(svc => {
                      var active = (rel.offeredServices || []).includes(svc);
                      return <button key={svc} onClick={() => toggleRelService(rel.id, svc)} style={{ fontSize: 12, padding: "7px 16px", borderRadius: 8, cursor: "pointer", fontWeight: 600, border: active ? "1px solid " + c.accent : "1px solid " + c.border, background: active ? c.accent + "20" : "transparent", color: active ? c.accent : c.textMuted, transition: "all 0.15s" }}>{svc}</button>;
                    })}
                  </div>
                </div>

                {/* Can Open Named Accounts */}
                <div style={{ background: c.surface, borderRadius: 10, padding: 16, border: `1px solid ${c.border}` }}>
                  <div style={sectionHeader}>Can Open Named Accounts?</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {[{ val: true, label: "Yes" }, { val: false, label: "No" }].map(opt => {
                      var sel = rel.canOpenNamedAccounts === opt.val;
                      return <button key={String(opt.val)} onClick={() => updateRel(rel.id, "canOpenNamedAccounts", opt.val)} style={{ padding: "7px 20px", borderRadius: 8, fontSize: 12, fontWeight: sel ? 700 : 400, cursor: "pointer", background: sel ? (opt.val ? "rgba(34,197,94,0.15)" : "rgba(245,158,11,0.15)") : c.surface, color: sel ? (opt.val ? "#34d399" : "#fbbf24") : c.textMuted, border: `2px solid ${sel ? (opt.val ? "#34d399" : "#fbbf24") : c.border}`, transition: "all 0.15s" }}>{opt.label}</button>;
                    })}
                  </div>
                </div>

                {/* Fees */}
                <div style={{ background: c.surface, borderRadius: 10, padding: 16, border: `1px solid ${c.border}` }}>
                  <div style={sectionHeader}>Fees</div>
                  <div style={{ display: "grid", gridTemplateColumns: "80px 1fr 1fr", gap: 8, alignItems: "center" }}>
                    <span></span>
                    <span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textAlign: "center", textTransform: "uppercase" }}>% Rate</span>
                    <span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600, textAlign: "center", textTransform: "uppercase" }}>TX Fee</span>
                    {FEE_TYPES.map(ft => (
                      <React.Fragment key={ft}>
                        <span style={{ fontSize: 12, color: c.textSecondary, fontWeight: 700 }}>{ft}</span>
                        <input value={(rel.fees?.[ft]?.pct) || ""} onChange={e => updateRelFee(rel.id, ft, "pct", e.target.value)} placeholder="0.00%" style={{ ...inputStyle, textAlign: "center" }} />
                        <input value={(rel.fees?.[ft]?.tx) || ""} onChange={e => updateRelFee(rel.id, ft, "tx", e.target.value)} placeholder="$0.00" style={{ ...inputStyle, textAlign: "center" }} />
                      </React.Fragment>
                    ))}
                  </div>
                </div>

                {/* Notes */}
                <div style={{ background: c.surface, borderRadius: 10, padding: 16, border: `1px solid ${c.border}` }}>
                  <div style={sectionHeader}>Notes</div>
                  {/* Compose new note */}
                  <div style={{ background: c.card, borderRadius: 8, padding: 12, marginBottom: 12, border: `1px solid ${c.accent}30` }}>
                    <textarea value={bankNoteDrafts[rel.id] || ""} onChange={e => setBankNoteDrafts({ ...bankNoteDrafts, [rel.id]: e.target.value })} placeholder="Write a note..." rows={2} style={{ ...inputStyle, width: "100%", resize: "vertical", fontFamily: "inherit", marginBottom: 8 }} />
                    <button onClick={() => { addNote(rel.id, bankNoteDrafts[rel.id]); setBankNoteDrafts({ ...bankNoteDrafts, [rel.id]: "" }); }} disabled={!(bankNoteDrafts[rel.id] || "").trim()} style={{ fontSize: 11, color: !(bankNoteDrafts[rel.id] || "").trim() ? c.textMuted : "#fff", background: !(bankNoteDrafts[rel.id] || "").trim() ? c.surface : c.accent, border: `1px solid ${!(bankNoteDrafts[rel.id] || "").trim() ? c.border : c.accent}`, borderRadius: 6, padding: "6px 16px", cursor: !(bankNoteDrafts[rel.id] || "").trim() ? "default" : "pointer", fontWeight: 600 }}>Save Note</button>
                  </div>
                  {/* Saved notes */}
                  {(rel.notes || []).slice().reverse().map(function(note) {
                    var isEditing = editingNoteId === note.id;
                    return (
                      <div key={note.id} style={{ background: c.card, borderRadius: 8, padding: 12, marginBottom: 6, border: `1px solid ${c.border}`, borderLeft: `3px solid ${c.accent}40` }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                          <span style={{ fontSize: 10, color: c.textMuted, fontWeight: 600 }}>{note.createdAt}</span>
                          <div style={{ display: "flex", gap: 6 }}>
                            <button onClick={() => setEditingNoteId(isEditing ? null : note.id)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: isEditing ? c.accent : c.textMuted, cursor: "pointer", fontSize: 10, padding: "2px 8px", borderRadius: 4, fontWeight: 600 }}>{isEditing ? "Done" : "Edit"}</button>
                            <button onClick={() => { if (confirm("Delete this note?")) removeNote(rel.id, note.id); }} style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", color: "#f87171", cursor: "pointer", fontSize: 10, padding: "2px 8px", borderRadius: 4, fontWeight: 600 }}>Delete</button>
                          </div>
                        </div>
                        {isEditing ? (
                          <textarea value={note.text || ""} onChange={e => updateNote(rel.id, note.id, e.target.value)} rows={3} style={{ ...inputStyle, width: "100%", resize: "vertical", fontFamily: "inherit" }} />
                        ) : (
                          <div style={{ fontSize: 13, color: c.text, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{note.text}</div>
                        )}
                      </div>
                    );
                  })}
                  {(rel.notes || []).length === 0 && <div style={{ fontSize: 12, color: c.textMuted, fontStyle: "italic" }}>No notes yet — write one above</div>}
                </div>
              </div>
            </div>
          )}
        </div>
        );
      })}
    </div>
    );
  };

  // ===== CONTRACT GENERATOR =====
  const renderContractGenerator = () => {
    var inputStyle = { fontSize: 13, padding: "9px 14px", borderRadius: 8, border: "1px solid " + c.border, background: c.surface, color: c.text, outline: "none", boxSizing: "border-box", transition: "border-color 0.15s" };
    var cgLabelStyle = { fontSize: 11, fontWeight: 600, color: c.textMuted, display: "block", marginBottom: 4 };
    var cgInputStyle = Object.assign({}, inputStyle, { width: "100%" });
    var cgSectionCard = { background: c.card, borderRadius: 12, border: "1px solid " + c.border, padding: 20, marginBottom: 16 };

    var selectedClientId = contractDefaults._selectedClient || "";
    var cl = gatewayClients.find(function(x) { return x.id === selectedClientId; });
    var ents = cl ? (cl.entities || []) : [];
    var contractConfig = cl ? (cl.contractConfig || {}) : {};

    var updateCC = function(field, val) {
      if (!cl) return;
      var updated = Object.assign({}, cl.contractConfig || {});
      updated[field] = val;
      setGatewayClients(function(prev) { return prev.map(function(x) { return x.id === cl.id ? Object.assign({}, x, { contractConfig: updated }) : x; }); });
    };

    var selectedTemplate = contractConfig.template || "gateway";

    // Backward compat: migrate flat contractDefaults to nested structure
    var cd = contractDefaults[selectedTemplate] || contractDefaults.gateway || {};
    if (!contractDefaults.gateway && contractDefaults.providerName) {
      // Old flat format — migrate
      cd = Object.assign({}, contractDefaults);
    }

    var updateDefault = function(field, val) {
      setContractDefaults(function(prev) {
        var tmpl = selectedTemplate;
        var existing = prev[tmpl] || {};
        var updated = Object.assign({}, existing);
        updated[field] = val;
        var result = Object.assign({}, prev);
        result[tmpl] = updated;
        return result;
      });
    };

    var updateGlobal = function(field, val) {
      setContractDefaults(function(prev) { return Object.assign({}, prev, (function() { var o = {}; o[field] = val; return o; })()); });
    };

    var selectedEntity = ents.find(function(e) { return e.id === contractConfig.entityId; });
    var defaultsOpen = contractDefaults._defaultsOpen || false;

    var generateContract = async function() {
      if (!cl) { alert("Please select a client first"); return; }
      if (!contractConfig.entityId) { alert("Please select an entity"); return; }
      if (!selectedEntity) { alert("Entity not found"); return; }

      try {
        var templateB64 = selectedTemplate === "gateway" ? GATEWAY_CONTRACT_TEMPLATE_B64 : null;
        if (!templateB64) { alert("Cube Pay template not yet available. Please upload one."); return; }

        var binaryStr = atob(templateB64);
        var bytes = new Uint8Array(binaryStr.length);
        for (var i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        var zip = await JSZip.loadAsync(bytes);
        var docXml = await zip.file("word/document.xml").async("string");

        var effectiveDate = contractConfig.effectiveDate || "";
        var formattedDate = effectiveDate ? new Date(effectiveDate).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }) : "";

        // Build replacement map — blank values keep the original placeholder (with yellow highlight)
        var replacements = {
          "[CLIENT LEGAL NAME]": selectedEntity.entityName || cl.name || "",
          "[AGREEMENT REF]": contractConfig.agreementRef || "",
          "[EFFECTIVE DATE]": formattedDate,
          "[FREE ZONE / EMIRATE, UAE]": cd.freeZone || "",
          "[REGISTRATION NUMBER]": cd.registrationNumber || "",
          "[REGISTERED ADDRESS]": cd.registeredAddress || "",
          "[JURISDICTION]": selectedEntity.jurisdiction || "",
          "[CLIENT REG. NO.]": selectedEntity.companyNumber || "",
          "[CLIENT ADDRESS]": selectedEntity.registeredAddress || "",
          "[CURRENCY]": contractConfig.currency || "USD",
          "[PCI DSS LEVEL]": cd.pciLevel || "",
          "[AOC DATE]": cd.aocDate || "",
          "[PROVIDER NOTICE NAME / EMAIL]": cd.providerNoticeName ? (cd.providerNoticeName + " / " + (cd.providerNoticeEmail || "")) : "",
          "[CLIENT NOTICE NAME / EMAIL]": contractConfig.clientNoticeName ? (contractConfig.clientNoticeName + " / " + (contractConfig.clientNoticeEmail || "")) : "",
          "[SUPPORT EMAIL]": cd.supportEmail || "",
          "[ACCOUNT NAME]": cd.accountName || "",
          "[BANK DETAILS]": cd.bankDetails || "",
          "[AMOUNT RANGE]": cd.amountRange || "",
        };

        // Helper: replace only if value is non-empty, otherwise leave placeholder highlighted
        var replaceIfFilled = function(xml, placeholder, value) {
          if (!value) return xml; // leave original placeholder text + yellow highlight
          var escaped = placeholder.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          // Replace text AND remove yellow highlight for filled values
          xml = xml.replace(new RegExp(escaped, "g"), value);
          return xml;
        };

        // Apply standard replacements — only replace if value is provided
        Object.keys(replacements).forEach(function(placeholder) {
          docXml = replaceIfFilled(docXml, placeholder, replacements[placeholder]);
        });

        // For filled values, remove yellow highlight from the run so it looks clean
        // We do this by finding runs that HAD a placeholder but now have real text (no brackets)
        // Simpler approach: remove highlight from runs that no longer contain [BRACKETS]
        docXml = docXml.replace(/<w:highlight w:val="yellow"\/>\s*<\/w:rPr>\s*<w:t[^>]*>([^<]*)<\/w:t>/g, function(match, text) {
          if (text.indexOf("[") === -1) {
            // No brackets = value was filled in, remove highlight
            return match.replace(/<w:highlight w:val="yellow"\/>/, "");
          }
          return match; // Still has placeholder, keep highlight
        });

        // Handle the three [AMOUNT] placeholders in order (set-up, monthly, transaction)
        if (contractConfig.monthlyFee) {
          docXml = docXml.replace(/\[AMOUNT\] \/ month/g, contractConfig.monthlyFee + " / month");
        }
        if (contractConfig.transactionFee) {
          docXml = docXml.replace(/\[AMOUNT\] per transaction/g, contractConfig.transactionFee + " per transaction");
        }
        if (contractConfig.setupFee) {
          docXml = docXml.replace(/\[AMOUNT\]/g, contractConfig.setupFee);
        }

        // Handle signature [NAME], [TITLE], [DATE] in order
        var nameCount = 0;
        var nameValues = [cd.providerSignName || "", contractConfig.clientSignName || "", cd.providerSignName || "", contractConfig.clientSignName || ""];
        docXml = docXml.replace(/\[NAME\]/g, function(m) { var v = nameValues[nameCount++]; return v || m; });

        var titleCount = 0;
        var titleValues = [cd.providerSignTitle || "", contractConfig.clientSignTitle || ""];
        docXml = docXml.replace(/\[TITLE\]/g, function(m) { var v = titleValues[titleCount++]; return v || m; });

        if (formattedDate) {
          docXml = docXml.replace(/\[DATE\]/g, formattedDate);
        }

        // Handle en-dash variants
        if (cd.governingLaw) docXml = docXml.replace(/\[GOVERNING LAW [^\[\]]*\]/g, cd.governingLaw);
        if (cd.arbitralInstitution) docXml = docXml.replace(/\[ARBITRAL INSTITUTION [^\[\]]*\]/g, cd.arbitralInstitution);
        if (cd.arbitrationSeat) docXml = docXml.replace(/\[SEAT [^\[\]]*\]/g, cd.arbitrationSeat);
        if (cd.arbitrators) docXml = docXml.replace(/\[one \(1\) \/ three \(3\)\]/g, cd.arbitrators);

        // Clean up highlights on filled runs
        docXml = docXml.replace(/<w:highlight w:val="yellow"\/>\s*<\/w:rPr>\s*<w:t[^>]*>([^<]*)<\/w:t>/g, function(match, text) {
          if (text.indexOf("[") === -1) return match.replace(/<w:highlight w:val="yellow"\/>/, "");
          return match;
        });

        zip.file("word/document.xml", docXml);

        var blob = await zip.generateAsync({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
        var fileName = (selectedTemplate === "gateway" ? "Gateway_TSA" : "CubePay_Agreement") + "_" + (selectedEntity.entityName || cl.name || "Client").replace(/[^a-zA-Z0-9]/g, "_") + "_" + (effectiveDate || "DRAFT") + ".docx";
        saveAs(blob, fileName);
      } catch (err) {
        console.error("Contract generation error:", err);
        alert("Error generating contract: " + err.message);
      }
    };

    return (
      <div>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 4px 0", letterSpacing: "-0.02em" }}>Contract Generator</h2>
        <p style={{ color: c.textSecondary, fontSize: 13, margin: "0 0 20px 0" }}>Generate populated contracts for clients</p>

        {/* Template & Client Selection */}
        <div style={cgSectionCard}>
          <div style={{ fontSize: 12, fontWeight: 700, color: c.accent, textTransform: "uppercase", marginBottom: 14, letterSpacing: "0.04em" }}>1. Select Template & Client</div>

          {/* Template buttons */}
          <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
            {["gateway", "cubepay"].map(function(tmpl) {
              var active = selectedTemplate === tmpl;
              var label = tmpl === "gateway" ? "Gateway.io" : "Cube Pay";
              return <button key={tmpl} onClick={function() { updateCC("template", tmpl); }} style={{ padding: "12px 28px", borderRadius: 10, border: active ? "2px solid " + c.accent : "1px solid " + c.border, background: active ? c.accent + "15" : "transparent", color: active ? c.accent : c.textMuted, fontWeight: 700, fontSize: 14, cursor: "pointer", transition: "all 0.15s" }}>{label}</button>;
            })}
          </div>

          {/* Client & Entity selectors */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <div>
              <label style={cgLabelStyle}>Client</label>
              <select value={selectedClientId} onChange={function(e) { updateGlobal("_selectedClient", e.target.value); }} style={cgInputStyle}>
                <option value="">{"—"} Select Client {"—"}</option>
                {gatewayClients.map(function(gc) { return <option key={gc.id} value={gc.id}>{gc.name}</option>; })}
              </select>
            </div>
            <div>
              <label style={cgLabelStyle}>Entity</label>
              <select value={contractConfig.entityId || ""} onChange={function(e) { updateCC("entityId", e.target.value); }} style={cgInputStyle} disabled={!cl}>
                <option value="">{"—"} Select Entity {"—"}</option>
                {ents.map(function(ent) { return <option key={ent.id} value={ent.id}>{ent.entityName || "(Unnamed)"}</option>; })}
              </select>
            </div>
          </div>

          {/* Auto-filled entity preview */}
          {selectedEntity && (
            <div style={{ background: c.surface, borderRadius: 8, padding: 14, border: "1px solid " + c.border, marginTop: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: c.accent, textTransform: "uppercase", marginBottom: 8, letterSpacing: "0.05em" }}>Entity Details (Auto-filled from KYB)</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                <div><span style={{ fontSize: 10, color: c.textMuted }}>Legal Name</span><div style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{selectedEntity.entityName || "—"}</div></div>
                <div><span style={{ fontSize: 10, color: c.textMuted }}>Jurisdiction</span><div style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{selectedEntity.jurisdiction || "—"}</div></div>
                <div><span style={{ fontSize: 10, color: c.textMuted }}>Company No.</span><div style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{selectedEntity.companyNumber || "—"}</div></div>
                <div style={{ gridColumn: "span 3" }}><span style={{ fontSize: 10, color: c.textMuted }}>Registered Address</span><div style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{selectedEntity.registeredAddress || "—"}</div></div>
              </div>
            </div>
          )}
        </div>

        {/* Agreement Details */}
        {cl && (
        <div style={cgSectionCard}>
          <div style={{ fontSize: 12, fontWeight: 700, color: c.accent, textTransform: "uppercase", marginBottom: 14, letterSpacing: "0.04em" }}>2. Agreement Details</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 16 }}>
            <div>
              <label style={cgLabelStyle}>Effective Date</label>
              <input type="date" value={contractConfig.effectiveDate || ""} onChange={function(e) { updateCC("effectiveDate", e.target.value); }} style={cgInputStyle} />
            </div>
            <div>
              <label style={cgLabelStyle}>Agreement Reference</label>
              <input value={contractConfig.agreementRef || ""} onChange={function(e) { updateCC("agreementRef", e.target.value); }} placeholder="e.g. GW-2026-001" style={cgInputStyle} />
            </div>
            <div>
              <label style={cgLabelStyle}>Currency</label>
              <select value={contractConfig.currency || "USD"} onChange={function(e) { updateCC("currency", e.target.value); }} style={cgInputStyle}>
                {["USD", "EUR", "GBP", "AED", "USDT"].map(function(cur) { return <option key={cur} value={cur}>{cur}</option>; })}
              </select>
            </div>
          </div>

          <div style={{ fontSize: 12, fontWeight: 700, color: c.text, marginBottom: 10 }}>Fees</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 16 }}>
            <div>
              <label style={cgLabelStyle}>Set-Up Fee</label>
              <input value={contractConfig.setupFee || ""} onChange={function(e) { updateCC("setupFee", e.target.value); }} placeholder="e.g. 5,000" style={cgInputStyle} />
            </div>
            <div>
              <label style={cgLabelStyle}>Monthly Fee</label>
              <input value={contractConfig.monthlyFee || ""} onChange={function(e) { updateCC("monthlyFee", e.target.value); }} placeholder="e.g. 2,500" style={cgInputStyle} />
            </div>
            <div>
              <label style={cgLabelStyle}>Transaction Fee</label>
              <input value={contractConfig.transactionFee || ""} onChange={function(e) { updateCC("transactionFee", e.target.value); }} placeholder="e.g. 0.10" style={cgInputStyle} />
            </div>
          </div>

          <div style={{ fontSize: 12, fontWeight: 700, color: c.text, marginBottom: 10 }}>Client Signing Details</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 14, marginBottom: 20 }}>
            <div>
              <label style={cgLabelStyle}>Signatory Name</label>
              <input value={contractConfig.clientSignName || ""} onChange={function(e) { updateCC("clientSignName", e.target.value); }} placeholder="Client signatory" style={cgInputStyle} />
            </div>
            <div>
              <label style={cgLabelStyle}>Signatory Title</label>
              <input value={contractConfig.clientSignTitle || ""} onChange={function(e) { updateCC("clientSignTitle", e.target.value); }} placeholder="e.g. Director" style={cgInputStyle} />
            </div>
            <div>
              <label style={cgLabelStyle}>Notice Contact</label>
              <input value={contractConfig.clientNoticeName || ""} onChange={function(e) { updateCC("clientNoticeName", e.target.value); }} placeholder="Contact name" style={cgInputStyle} />
            </div>
            <div>
              <label style={cgLabelStyle}>Notice Email</label>
              <input value={contractConfig.clientNoticeEmail || ""} onChange={function(e) { updateCC("clientNoticeEmail", e.target.value); }} placeholder="email@client.com" style={cgInputStyle} />
            </div>
          </div>

          {/* Generate Button */}
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <button onClick={generateContract} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 10, padding: "14px 36px", cursor: "pointer", fontSize: 15, fontWeight: 700, letterSpacing: "0.02em", transition: "all 0.15s" }}>Generate Contract</button>
            <span style={{ fontSize: 12, color: c.textMuted }}>Downloads a .docx with all fields populated</span>
          </div>
        </div>
        )}

        {/* Provider Defaults (collapsible) */}
        <div style={cgSectionCard}>
          <div onClick={function() { updateGlobal("_defaultsOpen", !defaultsOpen); }} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: c.text }}>Provider Defaults <span style={{ fontSize: 11, fontWeight: 500, color: c.accent }}>({selectedTemplate === "gateway" ? "Gateway.io" : "Cube Pay"})</span></div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 11, color: c.textMuted }}>Editing {selectedTemplate === "gateway" ? "Gateway.io" : "Cube Pay"} defaults</span>
              <span style={{ fontSize: 14, color: c.textMuted, transition: "transform 0.2s", transform: defaultsOpen ? "rotate(180deg)" : "rotate(0deg)" }}>{"▼"}</span>
            </div>
          </div>

          {defaultsOpen && (
            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: c.accent, textTransform: "uppercase", marginBottom: 10, letterSpacing: "0.04em" }}>Company Information</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 16 }}>
                <div>
                  <label style={cgLabelStyle}>Provider Name</label>
                  <input value={cd.providerName || ""} onChange={function(e) { updateDefault("providerName", e.target.value); }} style={cgInputStyle} />
                </div>
                <div>

  // ===== SETTINGS =====
  const renderSettings = () => {
    const inputStyle5 = { fontSize: 12, padding: "8px 12px", borderRadius: 8, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none", boxSizing: "border-box" };
    const labelStyle5 = { fontSize: 10, fontWeight: 600, color: c.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4, display: "block" };

    const sortedCurrencies = Object.entries(fxRates).sort((a, b) => a[0].localeCompare(b[0]));

    const updateRate = (curr, rate) => {
      const val = parseFloat(rate);
      if (isNaN(val) || val <= 0) return;
      setFxRates(prev => ({ ...prev, [curr.toUpperCase()]: val }));
    };

    const addCurrency = () => {
      if (!fxNewCurr || !fxNewRate) return;
      const val = parseFloat(fxNewRate);
      if (isNaN(val) || val <= 0) return;
      setFxRates(prev => ({ ...prev, [fxNewCurr.toUpperCase().trim()]: val }));
      setFxNewCurr("");
      setFxNewRate("");
    };

    const removeCurrency = (curr) => {
      if (curr === "EUR") return; // Can't remove base
      setFxRates(prev => { const n = { ...prev }; delete n[curr]; return n; });
    };

    const fetchLiveRates = async () => {
      try {
        setMbFetchStatus("Fetching live FX rates...");
        const resp = await fetch("https://api.exchangerate-api.com/v4/latest/EUR");
        const data = await resp.json();
        if (data && data.rates) {
          const updated = { EUR: 1 };
          Object.keys(fxRates).forEach(curr => {
            if (curr === "EUR") return;
            if (data.rates[curr]) {
              updated[curr] = parseFloat((1 / data.rates[curr]).toFixed(6));
            } else {
              updated[curr] = fxRates[curr]; // Keep existing if not found
            }
          });
          setFxRates(updated);
          setFxLastUpdated(new Date().toISOString());
          setMbFetchStatus("FX rates updated!");
          setTimeout(() => setMbFetchStatus(""), 3000);
        }
      } catch (e) {
        setMbFetchStatus("FX fetch failed: " + e.message);
        setTimeout(() => setMbFetchStatus(""), 5000);
      }
    };

    return (
      <div>
        <div style={{ marginBottom: 24 }}>
          <h2 style={{ fontSize: 22, fontWeight: 800, color: c.text, margin: "0 0 4px" }}>Settings</h2>
          <p style={{ color: c.textSecondary, fontSize: 13, margin: 0 }}>Configure global settings for the dashboard</p>
        </div>

        {/* FX Rates Section */}
        <div style={{ background: c.card, borderRadius: 16, border: `1px solid ${c.border}`, padding: 24, marginBottom: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: c.text, marginBottom: 4 }}>FX Rates</div>
              <div style={{ fontSize: 12, color: c.textMuted }}>All rates expressed as 1 unit of currency = X EUR {fxLastUpdated && <span style={{ marginLeft: 8, fontSize: 10, color: c.accent }}>Last updated: {new Date(fxLastUpdated).toLocaleString()}</span>}</div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              {mbFetchStatus && <span style={{ fontSize: 11, color: mbFetchStatus.includes("fail") ? "#f87171" : "#34d399", alignSelf: "center" }}>{mbFetchStatus}</span>}
              <button onClick={fetchLiveRates} style={{ fontSize: 12, padding: "8px 20px", borderRadius: 8, cursor: "pointer", border: "none", background: "linear-gradient(135deg, #818cf8, #a78bfa)", color: "#fff", fontWeight: 600, boxShadow: "0 2px 8px rgba(129,140,248,0.2)" }}>Fetch Live Rates</button>
            </div>
          </div>

          {/* Currency Grid */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12, marginBottom: 20 }}>
            {sortedCurrencies.map(([curr, rate]) => (
              <div key={curr} style={{ background: c.surface, borderRadius: 12, border: `1px solid ${curr === "EUR" ? "rgba(129,140,248,0.2)" : c.border}`, padding: 14, position: "relative" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 16, fontWeight: 800, color: c.text }}>{curr}</span>
                    {curr === "EUR" && <span style={{ fontSize: 9, padding: "2px 6px", borderRadius: 4, background: "rgba(99,102,241,0.15)", color: c.accent, fontWeight: 700 }}>BASE</span>}
                  </div>
                  {curr !== "EUR" && (
                    <button onClick={() => removeCurrency(curr)} style={{ fontSize: 14, width: 22, height: 22, borderRadius: 6, cursor: "pointer", border: "none", background: "rgba(248,113,113,0.08)", color: "#f87171", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1 }}>×</button>
                  )}
                </div>
                {curr === "EUR" ? (
                  <div style={{ fontSize: 13, color: c.textMuted, fontStyle: "italic" }}>Base currency (1.00)</div>
                ) : (
                  <div>
                    <label style={labelStyle5}>1 {curr} = EUR</label>
                    <input type="number" step="any" value={rate} onChange={e => updateRate(curr, e.target.value)} style={{ ...inputStyle5, width: "100%" }} />
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Add New Currency */}
          <div style={{ background: c.surface, borderRadius: 12, border: `1px dashed ${c.border}`, padding: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: c.text, marginBottom: 10 }}>Add Currency Pair</div>
            <div style={{ display: "flex", gap: 10, alignItems: "end" }}>
              <div>
                <label style={labelStyle5}>Currency Code</label>
                <input value={fxNewCurr} onChange={e => setFxNewCurr(e.target.value.toUpperCase())} placeholder="e.g. CHF" maxLength={4} style={{ ...inputStyle5, width: 100, textTransform: "uppercase" }} />
              </div>
              <div>
                <label style={labelStyle5}>Rate (1 unit = ? EUR)</label>
                <input type="number" step="any" value={fxNewRate} onChange={e => setFxNewRate(e.target.value)} placeholder="e.g. 1.04" style={{ ...inputStyle5, width: 140 }} />
              </div>
              <button onClick={addCurrency} style={{ fontSize: 12, padding: "8px 20px", borderRadius: 8, cursor: "pointer", border: "none", background: c.accent, color: "#fff", fontWeight: 600 }}>Add</button>
            </div>

                  <li>Go to your <a href="https://supabase.com/dashboard/project/iosvevycvqviaonsxsnq/auth/users" target="_blank" rel="noopener" style={{ color: c.accent }}>Supabase Auth Dashboard</a></li>
                  <li>Click "Add user" → "Create new user"</li>
                  <li>Enter the user's email and a temporary password</li>
                  <li>The user can change their password after first login</li>
                </ol>
              </div>
            </div>
          </div>
        )}
        <div style={{ maxWidth: section === "home" ? "100%" : section === "signal" ? 1400 : 1100, margin: "0 auto" }}>{(sections[section] || renderHome)()}</div>
      </div>
      {copiedText && (
        <div style={{ position: "fixed", bottom: 24, right: 24, background: c.success, color: "#fff", padding: "10px 20px", borderRadius: 8, fontSize: 12, fontWeight: 600, boxShadow: "0 4px 12px rgba(0,0,0,0.3)", zIndex: 1000 }}>Copied to clipboard</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AviroDashboard));
</script>
</body>
</html>
