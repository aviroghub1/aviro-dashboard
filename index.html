                            updateClient(cl.id, "agreements", upd);
                          }} style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>Start Date</label><input type="date" value={ag.startDate || ""} onChange={e => {
                            const upd = (cl.agreements || []).map(a => a.id === ag.id ? { ...a, startDate: e.target.value } : a);
                            updateClient(cl.id, "agreements", upd);
                          }} style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>Renewal (months)</label><input type="number" min="0" value={ag.renewalMonths || ""} onChange={e => {
                            const upd = (cl.agreements || []).map(a => a.id === ag.id ? { ...a, renewalMonths: e.target.value } : a);
                            updateClient(cl.id, "agreements", upd);
                          }} placeholder="No renewal" style={{ ...inputStyle, width: "100%" }} /></div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </>)}
            </div>

            {/* Introduction */}
            <div style={sectionCard}>
              <SectionHeader sectionKey="intro" title="Introduction" badge={cl.introduction || ""} />
              {!collapsed.intro && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div><label style={labelStyle}>Introduced By</label><input value={cl.introduction || ""} onChange={e => updateClient(cl.id, "introduction", e.target.value)} placeholder="Who introduced this client..." style={{ ...inputStyle, width: "100%" }} /></div>
                  <div><label style={labelStyle}>Introduction Deal</label><input value={cl.introductionDeal || ""} onChange={e => updateClient(cl.id, "introductionDeal", e.target.value)} placeholder="Commission / referral terms..." style={{ ...inputStyle, width: "100%" }} /></div>
                </div>
              )}
            </div>

            {/* Deal */}
            <div style={sectionCard}>
              <SectionHeader sectionKey="deal" title="Deal" badge={cl.monthlyFee ? `${cl.monthlyFeeCurrency || "USD"} ${cl.monthlyFee}/mo` : ""} />
              {!collapsed.deal && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div>
                    <label style={labelStyle}>Monthly Fee</label>
                    <div style={{ display: "flex", gap: 8 }}>
                      <select value={cl.monthlyFeeCurrency || "USD"} onChange={e => updateClient(cl.id, "monthlyFeeCurrency", e.target.value)} style={{ ...inputStyle, width: 90 }}>
                        {CLIENT_CURRENCIES.map(cur => <option key={cur} value={cur}>{cur}</option>)}
                      </select>
                      <input value={cl.monthlyFee || ""} onChange={e => updateClient(cl.id, "monthlyFee", e.target.value)} placeholder="Amount" style={{ ...inputStyle, flex: 1 }} />
                    </div>
                  </div>
                  <div>
                    <label style={labelStyle}>Revenue Share</label>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <input value={cl.revenueSharePct || ""} onChange={e => updateClient(cl.id, "revenueSharePct", e.target.value)} placeholder="%" style={{ ...inputStyle, width: 70 }} />
                      <span style={{ fontSize: 11, color: c.textMuted }}>% from</span>
                      <select value={cl.revenueShareFrom || ""} onChange={e => updateClient(cl.id, "revenueShareFrom", e.target.value)} style={{ ...inputStyle, flex: 1 }}>
                        <option value="">— Select —</option>
                        {REVENUE_SHARE_FROM.map(r => <option key={r} value={r}>{r}</option>)}
                      </select>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* Providers */}
            <div style={sectionCard}>
              <SectionHeader sectionKey="providers" title="Providers" />
              {!collapsed.providers && <div style={{ fontSize: 12, color: c.textMuted, fontStyle: "italic" }}>Coming soon</div>}
            </div>

            {/* Settlement Agreement */}
            <div style={sectionCard}>
              <SectionHeader sectionKey="settlement" title="Settlement Agreement" badge={cl.settlementTerms || ""} />
              {!collapsed.settlement && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
                  <div><label style={labelStyle}>Settlement Group</label><input value={cl.settlementGroup || ""} onChange={e => updateClient(cl.id, "settlementGroup", e.target.value)} placeholder="Group name" style={{ ...inputStyle, width: "100%" }} /></div>
                  <div><label style={labelStyle}>Settlement Terms</label><select value={cl.settlementTerms || ""} onChange={e => updateClient(cl.id, "settlementTerms", e.target.value)} style={{ ...inputStyle, width: "100%" }}><option value="">— Select —</option>{SETTLEMENT_TERMS.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                  <div><label style={labelStyle}>Settlement Fee (%)</label><input value={cl.settlementFee || ""} onChange={e => updateClient(cl.id, "settlementFee", e.target.value)} placeholder="e.g. 0.5" style={{ ...inputStyle, width: "100%" }} /></div>
                </div>
              )}
            </div>

            {/* Bank Accounts */}
            <div style={sectionCard}>
              <SectionHeader sectionKey="banks" title="Bank Accounts" badge={`${(cl.bankAccounts || []).length}`} extra={
                !collapsed.banks && <button onClick={() => {
                  const newBA = { id: `clba-${Date.now()}`, bankName: "", accountType: "", feeIncoming: "", feeOutgoing: "" };
                  updateClient(cl.id, "bankAccounts", [...(cl.bankAccounts || []), newBA]);
                }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>+ Add</button>
              } />
              {!collapsed.banks && (<>
                {(cl.bankAccounts || []).length === 0 && <div style={{ fontSize: 12, color: c.textMuted }}>No bank accounts</div>}
                {(cl.bankAccounts || []).map(ba => (
                  <div key={ba.id} style={{ background: c.surface, borderRadius: 8, border: `1px solid ${c.border}`, padding: 12, marginBottom: 8 }}>
                    <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr auto", gap: 10, alignItems: "end" }}>
                      <div><label style={labelStyle}>Bank Name</label><input value={ba.bankName || ""} onChange={e => { const upd = (cl.bankAccounts || []).map(b => b.id === ba.id ? { ...b, bankName: e.target.value } : b); updateClient(cl.id, "bankAccounts", upd); }} placeholder="Bank name" style={{ ...inputStyle, width: "100%" }} /></div>
                      <div><label style={labelStyle}>Account Type</label><select value={ba.accountType || ""} onChange={e => { const upd = (cl.bankAccounts || []).map(b => b.id === ba.id ? { ...b, accountType: e.target.value } : b); updateClient(cl.id, "bankAccounts", upd); }} style={{ ...inputStyle, width: "100%" }}><option value="">— Type —</option>{BANK_ACCT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                      <div><label style={labelStyle}>Fee In (%)</label><input value={ba.feeIncoming || ""} onChange={e => { const upd = (cl.bankAccounts || []).map(b => b.id === ba.id ? { ...b, feeIncoming: e.target.value } : b); updateClient(cl.id, "bankAccounts", upd); }} placeholder="%" style={{ ...inputStyle, width: "100%" }} /></div>
                      <div><label style={labelStyle}>Fee Out (%)</label><input value={ba.feeOutgoing || ""} onChange={e => { const upd = (cl.bankAccounts || []).map(b => b.id === ba.id ? { ...b, feeOutgoing: e.target.value } : b); updateClient(cl.id, "bankAccounts", upd); }} placeholder="%" style={{ ...inputStyle, width: "100%" }} /></div>
                      <button onClick={() => updateClient(cl.id, "bankAccounts", (cl.bankAccounts || []).filter(b => b.id !== ba.id))} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 4, padding: "3px 6px", cursor: "pointer", fontSize: 10, marginBottom: 2 }}>✕</button>
                    </div>
                  </div>
                ))}
              </>)}
            </div>

          </>);
          })()}
        </div>
      );
    }

    // ===== CLIENT LIST VIEW =====
    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>Gateway.io Client Portal</h2>
            <p style={{ color: c.textSecondary, fontSize: 13, margin: "4px 0 0 0" }}>{gatewayClients.filter(x => x.status === "active").length} active · {gatewayClients.filter(x => x.status === "onboarding" || !x.status).length} onboarding · {gatewayClients.filter(x => x.status === "inactive").length} inactive</p>
          </div>
          <button onClick={() => setShowAddClient(!showAddClient)} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ Add Client</button>
        </div>

        {/* Add Client Form */}
        {showAddClient && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.accent}40`, padding: 16, marginBottom: 16, display: "flex", gap: 10, alignItems: "end" }}>
            <div style={{ flex: 1 }}>
              <label style={labelStyle}>Client Name</label>
              <input value={newClientName} onChange={e => setNewClientName(e.target.value)} placeholder="Enter client name..." style={{ ...inputStyle, width: "100%" }} onKeyDown={e => {
                if (e.key === "Enter" && newClientName.trim()) {
                  const newCl = { id: `cl-${Date.now()}`, name: newClientName.trim(), clientType: "", clientEntities: [], agreements: [], introduction: "", introductionDeal: "", monthlyFee: "", monthlyFeeCurrency: "USD", revenueSharePct: "", revenueShareFrom: "", settlementGroup: "", settlementTerms: "", settlementFee: "", bankAccounts: [], providers: [] };
                  setGatewayClients([...gatewayClients, newCl]);
                  setNewClientName(""); setShowAddClient(false);
                }
              }} />
            </div>
            <button onClick={() => {
              if (!newClientName.trim()) return;
              const newCl = { id: `cl-${Date.now()}`, name: newClientName.trim(), clientType: "", clientEntities: [], agreements: [], introduction: "", introductionDeal: "", monthlyFee: "", monthlyFeeCurrency: "USD", revenueSharePct: "", revenueShareFrom: "", settlementGroup: "", settlementTerms: "", settlementFee: "", bankAccounts: [], providers: [] };
              setGatewayClients([...gatewayClients, newCl]);
              setNewClientName(""); setShowAddClient(false);
            }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "6px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap" }}>Create</button>
            <button onClick={() => { setShowAddClient(false); setNewClientName(""); }} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 12 }}>Cancel</button>
          </div>
        )}

        {/* Client Grid */}
        {gatewayClients.length === 0 && !showAddClient && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 40, textAlign: "center", color: c.textMuted, fontSize: 13 }}>No clients yet. Click "+ Add Client" to get started.</div>
        )}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
          {gatewayClients.map(cl => {
            const typeColor = cl.clientType === "Full Cashier Management" ? "#6366f1" : cl.clientType === "VIP Gateway" ? "#ec4899" : cl.clientType === "Gateway" ? "#22c55e" : cl.clientType === "Tech Only" ? "#06b6d4" : cl.clientType === "Another PSP" ? "#f59e0b" : c.accent;
            return (
              <div key={cl.id} onClick={() => { setSelectedClient(cl.id); setEditingClientField(null); }}
                style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 20, cursor: "pointer", borderLeft: `3px solid ${typeColor}`, transition: "background 0.15s" }}
                onMouseEnter={e => e.currentTarget.style.background = c.cardHover} onMouseLeave={e => e.currentTarget.style.background = c.card}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: c.text }}>{cl.name}</div>
                  {(() => { const sc = { active: "#22c55e", onboarding: "#f59e0b", inactive: "#6b7280" }; const st = cl.status || "onboarding"; return <span style={{ fontSize: 9, color: sc[st], background: `${sc[st]}15`, border: `1px solid ${sc[st]}40`, padding: "2px 8px", borderRadius: 4, fontWeight: 700, textTransform: "uppercase" }}>{st}</span>; })()}
                </div>
                {cl.clientType && <span style={{ fontSize: 10, color: typeColor, background: `${typeColor}15`, border: `1px solid ${typeColor}40`, padding: "2px 8px", borderRadius: 4, fontWeight: 600 }}>{cl.clientType}</span>}
                <div style={{ marginTop: 8, fontSize: 11, color: c.textMuted }}>
                  {(cl.agreements || []).length > 0 && <span>{(cl.agreements || []).length} agreement{(cl.agreements || []).length !== 1 ? "s" : ""}</span>}
                  {cl.monthlyFee && <span>{(cl.agreements || []).length > 0 ? " · " : ""}{cl.monthlyFeeCurrency || "USD"} {cl.monthlyFee}/mo</span>}
                  {cl.revenueSharePct && <span> · {cl.revenueSharePct}% rev share</span>}
                </div>
                {(cl.clientEntities || []).length > 0 && (
                  <div style={{ marginTop: 6, display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {(cl.clientEntities || []).slice(0, 3).map((ent, i) => <span key={i} style={{ fontSize: 9, color: c.textMuted, background: c.surface, padding: "1px 6px", borderRadius: 3 }}>{ent}</span>)}
                    {(cl.clientEntities || []).length > 3 && <span style={{ fontSize: 9, color: c.textMuted }}>+{(cl.clientEntities || []).length - 3}</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ===== INTEGRATION ROADMAP =====
  const renderRoadmap = () => {
    const STAGES = ["Roadmap", "Planning", "Execution", "Testing", "Deployed"];
    const STAGE_COLORS = { "Roadmap": { bg: "rgba(139,92,246,0.12)", border: "rgba(139,92,246,0.4)", text: "#8b5cf6" }, "Planning": { bg: "rgba(59,130,246,0.12)", border: "rgba(59,130,246,0.4)", text: "#3b82f6" }, "Execution": { bg: "rgba(245,158,11,0.12)", border: "rgba(245,158,11,0.4)", text: "#f59e0b" }, "Testing": { bg: "rgba(234,179,8,0.12)", border: "rgba(234,179,8,0.4)", text: "#eab308" }, "Deployed": { bg: "rgba(34,197,94,0.12)", border: "rgba(34,197,94,0.4)", text: "#22c55e" } };
    const METHOD_TYPES = ["Payin", "Payout", "Both"];
    const METHOD_CHANNELS = ["Cards", "Non Cards", "Crypto"];
    const PAYMENT_REGIONS = ["Global", "UK", "West Europe", "East Europe", "Scandinavia", "Turkey", "MENA", "GCC", "CIS", "Africa", "LATAM", "North America", "Oceania", "India", "Asia", "South East Asia", "Japan"];
    const PACE_OPTIONS = ["Behind Pace", "On Pace", "Ahead Of Pace"];
    const GROUP_PLATFORMS = ["Signal", "Telegram", "WhatsApp", "Lark", "Teams", "Other"];
    const inputStyle2 = { fontSize: 12, padding: "7px 10px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" };
    const labelStyle2 = { display: "block", fontSize: 10, fontWeight: 600, color: c.textMuted, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.05em" };

    const updateIntegration = (id, field, val) => setIntegrations(integrations.map(ig => ig.id === id ? { ...ig, [field]: val } : ig));

    const getEstimatedDeployDate = (ig) => {
      if (!ig.startDate || !ig.weeksToDeployment) return null;
      const d = new Date(ig.startDate);
      let weeks = parseInt(ig.weeksToDeployment) || 0;
      if (ig.pace === "Behind Pace" && ig.behindDelayWeeks) weeks += parseInt(ig.behindDelayWeeks) || 0;
      if (ig.pace === "Ahead Of Pace" && ig.aheadWeeks) weeks -= parseInt(ig.aheadWeeks) || 0;
      d.setDate(d.getDate() + weeks * 7);
      return d;
    };

    // ===== DETAIL VIEW =====
    if (selectedIntegration) {
      const ig = integrations.find(i => i.id === selectedIntegration);
      if (!ig) { setSelectedIntegration(null); return null; }
      const stageIdx = STAGES.indexOf(ig.stage);
      const deployDate = getEstimatedDeployDate(ig);
      const isEarlyStage = ig.stage === "Roadmap" || ig.stage === "Planning";

      return (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
            <button onClick={() => setSelectedIntegration(null)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>← Back to List</button>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>{ig.name}</h2>
            <span style={{ fontSize: 11, padding: "4px 12px", borderRadius: 6, background: (STAGE_COLORS[ig.stage] || STAGE_COLORS.Roadmap).bg, color: (STAGE_COLORS[ig.stage] || STAGE_COLORS.Roadmap).text, border: `1px solid ${(STAGE_COLORS[ig.stage] || STAGE_COLORS.Roadmap).border}`, fontWeight: 700 }}>{ig.stage}</span>
          </div>

          {/* Estimated Deployment Date banner */}
          {deployDate ? (
            <div style={{ background: ig.deployedSuccessfully ? "rgba(34,197,94,0.1)" : ig.pace === "Behind Pace" ? "rgba(239,68,68,0.08)" : ig.pace === "Ahead Of Pace" ? "rgba(59,130,246,0.08)" : c.card, border: `1px solid ${ig.deployedSuccessfully ? "rgba(34,197,94,0.3)" : ig.pace === "Behind Pace" ? "rgba(239,68,68,0.25)" : ig.pace === "Ahead Of Pace" ? "rgba(59,130,246,0.25)" : c.border}`, borderRadius: 12, padding: "16px 24px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: c.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 2 }}>{ig.deployedSuccessfully ? "Deployed" : isEarlyStage ? "Estimated Deployment" : "Target Deployment Date"}</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: ig.deployedSuccessfully ? c.success : ig.pace === "Behind Pace" ? "#ef4444" : ig.pace === "Ahead Of Pace" ? "#3b82f6" : c.text }}>{ig.deployedSuccessfully && ig.deployedDate ? new Date(ig.deployedDate + "T00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" }) : deployDate.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                {ig.pace === "Behind Pace" && ig.behindDelayWeeks && <div style={{ fontSize: 12, fontWeight: 600, color: "#ef4444" }}>+{ig.behindDelayWeeks}w delay</div>}
                {ig.pace === "Ahead Of Pace" && ig.aheadWeeks && <div style={{ fontSize: 12, fontWeight: 600, color: "#3b82f6" }}>{ig.aheadWeeks}w ahead</div>}
                {ig.weeksToDeployment && <div style={{ fontSize: 11, color: c.textMuted }}>{ig.weeksToDeployment}w estimated{ig.pace === "Behind Pace" && ig.behindDelayWeeks ? ` + ${ig.behindDelayWeeks}w delay` : ig.pace === "Ahead Of Pace" && ig.aheadWeeks ? ` - ${ig.aheadWeeks}w ahead` : ""}</div>}
              </div>
            </div>
          ) : (
            <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: "16px 24px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: c.textMuted, textTransform: "uppercase" }}>Estimated Deployment</span>
              <span style={{ fontSize: 13, color: c.textMuted, fontStyle: "italic" }}>Set a start date and estimated weeks below</span>
            </div>
          )}

          {/* Stage pipeline */}
          <div style={{ display: "flex", gap: 4, marginBottom: 24 }}>
            {STAGES.map((st, i) => {
              const sc = STAGE_COLORS[st];
              const isActive = i <= stageIdx;
              const isCurrent = st === ig.stage;
              return (
                <div key={st} onClick={() => {
                  const updates = { stage: st };
                  if (st === "Testing") updates.testStarted = true;
                  if (st === "Deployed") { updates.deployedSuccessfully = true; updates.testStarted = true; updates.deployedDate = new Date().toISOString().split("T")[0]; }
                  if (st === "Roadmap" || st === "Planning" || st === "Execution") { updates.testStarted = false; updates.deployedSuccessfully = false; }
                  if (st === "Roadmap" || st === "Planning") { updates.pace = ""; }
                  setIntegrations(integrations.map(x => x.id === ig.id ? { ...x, ...updates } : x));
                }} style={{ flex: 1, padding: "10px 8px", borderRadius: 8, textAlign: "center", cursor: "pointer", background: isActive ? sc.bg : c.surface, border: `2px solid ${isCurrent ? sc.text : isActive ? sc.border : c.border}`, transition: "all 0.15s" }}>
                  <div style={{ fontSize: 12, fontWeight: isCurrent ? 700 : 500, color: isActive ? sc.text : c.textMuted }}>{st}</div>
                </div>
              );
            })}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {/* Left column */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* Provider & Method */}
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Provider & Method</h3>
                <div style={{ marginBottom: 10 }}><label style={labelStyle2}>Provider</label><input value={ig.provider || ""} onChange={e => updateIntegration(ig.id, "provider", e.target.value)} placeholder="Provider name..." style={{ ...inputStyle2, width: "100%" }} /></div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                  <div><label style={labelStyle2}>Type</label><select value={ig.methodType || ""} onChange={e => updateIntegration(ig.id, "methodType", e.target.value)} style={{ ...inputStyle2, width: "100%" }}><option value="">— Select —</option>{METHOD_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                  <div><label style={labelStyle2}>Channel</label><select value={ig.methodChannel || ""} onChange={e => updateIntegration(ig.id, "methodChannel", e.target.value)} style={{ ...inputStyle2, width: "100%" }}><option value="">— Select —</option>{METHOD_CHANNELS.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                </div>
                <div style={{ marginBottom: 10 }}>
                  <label style={labelStyle2}>Regions</label>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {PAYMENT_REGIONS.map(r => {
                      const sel = (ig.regions || []).includes(r);
                      return <button key={r} onClick={() => { const regs = ig.regions || []; updateIntegration(ig.id, "regions", sel ? regs.filter(x => x !== r) : [...regs, r]); }} style={{ padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: sel ? 600 : 400, cursor: "pointer", background: sel ? c.accentBg : c.surface, color: sel ? c.accent : c.textMuted, border: `1px solid ${sel ? c.accent + "40" : c.border}`, transition: "all 0.15s" }}>{r}</button>;
                    })}
                  </div>
                </div>
                <div style={{ marginBottom: 10 }}>
                  <label style={labelStyle2}>API Docs URL</label>
                  <div style={{ display: "flex", gap: 6 }}>
                    <input value={ig.apiDocs || ""} onChange={e => updateIntegration(ig.id, "apiDocs", e.target.value)} placeholder="https://docs.provider.com/api" style={{ ...inputStyle2, flex: 1 }} />
                    {ig.apiDocs && <button onClick={() => { navigator.clipboard.writeText(ig.apiDocs); setCopiedText(true); setTimeout(() => setCopiedText(null), 1500); }} style={{ background: c.accentBg, border: `1px solid ${c.accent}40`, color: c.accent, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600, flexShrink: 0 }}>Copy</button>}
                  </div>
                </div>
                <div><label style={labelStyle2}>Main Contact</label><input value={ig.mainContact || ""} onChange={e => updateIntegration(ig.id, "mainContact", e.target.value)} placeholder="Contact name / email" style={{ ...inputStyle2, width: "100%" }} /></div>
              </div>

              {/* Integration Group */}
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Integration Group</h3>
                <div style={{ marginBottom: 10 }}><label style={labelStyle2}>Group Name</label><input value={ig.groupName || ""} onChange={e => updateIntegration(ig.id, "groupName", e.target.value)} placeholder="Group name..." style={{ ...inputStyle2, width: "100%" }} /></div>
                <div style={{ marginBottom: 10 }}>
                  <label style={labelStyle2}>Platform</label>
                  <select value={ig.groupPlatform || ""} onChange={e => updateIntegration(ig.id, "groupPlatform", e.target.value)} style={{ ...inputStyle2, width: "100%" }}>
                    <option value="">— Select —</option>
                    {GROUP_PLATFORMS.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                {ig.groupPlatform === "Other" && (
                  <div><label style={labelStyle2}>Platform Name</label><input value={ig.groupPlatformOther || ""} onChange={e => updateIntegration(ig.id, "groupPlatformOther", e.target.value)} placeholder="Specify platform..." style={{ ...inputStyle2, width: "100%" }} /></div>
                )}
              </div>
            </div>

            {/* Right column */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* Timeline */}
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Timeline</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                  <div><label style={labelStyle2}>{isEarlyStage ? "Estimated Start Date" : "Integration Start Date"}</label><input type="date" value={ig.startDate || ""} onChange={e => updateIntegration(ig.id, "startDate", e.target.value)} style={{ ...inputStyle2, width: "100%" }} /></div>
                  <div><label style={labelStyle2}>Est. Time to Deployment</label>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" min="1" value={ig.weeksToDeployment || ""} onChange={e => updateIntegration(ig.id, "weeksToDeployment", e.target.value)} placeholder="#" style={{ ...inputStyle2, width: 60 }} />
                      <span style={{ fontSize: 12, color: c.textMuted }}>weeks</span>
                    </div>
                  </div>
                </div>
                {deployDate && (
                  <div style={{ background: c.surface, borderRadius: 8, padding: "10px 14px", marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: c.textMuted }}>Estimated Deployment</span>
                    <span style={{ fontSize: 13, fontWeight: 700, color: ig.deployedSuccessfully ? c.success : c.text }}>{deployDate.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}</span>
                  </div>
                )}

                {/* Integration Progress — show for Execution and Testing stages */}
                {(ig.stage === "Execution" || ig.stage === "Testing") && (<>
                  <div style={{ marginBottom: 10 }}>
                    <label style={labelStyle2}>Integration Progress</label>
                    <div style={{ display: "flex", gap: 6 }}>
                      {PACE_OPTIONS.map(p => {
                        const sel = ig.pace === p;
                        const paceColor = p === "Behind Pace" ? "#ef4444" : p === "On Pace" ? "#22c55e" : "#3b82f6";
                        return <button key={p} onClick={() => updateIntegration(ig.id, "pace", p)} style={{ flex: 1, padding: "8px 6px", borderRadius: 8, fontSize: 11, fontWeight: sel ? 700 : 400, cursor: "pointer", background: sel ? paceColor + "18" : c.surface, color: sel ? paceColor : c.textMuted, border: `2px solid ${sel ? paceColor : c.border}`, transition: "all 0.15s" }}>{p}</button>;
                      })}
                    </div>
                  </div>
                  {ig.pace === "Behind Pace" && (
                    <div style={{ background: "rgba(239,68,68,0.08)", borderRadius: 8, padding: 12, border: "1px solid rgba(239,68,68,0.2)", marginBottom: 10 }}>
                      <div style={{ marginBottom: 8 }}><label style={{ ...labelStyle2, color: "#ef4444" }}>Reason for Delay</label><textarea value={ig.behindReason || ""} onChange={e => updateIntegration(ig.id, "behindReason", e.target.value)} placeholder="What's causing the delay..." rows={2} style={{ ...inputStyle2, width: "100%", resize: "vertical" }} /></div>
                      <div><label style={{ ...labelStyle2, color: "#ef4444" }}>Estimated Delay</label>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="number" min="1" value={ig.behindDelayWeeks || ""} onChange={e => updateIntegration(ig.id, "behindDelayWeeks", e.target.value)} placeholder="#" style={{ ...inputStyle2, width: 60 }} />
                          <span style={{ fontSize: 12, color: c.textMuted }}>weeks</span>
                        </div>
                      </div>
                    </div>
                  )}
                  {ig.pace === "Ahead Of Pace" && (
                    <div style={{ background: "rgba(59,130,246,0.08)", borderRadius: 8, padding: 12, border: "1px solid rgba(59,130,246,0.2)", marginBottom: 10 }}>
                      <div><label style={{ ...labelStyle2, color: "#3b82f6" }}>Weeks Ahead</label>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="number" min="1" value={ig.aheadWeeks || ""} onChange={e => updateIntegration(ig.id, "aheadWeeks", e.target.value)} placeholder="#" style={{ ...inputStyle2, width: 60 }} />
                          <span style={{ fontSize: 12, color: c.textMuted }}>weeks ahead of schedule</span>
                        </div>
                      </div>
                    </div>
                  )}
                </>)}
              </div>

              {/* Status */}
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Status</h3>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: `1px solid ${c.border}` }}>
                  <span style={{ fontSize: 13, color: c.text }}>Testing Started</span>
                  <div onClick={() => { if (ig.stage === "Testing" || ig.stage === "Deployed") return; if (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") return; updateIntegration(ig.id, "testStarted", !ig.testStarted); }} style={{ width: 40, height: 22, borderRadius: 11, background: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? c.surface : ig.testStarted ? c.success : c.surface, border: `1px solid ${(ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? c.border : ig.testStarted ? c.success : c.border}`, cursor: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution" || ig.stage === "Testing" || ig.stage === "Deployed") ? "default" : "pointer", position: "relative", transition: "all 0.2s", opacity: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? 0.4 : 1 }}>
                    <div style={{ width: 16, height: 16, borderRadius: 8, background: "#fff", position: "absolute", top: 2, left: ig.testStarted ? 21 : 2, transition: "left 0.2s" }} />
                  </div>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0" }}>
                  <span style={{ fontSize: 13, color: c.text }}>Deployed Successfully</span>
                  <div onClick={() => {
                    if (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") return;
                    if (!ig.deployedSuccessfully) {
                      setIntegrations(integrations.map(x => x.id === ig.id ? { ...x, deployedSuccessfully: true, stage: "Deployed", testStarted: true, deployedDate: x.deployedDate || new Date().toISOString().split("T")[0] } : x));
                    } else {
                      updateIntegration(ig.id, "deployedSuccessfully", false);
                    }
                  }} style={{ width: 40, height: 22, borderRadius: 11, background: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? c.surface : ig.deployedSuccessfully ? c.success : c.surface, border: `1px solid ${(ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? c.border : ig.deployedSuccessfully ? c.success : c.border}`, cursor: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? "default" : "pointer", position: "relative", transition: "all 0.2s", opacity: (ig.stage === "Roadmap" || ig.stage === "Planning" || ig.stage === "Execution") ? 0.4 : 1 }}>
                    <div style={{ width: 16, height: 16, borderRadius: 8, background: "#fff", position: "absolute", top: 2, left: ig.deployedSuccessfully ? 21 : 2, transition: "left 0.2s" }} />
                  </div>
                </div>
                {ig.deployedSuccessfully && (
                  <div style={{ padding: "10px 0 0", borderTop: `1px solid ${c.border}`, marginTop: 10 }}>
                    <label style={labelStyle2}>Deployment Date</label>
                    <input type="date" value={ig.deployedDate || ""} onChange={e => updateIntegration(ig.id, "deployedDate", e.target.value)} style={{ ...inputStyle2, width: "100%" }} />
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Delete */}
          <div style={{ marginTop: 24, textAlign: "right" }}>
            <button onClick={() => { if (confirm("Delete this integration?")) { setIntegrations(integrations.filter(x => x.id !== ig.id)); setSelectedIntegration(null); } }} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 8, padding: "8px 20px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Delete Integration</button>
          </div>
        </div>
      );
    }

    // ===== LIST VIEW =====
    const stageCounts = {};
    STAGES.forEach(s => { stageCounts[s] = integrations.filter(ig => ig.stage === s).length; });

    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>Integration Roadmap</h2>
            <p style={{ color: c.textSecondary, fontSize: 13, margin: "4px 0 0 0" }}>{integrations.length} integration{integrations.length !== 1 ? "s" : ""}</p>
          </div>
          <button onClick={() => setShowAddIntegration(!showAddIntegration)} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ New Integration</button>
        </div>

        {/* Add Integration Form */}
        {showAddIntegration && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.accent}40`, padding: 16, marginBottom: 16, display: "flex", gap: 10, alignItems: "end" }}>
            <div style={{ flex: 1 }}>
              <label style={labelStyle2}>Integration Name</label>
              <input value={newIntegrationName} onChange={e => setNewIntegrationName(e.target.value)} placeholder="Enter integration name..." style={{ ...inputStyle2, width: "100%" }} onKeyDown={e => {
                if (e.key === "Enter" && newIntegrationName.trim()) {
                  const newIg = { id: `ig-${Date.now()}`, name: newIntegrationName.trim(), stage: "Roadmap", provider: "", methodType: "", methodChannel: "", regions: [], apiDocs: "", mainContact: "", groupName: "", groupPlatform: "", groupPlatformOther: "", startDate: "", weeksToDeployment: "", pace: "", behindReason: "", behindDelayWeeks: "", aheadWeeks: "", testStarted: false, deployedSuccessfully: false };
                  setIntegrations([...integrations, newIg]);
                  setNewIntegrationName(""); setShowAddIntegration(false);
                  setSelectedIntegration(newIg.id);
                }
              }} />
            </div>
            <button onClick={() => {
              if (!newIntegrationName.trim()) return;
              const newIg = { id: `ig-${Date.now()}`, name: newIntegrationName.trim(), stage: "Roadmap", provider: "", methodType: "", methodChannel: "", regions: [], apiDocs: "", mainContact: "", groupName: "", groupPlatform: "", groupPlatformOther: "", startDate: "", weeksToDeployment: "", pace: "", behindReason: "", behindDelayWeeks: "", aheadWeeks: "", testStarted: false, deployedSuccessfully: false };
              setIntegrations([...integrations, newIg]);
              setNewIntegrationName(""); setShowAddIntegration(false);
              setSelectedIntegration(newIg.id);
            }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap" }}>Create</button>
          </div>
        )}

        {/* Stage summary bar */}
        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {STAGES.map(st => {
            const sc = STAGE_COLORS[st];
            const count = stageCounts[st];
            return (
              <div key={st} style={{ flex: 1, background: sc.bg, borderRadius: 10, padding: "12px 10px", textAlign: "center", border: `1px solid ${sc.border}` }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: sc.text }}>{count}</div>
                <div style={{ fontSize: 10, color: sc.text, fontWeight: 600, marginTop: 2 }}>{st}</div>
              </div>
            );
          })}
        </div>

        {/* Integration list grouped by stage */}
        {STAGES.map(stage => {
          const stageItems = integrations.filter(ig => ig.stage === stage);
          if (stageItems.length === 0) return null;
          const sc = STAGE_COLORS[stage];
          return (
            <div key={stage} style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: sc.text }} />
                <h3 style={{ fontSize: 14, fontWeight: 700, color: c.text, margin: 0 }}>{stage}</h3>
                <span style={{ fontSize: 11, color: c.textMuted }}>({stageItems.length})</span>
              </div>
              {stageItems.map(ig => {
                const deployDate = getEstimatedDeployDate(ig);
                return (
                  <div key={ig.id} onClick={() => setSelectedIntegration(ig.id)}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = sc.text; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = c.border; }}
                    style={{ background: c.card, border: `1px solid ${c.border}`, borderLeft: `4px solid ${sc.text}`, borderRadius: "0 10px 10px 0", padding: "14px 18px", marginBottom: 6, cursor: "pointer", transition: "border-color 0.15s" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, minWidth: 0 }}>
                        <span style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{ig.name}</span>
                        {ig.provider && <span style={{ fontSize: 11, color: c.textMuted }}>· {ig.provider}</span>}
                        {ig.methodType && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: c.surface, color: c.textSecondary, fontWeight: 500 }}>{ig.methodType}{ig.methodChannel ? " · " + ig.methodChannel : ""}</span>}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                        {(ig.regions || []).length > 0 && <span style={{ fontSize: 10, color: c.textMuted }}>{ig.regions.slice(0, 3).join(", ")}{ig.regions.length > 3 ? ` +${ig.regions.length - 3}` : ""}</span>}
                        {ig.stage === "Execution" && ig.pace && (
                          <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, fontWeight: 600, background: ig.pace === "Behind Pace" ? "rgba(239,68,68,0.12)" : ig.pace === "On Pace" ? "rgba(34,197,94,0.12)" : "rgba(59,130,246,0.12)", color: ig.pace === "Behind Pace" ? "#ef4444" : ig.pace === "On Pace" ? "#22c55e" : "#3b82f6" }}>{ig.pace}</span>
                        )}
                        {deployDate && <span style={{ fontSize: 11, color: c.textMuted }}>{deployDate.toLocaleDateString("en-GB", { day: "numeric", month: "short" })}</span>}
                        <span style={{ fontSize: 12, color: c.accent }}>→</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}

        {integrations.length === 0 && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 40, textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🔌</div>
            <div style={{ fontSize: 16, fontWeight: 600, color: c.text, marginBottom: 4 }}>No integrations yet</div>
            <div style={{ fontSize: 13, color: c.textMuted }}>Click "New Integration" to add your first integration to the roadmap</div>
          </div>
        )}
      </div>
    );
  };

  // ===== PROVIDERS =====
  const renderProviders = () => {
    const SERVICE_TYPES_1 = ["Payin", "Payout", "Both"];
    const SERVICE_TYPES_2 = ["Cards", "Open Banking", "APM", "Crypto", "Other"];
    const AGREEMENT_TYPES = ["MOR", "PayFac", "Payment Agent", "Direct to Merchant"];
    const PROVIDER_REGIONS = ["Global", "UK", "West Europe", "East Europe", "Scandinavia", "Turkey", "MENA", "GCC", "CIS", "Africa", "LATAM", "North America", "Oceania", "India", "Asia", "South East Asia", "Japan"];
    const GROUP_PLATFORMS_P = ["Signal", "Telegram", "WhatsApp", "Lark", "Teams", "Other"];
    const SETTLEMENT_TERMS_P = ["T+0", "T+1", "T+2", "T+3", "T+4", "T+5", "T+7", "Weekly", "Bi-Weekly", "Monthly"];
    const FEE_CURRENCIES = ["USD", "EUR", "GBP", "CAD", "AUD", "CHF", "AED", "BTC", "USDT"];
    const inputStyle3 = { fontSize: 12, padding: "7px 10px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" };
    const labelStyle3 = { display: "block", fontSize: 10, fontWeight: 600, color: c.textMuted, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.05em" };

    const entityNames = corporateEntities.map(e => e.name);

    const updateProvider = (provId, field, val) => setProviders(providers.map(p => p.id === provId ? { ...p, [field]: val } : p));
    const updateService = (provId, svcId, field, val) => {
      setProviders(providers.map(p => p.id === provId ? { ...p, services: (p.services || []).map(s => s.id === svcId ? { ...s, [field]: val } : s) } : p));
    };

    // ===== PROVIDER DETAIL VIEW =====
    if (selectedProvider) {
      const prov = providers.find(p => p.id === selectedProvider);
      if (!prov) { setSelectedProvider(null); return null; }
      const svcs = prov.services || [];

      return (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
            <button onClick={() => setSelectedProvider(null)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>← Back to Providers</button>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>{prov.name}</h2>
            <span style={{ fontSize: 11, padding: "4px 10px", borderRadius: 6, background: c.accentBg, color: c.accent, fontWeight: 600 }}>{svcs.length} service{svcs.length !== 1 ? "s" : ""}</span>
          </div>

          {/* Add Service */}
          <button onClick={() => {
            const newSvc = { id: `svc-${Date.now()}`, name: "", mainContact: "", contactDetails: "", serviceType1: "", serviceType2: "", regions: [], supportGroup: "", supportPlatform: "", supportPlatformOther: "", supportEmail: "", agreementType: "", entities: [], payinPct: "", payinTxFee: "", payinTxCurrency: "USD", payoutPct: "", payoutTxFee: "", payoutTxCurrency: "USD", settlementTerms: "", settlementFee: "" };
            updateProvider(prov.id, "services", [...svcs, newSvc]);
          }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600, marginBottom: 20 }}>+ Add Service</button>

          {svcs.length === 0 && (
            <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 40, textAlign: "center" }}>
              <div style={{ fontSize: 16, fontWeight: 600, color: c.text, marginBottom: 4 }}>No services yet</div>
              <div style={{ fontSize: 13, color: c.textMuted }}>Click "Add Service" to configure this provider's offerings</div>
            </div>
          )}

          {svcs.map((svc, svcIdx) => {
            const showPayin = svc.serviceType1 === "Payin" || svc.serviceType1 === "Both";
            const showPayout = svc.serviceType1 === "Payout" || svc.serviceType1 === "Both";
            return (
              <div key={svc.id} style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20, marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: c.accent, background: c.accentBg, padding: "2px 8px", borderRadius: 4 }}>SERVICE {svcIdx + 1}</span>
                    {svc.name && <span style={{ fontSize: 15, fontWeight: 700, color: c.text }}>{svc.name}</span>}
                  </div>
                  <button onClick={() => { if (confirm("Delete this service?")) updateProvider(prov.id, "services", svcs.filter(s => s.id !== svc.id)); }} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Delete</button>
                </div>
                {/* Service Status */}
                <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
                  {["Onboarding", "Integrating", "Active", "Deactivated"].map(st => {
                    const sel = svc.serviceStatus === st;
                    const stColor = st === "Active" ? "#22c55e" : st === "Deactivated" ? "#ef4444" : st === "Integrating" ? "#f59e0b" : "#6366f1";
                    return <button key={st} onClick={() => updateService(prov.id, svc.id, "serviceStatus", st)} style={{ flex: 1, padding: "7px 6px", borderRadius: 6, fontSize: 11, fontWeight: sel ? 700 : 400, cursor: "pointer", background: sel ? stColor + "18" : c.surface, color: sel ? stColor : c.textMuted, border: `2px solid ${sel ? stColor : c.border}`, transition: "all 0.15s" }}>{st}</button>;
                  })}
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  {/* Left col */}
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {/* Service basics */}
                    <div><label style={labelStyle3}>Service Name</label><input value={svc.name || ""} onChange={e => updateService(prov.id, svc.id, "name", e.target.value)} placeholder="Service name..." style={{ ...inputStyle3, width: "100%" }} /></div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <div><label style={labelStyle3}>Main Contact</label><input value={svc.mainContact || ""} onChange={e => updateService(prov.id, svc.id, "mainContact", e.target.value)} placeholder="Contact name" style={{ ...inputStyle3, width: "100%" }} /></div>
                      <div><label style={labelStyle3}>Contact Details</label><input value={svc.contactDetails || ""} onChange={e => updateService(prov.id, svc.id, "contactDetails", e.target.value)} placeholder="Email / phone" style={{ ...inputStyle3, width: "100%" }} /></div>
                    </div>

                    {/* Service type */}
                    <div style={{ display: "grid", gridTemplateColumns: svc.serviceType2 === "Cards" ? "1fr 1fr 1fr" : "1fr 1fr", gap: 10 }}>
                      <div><label style={labelStyle3}>Service Type</label><select value={svc.serviceType1 || ""} onChange={e => updateService(prov.id, svc.id, "serviceType1", e.target.value)} style={{ ...inputStyle3, width: "100%" }}><option value="">— Select —</option>{SERVICE_TYPES_1.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                      <div><label style={labelStyle3}>Channel</label><select value={svc.serviceType2 || ""} onChange={e => updateService(prov.id, svc.id, "serviceType2", e.target.value)} style={{ ...inputStyle3, width: "100%" }}><option value="">— Select —</option>{SERVICE_TYPES_2.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                      {svc.serviceType2 === "Cards" && (
                        <div><label style={labelStyle3}>Card Type</label><select value={svc.cardType || ""} onChange={e => updateService(prov.id, svc.id, "cardType", e.target.value)} style={{ ...inputStyle3, width: "100%" }}><option value="">— Select —</option><option value="7995">7995</option><option value="6051">6051</option><option value="Other">Other</option></select></div>
                      )}
                    </div>

                    {/* Regions */}
                    <div>
                      <label style={labelStyle3}>Regions</label>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                        {PROVIDER_REGIONS.map(r => {
                          const sel = (svc.regions || []).includes(r);
                          return <button key={r} onClick={() => { const regs = svc.regions || []; updateService(prov.id, svc.id, "regions", sel ? regs.filter(x => x !== r) : [...regs, r]); }} style={{ padding: "3px 8px", borderRadius: 5, fontSize: 10, fontWeight: sel ? 600 : 400, cursor: "pointer", background: sel ? c.accentBg : c.surface, color: sel ? c.accent : c.textMuted, border: `1px solid ${sel ? c.accent + "40" : c.border}` }}>{r}</button>;
                        })}
                      </div>
                    </div>

                    {/* Agreement & Entities */}
                    <div><label style={labelStyle3}>Agreement Type</label><select value={svc.agreementType || ""} onChange={e => { updateService(prov.id, svc.id, "agreementType", e.target.value); updateService(prov.id, svc.id, "entities", []); }} style={{ ...inputStyle3, width: "100%" }}><option value="">— Select —</option>{AGREEMENT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                    {svc.agreementType && (() => {
                      const financialInstitutes = corporateEntities.filter(e => e.category === "Financial Institute").map(e => e.name);
                      const paymentAgents = corporateEntities.filter(e => e.category === "Payment Agent").map(e => e.name);
                      const gamingLicenses = corporateEntities.filter(e => e.category === "Gaming License").map(e => e.name);
                      const clientNames = gatewayClients.map(cl2 => cl2.name);

                      let options = [];
                      let label = "Entity/ies Onboarded With";
                      if (svc.agreementType === "PayFac" || svc.agreementType === "MOR") {
                        options = financialInstitutes;
                        label = "Financial Institution(s)";
                      } else if (svc.agreementType === "Payment Agent") {
                        options = paymentAgents;
                        label = "Payment Agent(s)";
                      } else if (svc.agreementType === "Direct to Merchant") {
                        options = [...gamingLicenses.map(n => ({ name: n, type: "License" })), ...clientNames.map(n => ({ name: n, type: "Client" }))];
                      }

                      if (svc.agreementType === "Direct to Merchant") {
                        return (
                          <div>
                            <label style={labelStyle3}>Gaming License / Client</label>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                              {options.map(opt => {
                                const sel = (svc.entities || []).includes(opt.name);
                                const isLicense = opt.type === "License";
                                return <button key={opt.name} onClick={() => { const ents = svc.entities || []; updateService(prov.id, svc.id, "entities", sel ? ents.filter(x => x !== opt.name) : [...ents, opt.name]); }} style={{ padding: "3px 8px", borderRadius: 5, fontSize: 10, fontWeight: sel ? 600 : 400, cursor: "pointer", background: sel ? (isLicense ? "rgba(139,92,246,0.12)" : c.accentBg) : c.surface, color: sel ? (isLicense ? "#8b5cf6" : c.accent) : c.textMuted, border: `1px solid ${sel ? (isLicense ? "rgba(139,92,246,0.4)" : c.accent + "40") : c.border}` }}>{isLicense ? "🔑 " : "👤 "}{opt.name}</button>;
                              })}
                              {options.length === 0 && <span style={{ fontSize: 11, color: c.textMuted, fontStyle: "italic" }}>No gaming licenses or clients found</span>}
                            </div>
                          </div>
                        );
                      }

                      return (
                        <div>
                          <label style={labelStyle3}>{label}</label>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                            {options.map(en => {
                              const sel = (svc.entities || []).includes(en);
                              return <button key={en} onClick={() => { const ents = svc.entities || []; updateService(prov.id, svc.id, "entities", sel ? ents.filter(x => x !== en) : [...ents, en]); }} style={{ padding: "3px 8px", borderRadius: 5, fontSize: 10, fontWeight: sel ? 600 : 400, cursor: "pointer", background: sel ? c.accentBg : c.surface, color: sel ? c.accent : c.textMuted, border: `1px solid ${sel ? c.accent + "40" : c.border}` }}>{en}</button>;
                            })}
                            {options.length === 0 && <span style={{ fontSize: 11, color: c.textMuted, fontStyle: "italic" }}>No {svc.agreementType === "Payment Agent" ? "payment agents" : "financial institutions"} in Corporate Matrix</span>}
                          </div>
                        </div>
                      );
                    })()}
                  </div>

                  {/* Right col */}
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {/* Support */}
                    <div style={{ background: c.surface, borderRadius: 8, padding: 14, border: `1px solid ${c.border}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: c.accent, marginBottom: 8, textTransform: "uppercase" }}>Support</div>
                      <div style={{ marginBottom: 8 }}><label style={labelStyle3}>Group Name</label><input value={svc.supportGroup || ""} onChange={e => updateService(prov.id, svc.id, "supportGroup", e.target.value)} placeholder="Support group name" style={{ ...inputStyle3, width: "100%" }} /></div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                        <div><label style={labelStyle3}>Platform</label><select value={svc.supportPlatform || ""} onChange={e => updateService(prov.id, svc.id, "supportPlatform", e.target.value)} style={{ ...inputStyle3, width: "100%" }}><option value="">— Select —</option>{GROUP_PLATFORMS_P.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                        {svc.supportPlatform === "Other" && <div><label style={labelStyle3}>Platform Name</label><input value={svc.supportPlatformOther || ""} onChange={e => updateService(prov.id, svc.id, "supportPlatformOther", e.target.value)} style={{ ...inputStyle3, width: "100%" }} /></div>}
                      </div>
                      <div><label style={labelStyle3}>Support Email</label><input value={svc.supportEmail || ""} onChange={e => updateService(prov.id, svc.id, "supportEmail", e.target.value)} placeholder="support@provider.com" style={{ ...inputStyle3, width: "100%" }} /></div>
                    </div>

                    {/* Fees */}
                    <div style={{ background: c.surface, borderRadius: 8, padding: 14, border: `1px solid ${c.border}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: c.accent, marginBottom: 8, textTransform: "uppercase" }}>Fees</div>
                      {!svc.serviceType1 && <div style={{ fontSize: 11, color: c.textMuted, fontStyle: "italic" }}>Select a service type to configure fees</div>}
                      {showPayin && (
                        <div style={{ marginBottom: showPayout ? 10 : 0 }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: c.text, marginBottom: 6 }}>Payin</div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                            <div><label style={labelStyle3}>Rate (%)</label><input value={svc.payinPct || ""} onChange={e => updateService(prov.id, svc.id, "payinPct", e.target.value)} placeholder="%" style={{ ...inputStyle3, width: "100%" }} /></div>
                            <div><label style={labelStyle3}>TX Fee</label><input value={svc.payinTxFee || ""} onChange={e => updateService(prov.id, svc.id, "payinTxFee", e.target.value)} placeholder="Amount" style={{ ...inputStyle3, width: "100%" }} /></div>
                            <div><label style={labelStyle3}>Currency</label><select value={svc.payinTxCurrency || "USD"} onChange={e => updateService(prov.id, svc.id, "payinTxCurrency", e.target.value)} style={{ ...inputStyle3, width: "100%" }}>{FEE_CURRENCIES.map(cur => <option key={cur} value={cur}>{cur}</option>)}</select></div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8 }}>
                            <label style={{ ...labelStyle3, margin: 0, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                              <input type="checkbox" checked={!!svc.payinICC} onChange={e => updateService(prov.id, svc.id, "payinICC", e.target.checked)} style={{ accentColor: c.accent }} />
                              ICC++
                            </label>
                          </div>
                        </div>
                      )}
                      {showPayout && (
                        <div>
                          <div style={{ fontSize: 10, fontWeight: 700, color: c.text, marginBottom: 6 }}>Payout</div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                            <div><label style={labelStyle3}>Rate (%)</label><input value={svc.payoutPct || ""} onChange={e => updateService(prov.id, svc.id, "payoutPct", e.target.value)} placeholder="%" style={{ ...inputStyle3, width: "100%" }} /></div>
                            <div><label style={labelStyle3}>TX Fee</label><input value={svc.payoutTxFee || ""} onChange={e => updateService(prov.id, svc.id, "payoutTxFee", e.target.value)} placeholder="Amount" style={{ ...inputStyle3, width: "100%" }} /></div>
                            <div><label style={labelStyle3}>Currency</label><select value={svc.payoutTxCurrency || "USD"} onChange={e => updateService(prov.id, svc.id, "payoutTxCurrency", e.target.value)} style={{ ...inputStyle3, width: "100%" }}>{FEE_CURRENCIES.map(cur => <option key={cur} value={cur}>{cur}</option>)}</select></div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8 }}>
                            <label style={{ ...labelStyle3, margin: 0, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                              <input type="checkbox" checked={!!svc.payoutICC} onChange={e => updateService(prov.id, svc.id, "payoutICC", e.target.checked)} style={{ accentColor: c.accent }} />
                              ICC++
                            </label>
                          </div>
                        </div>
                      )}
                    </div>

                    {/* Settlement */}
                    <div style={{ background: c.surface, borderRadius: 8, padding: 14, border: `1px solid ${c.border}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: c.accent, marginBottom: 8, textTransform: "uppercase" }}>Settlement</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                        <div><label style={labelStyle3}>Settlement Terms</label><select value={svc.settlementTerms || ""} onChange={e => updateService(prov.id, svc.id, "settlementTerms", e.target.value)} style={{ ...inputStyle3, width: "100%" }}><option value="">— Select —</option>{SETTLEMENT_TERMS_P.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                        <div><label style={labelStyle3}>Settlement Fee (%)</label><input value={svc.settlementFee || ""} onChange={e => updateService(prov.id, svc.id, "settlementFee", e.target.value)} placeholder="%" style={{ ...inputStyle3, width: "100%" }} /></div>
                        <div><label style={labelStyle3}>Settlement Method</label><select value={svc.settlementMethod || ""} onChange={e => updateService(prov.id, svc.id, "settlementMethod", e.target.value)} style={{ ...inputStyle3, width: "100%" }}><option value="">— Select —</option><option value="Fiat">Fiat</option><option value="Crypto">Crypto</option></select></div>
                      </div>
                      {svc.settlementMethod === "Fiat" && (() => {
                        const selEntities = svc.entities || [];
                        const matchedAccounts = bankAccountsList.filter(a => selEntities.includes(a.entityName));
                        return (
                          <div>
                            <label style={labelStyle3}>Settlement Bank Account</label>
                            <select value={svc.settlementBankAccount || ""} onChange={e => updateService(prov.id, svc.id, "settlementBankAccount", e.target.value)} style={{ ...inputStyle3, width: "100%" }}>
                              <option value="">— Select Bank Account —</option>
                              {matchedAccounts.map(acc => {
                                const bankRel = bankRelationships.find(b => b.id === acc.bankRelId);
                                const bankName = bankRel ? bankRel.bankName : "Unknown Bank";
                                return <option key={acc.id} value={acc.id}>{bankName} — {acc.entityName}{acc.accountPurpose && acc.accountPurpose.length ? ` (${acc.accountPurpose.join(", ")})` : ""}</option>;
                              })}
                            </select>
                            {matchedAccounts.length === 0 && <div style={{ fontSize: 10, color: c.textMuted, fontStyle: "italic", marginTop: 4 }}>No bank accounts found for the selected entities. Add bank accounts in the Corporate Matrix section first.</div>}
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}

          {/* Delete Provider */}
          <div style={{ marginTop: 16, textAlign: "right" }}>
            <button onClick={() => { if (confirm("Delete this provider and all its services?")) { setProviders(providers.filter(p => p.id !== prov.id)); setSelectedProvider(null); } }} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 8, padding: "8px 20px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Delete Provider</button>
          </div>
        </div>
      );
    }

    // ===== PROVIDER LIST VIEW =====
    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>Providers</h2>
            <p style={{ color: c.textSecondary, fontSize: 13, margin: "4px 0 0 0" }}>{providers.length} provider{providers.length !== 1 ? "s" : ""} · {providers.reduce((sum, p) => sum + (p.services || []).length, 0)} services</p>
          </div>
          <button onClick={() => setShowAddProvider(!showAddProvider)} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ Add Provider</button>
        </div>

        {/* Add Provider Form */}
        {showAddProvider && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.accent}40`, padding: 16, marginBottom: 16, display: "flex", gap: 10, alignItems: "end" }}>
            <div style={{ flex: 1 }}>
              <label style={labelStyle3}>Provider Name</label>
              <input value={newProviderName} onChange={e => setNewProviderName(e.target.value)} placeholder="Enter provider name..." style={{ ...inputStyle3, width: "100%" }} onKeyDown={e => {
                if (e.key === "Enter" && newProviderName.trim()) {
                  const newP = { id: `prov-${Date.now()}`, name: newProviderName.trim(), services: [] };
                  setProviders([...providers, newP]);
                  setNewProviderName(""); setShowAddProvider(false);
                  setSelectedProvider(newP.id);
                }
              }} />
            </div>
            <button onClick={() => {
              if (!newProviderName.trim()) return;
              const newP = { id: `prov-${Date.now()}`, name: newProviderName.trim(), services: [] };
              setProviders([...providers, newP]);
              setNewProviderName(""); setShowAddProvider(false);
              setSelectedProvider(newP.id);
            }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap" }}>Create</button>
          </div>
        )}

        {/* Provider tiles */}
        {providers.length === 0 && (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 40, textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🏦</div>
            <div style={{ fontSize: 16, fontWeight: 600, color: c.text, marginBottom: 4 }}>No providers yet</div>
            <div style={{ fontSize: 13, color: c.textMuted }}>Click "Add Provider" to start building your provider directory</div>
          </div>
        )}

        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
          {providers.map(prov => {
            const svcs = prov.services || [];
            const svcTypes = [...new Set(svcs.map(s => s.serviceType1).filter(Boolean))];
            const regions = [...new Set(svcs.flatMap(s => s.regions || []))];
            return (
              <div key={prov.id} onClick={() => setSelectedProvider(prov.id)}
                onMouseEnter={e => { e.currentTarget.style.borderColor = c.accent; e.currentTarget.style.transform = "translateY(-2px)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = c.border; e.currentTarget.style.transform = "translateY(0)"; }}
                style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20, cursor: "pointer", transition: "all 0.15s" }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: c.text, marginBottom: 8 }}>{prov.name}</div>
                <div style={{ fontSize: 12, color: c.textMuted, marginBottom: 8 }}>{svcs.length} service{svcs.length !== 1 ? "s" : ""}</div>
                {svcTypes.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 6 }}>
                    {svcTypes.map(t => <span key={t} style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: c.accentBg, color: c.accent, fontWeight: 600 }}>{t}</span>)}
                  </div>
                )}
                {regions.length > 0 && <div style={{ fontSize: 10, color: c.textMuted }}>{regions.slice(0, 4).join(", ")}{regions.length > 4 ? ` +${regions.length - 4}` : ""}</div>}
                <div style={{ marginTop: 10, fontSize: 12, color: c.accent, fontWeight: 600 }}>Open →</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ===== ENTITY DETAIL =====
  const renderEntityDetail = (entity, category) => {
    // Merge base entity data with overrides
    const merged = { ...entity, ...(entityOverrides[entity.name] || {}) };

    // Helper: calculate document status
    // Use global doc status calculator
    const getDocStatus = (doc) => getDocStatusGlobal(doc);

    // Standard document list for suggestions
    const standardDocs = ["Certificate of Incorporation/Registration", "Articles of Association/Memorandum of Association", "Certificate of Incumbency", "Corporate Structure Chart", "Register of Shareholders", "Register of Directors", "ID Documents for UBOs/Directors", "Proof of Address for UBOs/Directors"];

    // Get all docs: only from entityDocs (user-added), not hardcoded placeholders
    const allUserDocs = entityDocs[entity.name] || [];
    const allDocNames = new Set(allUserDocs.map(d => d.name));
    const missingDocs = standardDocs.filter(d => !allDocNames.has(d));

    // Service providers: use saved ones or default to csp
    const providers = entityServiceProviders[entity.name] || (entity.csp ? [{ id: "csp-default", name: entity.csp.name, company: "CSP", email: entity.csp.contact, phone: "", notes: "Default CSP" }] : []);

    // Footer text
    const footerText = entityFooters[entity.name] !== undefined ? entityFooters[entity.name] : (entity.footerText || "");

    // Editable field helper — click anywhere on the row to edit
    const EditableField = ({ label, value, fieldKey, onSave }) => {
      const [editing, setEditing] = useState(false);
      const [inputVal, setInputVal] = useState(value || "");
      const [hovered, setHovered] = useState(false);
      const handleSave = () => {
        // Save directly to the corporateEntities state
        setCorporateEntities(corporateEntities.map(ce => ce.name === entity.name ? { ...ce, [fieldKey]: inputVal } : ce));
        // Also keep entityOverrides in sync for backward compat
        const updated = { ...entityOverrides[entity.name] || {}, [fieldKey]: inputVal };
        setEntityOverrides({ ...entityOverrides, [entity.name]: updated });
        setEditing(false);
      };
      return (
        <div
          onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
          onClick={() => { if (!editing) setEditing(true); }}
          style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", marginBottom: 2, borderRadius: 6, fontSize: 13, cursor: editing ? "default" : "pointer", background: hovered && !editing ? `${c.accent}12` : "transparent", transition: "background 0.15s" }}
        >
          <span style={{ color: c.textSecondary, fontSize: 12 }}>{label}</span>
          {!editing ? (
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ color: value ? c.text : c.textMuted, fontWeight: 500, fontStyle: value ? "normal" : "italic" }}>{value || "Click to add"}</span>
              <span style={{ color: hovered ? c.accent : c.textMuted, fontSize: 11, opacity: hovered ? 1 : 0.4, transition: "all 0.15s" }}>✎</span>
            </div>
          ) : (
            <div style={{ display: "flex", gap: 6, alignItems: "center" }} onClick={e => e.stopPropagation()}>
              <input type="text" value={inputVal} onChange={e => setInputVal(e.target.value)} onKeyDown={e => { if (e.key === "Enter") handleSave(); if (e.key === "Escape") setEditing(false); }} autoFocus style={{ fontSize: 12, padding: "5px 10px", borderRadius: 6, border: `1px solid ${c.accent}`, background: c.surface, color: c.text, width: 220, outline: "none" }} />
              <button onClick={handleSave} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 5, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Save</button>
              <button onClick={() => { setInputVal(value || ""); setEditing(false); }} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 5, padding: "4px 8px", cursor: "pointer", fontSize: 11 }}>✕</button>
            </div>
          )}
        </div>
      );
    };

    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <button onClick={() => { setSelectedEntity(null); setSelectedCategory(null); }} style={{ background: "transparent", border: "none", color: c.accent, cursor: "pointer", fontSize: 13, padding: 0 }}>&larr; Back</button>
          <button onClick={() => downloadEntityPack(entity.name)} disabled={packDownloading} style={{ background: packDownloading ? c.surface : c.accent, border: "none", color: packDownloading ? c.textMuted : "#fff", padding: "6px 14px", borderRadius: 6, fontSize: 12, cursor: packDownloading ? "wait" : "pointer", fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>{packDownloading ? "⟳ Building Pack..." : "↓ Download Company Pack"}</button>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>{entity.name}</h2>
          <span style={{ fontSize: 12, color: c.textMuted, background: c.surface, padding: "4px 10px", borderRadius: 6 }}>{category}</span>
        </div>

        {/* A: Editable Company Details */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
            <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Company Details</h3>
            <EditableField label="Name" value={merged.name} fieldKey="name" />
            <EditableField label="Jurisdiction" value={merged.jurisdiction} fieldKey="jurisdiction" />
            <EditableField label="Company No." value={merged.companyNumber} fieldKey="companyNumber" />
            <EditableField label="License No." value={merged.licenseNumber || ""} fieldKey="licenseNumber" />
            <EditableField label="Address" value={merged.address || ""} fieldKey="address" />
            <EditableField label="UBO" value={merged.ubo || ""} fieldKey="ubo" />
            <EditableField label="Director" value={merged.director || ""} fieldKey="director" />
          </div>

          {/* B: Service Providers */}
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: 0, textTransform: "uppercase" }}>Service Providers</h3>
              <button onClick={() => {
                const newProvider = { id: `sp-${Date.now()}`, name: "New Provider", company: "", email: "", phone: "", notes: "" };
                const updated = [...providers, newProvider];
                setEntityServiceProviders({ ...entityServiceProviders, [entity.name]: updated });
              }} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Add</button>
            </div>
            {providers.length === 0 && <div style={{ fontSize: 12, color: c.textMuted, padding: "8px 0" }}>No service providers added</div>}
            {providers.map(p => {
