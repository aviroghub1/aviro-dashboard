const PriorityBadge = ({ priority }) => {
  const m = { urgent: { bg: c.urgentBg, co: c.urgent, bd: "rgba(239,68,68,0.3)", l: "URGENT" }, high: { bg: c.highBg, co: c.high, bd: "rgba(245,158,11,0.3)", l: "HIGH" }, normal: { bg: c.normalBg, co: c.normal, bd: "rgba(99,102,241,0.3)", l: "NORMAL" }, low: { bg: "rgba(107,114,128,0.1)", co: "#6b7280", bd: "rgba(107,114,128,0.3)", l: "LOW" } };
  const p = m[priority] || m.normal;
  return <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 4, background: p.bg, color: p.co, border: `1px solid ${p.bd}`, letterSpacing: "0.05em" }}>{p.l}</span>;
};

const StatusBadge = ({ status }) => {
  const isA = ["active", "completed", "successful"].includes(status?.toLowerCase());
  const isW = ["in progress", "in progress finishing", "integrating", "onboarding", "review", "sign off", "work in progress"].includes(status?.toLowerCase());
  const bg = isA ? c.successBg : isW ? c.warningBg : "rgba(107,114,128,0.1)";
  const co = isA ? c.success : isW ? c.warning : c.textSecondary;
  const bd = isA ? "rgba(34,197,94,0.3)" : isW ? "rgba(245,158,11,0.3)" : "rgba(107,114,128,0.3)";
  return <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: bg, color: co, border: `1px solid ${bd}`, textTransform: "uppercase", letterSpacing: "0.03em" }}>{status}</span>;
};

const DocStatusBadge = ({ status }) => {
  const m = { valid: { bg: c.successBg, co: c.success, l: "Valid" }, review_soon: { bg: c.warningBg, co: c.warning, l: "Review Soon" }, expiring: { bg: c.dangerBg, co: c.danger, l: "Expiring" } };
  const s = m[status] || m.valid;
  return <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 6px", borderRadius: 3, background: s.bg, color: s.co }}>{s.l}</span>;
};

// Time zone helpers - GST is UTC+4, GMT is UTC+0, CET is UTC+1 (or +2 CEST in April)
const toGST = (h) => ((h + 4) % 24);
const toGMT = (h) => h;
const toCET = (h) => ((h + 2) % 24); // CEST in April
const fmt12 = (h) => { const hr = h % 12 || 12; const ap = h < 12 ? "am" : "pm"; return `${hr}${ap}`; };

// Motion API config — tries direct first, then CORS proxy fallback
const MOTION_API_KEY = "jBkDSv4Fbp4QAhD967RbP4tzu+XjucvfEaRSRir7/aw=";
const MOTION_API_BASE = "https://api.usemotion.com/v1";
const CORS_PROXIES = [
  (url) => url, // direct first
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];
let activeProxy = 0;
const motionFetch = async (endpoint, opts = {}) => {
  const url = `${MOTION_API_BASE}${endpoint}`;
  for (let i = activeProxy; i < CORS_PROXIES.length; i++) {
    try {
      const proxyUrl = CORS_PROXIES[i](url);
      const res = await fetch(proxyUrl, {
        ...opts,
        headers: { "X-API-Key": MOTION_API_KEY, "Content-Type": "application/json", ...(opts.headers || {}) },
      });
      if (res.ok || res.status < 500) { activeProxy = i; return res; }
    } catch (e) { continue; }
  }
  throw new Error("All Motion API attempts failed (CORS)");
};

      // Fetch workspaces first (needed for creating tasks later)
      try {
        const wsRes = await motionFetch("/workspaces");
        if (wsRes.ok) {
          const wsData = await wsRes.json();
          setMotionWorkspaces(wsData?.workspaces || wsData || []);
        }
      } catch (e) { /* workspaces optional */ }
      // Fetch tasks — paginate through all
      let allTasks = [];
      let cursor = null;
      for (let i = 0; i < 10; i++) {
        const url = cursor ? `/tasks?cursor=${cursor}` : "/tasks";
        const res = await motionFetch(url);
        if (!res.ok) {
          const errBody = await res.text().catch(() => "");
          throw new Error(`Motion API returned ${res.status}: ${errBody.slice(0, 200)}`);
        }
        const data = await res.json();
        allTasks = [...allTasks, ...(data.tasks || data || [])];
        cursor = data.meta?.nextCursor || data.nextCursor;
        if (!cursor) break;
      }
      setMotionTasks(allTasks);
      // Convert Motion tasks with scheduled times into calendar events
      const motionEvents = allTasks
        .filter(t => t.scheduledStart || t.dueDate)
        .map(t => {
          const start = t.scheduledStart ? new Date(t.scheduledStart) : new Date(t.dueDate);
          const end = t.scheduledEnd ? new Date(t.scheduledEnd) : new Date(start.getTime() + (t.duration || 30) * 60000);
          const dateStr = `${start.getFullYear()}-${String(start.getMonth() + 1).padStart(2, "0")}-${String(start.getDate()).padStart(2, "0")}`;
          const startHour = start.getUTCHours() + start.getUTCMinutes() / 60;
          const endHour = end.getUTCHours() + end.getUTCMinutes() / 60;
          return {
            id: `motion-${t.id}`, date: dateStr, startHour, endHour: endHour || startHour + 0.5,
            title: t.name, cat: "motion", meet: t.meetingUrl || null,
            attendees: (t.assignees || []).map(a => a.name).join(", "),
            location: t.location || "", notes: t.description || "",
            motionId: t.id, motionStatus: t.status?.name || t.status,
            priority: t.priority, isMotion: true,
          };
        });
      // Merge: keep existing non-motion events, add motion events
      setCalEvents(prev => {
        const nonMotion = prev.filter(e => !e.isMotion);
        return [...nonMotion, ...motionEvents];
      });
      setMotionSyncStatus("synced");
      setMotionLastSync(new Date());
    } catch (err) {
      console.error("Motion sync error:", err);
      setMotionSyncStatus("error");

  const [entityOverrides, setEntityOverrides] = useState({}); // { "Entity Name": { jurisdiction: "...", companyNumber: "...", ... } }
  const [entityDocs, setEntityDocs] = useState({}); // { "Entity Name": [{ id, name, expiry, notarised, notarisedDate, renewalMonths, delayedUntil, fileName, fileSize }] }
  const [entityServiceProviders, setEntityServiceProviders] = useState({}); // { "Entity Name": [{ id, name, company, email, phone, notes }] }
  const [entitySeals, setEntitySeals] = useState({}); // { "Entity Name": [{ id, domainName, proofFileName, proofFileUrl, mirrorRangeStart, mirrorRangeEnd, licenseSeals: [{ id, name, sealCode }], collapsed }] }
  const [entityFooters, setEntityFooters] = useState({}); // { "Entity Name": "footer text" }
  const [bankRelationships, setBankRelationships] = useState([]); // [{ id, bankName, mainContact, relationshipLevel, contactEmail, contactPhone, offeredServices:[], supportEmail, supportChannels:[], fees: { b2b: {pct,tx}, b2c: {pct,tx}, c2b: {pct,tx}, fx: {pct,tx} } }]
  const [bankAccountsList, setBankAccountsList] = useState([]); // [{ id, bankRelId, entityName, accountPurpose:[], dateOpened, feesOverride: null|{...}, collapsed }]
  const [gamingBrands, setGamingBrands] = useState([]); // [{ id, brand, domain, collapsed }]
  const [entityAlertsCollapsed, setEntityAlertsCollapsed] = useState(false);
  const [editingEntityField, setEditingEntityField] = useState(null); // "fieldName" being edited

  // Supabase sync
  const [supabaseUrl, setSupabaseUrl] = useState(""); // Supabase project URL
  const [supabaseKey, setSupabaseKey] = useState(""); // Supabase anon key
  const [dbConnected, setDbConnected] = useState(false);
  const [dbSyncStatus, setDbSyncStatus] = useState("idle"); // idle, syncing, success, error
  const [dbSyncMessage, setDbSyncMessage] = useState("");
  const [showDbSetup, setShowDbSetup] = useState(false);

  // Gateway / Corporate
  const [selectedClient, setSelectedClient] = useState(null);
  const [selectedEntity, setSelectedEntity] = useState(null);
  const [selectedCategory, setSelectedCategory] = useState(null);
  const [expandedFlows, setExpandedFlows] = useState({});
  const [copiedText, setCopiedText] = useState(null);
  const [calSubSection, setCalSubSection] = useState("day"); // day, notes
  const [primaryTZ, setPrimaryTZ] = useState("GST"); // GST, BST, CEST - user's primary timezone

  // ===== LOCALSTORAGE PERSISTENCE =====
  const STORAGE_KEY = "aviro_dashboard_state";
  const saveState = useCallback(() => {
    try {
      const state = {
        calEvents, quickJobs, delegatedTasks, signalSlots, signalDayStarted, signalDayFinished,
        signalSlotNotes, signalCompleted, globalNotes, personalJobs, unscheduledItems,
        calNotes, dayBanners, dailyProgress, primaryTZ, calSubSection,
        entityOverrides, entityDocs, entityServiceProviders, entitySeals, entityFooters,
        bankRelationships, bankAccountsList, gamingBrands,
        supabaseUrl, supabaseKey,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { console.warn("Save state failed:", e); }
  }, [calEvents, quickJobs, delegatedTasks, signalSlots, signalDayStarted, signalDayFinished, signalSlotNotes, signalCompleted, globalNotes, personalJobs, unscheduledItems, calNotes, dayBanners, dailyProgress, primaryTZ, calSubSection, entityOverrides, entityDocs, entityServiceProviders, entitySeals, entityFooters, bankRelationships, bankAccountsList, gamingBrands, supabaseUrl, supabaseKey]);

  // Auto-save whenever state changes (debounced)
  useEffect(() => {
    const t = setTimeout(saveState, 500);
    return () => clearTimeout(t);
  }, [saveState]);

  // Load state on mount
  const [hasLoaded, setHasLoaded] = useState(false);
  useEffect(() => {
    if (hasLoaded) return;
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const s = JSON.parse(saved);
        if (s.calEvents) setCalEvents(s.calEvents);
        if (s.quickJobs) setQuickJobs(s.quickJobs);
        if (s.delegatedTasks) setDelegatedTasks(s.delegatedTasks);
        if (s.signalSlots) setSignalSlots(s.signalSlots);
        if (s.signalDayStarted !== undefined) setSignalDayStarted(s.signalDayStarted);
        if (s.signalDayFinished !== undefined) setSignalDayFinished(s.signalDayFinished);
        if (s.signalSlotNotes) setSignalSlotNotes(s.signalSlotNotes);
        if (s.signalCompleted) setSignalCompleted(s.signalCompleted);
        if (s.globalNotes) setGlobalNotes(s.globalNotes);
        if (s.personalJobs) setPersonalJobs(s.personalJobs);
        if (s.unscheduledItems) setUnscheduledItems(s.unscheduledItems);
        if (s.calNotes) setCalNotes(s.calNotes);
        if (s.dayBanners) setDayBanners(s.dayBanners);
        if (s.dailyProgress) setDailyProgress(s.dailyProgress);
        if (s.primaryTZ) setPrimaryTZ(s.primaryTZ);
        if (s.calSubSection) setCalSubSection(s.calSubSection);
        if (s.entityOverrides) setEntityOverrides(s.entityOverrides);
        if (s.entityDocs) setEntityDocs(s.entityDocs);
        if (s.entityServiceProviders) setEntityServiceProviders(s.entityServiceProviders);
        if (s.entitySeals) setEntitySeals(s.entitySeals);
        if (s.entityFooters) setEntityFooters(s.entityFooters);
        if (s.bankRelationships) setBankRelationships(s.bankRelationships);
        if (s.bankAccountsList) setBankAccountsList(s.bankAccountsList);
        if (s.gamingBrands) setGamingBrands(s.gamingBrands);
        if (s.supabaseUrl) setSupabaseUrl(s.supabaseUrl);
        if (s.supabaseKey) setSupabaseKey(s.supabaseKey);
      }
    } catch (e) { console.warn("Load state failed:", e); }
    setHasLoaded(true);
  }, []);

  // ===== SUPABASE DATABASE SYNC =====
  const getSupabaseHeaders = useCallback(() => ({
    "apikey": supabaseKey,
    "Authorization": "Bearer " + supabaseKey,
    "Content-Type": "application/json",
    "Prefer": "return=representation",
  }), [supabaseKey]);

  const dbApi = useCallback((table, opts = {}) => {
    const url = supabaseUrl + "/rest/v1/" + table + (opts.query || "");
    return fetch(url, { ...opts, headers: { ...getSupabaseHeaders(), ...(opts.headers || {}) } });
  }, [supabaseUrl, getSupabaseHeaders]);

  // Push entity docs + overrides to Supabase
  const syncToDb = useCallback(async () => {
    if (!supabaseUrl || !supabaseKey) return;
    setDbSyncStatus("syncing");
    setDbSyncMessage("Pushing to database...");
    try {
      // Delete all existing docs then insert current
      await dbApi("entity_documents", { method: "DELETE", query: "?id=not.is.null" });
      const rows = [];
      Object.entries(entityDocs).forEach(([entity, docs]) => {
        (docs || []).forEach(doc => {
          rows.push({
            entity_name: entity, doc_name: doc.name || "", expiry: doc.expiry || null,
            notarised: doc.notarised || false, delayed_until: doc.delayedUntil || null,
            renewal_notes: doc.renewalNotes || "", updated_by: "david@aviro-group.com",
          });
        });
      });
      if (rows.length > 0) {
        await dbApi("entity_documents", { method: "POST", body: JSON.stringify(rows) });
      }
      // Sync entity overrides (company details)
      const overrideEntries = Object.entries(entityOverrides);
      for (const [entName, ov] of overrideEntries) {
        if (!ov || Object.keys(ov).length === 0) continue;
        // Upsert: try to update first, insert if not found
        const upsertData = {
          entity_name: entName,
          jurisdiction: ov.jurisdiction || null,
          company_number: ov.companyNumber || null,
          license_number: ov.licenseNumber || null,
          address: ov.address || null,
          ubo: ov.ubo || null,
          director: ov.director || null,
        };
        await dbApi("entity_overrides", {
          method: "POST",
          query: "?on_conflict=entity_name",
          headers: { "Prefer": "return=representation,resolution=merge-duplicates" },
          body: JSON.stringify(upsertData),
        });
      }
      setDbConnected(true);
      setDbSyncStatus("success");
      setDbSyncMessage("Pushed " + rows.length + " docs + " + overrideEntries.length + " overrides");
    } catch (e) {
      setDbSyncStatus("error");
      setDbSyncMessage("Push failed: " + e.message);
    }
    setTimeout(() => setDbSyncStatus("idle"), 5000);
  }, [supabaseUrl, supabaseKey, entityDocs, entityOverrides, dbApi]);

  // Pull entity docs + overrides from Supabase
  const syncFromDb = useCallback(async () => {
    if (!supabaseUrl || !supabaseKey) return;
    setDbSyncStatus("syncing");
    setDbSyncMessage("Pulling from database...");
    try {
      const resp = await dbApi("entity_documents", { method: "GET", query: "?select=*&order=entity_name" });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const rows = await resp.json();
      const docs = {};
      rows.forEach(r => {
        if (!docs[r.entity_name]) docs[r.entity_name] = [];
        docs[r.entity_name].push({
          id: r.id, name: r.doc_name, expiry: r.expiry || "", notarised: r.notarised || false,
          delayedUntil: r.delayed_until || null, renewalNotes: r.renewal_notes || "",
        });
      });
      setEntityDocs(docs);
      // Pull entity overrides (company details)
      const ovResp = await dbApi("entity_overrides", { method: "GET", query: "?select=*" });
      if (ovResp.ok) {
        const ovRows = await ovResp.json();
        const overrides = { ...entityOverrides };
        ovRows.forEach(r => {
          overrides[r.entity_name] = {
            ...(overrides[r.entity_name] || {}),
            jurisdiction: r.jurisdiction || "",
            companyNumber: r.company_number || "",
            licenseNumber: r.license_number || "",
            address: r.address || "",
            ubo: r.ubo || "",
            director: r.director || "",
          };
        });
        setEntityOverrides(overrides);
      }
      setDbConnected(true);
      setDbSyncStatus("success");
      setDbSyncMessage("Pulled " + rows.length + " documents + company details");
    } catch (e) {
      setDbSyncStatus("error");
      setDbSyncMessage("Pull failed: " + e.message);
    }
    setTimeout(() => setDbSyncStatus("idle"), 5000);
  }, [supabaseUrl, supabaseKey, dbApi]);

  // Auto-sync to DB when docs or overrides change (only if connected, debounced 5s)
  useEffect(() => {
    if (!dbConnected || !hasLoaded) return;
    const t = setTimeout(() => { syncToDb(); }, 5000);
    return () => clearTimeout(t);
  }, [entityDocs, entityOverrides, dbConnected, hasLoaded]);

  // Global doc status calculator: renewal date = issueDate + renewalMonths
  // If noRenewal is true, always "valid" (no alerts)
  const getDocStatusGlobal = (doc) => {
    if (!doc) return "unknown";
    if (doc.noRenewal) return "valid";
    if (!doc.issueDate && !doc.expiry) return "unknown";
    const issueStr = doc.issueDate || doc.expiry; // backward compat with old expiry field
    if (!issueStr) return "unknown";
    const issue = new Date(issueStr);
    const renewalMonths = doc.renewalMonths || 12;
    const renewal = new Date(issue);
    renewal.setMonth(renewal.getMonth() + renewalMonths);
    if (doc.delayedUntil) renewal.setMonth(renewal.getMonth() + doc.delayedUntil);
    const now = new Date();
    const diffDays = (renewal - now) / (1000 * 60 * 60 * 24);
    if (diffDays < 0) return "expired";
    if (diffDays < 90) return "expiring";
    if (diffDays < 180) return "review_soon";
    return "valid";
  };
  // Helper: get calculated renewal date string from a doc
  const getDocRenewalDate = (doc) => {
    if (!doc) return "";
    if (doc.noRenewal) return "No renewal";
    const issueStr = doc.issueDate || doc.expiry;
    if (!issueStr) return "";
    const issue = new Date(issueStr);
    const renewalMonths = doc.renewalMonths || 12;
    const renewal = new Date(issue);
    renewal.setMonth(renewal.getMonth() + renewalMonths);
    if (doc.delayedUntil) renewal.setMonth(renewal.getMonth() + doc.delayedUntil);
    return renewal.toISOString().split("T")[0];
  };

  // Download full company document pack as ZIP with actual files + summary
  const [packDownloading, setPackDownloading] = useState(false);
  const downloadEntityPack = async (entityName) => {
    const entity = Object.values(CORPORATE_ENTITIES).flat().find(e => e.name === entityName);
    if (!entity) return;
    setPackDownloading(true);
    try {
      const merged = { ...entity, ...(entityOverrides[entityName] || {}) };
      const docs = entityDocs[entityName] || [];
      const providers = entityServiceProviders[entityName] || [];
      const seals = entitySeals[entityName] || [];
      const footer = entityFooters[entityName] || entity.footerText || "";
      const zip = new JSZip();

      // Build summary text file
      let summary = "═══════════════════════════════════════════\n";
      summary += "  " + merged.name + " — Document Pack\n";
      summary += "═══════════════════════════════════════════\n";
      summary += "Exported: " + new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }) + "\n\n";
      summary += "COMPANY DETAILS\n";
      summary += "───────────────────────────────────────────\n";
      summary += "Name:           " + (merged.name || "—") + "\n";
      summary += "Jurisdiction:   " + (merged.jurisdiction || "—") + "\n";
      summary += "Company No:     " + (merged.companyNumber || "—") + "\n";
      summary += "License No:     " + (merged.licenseNumber || "—") + "\n";
      summary += "Address:        " + (merged.address || "—") + "\n";
      summary += "UBO:            " + (merged.ubo || "—") + "\n";
      summary += "Director:       " + (merged.director || "—") + "\n\n";

      if (providers.length > 0) {
        summary += "SERVICE PROVIDERS\n";
        summary += "───────────────────────────────────────────\n";
        providers.forEach(sp => { summary += "  " + (sp.name || "—") + " (" + (sp.company || "") + ") — " + (sp.email || "") + " " + (sp.phone || "") + "\n"; });
        summary += "\n";
      }

      summary += "DOCUMENT REGISTER (" + docs.length + " documents)\n";
      summary += "───────────────────────────────────────────\n";
      docs.forEach((d, i) => {
        const st = getDocStatusGlobal(d);
        const renDate = getDocRenewalDate(d);
        summary += "  " + (i + 1) + ". " + (d.name || "Untitled") + "\n";
        summary += "     Status: " + st.toUpperCase();
        if (d.noRenewal) { summary += " | No renewal needed"; }
        else { summary += (d.issueDate || d.expiry ? " | Issued: " + (d.issueDate || d.expiry) : "") + (renDate ? " | Renewal due: " + renDate : "") + " | Cycle: " + (d.renewalMonths || 12) + " months"; }
        summary += "\n";
        summary += "     Notarised: " + (d.notarised ? "Yes" + (d.notarisedDate ? " (" + d.notarisedDate + ")" : "") : "No") + (d.renewalNotes ? " | Notes: " + d.renewalNotes : "") + "\n";
        if (d.fileName) summary += "     File: " + d.fileName + "\n";
        summary += "\n";
      });

      if (seals.length > 0) {
        summary += "DOMAINS & LICENSE SEALS\n";
        summary += "───────────────────────────────────────────\n";
        seals.forEach(dom => {
          summary += "  Domain: " + (dom.domainName || "—") + "\n";
          if (dom.proofFileName) summary += "    Proof: " + dom.proofFileName + "\n";
          if (dom.mirrorRangeStart || dom.mirrorRangeEnd) {
            const base = (dom.domainName || "").replace(/\.([^.]+)$/, "");
            const ext = (dom.domainName || "").match(/\.([^.]+)$/)?.[0] || ".com";
            summary += "    Mirrors: " + base + (dom.mirrorRangeStart || 1) + ext + " → " + base + (dom.mirrorRangeEnd || dom.mirrorRangeStart || 1) + ext + " (" + (parseInt(dom.mirrorRangeEnd || dom.mirrorRangeStart || 1) - parseInt(dom.mirrorRangeStart || 1) + 1) + " domains)\n";
          }
          if ((dom.licenseSeals || []).length > 0) {
            dom.licenseSeals.forEach(s => { summary += "    Seal: " + (s.name || "Unnamed") + "\n"; });
          }
          summary += "\n";
        });
      }

      if (footer) { summary += "FOOTER TEXT\n───────────────────────────────────────────\n" + footer + "\n\n"; }

      const linkedBankAccts = bankAccountsList.filter(a => a.entityName === entityName);
      if (linkedBankAccts.length > 0) {
        summary += "BANK ACCOUNTS\n";
        summary += "───────────────────────────────────────────\n";
        linkedBankAccts.forEach(a => { const rel = bankRelationships.find(r => r.id === a.bankRelId); summary += "  " + (rel ? rel.bankName : "Unknown") + " — " + ((a.accountPurpose || []).join(", ") || "No purpose") + (a.dateOpened ? " (Opened " + a.dateOpened + ")" : "") + "\n"; });
      }

      zip.file("00_SUMMARY.txt", summary);

      // Download and add actual document files
      const docsWithFiles = docs.filter(d => d.fileUrl);
      let downloaded = 0;
      for (const doc of docsWithFiles) {
        try {
          const resp = await fetch(doc.fileUrl);
          if (resp.ok) {
            const blob = await resp.blob();
            const ext = doc.fileName ? doc.fileName.split(".").pop() : "pdf";
            const safeName = (doc.name || "document").replace(/[^a-zA-Z0-9 ]/g, "").replace(/\s+/g, "_");
            zip.file(String(downloaded + 1).padStart(2, "0") + "_" + safeName + "." + ext, blob);
            downloaded++;
          }
        } catch (e) { console.warn("Could not download: " + doc.fileName, e); }
      }

      const zipBlob = await zip.generateAsync({ type: "blob" });
      saveAs(zipBlob, entityName.replace(/[^a-zA-Z0-9]/g, "_") + "_Document_Pack.zip");
    } catch (e) { alert("Download failed: " + e.message); }
    setPackDownloading(false);
  };

  const dateStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const selDateStr = dateStr(selectedDate);

  // Generate recurring event instances for the selected date
  const selectedDayOfWeek = selectedDate.getDay(); // 0=Sun, 1=Mon, ...
  const recurringToday = recurringEvents
    .filter(r => r.day === selectedDayOfWeek)
    .map(r => ({
      id: `${r.id}-${selDateStr}`, date: selDateStr, startHour: r.startHour, endHour: r.endHour,
      title: r.title, cat: r.cat, meet: r.meet, attendees: r.attendees, notes: "",
      isRecurring: true, recurringId: r.id,
    }));

  // Merge one-off events with recurring (avoid duplicates by title match on same day)
  const oneOffToday = calEvents.filter(e => e.date === selDateStr);
  const recurringFiltered = recurringToday.filter(r => !oneOffToday.some(o => o.title === r.title));
  const todayEvents = [...oneOffToday, ...recurringFiltered].sort((a,b) => a.startHour - b.startHour);

  const copyToClipboard = (text) => { navigator.clipboard?.writeText(text); setCopiedText(text); setTimeout(() => setCopiedText(null), 2000); };

  // Parse "HH:MM" to decimal hour
  const parseTime = (t) => { const [h, m] = (t || "09:00").split(":").map(Number); return h + (m || 0) / 60; };
  const fmtTime = (h) => { const hr = Math.floor(h); const mn = Math.round((h - hr) * 60); return `${String(hr).padStart(2,"0")}:${String(mn).padStart(2,"0")}`; };

  const addCalEvent = () => {
    if (!newEventForm.title.trim()) return;
    const startH = parseTime(newEventForm.startTime);
    const endH = parseTime(newEventForm.endTime);
    const meetLink = newEventForm.createMeet ? `meet.google.com/aviro-${Date.now().toString(36)}` : null;
    setCalEvents([...calEvents, {
      id: `e${Date.now()}`, date: selDateStr, startHour: startH, endHour: endH,
      title: newEventForm.title, cat: newEventForm.cat, meet: meetLink,
      attendees: newEventForm.attendees, location: newEventForm.location, notes: "",
    }]);
    if (newEventForm.createMeet || newEventForm.emailInvite) {
      setMeetingCreated({ title: newEventForm.title, meet: meetLink, emails: newEventForm.attendeeEmails, date: selDateStr, start: newEventForm.startTime, end: newEventForm.endTime });
    }
    setNewEventForm({ title: "", startTime: "09:00", endTime: "10:00", cat: "aviro", attendees: "", location: "", createMeet: false, emailInvite: false, attendeeEmails: "" });
    setShowAddEvent(false);
  };

  const saveNote = (eventId) => {
    const ev = [...calEvents, ...recurringEvents.map(r => ({ ...r, id: `${r.id}-note` }))].find(e => e.id === eventId) || {};
    const savedAt = new Date().toISOString();
    setCalNotes([...calNotes.filter(n => n.eventId !== eventId), { eventId, text: noteText, savedAt }]);
    // Auto-save to global notes
    const existingGlobal = globalNotes.find(n => n.sourceId === eventId);
    if (existingGlobal) {
      setGlobalNotes(globalNotes.map(n => n.sourceId === eventId ? { ...n, text: noteText, savedAt } : n));
    } else {
      setGlobalNotes([...globalNotes, { id: `gn${Date.now()}`, title: ev.title || "Meeting Note", text: noteText, cat: ev.cat || "aviro", type: "meeting", sourceId: eventId, date: ev.date || selDateStr, savedAt }]);
    }
    setEditingNote(null);
    setNoteText("");
  };

  const addDayBanner = () => {
    if (!newBanner.text.trim()) return;
    setDayBanners([...dayBanners, { id: `b${Date.now()}`, ...newBanner, startDate: newBanner.startDate || selDateStr, endDate: newBanner.endDate || selDateStr }]);
    setNewBanner({ text: "", startDate: "", endDate: "", color: "#f59e0b" });
    setShowAddBanner(false);
  };

  const handleDrop = (targetHour) => {
    // Handle drop of unscheduled items / quick jobs onto timeline
    if (draggingUnscheduled) {
      const du = draggingUnscheduled;
      const newStart = targetHour;
      const newEnd = targetHour + 0.5; // default 30 min
      setCalEvents([...calEvents, { id: `e${Date.now()}`, date: selDateStr, startHour: newStart, endHour: newEnd, title: du.text, cat: du.cat || "aviro", meet: null, attendees: "", location: "", notes: "" }]);
      // Remove from source
      if (du.source === "unscheduled") {
        setUnscheduledItems(unscheduledItems.filter(u => u.id !== du.id));
      } else if (du.source === "quickjob") {
        setQuickJobs(quickJobs.map(j => j.id === du.jobId ? { ...j, onCalendar: false } : j));
      }
      setDraggingUnscheduled(null);
      setDragOverHour(null);
      return;
    }
    // Handle existing calendar event drag (reorder)
    if (!draggingEvent) return;
    const ev = todayEvents.find(e => e.id === draggingEvent);
    if (!ev) { setDraggingEvent(null); setDragOverHour(null); return; }
    const duration = ev.endHour - ev.startHour;
    const newStart = targetHour;
    const newEnd = targetHour + duration;
    if (ev.isRecurring) {
      setCalEvents([...calEvents, { ...ev, id: `e${Date.now()}`, date: selDateStr, startHour: newStart, endHour: newEnd, isRecurring: false }]);
    } else {
      setCalEvents(calEvents.map(e => e.id === ev.id ? { ...e, startHour: newStart, endHour: newEnd } : e));
    }
    setDraggingEvent(null);
    setDragOverHour(null);
  };

  const todayBanners = dayBanners.filter(b => selDateStr >= b.startDate && selDateStr <= b.endDate);

  // Helper: get events for any date string
  const getEventsForDate = (ds) => {
    const d = new Date(ds + "T00:00:00");
    const dow = d.getDay();
    const oneOff = calEvents.filter(e => e.date === ds);
    const recur = recurringEvents.filter(r => r.day === dow).map(r => ({
      id: `${r.id}-${ds}`, date: ds, startHour: r.startHour, endHour: r.endHour,
      title: r.title, cat: r.cat, meet: r.meet, attendees: r.attendees, notes: "",
      isRecurring: true, recurringId: r.id,
    })).filter(r => !oneOff.some(o => o.title === r.title));
    return [...oneOff, ...recur].sort((a, b) => a.startHour - b.startHour);
  };

  // Week view helpers
  const getWeekDates = () => {
    const d = new Date(selectedDate);
    const day = d.getDay(); // 0=Sun
    const monday = new Date(d);
    monday.setDate(d.getDate() - ((day + 6) % 7)); // get Monday
    return Array.from({ length: 7 }, (_, i) => {
      const dt = new Date(monday);
      dt.setDate(monday.getDate() + i);
      return dt;
    });
  };

  const signalTasks = [
    ...CLICKUP_DAVID_TASKS.filter(t => t.priority === "urgent" || t.priority === "high" || (t.dueDate && t.dueDate <= "2026-04-15")).map(t => ({ ...t, source: "clickup" })),

  const allDocAlerts = [];

    entities.forEach(e => {
      const docs = entityDocs[e.name] || [];
      docs.forEach(d => {
        const status = getDocStatusGlobal(d);
        if (status === "expired" || status === "expiring" || status === "review_soon") {
          allDocAlerts.push({ entity: e.name, category: cat, doc: d.name, renewalDate: getDocRenewalDate(d) || "No date", status });

      });
    });
  });

  // Bank accounts are now managed centrally via bankRelationships + bankAccountsList state

  const HOURS = Array.from({ length: 24 }, (_, i) => i); // 0-23 (midnight to midnight)
  const scrollRef = useRef(null);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 3 * 52; }, [selDateStr, calSubSection]); // scroll to 3am GMT = 7am GST

  // Live clock - ticks every 30 seconds, uses proper UTC-based timezone math
  const [liveNow, setLiveNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setLiveNow(Date.now()), 30000); return () => clearInterval(t); }, []);
  const liveTimeForZone = (offsetHours) => {
    const now = new Date(liveNow);
    const utcH = now.getUTCHours();
    const utcM = now.getUTCMinutes();
    let h = (utcH + offsetHours) % 24;
    if (h < 0) h += 24;
    const ap = h < 12 ? "am" : "pm";
    const hr12 = h % 12 || 12;
    return `${hr12}:${String(utcM).padStart(2, "0")}${ap}`;
  };

              <div style={{ width: 6, height: 6, borderRadius: 3, background: motionSyncStatus === "syncing" ? "#eab308" : motionSyncStatus === "synced" ? "#06b6d4" : motionSyncStatus === "error" ? "#ef4444" : c.textMuted, animation: motionSyncStatus === "syncing" ? "pulse 1s infinite" : "none" }} />
              {motionSyncStatus === "syncing" ? "Syncing Motion..." : motionSyncStatus === "synced" ? `Motion Synced • ${motionTasks.length} tasks${motionLastSync ? " • " + motionLastSync.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : ""}` : motionSyncStatus === "error" ? "Motion Error — Click to Retry" : "Sync Motion"}

                    <span style={{ fontSize: 10, fontWeight: 700, color: cc.bg, background: `${cc.bg}22`, border: `1px solid ${cc.bg}44`, borderRadius: 3, padding: "1px 5px" }}>{cc.label.toUpperCase()}</span>
                    <span style={{ fontSize: 12, color: c.text, flex: 1 }}>{job.text}</span>

                  </div>
                  {schedulingItem?.id === schId && (
                    <div style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 8, padding: 10, marginBottom: 6, marginTop: 4 }}>
                      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>

                        <input type="time" value={schedulingItem.startTime} onChange={e => setSchedulingItem({ ...schedulingItem, startTime: e.target.value })} style={{ background: c.card, border: `1px solid ${c.border}`, color: c.text, borderRadius: 4, padding: "3px 6px", fontSize: 11 }} />

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 16px", borderBottom: `1px solid ${c.border}`, background: c.surface }}>
              <button onClick={() => { const d = new Date(selectedDate); d.setDate(d.getDate() - 7); setSelectedDate(d); }} style={{ background: c.card, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>&larr; Prev Week</button>
              <span style={{ fontSize: 14, fontWeight: 700, color: c.text }}>
                {(() => { const wd = getWeekDates(); return `${wd[0].toLocaleDateString("en-GB", { day: "numeric", month: "short" })} - ${wd[6].toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}`; })()}
              </span>
              <button onClick={() => { const d = new Date(selectedDate); d.setDate(d.getDate() + 7); setSelectedDate(d); }} style={{ background: c.card, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Next Week &rarr;</button>
            </div>
            {/* Day columns */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)" }}>
              {getWeekDates().map((wd, i) => {
                const ds = dateStr(wd);
                const dayEvents = getEventsForDate(ds);
                const isToday = ds === today;
                const isSel = ds === selDateStr;
                const dayBannersForDate = dayBanners.filter(b => ds >= b.startDate && ds <= b.endDate);
                return (
                  <div key={i} onClick={() => { setSelectedDate(wd); setCalSubSection("day"); }} style={{
                    borderRight: i < 6 ? `1px solid ${c.border}` : "none", minHeight: 400, cursor: "pointer",
                    background: isToday ? "rgba(99,102,241,0.05)" : "transparent",
                    transition: "background 0.15s",
                  }}
                  onMouseEnter={e => { if (!isToday) e.currentTarget.style.background = "rgba(255,255,255,0.02)"; }}
                  onMouseLeave={e => { if (!isToday) e.currentTarget.style.background = "transparent"; }}
                  >
                    {/* Day header */}
                    <div style={{ padding: "10px 8px", borderBottom: `1px solid ${c.border}`, textAlign: "center", background: isSel ? c.accentBg : "transparent" }}>
                      <div style={{ fontSize: 10, fontWeight: 600, color: c.textMuted, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][wd.getDay()]}
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 700, color: isToday ? c.accent : c.text, marginTop: 2 }}>{wd.getDate()}</div>
                      <div style={{ fontSize: 9, color: c.textMuted }}>{dayEvents.length} event{dayEvents.length !== 1 ? "s" : ""}</div>
                    </div>
                    {/* Banners */}
                    {dayBannersForDate.map(b => (
                      <div key={b.id} style={{ padding: "4px 6px", fontSize: 9, fontWeight: 600, background: `${b.color}22`, color: b.color, borderBottom: `1px solid ${c.border}`, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                        {b.text}
                      </div>
                    ))}
                    {/* Events */}
                    <div style={{ padding: 6 }}>
                      {dayEvents.map(ev => {
                        const cc = CAL_COLORS[ev.cat] || CAL_COLORS.aviro;
                        return (
                          <div key={ev.id} style={{
                            background: cc.bg, borderLeft: `3px solid ${cc.border}`, borderRadius: "0 6px 6px 0",
                            padding: "6px 8px", marginBottom: 4, transition: "transform 0.1s",
                          }}>
                            <div style={{ fontSize: 11, fontWeight: 600, color: c.text, lineHeight: 1.3, marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ev.title}</div>
                            <div style={{ fontSize: 9, color: c.textSecondary }}>
                              {fmt12(ev.startHour)} - {fmt12(ev.endHour)}
                            </div>
                            {ev.attendees && <div style={{ fontSize: 9, color: c.textMuted, marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ev.attendees}</div>}
                            {ev.isRecurring && <div style={{ fontSize: 8, color: c.accent, marginTop: 2, fontWeight: 700 }}>RECURRING</div>}
                          </div>
                        );
                      })}
                      {dayEvents.length === 0 && (
                        <div style={{ fontSize: 10, color: c.textMuted, textAlign: "center", padding: "20px 4px", opacity: 0.5 }}>No events</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ) : calSubSection === "recurring" ? (
          /* Recurring Events management */
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: c.text, margin: 0 }}>Recurring Events</h3>
              <button onClick={() => setShowAddRecurring(!showAddRecurring)} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                <Icon type="plus" size={14} /> Add Recurring
              </button>
            </div>

            {showAddRecurring && (
              <div style={{ background: c.card, border: `1px solid ${c.accent}`, borderRadius: 10, padding: 16, marginBottom: 16, display: "flex", gap: 10, alignItems: "flex-end", flexWrap: "wrap" }}>
                <div style={{ flex: 2 }}>
                  <label style={{ fontSize: 10, color: c.textMuted, display: "block", marginBottom: 4 }}>Title</label>
                  <input value={newRecurring.title} onChange={e => setNewRecurring({...newRecurring, title: e.target.value})} style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "8px 10px", fontSize: 12, outline: "none", boxSizing: "border-box" }} />
                </div>
                <div>
                  <label style={{ fontSize: 10, color: c.textMuted, display: "block", marginBottom: 4 }}>Day</label>
                  <select value={newRecurring.day} onChange={e => setNewRecurring({...newRecurring, day: parseInt(e.target.value)})} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "8px 6px", fontSize: 12 }}>
                    {["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"].map((d,i) => <option key={i} value={i}>{d}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{ fontSize: 10, color: c.textMuted, display: "block", marginBottom: 4 }}>Start</label>
                  <select value={newRecurring.startHour} onChange={e => setNewRecurring({...newRecurring, startHour: parseFloat(e.target.value)})} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "8px 6px", fontSize: 12 }}>
                    {HOURS.flatMap(h => [<option key={h} value={h}>{fmt12(h)}</option>, <option key={h+0.5} value={h+0.5}>{fmt12(h)}:30</option>])}
                  </select>
                </div>
                <div>
                  <label style={{ fontSize: 10, color: c.textMuted, display: "block", marginBottom: 4 }}>End</label>
                  <select value={newRecurring.endHour} onChange={e => setNewRecurring({...newRecurring, endHour: parseFloat(e.target.value)})} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "8px 6px", fontSize: 12 }}>
                    {HOURS.flatMap(h => [<option key={h} value={h}>{fmt12(h)}</option>, <option key={h+0.5} value={h+0.5}>{fmt12(h)}:30</option>])}
                  </select>
                </div>
                <div>
                  <label style={{ fontSize: 10, color: c.textMuted, display: "block", marginBottom: 4 }}>Category</label>
                  <select value={newRecurring.cat} onChange={e => setNewRecurring({...newRecurring, cat: e.target.value})} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "8px 6px", fontSize: 12 }}>
                    {Object.entries(CAL_COLORS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                </div>
                <button onClick={() => { if (newRecurring.title.trim()) { setRecurringEvents([...recurringEvents, { id: `r${Date.now()}`, ...newRecurring, meet: null, attendees: "", source: "manual" }]); setNewRecurring({ title: "", day: 1, startHour: 9, endHour: 10, cat: "aviro" }); setShowAddRecurring(false); }}} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 6, padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Add</button>
              </div>
            )}

            {recurringEvents.map(ev => {
              const dayName = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][ev.day];
              const cc = CAL_COLORS[ev.cat] || CAL_COLORS.aviro;
              return (
                <div key={ev.id} style={{ display: "flex", alignItems: "center", gap: 12, background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: "14px 20px", marginBottom: 6 }}>
                  <div style={{ width: 4, height: 36, borderRadius: 2, background: cc.border, flexShrink: 0 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{ev.title}</div>
                    <div style={{ fontSize: 12, color: c.textSecondary, marginTop: 2 }}>
                      Every {dayName} · {fmt12(ev.startHour)}{ev.startHour % 1 ? ":30" : ""} - {fmt12(ev.endHour)}{ev.endHour % 1 ? ":30" : ""} GMT
                      {ev.attendees && ` · ${ev.attendees}`}
                    </div>
                  </div>
                  <span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 3, background: cc.bg, color: cc.text, border: `1px solid ${cc.border}`, fontWeight: 700 }}>{cc.label}</span>
                  <span style={{ fontSize: 10, color: ev.source === "gmail" ? c.accent : c.textMuted, background: ev.source === "gmail" ? c.accentBg : c.surface, padding: "2px 8px", borderRadius: 4, fontWeight: 600 }}>
                    {ev.source === "gmail" ? "GMAIL" : "MANUAL"}
                  </span>
                  <button onClick={() => setRecurringEvents(recurringEvents.filter(r => r.id !== ev.id))} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer" }}><Icon type="trash" size={14} /></button>
                </div>
              );
            })}
          </div>
        ) : (
          /* Meeting Notes section */
          <div>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: c.text, margin: "0 0 16px 0" }}>Meeting Notes</h3>
            {calNotes.length === 0 ? (
              <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 32, textAlign: "center" }}>
                <div style={{ color: c.textMuted, fontSize: 14 }}>No meeting notes yet. Add notes from the Day View after calls.</div>
              </div>
            ) : calNotes.map(note => {
              const ev = calEvents.find(e => e.id === note.eventId);
              return (
                <div key={note.eventId} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{ev?.title || "Unknown event"}</div>
                    <span style={{ fontSize: 11, color: c.textMuted }}>{ev?.date}</span>
                  </div>
                  <div style={{ fontSize: 13, color: c.textSecondary, whiteSpace: "pre-wrap", lineHeight: 1.6 }}>{note.text}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // ===== QUICK JOBS =====
  const [newQJCat, setNewQJCat] = useState("aviro");
  const [newQJCalendar, setNewQJCalendar] = useState(true);
  const [editingQJNote, setEditingQJNote] = useState(null);
  const [qjNoteText, setQjNoteText] = useState("");
  const [qjFilter, setQjFilter] = useState("all");

  const renderQuickJobs = () => {
    const filtered = qjFilter === "all" ? quickJobs : qjFilter === "delegated" ? delegatedTasks : quickJobs.filter(j => j.cat === qjFilter);
    return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 6px 0" }}>Quick Jobs</h2>
      <p style={{ color: c.textSecondary, fontSize: 13, margin: "0 0 16px 0" }}>Small tasks that don't need a ClickUp ticket. Add to Signal List or delegate to Sophie.</p>

      {/* Add new job form */}
      <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <input value={newQuickJob} onChange={e => setNewQuickJob(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && newQuickJob.trim()) { setQuickJobs([...quickJobs, { id: `qj${Date.now()}`, text: newQuickJob.trim(), done: false, inSignal: false, cat: newQJCat, onCalendar: newQJCalendar, note: "", createdAt: new Date().toISOString() }]); setNewQuickJob(""); }}} placeholder="Add a quick job..." style={{ flex: 1, background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 8, padding: "10px 14px", fontSize: 13, outline: "none" }} />
          <button onClick={() => { if (newQuickJob.trim()) { setQuickJobs([...quickJobs, { id: `qj${Date.now()}`, text: newQuickJob.trim(), done: false, inSignal: false, cat: newQJCat, onCalendar: newQJCalendar, note: "", createdAt: new Date().toISOString() }]); setNewQuickJob(""); }}} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 8, padding: "10px 18px", cursor: "pointer", fontWeight: 600, display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
            <Icon type="plus" size={14} /> Add
          </button>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600 }}>Category:</span>
            <select value={newQJCat} onChange={e => setNewQJCat(e.target.value)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "4px 8px", fontSize: 11 }}>
              {Object.entries(CAL_COLORS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 11, color: c.text }}>
            <input type="checkbox" checked={newQJCalendar} onChange={e => setNewQJCalendar(e.target.checked)} style={{ accentColor: c.accent }} />
            Show on Calendar
          </label>
        </div>
      </div>

      {/* Filter tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
        {[{ k: "all", l: "All" }, ...Object.entries(CAL_COLORS).map(([k, v]) => ({ k, l: v.label })), { k: "delegated", l: "Delegated" }].map(f => (
          <button key={f.k} onClick={() => setQjFilter(f.k)} style={{
            background: qjFilter === f.k ? c.accentBg : "transparent", border: `1px solid ${qjFilter === f.k ? c.accent : c.border}`,
            color: qjFilter === f.k ? c.accent : c.textSecondary, borderRadius: 6, padding: "4px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600,
          }}>{f.l} {f.k === "all" ? `(${quickJobs.length})` : f.k === "delegated" ? `(${delegatedTasks.length})` : `(${quickJobs.filter(j => j.cat === f.k).length})`}</button>
        ))}
      </div>

      {/* Delegated tasks (when filter = delegated) */}
      {qjFilter === "delegated" ? (
        delegatedTasks.length === 0 ? (
          <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 32, textAlign: "center" }}>
            <div style={{ color: c.textMuted, fontSize: 13 }}>No delegated tasks yet. Use the delegate button on any quick job.</div>
          </div>
        ) : delegatedTasks.map(job => {
          const cc = CAL_COLORS[job.cat] || CAL_COLORS.aviro;
          return (
          <div key={job.id} style={{ display: "flex", alignItems: "center", gap: 10, background: c.card, border: `1px solid ${c.border}`, borderRadius: 8, padding: "10px 14px", marginBottom: 4 }}>
            <div style={{ width: 10, height: 10, borderRadius: 3, background: cc.bg, border: `1px solid ${cc.border}`, flexShrink: 0 }} />
            <span style={{ flex: 1, fontSize: 13, color: c.text }}>{job.text}</span>
            <span style={{ fontSize: 10, color: c.textMuted }}>{new Date(job.delegatedAt).toLocaleDateString()}</span>
            <button onClick={() => { setQuickJobs([...quickJobs, { id: job.id, text: job.text, done: false, inSignal: job.inSignal || false, cat: job.cat || "aviro", onCalendar: job.onCalendar !== false, note: job.note || "", createdAt: job.createdAt || new Date().toISOString() }]); setDelegatedTasks(delegatedTasks.filter(d => d.id !== job.id)); }} style={{ background: c.accentBg, border: `1px solid ${c.accent}`, color: c.accent, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>
              Take Back
            </button>
          </div>
          );
        })
      ) : (
        /* Regular jobs list */
        filtered.map(job => {
          const cc = CAL_COLORS[job.cat] || CAL_COLORS.aviro;
          return (
          <div key={job.id} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 8, padding: "10px 14px", marginBottom: 4 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <input type="checkbox" checked={job.done} onChange={() => setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, done: !j.done } : j))} style={{ accentColor: c.accent, width: 16, height: 16, flexShrink: 0 }} />
              <div style={{ width: 10, height: 10, borderRadius: 3, background: cc.bg, border: `1px solid ${cc.border}`, flexShrink: 0 }} title={cc.label} />
              <span style={{ flex: 1, fontSize: 13, color: job.done ? c.textMuted : c.text, textDecoration: job.done ? "line-through" : "none" }}>{job.text}</span>
              {/* Category selector */}
              <select value={job.cat || "aviro"} onChange={e => setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, cat: e.target.value } : j))} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 4, padding: "2px 4px", fontSize: 9, width: 70 }}>
                {Object.entries(CAL_COLORS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
              <button onClick={() => setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, onCalendar: !j.onCalendar } : j))} style={{ background: job.onCalendar ? "rgba(234,179,8,0.15)" : "transparent", border: `1px solid ${job.onCalendar ? "rgba(234,179,8,0.5)" : c.border}`, color: job.onCalendar ? "#eab308" : c.textMuted, borderRadius: 6, padding: "3px 8px", cursor: "pointer", fontSize: 9, fontWeight: 600 }}>
                {job.onCalendar ? "CAL" : "+ CAL"}
              </button>
              <button onClick={() => setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, inSignal: !j.inSignal } : j))} style={{ background: job.inSignal ? c.accentBg : "transparent", border: `1px solid ${job.inSignal ? c.accent : c.border}`, color: job.inSignal ? c.accent : c.textMuted, borderRadius: 6, padding: "3px 8px", cursor: "pointer", fontSize: 9, fontWeight: 600 }}>
                {job.inSignal ? "SIGNAL" : "+ SIGNAL"}
              </button>
              <button onClick={() => { setDelegatedTasks([...delegatedTasks, { ...job, delegatedAt: new Date().toISOString() }]); setQuickJobs(quickJobs.filter(j => j.id !== job.id)); }} title="Delegate to Sophie" style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 6, padding: "3px 6px", cursor: "pointer", fontSize: 9 }}>
                <Icon type="delegate" size={12} />
              </button>
              <button onClick={() => { setEditingQJNote(editingQJNote === job.id ? null : job.id); setQjNoteText(job.note || ""); }} style={{ background: job.note ? c.successBg : "transparent", border: `1px solid ${job.note ? "rgba(34,197,94,0.3)" : c.border}`, color: job.note ? c.success : c.textMuted, borderRadius: 6, padding: "3px 6px", cursor: "pointer", fontSize: 9, fontWeight: 600 }}>
                {job.note ? "NOTE" : "+ NOTE"}
              </button>
              <button onClick={() => setQuickJobs(quickJobs.filter(j => j.id !== job.id))} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer" }}><Icon type="trash" size={13} /></button>
            </div>
            {/* Note editor */}
            {editingQJNote === job.id && (
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${c.border}` }}>
                <textarea value={qjNoteText} onChange={e => setQjNoteText(e.target.value)} rows={2} placeholder="Add a note..." style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "8px 10px", fontSize: 12, outline: "none", resize: "vertical", fontFamily: "inherit", boxSizing: "border-box" }} />
                <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                  <button onClick={() => { setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, note: qjNoteText } : j)); setEditingQJNote(null); }} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Save</button>
                  <button onClick={() => setEditingQJNote(null)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11 }}>Cancel</button>
                </div>
              </div>
            )}
          </div>
          );
        })
      )}
    </div>
    );
  };

  // ===== SIGNAL TASKS =====
  // All ClickUp tasks (for left panel)
  const allClickUpTasks = CLICKUP_DAVID_TASKS.filter(t => t.status !== "completed").map(t => ({ ...t, source: "clickup" }));
  const quickJobSignal = quickJobs.filter(j => j.inSignal && !j.done).map(j => ({ id: j.id, name: j.text, priority: "normal", status: "quick job", source: "quickjob", space: CAL_COLORS[j.cat]?.label || "Aviro", dueDate: null, url: null }));

  // Auto-add quick jobs marked as signal
  useEffect(() => {
    quickJobSignal.forEach(qj => {
      const alreadyInSlot = signalSlots.some(s => s && s.id === qj.id);
      if (!alreadyInSlot) {
        const emptyIdx = signalSlots.findIndex(s => s === null);
        if (emptyIdx !== -1) {
          const newSlots = [...signalSlots];
          newSlots[emptyIdx] = { ...qj, completed: false };
          setSignalSlots(newSlots);
        }
      }
    });
  }, [quickJobs]);

  const sortedClickUp = [...allClickUpTasks].sort((a, b) => {
    if (signalTaskFilter === "priority") {
      const pOrder = { urgent: 0, high: 1, normal: 2, low: 3 };
      return (pOrder[a.priority] ?? 3) - (pOrder[b.priority] ?? 3);
    }
    if (signalTaskFilter === "dueDate") return (a.dueDate || "9999") < (b.dueDate || "9999") ? -1 : 1;
    return (a.space || "").localeCompare(b.space || "");
  });

  const spaces = [...new Set(allClickUpTasks.map(t => t.space))].sort();
  const filteredClickUp = signalSpaceFilter === "all" ? sortedClickUp : sortedClickUp.filter(t => t.space === signalSpaceFilter);

  // Count today's calendar events
  const todayCallCount = todayEvents.filter(e => e.meet || e.attendees).length;

  // Completed signal tasks (stay until marked done on ClickUp)
  const [signalDone, setSignalDone] = useState([]); // { ...task, note, completedAt, clickupDone }
  const [confirmClickUp, setConfirmClickUp] = useState(null); // task id awaiting ClickUp confirm

  const completeSignalSlot = (idx, note) => {
    const task = signalSlots[idx];
    if (!task) return;
    const completedNote = note || signalSlotNotes[idx] || "";
    // Move to completed list
    setSignalDone(prev => [...prev, { ...task, completed: true, note: completedNote, completedAt: new Date().toISOString(), clickupDone: false }]);
    // If quick job, tick it off on quick jobs
    if (task.source === "quickjob") {
      setQuickJobs(prev => prev.map(j => j.id === task.id ? { ...j, done: true, inSignal: false } : j));
    }
    // Save note to global notes
    if (completedNote.trim()) {
      setGlobalNotes(prev => [...prev, { id: `gn${Date.now()}`, title: `Signal: ${task.name}`, text: completedNote, cat: "aviro", type: "meeting", date: selDateStr, savedAt: new Date().toISOString() }]);
    }
    // Remove from slot and compact
    const newSlots = [...signalSlots];
    newSlots[idx] = null;
    const compacted = newSlots.filter(s => s !== null);
    while (compacted.length < 6) compacted.push(null);
    setSignalSlots(compacted);
    // Clean up notes
    setSignalSlotNotes(prev => { const n = {}; Object.keys(prev).forEach(k => { if (parseInt(k) !== idx) n[parseInt(k) > idx ? parseInt(k) - 1 : k] = prev[k]; }); return n; });
    // If ClickUp task, prompt to mark done there too
    if (task.source === "clickup") setConfirmClickUp(task.id);
  };

  const markClickUpDone = (taskId) => {
    setSignalDone(prev => prev.map(t => t.id === taskId ? { ...t, clickupDone: true } : t));
    setConfirmClickUp(null);
  };

  const finishDay = () => {
    const slotsUsed = signalSlots.filter(s => s !== null);
    const completedCount = signalDone.length;
    const totalTasks = slotsUsed.length + completedCount;
    // Save daily progress
    setDailyProgress(prev => [...prev, {
      date: selDateStr,
      tasksCompleted: completedCount,
      totalTasks,
      callsHad: todayCallCount,
      tasks: [...signalDone.map(s => ({ name: s.name, completed: true })), ...slotsUsed.map(s => ({ name: s.name, completed: false }))],
      savedAt: new Date().toISOString(),
    }]);
    // Roll incomplete slots to tomorrow
    const remaining = slotsUsed.map(s => ({ ...s, completed: false }));
    const newSlots = [...remaining];
    while (newSlots.length < 6) newSlots.push(null);
    setSignalSlots(newSlots);
    setSignalSlotNotes({});
    // Clear completed (ClickUp-done ones leave, others stay for reference)
    setSignalDone(prev => prev.filter(t => t.source === "clickup" && !t.clickupDone));
    setSignalDayStarted(false);
    setSignalDayFinished(true);
  };

  const startDay = () => {
    setSignalDayStarted(true);
    setSignalDayFinished(false);
  };

  // Auto-finish at 5am GST (1am UTC) each day
  useEffect(() => {
    const checkAutoFinish = () => {
      const now = new Date();
      const utcH = now.getUTCHours();
      const utcM = now.getUTCMinutes();
      if (utcH === 1 && utcM === 0 && signalDayStarted) finishDay();
    };
    const t = setInterval(checkAutoFinish, 60000);
    return () => clearInterval(t);
  }, [signalDayStarted]);

  const renderSignal = () => (
    <div style={{ maxWidth: "none" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 4px 0" }}>Signal Tasks</h2>
          <p style={{ color: c.textSecondary, fontSize: 12, margin: 0 }}>Drag tasks from the right into your daily signal list. Max 6 focused tasks per day.</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {!signalDayStarted ? (
            <button onClick={startDay} style={{ background: c.success, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
              <Icon type="zap" size={14} /> Start Day
            </button>
          ) : (
            <button onClick={finishDay} style={{ background: c.danger, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
              <Icon type="check" size={14} /> Finish Day
            </button>
          )}
        </div>
      </div>

      {/* ClickUp confirm modal */}
      {confirmClickUp && (
        <div style={{ background: c.accentBg, border: `1px solid ${c.accent}`, borderRadius: 10, padding: 16, marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 13, color: c.text }}>Mark this task as completed on ClickUp too?</span>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => markClickUpDone(confirmClickUp)} style={{ background: c.success, border: "none", color: "#fff", borderRadius: 6, padding: "6px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Yes, Complete on ClickUp</button>
            <button onClick={() => setConfirmClickUp(null)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 6, padding: "6px 16px", cursor: "pointer", fontSize: 12 }}>Not Yet</button>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        {/* LEFT: Today's Signal List */}
        <div>
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, overflow: "hidden" }}>
            {/* Day header */}
            <div style={{ padding: "16px 20px", borderBottom: `1px solid ${c.border}`, background: signalDayStarted ? "rgba(34,197,94,0.05)" : c.surface }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: c.text }}>
                {selectedDate.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
              </div>
              <div style={{ display: "flex", gap: 16, marginTop: 8 }}>
                <div style={{ fontSize: 12, color: c.textSecondary }}>
                  <span style={{ fontWeight: 700, color: c.accent, fontSize: 18 }}>{todayCallCount}</span> call{todayCallCount !== 1 ? "s" : ""} today
                </div>
                <div style={{ fontSize: 12, color: c.textSecondary }}>
                  <span style={{ fontWeight: 700, color: c.success, fontSize: 18 }}>{signalDone.length}</span>/{signalSlots.filter(s => s !== null).length + signalDone.length} done
                </div>
              </div>
              {signalDayStarted && <div style={{ marginTop: 6, fontSize: 11, color: c.success, fontWeight: 600 }}>Day in progress — auto-finishes 5am GST</div>}
              {signalDayFinished && <div style={{ marginTop: 6, fontSize: 11, color: c.accent, fontWeight: 600 }}>Day complete — progress saved</div>}
            </div>

            {/* 6 Signal Slots */}
            <div style={{ padding: 12 }}>
              {signalSlots.map((slot, idx) => (
                <div key={idx}
                  onDragOver={e => { if (draggingSignalTask && !slot) { e.preventDefault(); e.currentTarget.style.background = "rgba(99,102,241,0.1)"; }}}
                  onDragLeave={e => { e.currentTarget.style.background = "transparent"; }}
                  onDrop={e => {
                    e.preventDefault(); e.currentTarget.style.background = "transparent";
                    if (draggingSignalTask && !slot) {
                      const newSlots = [...signalSlots];
                      newSlots[idx] = { ...draggingSignalTask, completed: false };
                      setSignalSlots(newSlots);
                      setDraggingSignalTask(null);
                    }
                  }}
                  style={{
                    display: "flex", flexDirection: "column", minHeight: slot ? "auto" : 56, borderRadius: 8, marginBottom: 6,
                    border: slot ? `1px solid ${slot.priority === "urgent" ? "rgba(239,68,68,0.3)" : c.border}` : `2px dashed ${c.border}`,
                    background: "transparent",
                    transition: "background 0.15s",
                  }}>
                  {slot ? (
                    <div style={{ padding: "10px 14px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontSize: 16, fontWeight: 800, color: c.accent, minWidth: 22 }}>{idx + 1}</span>
                        <button onClick={() => completeSignalSlot(idx)} title="Mark complete" style={{
                          width: 24, height: 24, borderRadius: 6, border: `2px solid ${c.border}`,
                          background: "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: c.success, flexShrink: 0,
                        }}><Icon type="check" size={14} /></button>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{slot.name}</div>
                          <div style={{ fontSize: 10, color: c.textMuted }}>{slot.source === "clickup" ? `${slot.space} · ${slot.status}` : "Quick Job"}</div>
                        </div>
                        <PriorityBadge priority={slot.priority} />
                        <button onClick={() => { setEditingSignalNote(editingSignalNote === idx ? null : idx); setSignalNoteText(signalSlotNotes[idx] || ""); }} style={{
                          background: signalSlotNotes[idx] ? c.successBg : "transparent", border: `1px solid ${signalSlotNotes[idx] ? "rgba(34,197,94,0.3)" : c.border}`,
                          color: signalSlotNotes[idx] ? c.success : c.textMuted, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 9, fontWeight: 600,
                        }}>{signalSlotNotes[idx] ? "NOTE" : "+ NOTE"}</button>
                        <button onClick={() => { const ns = [...signalSlots]; ns[idx] = null; const comp = ns.filter(s => s !== null); while (comp.length < 6) comp.push(null); setSignalSlots(comp); }} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer" }}><Icon type="trash" size={12} /></button>
                      </div>
                      {editingSignalNote === idx && (
                        <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${c.border}` }}>
                          <textarea value={signalNoteText} onChange={e => setSignalNoteText(e.target.value)} rows={2} placeholder="Add a note about this task..." style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "8px 10px", fontSize: 12, outline: "none", resize: "vertical", fontFamily: "inherit", boxSizing: "border-box" }} />
                          <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                            <button onClick={() => { setSignalSlotNotes({ ...signalSlotNotes, [idx]: signalNoteText }); setEditingSignalNote(null); }} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Save</button>
                            <button onClick={() => setEditingSignalNote(null)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11 }}>Cancel</button>
                          </div>
                        </div>
                      )}
                    </div>
                  ) : (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "14px", gap: 8 }}>
                      <span style={{ fontSize: 16, fontWeight: 800, color: c.textMuted, opacity: 0.3 }}>{idx + 1}</span>
                      <span style={{ fontSize: 12, color: c.textMuted, opacity: 0.4 }}>Drag a task here</span>
                    </div>
                  )}
                </div>
              ))}
            </div>

            {/* Completed section */}
            {signalDone.length > 0 && (
              <div style={{ padding: "0 12px 12px" }}>
                <div style={{ borderTop: `1px solid ${c.border}`, paddingTop: 12, marginTop: 4 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: c.success, letterSpacing: "0.05em", marginBottom: 8, textTransform: "uppercase" }}>Completed ({signalDone.length})</div>
                  {signalDone.map(task => (
                    <div key={task.id + "-done"} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", marginBottom: 3, borderRadius: 6, background: "rgba(34,197,94,0.05)", border: `1px solid rgba(34,197,94,0.2)` }}>
                      <Icon type="check" size={14} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, color: c.textMuted, textDecoration: "line-through" }}>{task.name}</div>
                        {task.note && <div style={{ fontSize: 10, color: c.textSecondary, marginTop: 2, fontStyle: "italic" }}>{task.note}</div>}
                      </div>
                      {task.source === "clickup" && !task.clickupDone && (
                        <button onClick={() => markClickUpDone(task.id)} style={{ background: c.warningBg, border: `1px solid rgba(245,158,11,0.3)`, color: c.warning, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 9, fontWeight: 700 }}>
                          Complete on ClickUp
                        </button>
                      )}
                      {task.clickupDone && <span style={{ fontSize: 9, color: c.success, fontWeight: 700 }}>CLICKUP DONE</span>}
                      {task.source === "quickjob" && <span style={{ fontSize: 9, color: c.success, fontWeight: 700 }}>DONE</span>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* RIGHT: ClickUp Task Pool */}
        <div>
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, overflow: "hidden" }}>
            <div style={{ padding: "12px 16px", borderBottom: `1px solid ${c.border}`, background: c.surface }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: c.text }}>ClickUp Tasks ({filteredClickUp.length})</span>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {[{ k: "priority", l: "Priority" }, { k: "dueDate", l: "Due Date" }, { k: "space", l: "Workspace" }].map(f => (
                  <button key={f.k} onClick={() => setSignalTaskFilter(f.k)} style={{
                    background: signalTaskFilter === f.k ? c.accentBg : "transparent", border: `1px solid ${signalTaskFilter === f.k ? c.accent : c.border}`,
                    color: signalTaskFilter === f.k ? c.accent : c.textSecondary, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 10, fontWeight: 600,
                  }}>{f.l}</button>
                ))}
                <select value={signalSpaceFilter} onChange={e => setSignalSpaceFilter(e.target.value)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 4, padding: "3px 6px", fontSize: 10, marginLeft: 4 }}>
                  <option value="all">All Spaces</option>
                  {spaces.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div style={{ maxHeight: 600, overflowY: "auto", padding: 8 }}>
              {filteredClickUp.map(task => {
                const inSlot = signalSlots.some(s => s && s.id === task.id) || signalDone.some(s => s.id === task.id);
                return (
                  <div key={task.id} draggable={!inSlot}
                    onDragStart={e => { setDraggingSignalTask(task); e.dataTransfer.effectAllowed = "copy"; }}
                    onDragEnd={() => setDraggingSignalTask(null)}
                    style={{
                      display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", marginBottom: 3, borderRadius: 6,
                      background: inSlot ? c.surface : c.card, border: `1px solid ${inSlot ? c.border : task.priority === "urgent" ? "rgba(239,68,68,0.2)" : c.border}`,
                      cursor: inSlot ? "default" : "grab", opacity: inSlot ? 0.4 : 1, transition: "opacity 0.15s",
                    }}>
                    <PriorityBadge priority={task.priority} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 500, color: c.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{task.name}</div>
                      <div style={{ fontSize: 10, color: c.textMuted }}>{task.space}{task.dueDate ? ` · ${task.dueDate}` : ""}</div>
                    </div>
                    {task.url && <a href={task.url} target="_blank" rel="noopener" onClick={e => e.stopPropagation()} style={{ color: c.textMuted, flexShrink: 0 }}><Icon type="link" size={12} /></a>}
                    {inSlot && <span style={{ fontSize: 9, color: c.accent, fontWeight: 700 }}>IN SIGNAL</span>}
                  </div>
                );
              })}
              {/* Quick job signal items */}
              {quickJobSignal.length > 0 && (
                <>
                  <div style={{ padding: "8px 4px 4px", fontSize: 10, fontWeight: 700, color: c.accent, letterSpacing: "0.05em" }}>QUICK JOBS</div>
                  {quickJobSignal.map(task => {
                    const inSlot = signalSlots.some(s => s && s.id === task.id) || signalDone.some(s => s.id === task.id);
                    return (
                      <div key={task.id} draggable={!inSlot}
                        onDragStart={e => { setDraggingSignalTask(task); e.dataTransfer.effectAllowed = "copy"; }}
                        onDragEnd={() => setDraggingSignalTask(null)}
                        style={{
                          display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", marginBottom: 3, borderRadius: 6,
                          background: inSlot ? c.surface : c.accentBg, border: `1px solid rgba(99,102,241,0.2)`,
                          cursor: inSlot ? "default" : "grab", opacity: inSlot ? 0.4 : 1,
                        }}>
                        <Icon type="zap" size={12} />
                        <span style={{ fontSize: 12, color: c.text, flex: 1 }}>{task.name}</span>
                        {inSlot && <span style={{ fontSize: 9, color: c.accent, fontWeight: 700 }}>IN SIGNAL</span>}
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  // ===== SOPHIE TASKS =====
  const renderSophie = () => (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 6px 0" }}>Sophie's Tasks</h2>
      <p style={{ color: c.textSecondary, fontSize: 13, margin: "0 0 24px 0" }}>Sophie Whistler's ClickUp tasks and delegated quick jobs.</p>
      {delegatedTasks.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase", letterSpacing: "0.05em" }}>Delegated from you ({delegatedTasks.filter(t => !t.completed).length} active, {delegatedTasks.filter(t => t.completed).length} completed)</h3>
          {delegatedTasks.filter(t => !t.completed).map((t, i) => {
            const cc = CAL_COLORS[t.cat] || CAL_COLORS.aviro;
            return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, background: c.accentBg, border: `1px solid rgba(99,102,241,0.3)`, borderRadius: 8, padding: "10px 16px", marginBottom: 4 }}>
              <div style={{ width: 10, height: 10, borderRadius: 3, background: cc.bg, border: `1px solid ${cc.border}`, flexShrink: 0 }} />
              <Icon type="delegate" size={14} />
              <span style={{ fontSize: 13, color: c.text, flex: 1 }}>{t.text}</span>
              <span style={{ fontSize: 10, color: c.textMuted }}>{t.delegatedAt ? new Date(t.delegatedAt).toLocaleDateString() : "Delegated"}</span>
              <button onClick={() => { setDelegatedTasks(delegatedTasks.map(d => d.id === t.id ? { ...d, completed: true, completedAt: new Date().toISOString() } : d)); }} style={{ background: c.successBg, border: "1px solid rgba(34,197,94,0.3)", color: c.success, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Complete</button>
              <button onClick={() => { setQuickJobs([...quickJobs, { id: t.id, text: t.text, done: false, inSignal: t.inSignal || false, cat: t.cat || "aviro", onCalendar: false, note: t.note || "", createdAt: t.createdAt || new Date().toISOString() }]); setDelegatedTasks(delegatedTasks.filter(d => d.id !== t.id)); }} style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", color: "#ef4444", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Undelegate</button>
            </div>
            );
          })}
          {delegatedTasks.filter(t => t.completed).length > 0 && (
            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: c.textMuted, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>Completed</div>
              {delegatedTasks.filter(t => t.completed).map((t, i) => (
