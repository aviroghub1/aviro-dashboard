                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: i < allDocAlerts.length - 1 ? `1px solid ${c.border}` : "none" }}>
                    <span style={{ width: 6, height: 6, borderRadius: "50%", flexShrink: 0, background: a.status === "expired" ? "#ef4444" : a.status === "expiring" ? "#f59e0b" : "#3b82f6" }} />
                    <span style={{ fontSize: 12, color: c.text, flex: 1 }}>
                      <span style={{ fontWeight: 600 }}>{a.entity}</span>
                      <span style={{ color: c.textMuted }}> — </span>
                      <span>{a.doc}</span>
                      <span style={{ color: c.textMuted }}> — </span>
                      <span style={{ fontWeight: 500, color: a.status === "expired" ? "#ef4444" : a.status === "expiring" ? "#f59e0b" : "#3b82f6" }}>
                        {a.status === "expired" ? "Expired" : a.status === "expiring" ? "Expiring Soon" : "Review Soon"}
                      </span>
                      {a.renewalDate && a.renewalDate !== "No date" && (
                        <span style={{ color: c.textMuted }}> — renew by {a.renewalDate}</span>
                      )}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
        {Object.entries(CORPORATE_ENTITIES).map(([category, entities]) => (
          <div key={category} style={{ marginBottom: 24 }}>
            <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase", letterSpacing: "0.05em", borderBottom: `1px solid ${c.border}`, paddingBottom: 8 }}>
              {category} <span style={{ color: c.textMuted, fontWeight: 400 }}>({entities.length})</span>
            </h3>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 10 }}>
              {entities.map(entity => {
                const eDocs = entityDocs[entity.name] || [];
                const ac = eDocs.filter(d => { const s = getDocStatusGlobal(d); return s === "expired" || s === "expiring" || s === "review_soon"; }).length;
                return (
                  <div key={entity.name} onClick={() => { setSelectedEntity(entity.name); setSelectedCategory(category); }}
                    style={{ background: c.card, border: `1px solid ${ac > 0 ? "rgba(239,68,68,0.3)" : c.border}`, borderRadius: 10, padding: 16, cursor: "pointer" }}
                    onMouseEnter={e => e.currentTarget.style.background = c.cardHover} onMouseLeave={e => e.currentTarget.style.background = c.card}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{entity.name}</div>
                      {ac > 0 && <span style={{ background: c.dangerBg, color: c.danger, fontSize: 10, padding: "2px 6px", borderRadius: 4, fontWeight: 700 }}>{ac} alert{ac > 1 ? "s" : ""}</span>}
                    </div>
                    <div style={{ fontSize: 12, color: c.textSecondary }}>{entity.jurisdiction}</div>
                    <div style={{ fontSize: 11, color: c.textMuted }}>{entity.companyNumber}</div>
                    <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                      {bankAccountsList.filter(a => a.entityName === entity.name).length > 0 && <span style={{ fontSize: 10, color: c.textMuted, background: c.surface, padding: "2px 6px", borderRadius: 3 }}>{bankAccountsList.filter(a => a.entityName === entity.name).length} bank</span>}
                      {(entity.contracts || []).length > 0 && <span style={{ fontSize: 10, color: c.textMuted, background: c.surface, padding: "2px 6px", borderRadius: 3 }}>{entity.contracts.length} contracts</span>}
                      {(entity.domains || []).length > 0 && <span style={{ fontSize: 10, color: c.textMuted, background: c.surface, padding: "2px 6px", borderRadius: 3 }}>{entity.domains.length} domains</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    );
  };

  // ===== MONEY FLOW =====
  const typeColors = { "Payment Processing": "#6366f1", "Software License": "#22c55e", "Management Fee": "#f59e0b", "Payment Gateway": "#06b6d4", "Revenue Distribution": "#ec4899", "Subsidiary Distribution": "#8b5cf6" };
  const renderMoneyFlow = () => (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 16px 0" }}>Money Flow Map</h2>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
        {Object.entries(typeColors).map(([type, color]) => <span key={type} style={{ fontSize: 11, color, background: `${color}15`, border: `1px solid ${color}40`, padding: "3px 10px", borderRadius: 4 }}>{type}</span>)}
      </div>
      {MONEY_FLOWS.map((flow, idx) => (
        <div key={idx} onClick={() => setExpandedFlows({...expandedFlows, [idx]: !expandedFlows[idx]})} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: "14px 20px", marginBottom: 6, cursor: "pointer" }}
          onMouseEnter={e => e.currentTarget.style.background = c.cardHover} onMouseLeave={e => e.currentTarget.style.background = c.card}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: c.text, flex: 1 }}>{flow.from}</span>
            <span style={{ color: typeColors[flow.type] || c.accent }}><Icon type="arrowRight" size={16} /></span>
            <span style={{ fontSize: 13, fontWeight: 600, color: c.text, flex: 1 }}>{flow.to}</span>
            <span style={{ fontSize: 10, color: typeColors[flow.type], background: `${typeColors[flow.type]}15`, padding: "3px 8px", borderRadius: 4, fontWeight: 600 }}>{flow.type}</span>
          </div>
          {expandedFlows[idx] && <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${c.border}`, fontSize: 12, color: c.textSecondary }}>{flow.description}</div>}
        </div>
      ))}
    </div>
  );

  // ===== BANK ACCOUNTS =====
  const SERVICE_OPTIONS = ["C2B", "B2C", "B2B", "Treasury", "Internal"];
  const FEE_TYPES = ["B2B", "B2C", "C2B", "FX"];
  const allEntityNames = Object.values(CORPORATE_ENTITIES).flat().map(e => e.name);

  const renderBanks = () => {
    const updateRel = (id, field, val) => setBankRelationships(bankRelationships.map(r => r.id === id ? { ...r, [field]: val } : r));
    const updateRelFee = (id, feeType, feeField, val) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        const fees = { ...(r.fees || {}) };
        fees[feeType] = { ...(fees[feeType] || { pct: "", tx: "" }), [feeField]: val };
        return { ...r, fees };
      }));
    };
    const toggleRelService = (id, svc) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        const svcs = r.offeredServices || [];
        return { ...r, offeredServices: svcs.includes(svc) ? svcs.filter(s => s !== svc) : [...svcs, svc] };
      }));
    };
    const addSupportChannel = (id) => {
      setBankRelationships(bankRelationships.map(r => r.id === id ? { ...r, supportChannels: [...(r.supportChannels || []), ""] } : r));
    };
    const updateSupportChannel = (id, idx, val) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        const ch = [...(r.supportChannels || [])];
        ch[idx] = val;
        return { ...r, supportChannels: ch };
      }));
    };
    const removeSupportChannel = (id, idx) => {
      setBankRelationships(bankRelationships.map(r => {
        if (r.id !== id) return r;
        return { ...r, supportChannels: (r.supportChannels || []).filter((_, i) => i !== idx) };
      }));
    };

    const updateAcct = (id, field, val) => setBankAccountsList(bankAccountsList.map(a => a.id === id ? { ...a, [field]: val } : a));
    const toggleAcctPurpose = (id, purpose) => {
      setBankAccountsList(bankAccountsList.map(a => {
        if (a.id !== id) return a;
        const p = a.accountPurpose || [];
        return { ...a, accountPurpose: p.includes(purpose) ? p.filter(x => x !== purpose) : [...p, purpose] };
      }));
    };

    const inputStyle = { fontSize: 12, padding: "6px 10px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none", boxSizing: "border-box" };
    const labelStyle = { fontSize: 10, color: c.textMuted, fontWeight: 600, textTransform: "uppercase", display: "block", marginBottom: 3 };

    return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 6px 0" }}>Banking</h2>
      <p style={{ color: c.textSecondary, fontSize: 13, margin: "0 0 24px 0" }}>{bankRelationships.length} bank relationship{bankRelationships.length !== 1 ? "s" : ""}, {bankAccountsList.length} account{bankAccountsList.length !== 1 ? "s" : ""}</p>

      {/* ===== SECTION 1: BANK RELATIONSHIPS ===== */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, color: c.text, margin: 0 }}>Bank Relationships</h3>
          <button onClick={() => {
            setBankRelationships([...bankRelationships, {
              id: `br-${Date.now()}`, bankName: "", mainContact: "", relationshipLevel: 5, contactEmail: "", contactPhone: "",
              offeredServices: [], supportEmail: "", supportChannels: [],
              fees: { B2B: { pct: "", tx: "" }, B2C: { pct: "", tx: "" }, C2B: { pct: "", tx: "" }, FX: { pct: "", tx: "" } },
              collapsed: false,
            }]);
          }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "7px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>+ Add Bank Relationship</button>
        </div>

        {bankRelationships.length === 0 && <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 30, textAlign: "center", color: c.textMuted, fontSize: 13 }}>No bank relationships added yet.</div>}

        {bankRelationships.map(rel => (
          <div key={rel.id} style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 18, marginBottom: 10 }}>
            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 15, fontWeight: 600, color: c.text }}>{rel.bankName || "New Bank"}</span>
                {rel.relationshipLevel && <span style={{ fontSize: 10, color: c.accent, background: `${c.accent}15`, padding: "2px 8px", borderRadius: 4, fontWeight: 600 }}>Level {rel.relationshipLevel}/10</span>}
                {(rel.offeredServices || []).length > 0 && <span style={{ fontSize: 10, color: c.textMuted }}>{rel.offeredServices.join(", ")}</span>}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => updateRel(rel.id, "collapsed", !rel.collapsed)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, cursor: "pointer", fontSize: 10, borderRadius: 4, padding: "3px 10px" }}>{rel.collapsed ? "Edit ▾" : "Collapse ▴"}</button>
                <button onClick={() => setBankRelationships(bankRelationships.filter(r => r.id !== rel.id))} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 10 }}>✕</button>
              </div>
            </div>

            {/* Expanded */}
            {!rel.collapsed && (
              <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
                {/* Row 1: Name + Contact + Level */}
                <div style={{ display: "grid", gridTemplateColumns: "2fr 2fr 1fr", gap: 10 }}>
                  <div><label style={labelStyle}>Bank Name</label><input value={rel.bankName || ""} onChange={e => updateRel(rel.id, "bankName", e.target.value)} placeholder="e.g. Privalgo" style={{ ...inputStyle, width: "100%" }} /></div>
                  <div><label style={labelStyle}>Main Contact</label><input value={rel.mainContact || ""} onChange={e => updateRel(rel.id, "mainContact", e.target.value)} placeholder="Contact name" style={{ ...inputStyle, width: "100%" }} /></div>
                  <div><label style={labelStyle}>Relationship Level</label>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="range" min="1" max="10" value={rel.relationshipLevel || 5} onChange={e => updateRel(rel.id, "relationshipLevel", parseInt(e.target.value))} style={{ flex: 1 }} />
                      <span style={{ fontSize: 13, fontWeight: 700, color: c.accent, minWidth: 28, textAlign: "center" }}>{rel.relationshipLevel || 5}</span>
                    </div>
                  </div>
                </div>

                {/* Row 2: Contact details */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                  <div><label style={labelStyle}>Contact Email</label><input type="email" value={rel.contactEmail || ""} onChange={e => updateRel(rel.id, "contactEmail", e.target.value)} placeholder="contact@bank.com" style={{ ...inputStyle, width: "100%" }} /></div>
                  <div><label style={labelStyle}>Contact Phone</label><input value={rel.contactPhone || ""} onChange={e => updateRel(rel.id, "contactPhone", e.target.value)} placeholder="+44..." style={{ ...inputStyle, width: "100%" }} /></div>
                  <div><label style={labelStyle}>Support Email</label><input type="email" value={rel.supportEmail || ""} onChange={e => updateRel(rel.id, "supportEmail", e.target.value)} placeholder="support@bank.com" style={{ ...inputStyle, width: "100%" }} /></div>
                </div>

                {/* Offered Services */}
                <div>
                  <label style={labelStyle}>Offered Services</label>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {SERVICE_OPTIONS.map(svc => {
                      const active = (rel.offeredServices || []).includes(svc);
                      return <button key={svc} onClick={() => toggleRelService(rel.id, svc)} style={{ fontSize: 11, padding: "5px 12px", borderRadius: 6, cursor: "pointer", fontWeight: 600, border: active ? `1px solid ${c.accent}` : `1px solid ${c.border}`, background: active ? `${c.accent}20` : "transparent", color: active ? c.accent : c.textMuted, transition: "all 0.15s" }}>{svc}</button>;
                    })}
                  </div>
                </div>

                {/* Support Channels */}
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <label style={{ ...labelStyle, marginBottom: 0 }}>Support Channels</label>
                    <button onClick={() => addSupportChannel(rel.id)} style={{ fontSize: 10, color: c.accent, background: `${c.accent}15`, border: `1px solid ${c.accent}40`, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontWeight: 600 }}>+ Add</button>
                  </div>
                  {(rel.supportChannels || []).map((ch, ci) => (
                    <div key={ci} style={{ display: "flex", gap: 6, marginBottom: 4, alignItems: "center" }}>
                      <input value={ch} onChange={e => updateSupportChannel(rel.id, ci, e.target.value)} placeholder="e.g. Slack #bank-support, WhatsApp group..." style={{ ...inputStyle, flex: 1 }} />
                      <button onClick={() => removeSupportChannel(rel.id, ci)} style={{ background: "transparent", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 12, padding: "2px 6px" }}>✕</button>
                    </div>
                  ))}
                  {(rel.supportChannels || []).length === 0 && <div style={{ fontSize: 11, color: c.textMuted }}>No channels added</div>}
                </div>

                {/* Fees Grid */}
                <div>
                  <label style={labelStyle}>Fees</label>
                  <div style={{ display: "grid", gridTemplateColumns: "80px 1fr 1fr", gap: 6, alignItems: "center" }}>
                    <span></span><span style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, textAlign: "center" }}>% Rate</span><span style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, textAlign: "center" }}>TX Fee</span>
                    {FEE_TYPES.map(ft => (
                      <React.Fragment key={ft}>
                        <span style={{ fontSize: 11, color: c.textSecondary, fontWeight: 600 }}>{ft}</span>
                        <input value={(rel.fees?.[ft]?.pct) || ""} onChange={e => updateRelFee(rel.id, ft, "pct", e.target.value)} placeholder="0.00%" style={{ ...inputStyle, textAlign: "center" }} />
                        <input value={(rel.fees?.[ft]?.tx) || ""} onChange={e => updateRelFee(rel.id, ft, "tx", e.target.value)} placeholder="$0.00" style={{ ...inputStyle, textAlign: "center" }} />
                      </React.Fragment>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* ===== SECTION 2: BANK ACCOUNTS ===== */}
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, color: c.text, margin: 0 }}>Bank Accounts</h3>
          <button onClick={() => {
            setBankAccountsList([...bankAccountsList, {
              id: `ba-${Date.now()}`, bankRelId: "", entityName: "", accountPurpose: [],
              dateOpened: "", feesOverride: null, collapsed: false,
            }]);
          }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "7px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>+ Add Bank Account</button>
        </div>

        {bankAccountsList.length === 0 && <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 30, textAlign: "center", color: c.textMuted, fontSize: 13 }}>No bank accounts added yet.</div>}

        {bankAccountsList.map(acct => {
          const linkedRel = bankRelationships.find(r => r.id === acct.bankRelId);
          const acctFees = acct.feesOverride || (linkedRel ? linkedRel.fees : null);
          return (
          <div key={acct.id} style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 18, marginBottom: 10 }}>
            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 15, fontWeight: 600, color: c.text }}>{linkedRel ? linkedRel.bankName : "No Bank"}</span>
                <span style={{ fontSize: 11, color: c.textSecondary }}>→</span>
                <span style={{ fontSize: 13, fontWeight: 500, color: c.text }}>{acct.entityName || "No Entity"}</span>
                {(acct.accountPurpose || []).length > 0 && (acct.accountPurpose || []).map(p => (
                  <span key={p} style={{ fontSize: 9, color: c.accent, background: `${c.accent}15`, padding: "2px 6px", borderRadius: 4, fontWeight: 600 }}>{p}</span>
                ))}
                {acct.dateOpened && <span style={{ fontSize: 10, color: c.textMuted }}>Opened {acct.dateOpened}</span>}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => updateAcct(acct.id, "collapsed", !acct.collapsed)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, cursor: "pointer", fontSize: 10, borderRadius: 4, padding: "3px 10px" }}>{acct.collapsed ? "Edit ▾" : "Collapse ▴"}</button>
                <button onClick={() => setBankAccountsList(bankAccountsList.filter(a => a.id !== acct.id))} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 10 }}>✕</button>
              </div>
            </div>

            {/* Expanded */}
            {!acct.collapsed && (
              <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                  {/* Bank select */}
                  <div>
                    <label style={labelStyle}>Bank</label>
                    <select value={acct.bankRelId || ""} onChange={e => updateAcct(acct.id, "bankRelId", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                      <option value="">— Select Bank —</option>
                      {bankRelationships.map(r => <option key={r.id} value={r.id}>{r.bankName || "Unnamed"}</option>)}
                    </select>
                  </div>
                  {/* Entity select */}
                  <div>
                    <label style={labelStyle}>Entity</label>
                    <select value={acct.entityName || ""} onChange={e => updateAcct(acct.id, "entityName", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                      <option value="">— Select Entity —</option>
                      {allEntityNames.map(en => <option key={en} value={en}>{en}</option>)}
                    </select>
                  </div>
                  {/* Date Opened */}
                  <div>
                    <label style={labelStyle}>Date Opened</label>
                    <input type="date" value={acct.dateOpened || ""} onChange={e => updateAcct(acct.id, "dateOpened", e.target.value)} style={{ ...inputStyle, width: "100%" }} />
                  </div>
                </div>

                {/* Account Purpose */}
                <div>
                  <label style={labelStyle}>Account Purpose</label>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {["B2B", "C2B", "B2C", "Treasury"].map(p => {
                      const active = (acct.accountPurpose || []).includes(p);
                      return <button key={p} onClick={() => toggleAcctPurpose(acct.id, p)} style={{ fontSize: 11, padding: "5px 12px", borderRadius: 6, cursor: "pointer", fontWeight: 600, border: active ? `1px solid ${c.accent}` : `1px solid ${c.border}`, background: active ? `${c.accent}20` : "transparent", color: active ? c.accent : c.textMuted, transition: "all 0.15s" }}>{p}</button>;
                    })}
                  </div>
                </div>

                {/* Fees — inherited or overridden */}
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <label style={{ ...labelStyle, marginBottom: 0 }}>Fees {acct.feesOverride ? "(Manual Override)" : linkedRel ? `(From ${linkedRel.bankName})` : "(No bank linked)"}</label>
                    {linkedRel && !acct.feesOverride && (
                      <button onClick={() => updateAcct(acct.id, "feesOverride", linkedRel.fees ? { ...linkedRel.fees } : { B2B: { pct: "", tx: "" }, B2C: { pct: "", tx: "" }, C2B: { pct: "", tx: "" }, FX: { pct: "", tx: "" } })} style={{ fontSize: 10, color: c.accent, background: `${c.accent}15`, border: `1px solid ${c.accent}40`, borderRadius: 4, padding: "2px 8px", cursor: "pointer" }}>Override Manually</button>
                    )}
                    {acct.feesOverride && (
                      <button onClick={() => updateAcct(acct.id, "feesOverride", null)} style={{ fontSize: 10, color: "#f59e0b", background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.3)", borderRadius: 4, padding: "2px 8px", cursor: "pointer" }}>Use Bank Fees</button>
                    )}
                  </div>
                  {acctFees ? (
                    <div style={{ display: "grid", gridTemplateColumns: "80px 1fr 1fr", gap: 6, alignItems: "center" }}>
                      <span></span><span style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, textAlign: "center" }}>% Rate</span><span style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, textAlign: "center" }}>TX Fee</span>
                      {FEE_TYPES.map(ft => (
                        <React.Fragment key={ft}>
                          <span style={{ fontSize: 11, color: c.textSecondary, fontWeight: 600 }}>{ft}</span>
                          {acct.feesOverride ? (
                            <>
                              <input value={(acct.feesOverride[ft]?.pct) || ""} onChange={e => {
                                const f = { ...(acct.feesOverride || {}) };
                                f[ft] = { ...(f[ft] || {}), pct: e.target.value };
                                updateAcct(acct.id, "feesOverride", f);
                              }} placeholder="0.00%" style={{ ...inputStyle, textAlign: "center" }} />
                              <input value={(acct.feesOverride[ft]?.tx) || ""} onChange={e => {
                                const f = { ...(acct.feesOverride || {}) };
                                f[ft] = { ...(f[ft] || {}), tx: e.target.value };
                                updateAcct(acct.id, "feesOverride", f);
                              }} placeholder="$0.00" style={{ ...inputStyle, textAlign: "center" }} />
                            </>
                          ) : (
                            <>
                              <span style={{ fontSize: 12, color: c.text, textAlign: "center" }}>{acctFees[ft]?.pct || "—"}</span>
                              <span style={{ fontSize: 12, color: c.text, textAlign: "center" }}>{acctFees[ft]?.tx || "—"}</span>
                            </>
                          )}
                        </React.Fragment>
                      ))}
                    </div>
                  ) : (
                    <div style={{ fontSize: 11, color: c.textMuted }}>Select a bank to see inherited fees, or override manually.</div>
                  )}
                </div>
              </div>
            )}
          </div>
          );
        })}
      </div>
    </div>
    );
  };

  // ===== GAMING BRANDS =====
  const gamingLicenseEntities = (CORPORATE_ENTITIES["Gaming Licenses"] || []).map(e => e.name);
  const paymentAgentEntities = (CORPORATE_ENTITIES["Payment Agents"] || []).map(e => e.name);

  const renderBrands = () => {
    const updateBrand = (id, field, val) => setGamingBrands(gamingBrands.map(b => b.id === id ? { ...b, [field]: val } : b));
    const toggleBrandLicense = (id, lic) => {
      setGamingBrands(gamingBrands.map(b => {
        if (b.id !== id) return b;
        const lics = b.licenses || [];
        const updated = lics.includes(lic) ? lics.filter(l => l !== lic) : [...lics, lic];
        // If footerLicense was removed, clear it
        const newFooter = updated.includes(b.footerLicense) ? b.footerLicense : "";
        return { ...b, licenses: updated, footerLicense: newFooter };
      }));
    };
    const addPaymentMethod = (id) => {
      setGamingBrands(gamingBrands.map(b => b.id === id ? { ...b, paymentMethods: [...(b.paymentMethods || []), ""] } : b));
    };
    const updatePaymentMethod = (id, idx, val) => {
      setGamingBrands(gamingBrands.map(b => {
        if (b.id !== id) return b;
        const pm = [...(b.paymentMethods || [])];
        pm[idx] = val;
        return { ...b, paymentMethods: pm };
      }));
    };
    const removePaymentMethod = (id, idx) => {
      setGamingBrands(gamingBrands.map(b => b.id !== id ? b : { ...b, paymentMethods: (b.paymentMethods || []).filter((_, i) => i !== idx) }));
    };
    const addMirror = (id) => {
      setGamingBrands(gamingBrands.map(b => b.id === id ? { ...b, mirrors: [...(b.mirrors || []), ""] } : b));
    };
    const updateMirror = (id, idx, val) => {
      setGamingBrands(gamingBrands.map(b => {
        if (b.id !== id) return b;
        const m = [...(b.mirrors || [])];
        m[idx] = val;
        return { ...b, mirrors: m };
      }));
    };
    const removeMirror = (id, idx) => {
      setGamingBrands(gamingBrands.map(b => b.id !== id ? b : { ...b, mirrors: (b.mirrors || []).filter((_, i) => i !== idx) }));
    };

    const inputStyle = { fontSize: 12, padding: "6px 10px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none", boxSizing: "border-box" };
    const labelStyle = { fontSize: 10, color: c.textMuted, fontWeight: 600, textTransform: "uppercase", display: "block", marginBottom: 3 };

    return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>Gaming Brands</h2>
          <p style={{ color: c.textSecondary, fontSize: 13, margin: "4px 0 0 0" }}>{gamingBrands.length} brand{gamingBrands.length !== 1 ? "s" : ""}</p>
        </div>
        <button onClick={() => {
          setGamingBrands([...gamingBrands, { id: `gb-${Date.now()}`, brand: "", domain: "", mirrors: [], licenses: [], footerLicense: "", paymentAgent: "", paymentMethods: [], mainOperations: "", collapsed: false }]);
        }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "7px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>+ Add Gaming Brand</button>
      </div>

      {gamingBrands.length === 0 && <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 30, textAlign: "center", color: c.textMuted, fontSize: 13 }}>No gaming brands added yet. Click "Add Gaming Brand" to get started.</div>}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {gamingBrands.map(brand => {
          const selectedLicenses = brand.licenses || [];
          return (
          <div key={brand.id} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: 18 }}>
            {/* Header — always visible summary */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                  <span style={{ fontSize: 16, fontWeight: 700, color: c.text }}>{brand.brand || "New Brand"}</span>
                  {brand.domain && <a href={`https://${brand.domain}`} target="_blank" rel="noopener" style={{ fontSize: 11, color: c.accent, textDecoration: "none" }}>{brand.domain}</a>}
                </div>
                {/* Collapsed summary info */}
                {brand.collapsed && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 6 }}>
                    {(brand.mirrors || []).length > 0 && <div style={{ fontSize: 11, color: c.textMuted }}><span style={{ fontWeight: 600, color: c.textSecondary }}>Mirrors:</span> {brand.mirrors.filter(Boolean).join(", ")}</div>}
                    {selectedLicenses.length > 0 && <div style={{ fontSize: 11, color: c.textMuted }}><span style={{ fontWeight: 600, color: c.textSecondary }}>Licenses:</span> {selectedLicenses.join(", ")}</div>}
                    {brand.footerLicense && <div style={{ fontSize: 11, color: c.textMuted }}><span style={{ fontWeight: 600, color: c.textSecondary }}>Footer:</span> {brand.footerLicense}</div>}
                    {brand.paymentAgent && <div style={{ fontSize: 11, color: c.textMuted }}><span style={{ fontWeight: 600, color: c.textSecondary }}>Payment Agent:</span> {brand.paymentAgent}</div>}
                    {(brand.paymentMethods || []).filter(Boolean).length > 0 && <div style={{ fontSize: 11, color: c.textMuted }}><span style={{ fontWeight: 600, color: c.textSecondary }}>Payment Methods:</span> {brand.paymentMethods.filter(Boolean).join(", ")}</div>}
                    {brand.mainOperations && <div style={{ fontSize: 11, color: c.textMuted }}><span style={{ fontWeight: 600, color: c.textSecondary }}>Operations:</span> {brand.mainOperations}</div>}
                  </div>
                )}
              </div>
              <div style={{ display: "flex", gap: 6, flexShrink: 0, marginLeft: 8 }}>
                <button onClick={() => updateBrand(brand.id, "collapsed", !brand.collapsed)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, cursor: "pointer", fontSize: 10, borderRadius: 4, padding: "3px 10px" }}>{brand.collapsed ? "Edit ▾" : "Collapse ▴"}</button>
                <button onClick={() => setGamingBrands(gamingBrands.filter(b => b.id !== brand.id))} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 10 }}>✕</button>
              </div>
            </div>

            {/* Expanded edit view */}
            {!brand.collapsed && (
              <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 12 }}>
                {/* Name + Domain */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <div><label style={labelStyle}>Brand Name</label><input value={brand.brand || ""} onChange={e => updateBrand(brand.id, "brand", e.target.value)} placeholder="e.g. Shark Casino" style={{ ...inputStyle, width: "100%" }} /></div>
                  <div><label style={labelStyle}>Domain Name</label><input value={brand.domain || ""} onChange={e => updateBrand(brand.id, "domain", e.target.value)} placeholder="e.g. sharkcasino.com" style={{ ...inputStyle, width: "100%" }} /></div>
                </div>

                {/* Mirror Domains */}
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <label style={{ ...labelStyle, marginBottom: 0 }}>Mirror Domains</label>
                    <button onClick={() => addMirror(brand.id)} style={{ fontSize: 10, color: c.accent, background: `${c.accent}15`, border: `1px solid ${c.accent}40`, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontWeight: 600 }}>+ Add Mirror</button>
                  </div>
                  {(brand.mirrors || []).length === 0 && <div style={{ fontSize: 11, color: c.textMuted }}>No mirrors added</div>}
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {(brand.mirrors || []).map((m, mi) => (
                      <div key={mi} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                        <input value={m} onChange={e => updateMirror(brand.id, mi, e.target.value)} placeholder="mirror.com" style={{ ...inputStyle, width: 160 }} />
                        <button onClick={() => removeMirror(brand.id, mi)} style={{ background: "transparent", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 12, padding: "2px 4px" }}>✕</button>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Licenses — multi-select from Gaming Licenses entities */}
                <div>
                  <label style={labelStyle}>Licenses</label>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {gamingLicenseEntities.map(lic => {
                      const active = selectedLicenses.includes(lic);
                      return <button key={lic} onClick={() => toggleBrandLicense(brand.id, lic)} style={{ fontSize: 11, padding: "5px 12px", borderRadius: 6, cursor: "pointer", fontWeight: 600, border: active ? `1px solid ${c.accent}` : `1px solid ${c.border}`, background: active ? `${c.accent}20` : "transparent", color: active ? c.accent : c.textMuted, transition: "all 0.15s" }}>{lic}</button>;
                    })}
                  </div>
                </div>

                {/* Footer License — select one of the selected licenses */}
                <div>
                  <label style={labelStyle}>Footer License</label>
                  {selectedLicenses.length === 0 ? (
                    <div style={{ fontSize: 11, color: c.textMuted }}>Select licenses above first</div>
                  ) : (
                    <select value={brand.footerLicense || ""} onChange={e => updateBrand(brand.id, "footerLicense", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                      <option value="">— Select Footer License —</option>
                      {selectedLicenses.map(lic => <option key={lic} value={lic}>{lic}</option>)}
                    </select>
                  )}
                </div>

                {/* Payment Agent — select from Payment Agents */}
                <div>
                  <label style={labelStyle}>Payment Agent</label>
                  <select value={brand.paymentAgent || ""} onChange={e => updateBrand(brand.id, "paymentAgent", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                    <option value="">— Select Payment Agent —</option>
                    {paymentAgentEntities.map(pa => <option key={pa} value={pa}>{pa}</option>)}
                  </select>
                </div>

                {/* Payment Methods Active */}
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <label style={{ ...labelStyle, marginBottom: 0 }}>Payment Methods Active</label>
                    <button onClick={() => addPaymentMethod(brand.id)} style={{ fontSize: 10, color: c.accent, background: `${c.accent}15`, border: `1px solid ${c.accent}40`, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontWeight: 600 }}>+ Add</button>
                  </div>
                  {(brand.paymentMethods || []).length === 0 && <div style={{ fontSize: 11, color: c.textMuted }}>No payment methods added</div>}
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {(brand.paymentMethods || []).map((pm, pi) => (
                      <div key={pi} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                        <input value={pm} onChange={e => updatePaymentMethod(brand.id, pi, e.target.value)} placeholder="e.g. Visa, Crypto..." style={{ ...inputStyle, width: 150 }} />
                        <button onClick={() => removePaymentMethod(brand.id, pi)} style={{ background: "transparent", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 12, padding: "2px 4px" }}>✕</button>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Main Operations */}
                <div>
                  <label style={labelStyle}>Main Operations</label>
                  <input value={brand.mainOperations || ""} onChange={e => updateBrand(brand.id, "mainOperations", e.target.value)} placeholder="e.g. John Smith" style={{ ...inputStyle, width: "100%" }} />
                </div>
              </div>
            )}
          </div>
          );
        })}
      </div>
    </div>
    );
  };

  // ===== DAILY PROGRESS =====
  const renderDailyProgress = () => {
    const sorted = [...dailyProgress].sort((a, b) => b.date.localeCompare(a.date));
    return (
      <div>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 6px 0" }}>Daily Progress</h2>
        <p style={{ color: c.textSecondary, fontSize: 13, margin: "0 0 24px 0" }}>Track your daily signal task completion and call activity. KPIs coming soon.</p>
        {sorted.length === 0 ? (
          <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, padding: 40, textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>📊</div>
            <div style={{ fontSize: 14, color: c.textMuted }}>No daily progress recorded yet. Hit "Finish Day" on Signal Tasks to save your first day.</div>
          </div>
        ) : (
          <div>
            {/* Summary stats */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 24 }}>
              {[
                { label: "Days Tracked", value: sorted.length, color: c.accent },
                { label: "Total Tasks Completed", value: sorted.reduce((s, d) => s + d.tasksCompleted, 0), color: c.success },
                { label: "Total Calls", value: sorted.reduce((s, d) => s + d.callsHad, 0), color: c.warning },
              ].map((stat, i) => (
                <div key={i} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 20, textAlign: "center" }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: stat.color }}>{stat.value}</div>
                  <div style={{ fontSize: 11, color: c.textMuted, marginTop: 4, fontWeight: 600 }}>{stat.label}</div>
                </div>
              ))}
            </div>
            {/* Day-by-day list */}
            {sorted.map(day => {
              const pct = day.totalTasks > 0 ? Math.round((day.tasksCompleted / day.totalTasks) * 100) : 0;
              return (
                <div key={day.date} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: c.text }}>{new Date(day.date + "T00:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" })}</div>
                    <div style={{ display: "flex", gap: 12 }}>
                      <span style={{ fontSize: 12, color: c.accent }}>{day.callsHad} call{day.callsHad !== 1 ? "s" : ""}</span>
                      <span style={{ fontSize: 12, color: pct === 100 ? c.success : c.warning }}>{day.tasksCompleted}/{day.totalTasks} tasks ({pct}%)</span>
                    </div>
                  </div>
                  {/* Progress bar */}
                  <div style={{ height: 6, background: c.surface, borderRadius: 3, overflow: "hidden", marginBottom: 10 }}>
                    <div style={{ height: "100%", width: `${pct}%`, background: pct === 100 ? c.success : c.accent, borderRadius: 3, transition: "width 0.3s" }} />
                  </div>
                  {/* Task breakdown */}
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {day.tasks.map((t, i) => (
                      <span key={i} style={{ fontSize: 11, padding: "3px 8px", borderRadius: 4, background: t.completed ? c.successBg : c.dangerBg, color: t.completed ? c.success : c.danger, border: `1px solid ${t.completed ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)"}` }}>
                        {t.completed ? "✓" : "✗"} {t.name}
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // ===== NOTES =====
  const renderNotes = () => {
    const allNotes = [
      ...globalNotes,
      // Also include quick job notes
      ...quickJobs.filter(j => j.note).map(j => ({ id: `qjn-${j.id}`, title: j.text, text: j.note, cat: j.cat || "aviro", type: "quickjob", date: j.createdAt || new Date().toISOString(), savedAt: j.createdAt || new Date().toISOString() })),
    ].sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));

    const filteredNotes = notesFilter === "all" ? allNotes : notesFilter === "meeting" ? allNotes.filter(n => n.type === "meeting") : notesFilter === "quickjob" ? allNotes.filter(n => n.type === "quickjob") : notesFilter === "manual" ? allNotes.filter(n => n.type === "manual") : allNotes.filter(n => n.cat === notesFilter);

    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>Notes</h2>
          <span style={{ fontSize: 12, color: c.textMuted }}>{allNotes.length} note{allNotes.length !== 1 ? "s" : ""}</span>
        </div>
        <p style={{ color: c.textSecondary, fontSize: 13, margin: "0 0 16px 0" }}>All notes in one place — meeting notes, quick job notes, and manual entries. Ordered by date.</p>

        {/* New note form */}
        <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, marginBottom: 20 }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 10, alignItems: "center" }}>
            <span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600 }}>New Note:</span>
            <select value={newNoteCat} onChange={e => setNewNoteCat(e.target.value)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "4px 8px", fontSize: 11 }}>
              {Object.entries(CAL_COLORS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <textarea value={newNoteText} onChange={e => setNewNoteText(e.target.value)} rows={3} placeholder="Type a note..." style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "10px 12px", fontSize: 13, outline: "none", resize: "vertical", fontFamily: "inherit", boxSizing: "border-box", lineHeight: 1.6 }} />
          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8 }}>
            <button onClick={() => {
              if (!newNoteText.trim()) return;
              setGlobalNotes([...globalNotes, { id: `gn${Date.now()}`, title: newNoteText.trim().split("\n")[0].substring(0, 60), text: newNoteText.trim(), cat: newNoteCat, type: "manual", date: new Date().toISOString(), savedAt: new Date().toISOString() }]);
              setNewNoteText("");
            }} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 6, padding: "8px 20px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Save Note</button>
          </div>
        </div>

        {/* Filter tabs */}
        <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
          {[{ k: "all", l: "All" }, { k: "meeting", l: "Meeting" }, { k: "quickjob", l: "Quick Job" }, { k: "manual", l: "Manual" }, ...Object.entries(CAL_COLORS).map(([k, v]) => ({ k, l: v.label }))].map(f => (
            <button key={f.k} onClick={() => setNotesFilter(f.k)} style={{
              background: notesFilter === f.k ? c.accentBg : "transparent", border: `1px solid ${notesFilter === f.k ? c.accent : c.border}`,
              color: notesFilter === f.k ? c.accent : c.textSecondary, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600,
            }}>{f.l}</button>
          ))}
        </div>

        {/* Notes list */}
        {filteredNotes.length === 0 ? (
          <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 32, textAlign: "center" }}>
            <div style={{ color: c.textMuted, fontSize: 13 }}>No notes yet. Add meeting notes from the calendar, quick job notes, or write one above.</div>
          </div>
        ) : filteredNotes.map(note => {
          const cc = CAL_COLORS[note.cat] || CAL_COLORS.aviro;
          const isExp = expandedNoteId === note.id;
          const dateStr2 = new Date(note.savedAt).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
          const timeStr = new Date(note.savedAt).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
          return (
            <div key={note.id} onClick={() => setExpandedNoteId(isExp ? null : note.id)} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: "12px 16px", marginBottom: 6, cursor: "pointer", transition: "border-color 0.15s", borderLeftWidth: 3, borderLeftColor: cc.border }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
                  <span style={{ fontSize: 9, padding: "2px 6px", borderRadius: 3, background: cc.bg, color: cc.text, border: `1px solid ${cc.border}`, fontWeight: 700, flexShrink: 0 }}>{cc.label}</span>
                  <span style={{ fontSize: 9, padding: "2px 6px", borderRadius: 3, background: note.type === "meeting" ? c.accentBg : note.type === "quickjob" ? c.warningBg : c.surface, color: note.type === "meeting" ? c.accent : note.type === "quickjob" ? c.warning : c.textSecondary, fontWeight: 700, flexShrink: 0, textTransform: "uppercase" }}>{note.type}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: c.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{note.title}</span>
                </div>
                <span style={{ fontSize: 10, color: c.textMuted, flexShrink: 0, marginLeft: 8 }}>{dateStr2} {timeStr}</span>
              </div>
              {isExp && (
                <div onClick={e => e.stopPropagation()} style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${c.border}` }}>
                  <div style={{ fontSize: 13, color: c.text, whiteSpace: "pre-wrap", lineHeight: 1.7 }}>{note.text}</div>
                  {note.type === "manual" && (
                    <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 10 }}>
                      <button onClick={() => setGlobalNotes(globalNotes.filter(n => n.id !== note.id))} style={{ background: "transparent", border: `1px solid rgba(239,68,68,0.3)`, color: c.danger, borderRadius: 6, padding: "4px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Delete Note</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  const navItems = [
    { section: "david", label: "DAVID", isHeader: true },
    { section: "calendar", icon: "calendar", label: "David Calendar" },
    { section: "quickjobs", icon: "zap", label: "Quick Jobs" },
    { section: "signal", icon: "signal", label: "Signal Tasks" },
    { section: "sophie", icon: "delegate", label: "Sophie Tasks" },
    { section: "personal", icon: "list", label: "Personal Jobs" },
    { section: "notes", icon: "list", label: "Notes" },
    { section: "progress", icon: "signal", label: "Daily Progress" },
    { section: "gateway", label: "GATEWAY.IO", isHeader: true },
    { section: "clients", icon: "gateway", label: "Client Portal" },
    { section: "roadmap", icon: "roadmap", label: "Integration Roadmap" },
    { section: "corporate", label: "CORPORATE MATRIX", isHeader: true },
    { section: "entities", icon: "building", label: "Entity Matrix" },
    { section: "moneyflow", icon: "flow", label: "Money Flow" },
    { section: "banks", icon: "bank", label: "Bank Accounts" },
    { section: "brands", icon: "grid", label: "Gaming Brands" },
  ];

  const sections = { calendar: renderCalendar, quickjobs: renderQuickJobs, signal: renderSignal, sophie: renderSophie, personal: renderPersonalJobs, notes: renderNotes, progress: renderDailyProgress, clients: renderClients, roadmap: renderRoadmap, entities: renderEntities, moneyflow: renderMoneyFlow, banks: renderBanks, brands: renderBrands };

  return (
    <div style={{ display: "flex", height: "100vh", background: c.bg, fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: c.text, overflow: "hidden" }}>
      <div style={{ width: collapsed ? 60 : 220, background: c.surface, borderRight: `1px solid ${c.border}`, display: "flex", flexDirection: "column", transition: "width 0.2s", flexShrink: 0, overflow: "hidden" }}>
        <div style={{ padding: collapsed ? "20px 10px" : "20px 16px", borderBottom: `1px solid ${c.border}`, display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }} onClick={() => setCollapsed(!collapsed)}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #6366f1, #8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14, color: "#fff", flexShrink: 0 }}>A</div>
          {!collapsed && <div style={{ fontWeight: 700, fontSize: 14, color: c.text, whiteSpace: "nowrap" }}>AVIRO GROUP</div>}
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "8px 0" }}>
          {navItems.map((item, i) => {
            if (item.isHeader) {
              if (collapsed) return <div key={i} style={{ height: 1, background: c.border, margin: "8px 10px" }} />;
              return <div key={i} style={{ padding: "16px 16px 6px", fontSize: 10, fontWeight: 700, color: c.textMuted, letterSpacing: "0.1em" }}>{item.label}</div>;
            }
            const isAct = section === item.section;
            return (
              <div key={i} onClick={() => setSection(item.section)} style={{
                display: "flex", alignItems: "center", gap: 10, padding: collapsed ? "10px 18px" : "8px 16px", margin: "1px 6px", borderRadius: 6, cursor: "pointer",
                background: isAct ? c.accentBg : "transparent", color: isAct ? c.accent : c.textSecondary, fontSize: 13, fontWeight: isAct ? 600 : 400,
              }}
              onMouseEnter={e => { if (!isAct) e.currentTarget.style.background = c.surfaceHover; }}
              onMouseLeave={e => { if (!isAct) e.currentTarget.style.background = "transparent"; }}>
                <Icon type={item.icon} size={16} />
                {!collapsed && <span style={{ whiteSpace: "nowrap" }}>{item.label}</span>}
              </div>
            );
          })}
        </div>
        {!collapsed && (
          <div style={{ padding: 16, borderTop: `1px solid ${c.border}`, fontSize: 11, color: c.textMuted }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 8, height: 8, borderRadius: 4, background: c.success }} /> ClickUp Synced</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}><div style={{ width: 8, height: 8, borderRadius: 4, background: c.accent }} /> Gmail Connected</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}><div style={{ width: 8, height: 8, borderRadius: 4, background: dbConnected ? c.success : supabaseUrl ? c.warning : c.textMuted }} /> {dbConnected ? "Database Synced" : supabaseUrl ? "DB Not Connected" : "No Database"}</div>
          </div>
        )}
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: 32 }}>
        <div style={{ maxWidth: section === "signal" ? 1400 : 1100, margin: "0 auto" }}>{(sections[section] || renderCalendar)()}</div>
      </div>
      {copiedText && (
        <div style={{ position: "fixed", bottom: 24, right: 24, background: c.success, color: "#fff", padding: "10px 20px", borderRadius: 8, fontSize: 12, fontWeight: 600, boxShadow: "0 4px 12px rgba(0,0,0,0.3)", zIndex: 1000 }}>Copied to clipboard</div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AviroDashboard));
</script>
</body>
</html>
