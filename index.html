  return <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 4, background: p.bg, color: p.co, border: `1px solid ${p.bd}`, letterSpacing: "0.05em" }}>{p.l}</span>;

const StatusBadge = ({ status }) => {
  const isA = ["active", "completed", "successful"].includes(status?.toLowerCase());
  const isW = ["in progress", "in progress finishing", "integrating", "onboarding", "review", "sign off", "work in progress"].includes(status?.toLowerCase());
  const bg = isA ? c.successBg : isW ? c.warningBg : "rgba(107,114,128,0.1)";
  const co = isA ? c.success : isW ? c.warning : c.textSecondary;
  const bd = isA ? "rgba(34,197,94,0.3)" : isW ? "rgba(245,158,11,0.3)" : "rgba(107,114,128,0.3)";
  return <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: bg, color: co, border: `1px solid ${bd}`, textTransform: "uppercase", letterSpacing: "0.03em" }}>{status}</span>;
};

  return <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 6px", borderRadius: 3, background: s.bg, color: s.co }}>{s.l}</span>;
};

// Time zone helpers - GST is UTC+4, GMT is UTC+0, CET is UTC+1 (or +2 CEST in April)
const toGST = (h) => ((h + 4) % 24);
const toGMT = (h) => h;
const toCET = (h) => ((h + 2) % 24); // CEST in April
const fmt12 = (h) => { const hr = h % 12 || 12; const ap = h < 12 ? "am" : "pm"; return `${hr}${ap}`; };

// Motion API config — tries direct first, then CORS proxy fallback
const MOTION_API_KEY = "jBkDSv4Fbp4QAhD967RbP4tzu+XjucvfEaRSRir7/aw=";
const MOTION_API_BASE = "https://api.usemotion.com/v1";
const CORS_PROXIES = [
  (url) => url, // direct first
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];
let activeProxy = 0;
const motionFetch = async (endpoint, opts = {}) => {
  const url = `${MOTION_API_BASE}${endpoint}`;
  for (let i = activeProxy; i < CORS_PROXIES.length; i++) {
    try {
      const proxyUrl = CORS_PROXIES[i](url);
      const res = await fetch(proxyUrl, {
        ...opts,
        headers: { "X-API-Key": MOTION_API_KEY, "Content-Type": "application/json", ...(opts.headers || {}) },
      });
      if (res.ok || res.status < 500) { activeProxy = i; return res; }
    } catch (e) { continue; }
  }
  throw new Error("All Motion API attempts failed (CORS)");
};

      // Fetch workspaces first (needed for creating tasks later)
      try {
        const wsRes = await motionFetch("/workspaces");
        if (wsRes.ok) {
          const wsData = await wsRes.json();
          setMotionWorkspaces(wsData?.workspaces || wsData || []);
        }
      } catch (e) { /* workspaces optional */ }
      // Fetch tasks — paginate through all
      let allTasks = [];
      let cursor = null;
      for (let i = 0; i < 10; i++) {
        const url = cursor ? `/tasks?cursor=${cursor}` : "/tasks";
        const res = await motionFetch(url);
        if (!res.ok) {
          const errBody = await res.text().catch(() => "");
          throw new Error(`Motion API returned ${res.status}: ${errBody.slice(0, 200)}`);
        }
        const data = await res.json();
        allTasks = [...allTasks, ...(data.tasks || data || [])];
        cursor = data.meta?.nextCursor || data.nextCursor;
        if (!cursor) break;
      }
      setMotionTasks(allTasks);
      // Convert Motion tasks with scheduled times into calendar events
      const motionEvents = allTasks
        .filter(t => t.scheduledStart || t.dueDate)
        .map(t => {
          const start = t.scheduledStart ? new Date(t.scheduledStart) : new Date(t.dueDate);
          const end = t.scheduledEnd ? new Date(t.scheduledEnd) : new Date(start.getTime() + (t.duration || 30) * 60000);
          const dateStr = `${start.getFullYear()}-${String(start.getMonth() + 1).padStart(2, "0")}-${String(start.getDate()).padStart(2, "0")}`;
          const startHour = start.getUTCHours() + start.getUTCMinutes() / 60;
          const endHour = end.getUTCHours() + end.getUTCMinutes() / 60;
          return {
            id: `motion-${t.id}`, date: dateStr, startHour, endHour: endHour || startHour + 0.5,
            title: t.name, cat: "motion", meet: t.meetingUrl || null,
            attendees: (t.assignees || []).map(a => a.name).join(", "),
            location: t.location || "", notes: t.description || "",
            motionId: t.id, motionStatus: t.status?.name || t.status,
            priority: t.priority, isMotion: true,
          };
        });
      // Merge: keep existing non-motion events, add motion events
      setCalEvents(prev => {
        const nonMotion = prev.filter(e => !e.isMotion);
        return [...nonMotion, ...motionEvents];
      });
      setMotionSyncStatus("synced");
      setMotionLastSync(new Date());

      console.error("Motion sync error:", err);

  const getDocStatusGlobal = (doc) => {

    const issueStr = doc.issueDate || doc.expiry; // backward compat with old expiry field

    const issue = new Date(issueStr);

    const renewal = new Date(issue);
    renewal.setMonth(renewal.getMonth() + renewalMonths);
    if (doc.delayedUntil) renewal.setMonth(renewal.getMonth() + doc.delayedUntil);
    const now = new Date();
    const diffDays = (renewal - now) / (1000 * 60 * 60 * 24);

      saveAs(zipBlob, entityName.replace(/[^a-zA-Z0-9]/g, "_") + "_Document_Pack.zip");
    } catch (e) { alert("Download failed: " + e.message); }
    setPackDownloading(false);
  };

  const dateStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const selDateStr = dateStr(selectedDate);

  // Generate recurring event instances for the selected date
  const selectedDayOfWeek = selectedDate.getDay(); // 0=Sun, 1=Mon, ...
  const recurringToday = recurringEvents
    .filter(r => r.day === selectedDayOfWeek)
    .map(r => ({
      id: `${r.id}-${selDateStr}`, date: selDateStr, startHour: r.startHour, endHour: r.endHour,
      title: r.title, cat: r.cat, meet: r.meet, attendees: r.attendees, notes: "",
      isRecurring: true, recurringId: r.id,
    }));

  // Merge one-off events with recurring (avoid duplicates by title match on same day)
  const oneOffToday = calEvents.filter(e => e.date === selDateStr);
  const recurringFiltered = recurringToday.filter(r => !oneOffToday.some(o => o.title === r.title));
  const todayEvents = [...oneOffToday, ...recurringFiltered].sort((a,b) => a.startHour - b.startHour);

  const copyToClipboard = (text) => { navigator.clipboard?.writeText(text); setCopiedText(text); setTimeout(() => setCopiedText(null), 2000); };

  // Parse "HH:MM" to decimal hour
  const parseTime = (t) => { const [h, m] = (t || "09:00").split(":").map(Number); return h + (m || 0) / 60; };
  const fmtTime = (h) => { const hr = Math.floor(h); const mn = Math.round((h - hr) * 60); return `${String(hr).padStart(2,"0")}:${String(mn).padStart(2,"0")}`; };

  const addCalEvent = () => {
    if (!newEventForm.title.trim()) return;
    const startH = parseTime(newEventForm.startTime);
    const endH = parseTime(newEventForm.endTime);
    const meetLink = newEventForm.createMeet ? `meet.google.com/aviro-${Date.now().toString(36)}` : null;
    setCalEvents([...calEvents, {
      id: `e${Date.now()}`, date: selDateStr, startHour: startH, endHour: endH,
      title: newEventForm.title, cat: newEventForm.cat, meet: meetLink,
      attendees: newEventForm.attendees, location: newEventForm.location, notes: "",
    }]);
    if (newEventForm.createMeet || newEventForm.emailInvite) {
      setMeetingCreated({ title: newEventForm.title, meet: meetLink, emails: newEventForm.attendeeEmails, date: selDateStr, start: newEventForm.startTime, end: newEventForm.endTime });
    }
    setNewEventForm({ title: "", startTime: "09:00", endTime: "10:00", cat: "aviro", attendees: "", location: "", createMeet: false, emailInvite: false, attendeeEmails: "" });
    setShowAddEvent(false);
  };

  const saveNote = (eventId) => {
    const ev = [...calEvents, ...recurringEvents.map(r => ({ ...r, id: `${r.id}-note` }))].find(e => e.id === eventId) || {};
    const savedAt = new Date().toISOString();
    setCalNotes([...calNotes.filter(n => n.eventId !== eventId), { eventId, text: noteText, savedAt }]);
    // Auto-save to global notes
    const existingGlobal = globalNotes.find(n => n.sourceId === eventId);
    if (existingGlobal) {
      setGlobalNotes(globalNotes.map(n => n.sourceId === eventId ? { ...n, text: noteText, savedAt } : n));
    } else {
      setGlobalNotes([...globalNotes, { id: `gn${Date.now()}`, title: ev.title || "Meeting Note", text: noteText, cat: ev.cat || "aviro", type: "meeting", sourceId: eventId, date: ev.date || selDateStr, savedAt }]);
    }
    setEditingNote(null);
    setNoteText("");
  };

  const addDayBanner = () => {
    if (!newBanner.text.trim()) return;
    setDayBanners([...dayBanners, { id: `b${Date.now()}`, ...newBanner, startDate: newBanner.startDate || selDateStr, endDate: newBanner.endDate || selDateStr }]);
    setNewBanner({ text: "", startDate: "", endDate: "", color: "#f59e0b" });
    setShowAddBanner(false);
  };

  const handleDrop = (targetHour) => {
    // Handle drop of unscheduled items / quick jobs onto timeline
    if (draggingUnscheduled) {
      const du = draggingUnscheduled;
      const newStart = targetHour;
      const newEnd = targetHour + 0.5; // default 30 min
      setCalEvents([...calEvents, { id: `e${Date.now()}`, date: selDateStr, startHour: newStart, endHour: newEnd, title: du.text, cat: du.cat || "aviro", meet: null, attendees: "", location: "", notes: "" }]);
      // Remove from source
      if (du.source === "unscheduled") {
        setUnscheduledItems(unscheduledItems.filter(u => u.id !== du.id));
      } else if (du.source === "quickjob") {
        setQuickJobs(quickJobs.map(j => j.id === du.jobId ? { ...j, onCalendar: false } : j));
      }
      setDraggingUnscheduled(null);
      setDragOverHour(null);
      return;
    }
    // Handle existing calendar event drag (reorder)
    if (!draggingEvent) return;
    const ev = todayEvents.find(e => e.id === draggingEvent);
    if (!ev) { setDraggingEvent(null); setDragOverHour(null); return; }
    const duration = ev.endHour - ev.startHour;
    const newStart = targetHour;
    const newEnd = targetHour + duration;
    if (ev.isRecurring) {
      setCalEvents([...calEvents, { ...ev, id: `e${Date.now()}`, date: selDateStr, startHour: newStart, endHour: newEnd, isRecurring: false }]);
    } else {
      setCalEvents(calEvents.map(e => e.id === ev.id ? { ...e, startHour: newStart, endHour: newEnd } : e));
    }
    setDraggingEvent(null);
    setDragOverHour(null);
  };

  const todayBanners = dayBanners.filter(b => selDateStr >= b.startDate && selDateStr <= b.endDate);

  // Helper: get events for any date string
  const getEventsForDate = (ds) => {
    const d = new Date(ds + "T00:00:00");
    const dow = d.getDay();
    const oneOff = calEvents.filter(e => e.date === ds);
    const recur = recurringEvents.filter(r => r.day === dow).map(r => ({
      id: `${r.id}-${ds}`, date: ds, startHour: r.startHour, endHour: r.endHour,
      title: r.title, cat: r.cat, meet: r.meet, attendees: r.attendees, notes: "",
      isRecurring: true, recurringId: r.id,
    })).filter(r => !oneOff.some(o => o.title === r.title));
    return [...oneOff, ...recur].sort((a, b) => a.startHour - b.startHour);
  };

  // Week view helpers
  const getWeekDates = () => {
    const d = new Date(selectedDate);
    const day = d.getDay(); // 0=Sun
    const monday = new Date(d);
    monday.setDate(d.getDate() - ((day + 6) % 7)); // get Monday
    return Array.from({ length: 7 }, (_, i) => {
      const dt = new Date(monday);
      dt.setDate(monday.getDate() + i);
      return dt;
    });
  };

  const signalTasks = [
    ...CLICKUP_DAVID_TASKS.filter(t => t.priority === "urgent" || t.priority === "high" || (t.dueDate && t.dueDate <= "2026-04-15")).map(t => ({ ...t, source: "clickup" })),
    ...quickJobs.filter(j => j.inSignal && !j.done).map(j => ({ id: j.id, name: j.text, priority: "normal", status: "quick job", source: "quickjob" })),
  ];

  // Compute doc alerts from user-added documents (entityDocs), not hardcoded placeholders
  const allDocAlerts = [];
  Object.entries(CORPORATE_ENTITIES).forEach(([cat, entities]) => {
    entities.forEach(e => {
      const docs = entityDocs[e.name] || [];
      docs.forEach(d => {
        const status = getDocStatusGlobal(d);
        if (status === "expired" || status === "expiring" || status === "review_soon") {
          allDocAlerts.push({ entity: e.name, category: cat, doc: d.name, renewalDate: getDocRenewalDate(d) || "No date", status });
        }
      });
    });
  });

  // Bank accounts are now managed centrally via bankRelationships + bankAccountsList state

  const HOURS = Array.from({ length: 24 }, (_, i) => i); // 0-23 (midnight to midnight)
  const scrollRef = useRef(null);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 3 * 52; }, [selDateStr, calSubSection]); // scroll to 3am GMT = 7am GST

  // Live clock - ticks every 30 seconds, uses proper UTC-based timezone math
  const [liveNow, setLiveNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setLiveNow(Date.now()), 30000); return () => clearInterval(t); }, []);
  const liveTimeForZone = (offsetHours) => {
    const now = new Date(liveNow);
    const utcH = now.getUTCHours();
    const utcM = now.getUTCMinutes();
    let h = (utcH + offsetHours) % 24;
    if (h < 0) h += 24;
    const ap = h < 12 ? "am" : "pm";
    const hr12 = h % 12 || 12;
    return `${hr12}:${String(utcM).padStart(2, "0")}${ap}`;
  };

  // ===== CALENDAR =====
  const renderCalendar = () => {
    const year = selectedDate.getFullYear(), month = selectedDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay();
    const today = (() => { const n = new Date(); return n.getFullYear() + "-" + String(n.getMonth()+1).padStart(2,"0") + "-" + String(n.getDate()).padStart(2,"0"); })();
    const days = [];
    for (let i = 0; i < firstDay; i++) days.push(null);
    for (let i = 1; i <= daysInMonth; i++) days.push(i);
    const monthStr = selectedDate.toLocaleString("default", { month: "long", year: "numeric" });
    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>

            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>David Calendar</h2>
            <button onClick={syncMotion} style={{ display: "flex", alignItems: "center", gap: 6, background: motionSyncStatus === "synced" ? "rgba(6,182,212,0.1)" : motionSyncStatus === "error" ? "rgba(239,68,68,0.1)" : "transparent", border: `1px solid ${motionSyncStatus === "synced" ? "rgba(6,182,212,0.4)" : motionSyncStatus === "error" ? "rgba(239,68,68,0.4)" : c.border}`, color: motionSyncStatus === "synced" ? "#06b6d4" : motionSyncStatus === "error" ? "#ef4444" : c.textMuted, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>
              <div style={{ width: 6, height: 6, borderRadius: 3, background: motionSyncStatus === "syncing" ? "#eab308" : motionSyncStatus === "synced" ? "#06b6d4" : motionSyncStatus === "error" ? "#ef4444" : c.textMuted, animation: motionSyncStatus === "syncing" ? "pulse 1s infinite" : "none" }} />
              {motionSyncStatus === "syncing" ? "Syncing Motion..." : motionSyncStatus === "synced" ? `Motion Synced • ${motionTasks.length} tasks${motionLastSync ? " • " + motionLastSync.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : ""}` : motionSyncStatus === "error" ? "Motion Error — Click to Retry" : "Sync Motion"}
            </button>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {[{ k: "day", l: "Day View" }, { k: "week", l: "Week View" }, { k: "recurring", l: "Recurring" }, { k: "notes", l: "Meeting Notes" }].map(t => (
              <button key={t.k} onClick={() => setCalSubSection(t.k)} style={{
                background: calSubSection === t.k ? c.accentBg : "transparent", border: `1px solid ${calSubSection === t.k ? c.accent : c.border}`,
                color: calSubSection === t.k ? c.accent : c.textSecondary, borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600,
              }}>{t.l}</button>
            ))}
          </div>
        </div>

        {/* Mini calendar nav + timezone header */}
        <div style={{ display: "grid", gridTemplateColumns: "260px 1fr", gap: 20, marginBottom: 20 }}>
          {/* Mini calendar */}
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <button onClick={() => setSelectedDate(new Date(year, month - 1, 1))} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 4, padding: "4px 8px", cursor: "pointer", fontSize: 12 }}>&lt;</button>
              <span style={{ fontWeight: 700, color: c.text, fontSize: 13 }}>{monthStr}</span>
              <button onClick={() => setSelectedDate(new Date(year, month + 1, 1))} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 4, padding: "4px 8px", cursor: "pointer", fontSize: 12 }}>&gt;</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 1, textAlign: "center" }}>
              {dayNames.map(d => <div key={d} style={{ padding: 4, fontSize: 10, color: c.textMuted, fontWeight: 600 }}>{d}</div>)}
              {days.map((d, i) => {
                if (!d) return <div key={`e${i}`} />;
                const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                const hasEv = calEvents.some(e => e.date === ds);
                const isToday = ds === today;
                const isSel = ds === selDateStr;
                return (
                  <div key={d} onClick={() => setSelectedDate(new Date(year, month, d))} style={{
                    padding: 5, borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: isToday ? 700 : 400,
                    background: isSel ? c.accent : isToday ? c.accentBg : "transparent",
                    color: isSel ? c.white : isToday ? c.accent : c.text,
                  }}>
                    {d}
                    {hasEv && <div style={{ width: 3, height: 3, borderRadius: 2, background: isSel ? c.white : c.accent, margin: "1px auto 0" }} />}
                  </div>
                );
              })}
            </div>
            {/* Color legend */}
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${c.border}` }}>
              {Object.entries(CAL_COLORS).map(([k, v]) => (
                <div key={k} style={{ display: "flex", alignItems: "center", gap: 6, padding: "2px 0" }}>
                  <div style={{ width: 10, height: 10, borderRadius: 3, background: v.bg, border: `1px solid ${v.border}` }} />
                  <span style={{ fontSize: 10, color: c.textSecondary }}>{v.label}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Day header */}
          <div>
            <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 16, marginBottom: 12 }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: c.text, marginBottom: 4 }}>
                {selectedDate.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
              </div>
              {/* Timezone bar */}
              <div style={{ display: "flex", gap: 20, marginTop: 8, alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 10, color: c.textMuted, fontWeight: 600 }}>Primary:</span>
                  <select value={primaryTZ} onChange={e => setPrimaryTZ(e.target.value)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "3px 8px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                    <option value="GST">GST (Dubai, UTC+4)</option>
                    <option value="BST">BST (London, UTC+1)</option>
                    <option value="CEST">CEST (Europe, UTC+2)</option>
                  </select>
                </div>
                {[
                  { key: "GST", label: "GST (Dubai)", time: liveTimeForZone(4), color: "#f59e0b" },
                  { key: "BST", label: "BST (London)", time: liveTimeForZone(1), color: "#3b82f6" },
                  { key: "CEST", label: "CEST (Europe)", time: liveTimeForZone(2), color: "#22c55e" },
                ].map(tz => (
                  <div key={tz.label} style={{ display: "flex", alignItems: "center", gap: 6, opacity: tz.key === primaryTZ ? 1 : 0.6, padding: "3px 8px", borderRadius: 6, background: tz.key === primaryTZ ? `${tz.color}18` : "transparent", border: tz.key === primaryTZ ? `1px solid ${tz.color}40` : "1px solid transparent" }}>
                    <div style={{ width: 8, height: 8, borderRadius: 4, background: tz.color }} />
                    <span style={{ fontSize: 11, color: c.textSecondary }}>{tz.label}</span>
                    <span style={{ fontSize: 11, fontWeight: 700, color: c.text }}>{tz.time}</span>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 8, fontSize: 12, color: c.textSecondary }}>
                {todayEvents.length} event{todayEvents.length !== 1 ? "s" : ""} scheduled
              </div>
            </div>

            {/* Unscheduled items */}
            <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 16 }}>
              <h3 style={{ fontSize: 12, fontWeight: 700, color: c.textSecondary, margin: "0 0 8px 0", textTransform: "uppercase", letterSpacing: "0.05em" }}>Unscheduled Calls & Items</h3>
              {unscheduledItems.map(item => (
                <div key={item.id}>
                  <div draggable
                    onDragStart={e => { setDraggingUnscheduled({ id: item.id, text: item.text, source: "unscheduled", cat: "aviro" }); e.dataTransfer.effectAllowed = "move"; }}
                    onDragEnd={() => { setDraggingUnscheduled(null); setDragOverHour(null); }}
                    style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: schedulingItem?.id === item.id ? "none" : `1px solid ${c.border}`, cursor: "grab" }}>
                    <span style={{ fontSize: 10, color: c.textMuted, cursor: "grab" }}>⠿</span>
                    <span style={{ fontSize: 12, color: item.type === "call" ? c.accent : c.warning }}>{item.type === "call" ? "CALL" : "TODO"}</span>
                    <span style={{ fontSize: 12, color: c.text, flex: 1 }}>{item.text}</span>
                    <button onClick={() => setSchedulingItem(schedulingItem?.id === item.id ? null : { id: item.id, text: item.text, source: "unscheduled", cat: "aviro", startTime: "09:00", endTime: "09:30" })} style={{ background: schedulingItem?.id === item.id ? c.accentBg : "transparent", border: `1px solid ${schedulingItem?.id === item.id ? c.accent : c.border}`, color: schedulingItem?.id === item.id ? c.accent : c.textMuted, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Schedule</button>
                    <button onClick={() => setUnscheduledItems(unscheduledItems.filter(u => u.id !== item.id))} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer" }}><Icon type="trash" size={12} /></button>
                  </div>

                        <label style={{ fontSize: 10, color: c.textMuted, fontWeight: 600 }}>From</label>
                        <input type="time" value={schedulingItem.startTime} onChange={e => setSchedulingItem({ ...schedulingItem, startTime: e.target.value })} style={{ background: c.card, border: `1px solid ${c.border}`, color: c.text, borderRadius: 4, padding: "3px 6px", fontSize: 11 }} />
                        <label style={{ fontSize: 10, color: c.textMuted, fontWeight: 600 }}>To</label>
                        <input type="time" value={schedulingItem.endTime} onChange={e => setSchedulingItem({ ...schedulingItem, endTime: e.target.value })} style={{ background: c.card, border: `1px solid ${c.border}`, color: c.text, borderRadius: 4, padding: "3px 6px", fontSize: 11 }} />
                        <select value={schedulingItem.cat} onChange={e => setSchedulingItem({ ...schedulingItem, cat: e.target.value })} style={{ background: c.card, border: `1px solid ${c.border}`, color: c.text, borderRadius: 4, padding: "3px 6px", fontSize: 10 }}>

                        </select>
                        <button onClick={() => { const startH = parseTime(schedulingItem.startTime); const endH = parseTime(schedulingItem.endTime); setCalEvents([...calEvents, { id: `e${Date.now()}`, date: selDateStr, startHour: startH, endHour: endH, title: schedulingItem.text, cat: schedulingItem.cat, meet: null, attendees: "", location: "", notes: "" }]); setUnscheduledItems(unscheduledItems.filter(u => u.id !== item.id)); setSchedulingItem(null); }} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 4, padding: "3px 12px", cursor: "pointer", fontSize: 10, fontWeight: 700 }}>Add to Calendar</button>
                        <button onClick={() => { const dur = Math.round((parseTime(schedulingItem.endTime) - parseTime(schedulingItem.startTime)) * 60) || 30; createMotionTask(schedulingItem.text, `${selDateStr}T${schedulingItem.startTime}:00`, dur); setUnscheduledItems(unscheduledItems.filter(u => u.id !== item.id)); setSchedulingItem(null); }} style={{ background: "rgba(6,182,212,0.15)", border: "1px solid rgba(6,182,212,0.5)", color: "#06b6d4", borderRadius: 4, padding: "3px 12px", cursor: "pointer", fontSize: 10, fontWeight: 700 }}>Add to Motion</button>
                        <button onClick={() => setSchedulingItem(null)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 10 }}>Cancel</button>
                      </div>
                    </div>

                </div>
              ))}

                const schId = `qj-${job.id}`;
                return (
                <div key={`qjcal-${job.id}`}>
                  <div draggable
                    onDragStart={e => { setDraggingUnscheduled({ id: schId, text: job.text, source: "quickjob", jobId: job.id, cat: job.cat || "aviro" }); e.dataTransfer.effectAllowed = "move"; }}
                    onDragEnd={() => { setDraggingUnscheduled(null); setDragOverHour(null); }}
                    style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: schedulingItem?.id === schId ? "none" : `1px solid ${c.border}`, cursor: "grab" }}>
                    <span style={{ fontSize: 10, color: c.textMuted, cursor: "grab" }}>⠿</span>
                    <span style={{ fontSize: 10, fontWeight: 700, color: cc.bg, background: `${cc.bg}22`, border: `1px solid ${cc.bg}44`, borderRadius: 3, padding: "1px 5px" }}>{cc.label.toUpperCase()}</span>
                    <span style={{ fontSize: 12, color: c.text, flex: 1 }}>{job.text}</span>
                    <button onClick={() => setSchedulingItem(schedulingItem?.id === schId ? null : { id: schId, text: job.text, source: "quickjob", jobId: job.id, cat: job.cat || "aviro", startTime: "09:00", endTime: "09:30" })} style={{ background: schedulingItem?.id === schId ? c.accentBg : "transparent", border: `1px solid ${schedulingItem?.id === schId ? c.accent : c.border}`, color: schedulingItem?.id === schId ? c.accent : c.textMuted, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Schedule</button>
                    <button onClick={() => setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, onCalendar: false } : j))} title="Remove from calendar" style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer" }}><Icon type="trash" size={12} /></button>
                  </div>
                  {schedulingItem?.id === schId && (
                    <div style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 8, padding: 10, marginBottom: 6, marginTop: 4 }}>

              Take Back
            </button>
          </div>
          );
        })
      ) : (
        /* Regular jobs list */
        filtered.map(job => {
          const cc = CAL_COLORS[job.cat] || CAL_COLORS.aviro;
          return (
          <div key={job.id} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 8, padding: "10px 14px", marginBottom: 4 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <input type="checkbox" checked={job.done} onChange={() => setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, done: !j.done } : j))} style={{ accentColor: c.accent, width: 16, height: 16, flexShrink: 0 }} />
              <div style={{ width: 10, height: 10, borderRadius: 3, background: cc.bg, border: `1px solid ${cc.border}`, flexShrink: 0 }} title={cc.label} />
              <span style={{ flex: 1, fontSize: 13, color: job.done ? c.textMuted : c.text, textDecoration: job.done ? "line-through" : "none" }}>{job.text}</span>
              {/* Category selector */}
              <select value={job.cat || "aviro"} onChange={e => setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, cat: e.target.value } : j))} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 4, padding: "2px 4px", fontSize: 9, width: 70 }}>
                {Object.entries(CAL_COLORS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
              <button onClick={() => setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, onCalendar: !j.onCalendar } : j))} style={{ background: job.onCalendar ? "rgba(234,179,8,0.15)" : "transparent", border: `1px solid ${job.onCalendar ? "rgba(234,179,8,0.5)" : c.border}`, color: job.onCalendar ? "#eab308" : c.textMuted, borderRadius: 6, padding: "3px 8px", cursor: "pointer", fontSize: 9, fontWeight: 600 }}>
                {job.onCalendar ? "CAL" : "+ CAL"}
              </button>
              <button onClick={() => setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, inSignal: !j.inSignal } : j))} style={{ background: job.inSignal ? c.accentBg : "transparent", border: `1px solid ${job.inSignal ? c.accent : c.border}`, color: job.inSignal ? c.accent : c.textMuted, borderRadius: 6, padding: "3px 8px", cursor: "pointer", fontSize: 9, fontWeight: 600 }}>
                {job.inSignal ? "SIGNAL" : "+ SIGNAL"}
              </button>
              <button onClick={() => { setDelegatedTasks([...delegatedTasks, { ...job, delegatedAt: new Date().toISOString() }]); setQuickJobs(quickJobs.filter(j => j.id !== job.id)); }} title="Delegate to Sophie" style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 6, padding: "3px 6px", cursor: "pointer", fontSize: 9 }}>
                <Icon type="delegate" size={12} />
              </button>
              <button onClick={() => { setEditingQJNote(editingQJNote === job.id ? null : job.id); setQjNoteText(job.note || ""); }} style={{ background: job.note ? c.successBg : "transparent", border: `1px solid ${job.note ? "rgba(34,197,94,0.3)" : c.border}`, color: job.note ? c.success : c.textMuted, borderRadius: 6, padding: "3px 6px", cursor: "pointer", fontSize: 9, fontWeight: 600 }}>
                {job.note ? "NOTE" : "+ NOTE"}
              </button>
              <button onClick={() => setQuickJobs(quickJobs.filter(j => j.id !== job.id))} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer" }}><Icon type="trash" size={13} /></button>
            </div>
            {/* Note editor */}
            {editingQJNote === job.id && (
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${c.border}` }}>
                <textarea value={qjNoteText} onChange={e => setQjNoteText(e.target.value)} rows={2} placeholder="Add a note..." style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "8px 10px", fontSize: 12, outline: "none", resize: "vertical", fontFamily: "inherit", boxSizing: "border-box" }} />
                <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                  <button onClick={() => { setQuickJobs(quickJobs.map(j => j.id === job.id ? { ...j, note: qjNoteText } : j)); setEditingQJNote(null); }} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Save</button>
                  <button onClick={() => setEditingQJNote(null)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11 }}>Cancel</button>
                </div>
              </div>
            )}
          </div>
          );
        })
      )}
    </div>
    );
  };

  // ===== SIGNAL TASKS =====
  // All ClickUp tasks (for left panel)
  const allClickUpTasks = CLICKUP_DAVID_TASKS.filter(t => t.status !== "completed").map(t => ({ ...t, source: "clickup" }));
  const quickJobSignal = quickJobs.filter(j => j.inSignal && !j.done).map(j => ({ id: j.id, name: j.text, priority: "normal", status: "quick job", source: "quickjob", space: CAL_COLORS[j.cat]?.label || "Aviro", dueDate: null, url: null }));

  // Auto-add quick jobs marked as signal
  useEffect(() => {
    quickJobSignal.forEach(qj => {
      const alreadyInSlot = signalSlots.some(s => s && s.id === qj.id);
      if (!alreadyInSlot) {
        const emptyIdx = signalSlots.findIndex(s => s === null);
        if (emptyIdx !== -1) {
          const newSlots = [...signalSlots];
          newSlots[emptyIdx] = { ...qj, completed: false };
          setSignalSlots(newSlots);
        }
      }
    });
  }, [quickJobs]);

  const sortedClickUp = [...allClickUpTasks].sort((a, b) => {
    if (signalTaskFilter === "priority") {
      const pOrder = { urgent: 0, high: 1, normal: 2, low: 3 };
      return (pOrder[a.priority] ?? 3) - (pOrder[b.priority] ?? 3);
    }
    if (signalTaskFilter === "dueDate") return (a.dueDate || "9999") < (b.dueDate || "9999") ? -1 : 1;
    return (a.space || "").localeCompare(b.space || "");
  });

  const spaces = [...new Set(allClickUpTasks.map(t => t.space))].sort();
  const filteredClickUp = signalSpaceFilter === "all" ? sortedClickUp : sortedClickUp.filter(t => t.space === signalSpaceFilter);

  // Count today's calendar events
  const todayCallCount = todayEvents.filter(e => e.meet || e.attendees).length;

  // Completed signal tasks (stay until marked done on ClickUp)
  const [signalDone, setSignalDone] = useState([]); // { ...task, note, completedAt, clickupDone }
  const [confirmClickUp, setConfirmClickUp] = useState(null); // task id awaiting ClickUp confirm

  const completeSignalSlot = (idx, note) => {
    const task = signalSlots[idx];
    if (!task) return;
    const completedNote = note || signalSlotNotes[idx] || "";
    // Move to completed list
    setSignalDone(prev => [...prev, { ...task, completed: true, note: completedNote, completedAt: new Date().toISOString(), clickupDone: false }]);
    // If quick job, tick it off on quick jobs
    if (task.source === "quickjob") {
      setQuickJobs(prev => prev.map(j => j.id === task.id ? { ...j, done: true, inSignal: false } : j));
    }
    // Save note to global notes
    if (completedNote.trim()) {
      setGlobalNotes(prev => [...prev, { id: `gn${Date.now()}`, title: `Signal: ${task.name}`, text: completedNote, cat: "aviro", type: "meeting", date: selDateStr, savedAt: new Date().toISOString() }]);
    }
    // Remove from slot and compact
    const newSlots = [...signalSlots];
    newSlots[idx] = null;
    const compacted = newSlots.filter(s => s !== null);
    while (compacted.length < 6) compacted.push(null);
    setSignalSlots(compacted);
    // Clean up notes
    setSignalSlotNotes(prev => { const n = {}; Object.keys(prev).forEach(k => { if (parseInt(k) !== idx) n[parseInt(k) > idx ? parseInt(k) - 1 : k] = prev[k]; }); return n; });
    // If ClickUp task, prompt to mark done there too
    if (task.source === "clickup") setConfirmClickUp(task.id);
  };

  const markClickUpDone = (taskId) => {
    setSignalDone(prev => prev.map(t => t.id === taskId ? { ...t, clickupDone: true } : t));
    setConfirmClickUp(null);
  };

  const finishDay = () => {
    const slotsUsed = signalSlots.filter(s => s !== null);
    const completedCount = signalDone.length;
    const totalTasks = slotsUsed.length + completedCount;
    // Save daily progress
    setDailyProgress(prev => [...prev, {
      date: selDateStr,
      tasksCompleted: completedCount,
      totalTasks,
      callsHad: todayCallCount,
      tasks: [...signalDone.map(s => ({ name: s.name, completed: true })), ...slotsUsed.map(s => ({ name: s.name, completed: false }))],
      savedAt: new Date().toISOString(),
    }]);
    // Roll incomplete slots to tomorrow
    const remaining = slotsUsed.map(s => ({ ...s, completed: false }));
    const newSlots = [...remaining];
    while (newSlots.length < 6) newSlots.push(null);
    setSignalSlots(newSlots);
    setSignalSlotNotes({});
    // Clear completed (ClickUp-done ones leave, others stay for reference)
    setSignalDone(prev => prev.filter(t => t.source === "clickup" && !t.clickupDone));
    setSignalDayStarted(false);
    setSignalDayFinished(true);
  };

  const startDay = () => {
    setSignalDayStarted(true);
    setSignalDayFinished(false);
  };

  // Auto-finish at 5am GST (1am UTC) each day
  useEffect(() => {
    const checkAutoFinish = () => {
      const now = new Date();
      const utcH = now.getUTCHours();
      const utcM = now.getUTCMinutes();
      if (utcH === 1 && utcM === 0 && signalDayStarted) finishDay();
    };
    const t = setInterval(checkAutoFinish, 60000);
    return () => clearInterval(t);
  }, [signalDayStarted]);

  const renderSignal = () => (
    <div style={{ maxWidth: "none" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 4px 0" }}>Signal Tasks</h2>
          <p style={{ color: c.textSecondary, fontSize: 12, margin: 0 }}>Drag tasks from the right into your daily signal list. Max 6 focused tasks per day.</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {!signalDayStarted ? (
            <button onClick={startDay} style={{ background: c.success, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
              <Icon type="zap" size={14} /> Start Day
            </button>
          ) : (
            <button onClick={finishDay} style={{ background: c.danger, border: "none", color: "#fff", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
              <Icon type="check" size={14} /> Finish Day
            </button>
          )}
        </div>
      </div>

      {/* ClickUp confirm modal */}
      {confirmClickUp && (
        <div style={{ background: c.accentBg, border: `1px solid ${c.accent}`, borderRadius: 10, padding: 16, marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 13, color: c.text }}>Mark this task as completed on ClickUp too?</span>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => markClickUpDone(confirmClickUp)} style={{ background: c.success, border: "none", color: "#fff", borderRadius: 6, padding: "6px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Yes, Complete on ClickUp</button>
            <button onClick={() => setConfirmClickUp(null)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 6, padding: "6px 16px", cursor: "pointer", fontSize: 12 }}>Not Yet</button>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        {/* LEFT: Today's Signal List */}
        <div>
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, overflow: "hidden" }}>
            {/* Day header */}
            <div style={{ padding: "16px 20px", borderBottom: `1px solid ${c.border}`, background: signalDayStarted ? "rgba(34,197,94,0.05)" : c.surface }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: c.text }}>
                {selectedDate.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
              </div>
              <div style={{ display: "flex", gap: 16, marginTop: 8 }}>
                <div style={{ fontSize: 12, color: c.textSecondary }}>
                  <span style={{ fontWeight: 700, color: c.accent, fontSize: 18 }}>{todayCallCount}</span> call{todayCallCount !== 1 ? "s" : ""} today
                </div>
                <div style={{ fontSize: 12, color: c.textSecondary }}>
                  <span style={{ fontWeight: 700, color: c.success, fontSize: 18 }}>{signalDone.length}</span>/{signalSlots.filter(s => s !== null).length + signalDone.length} done
                </div>
              </div>
              {signalDayStarted && <div style={{ marginTop: 6, fontSize: 11, color: c.success, fontWeight: 600 }}>Day in progress — auto-finishes 5am GST</div>}
              {signalDayFinished && <div style={{ marginTop: 6, fontSize: 11, color: c.accent, fontWeight: 600 }}>Day complete — progress saved</div>}
            </div>

            {/* 6 Signal Slots */}
            <div style={{ padding: 12 }}>
              {signalSlots.map((slot, idx) => (
                <div key={idx}
                  onDragOver={e => { if (draggingSignalTask && !slot) { e.preventDefault(); e.currentTarget.style.background = "rgba(99,102,241,0.1)"; }}}
                  onDragLeave={e => { e.currentTarget.style.background = "transparent"; }}
                  onDrop={e => {
                    e.preventDefault(); e.currentTarget.style.background = "transparent";
                    if (draggingSignalTask && !slot) {
                      const newSlots = [...signalSlots];
                      newSlots[idx] = { ...draggingSignalTask, completed: false };
                      setSignalSlots(newSlots);
                      setDraggingSignalTask(null);
                    }
                  }}
                  style={{
                    display: "flex", flexDirection: "column", minHeight: slot ? "auto" : 56, borderRadius: 8, marginBottom: 6,
                    border: slot ? `1px solid ${slot.priority === "urgent" ? "rgba(239,68,68,0.3)" : c.border}` : `2px dashed ${c.border}`,
                    background: "transparent",
                    transition: "background 0.15s",
                  }}>
                  {slot ? (
                    <div style={{ padding: "10px 14px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontSize: 16, fontWeight: 800, color: c.accent, minWidth: 22 }}>{idx + 1}</span>
                        <button onClick={() => completeSignalSlot(idx)} title="Mark complete" style={{
                          width: 24, height: 24, borderRadius: 6, border: `2px solid ${c.border}`,
                          background: "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: c.success, flexShrink: 0,
                        }}><Icon type="check" size={14} /></button>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{slot.name}</div>
                          <div style={{ fontSize: 10, color: c.textMuted }}>{slot.source === "clickup" ? `${slot.space} · ${slot.status}` : "Quick Job"}</div>
                        </div>
                        <PriorityBadge priority={slot.priority} />
                        <button onClick={() => { setEditingSignalNote(editingSignalNote === idx ? null : idx); setSignalNoteText(signalSlotNotes[idx] || ""); }} style={{
                          background: signalSlotNotes[idx] ? c.successBg : "transparent", border: `1px solid ${signalSlotNotes[idx] ? "rgba(34,197,94,0.3)" : c.border}`,
                          color: signalSlotNotes[idx] ? c.success : c.textMuted, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 9, fontWeight: 600,
                        }}>{signalSlotNotes[idx] ? "NOTE" : "+ NOTE"}</button>
                        <button onClick={() => { const ns = [...signalSlots]; ns[idx] = null; const comp = ns.filter(s => s !== null); while (comp.length < 6) comp.push(null); setSignalSlots(comp); }} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer" }}><Icon type="trash" size={12} /></button>
                      </div>
                      {editingSignalNote === idx && (
                        <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${c.border}` }}>
                          <textarea value={signalNoteText} onChange={e => setSignalNoteText(e.target.value)} rows={2} placeholder="Add a note about this task..." style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "8px 10px", fontSize: 12, outline: "none", resize: "vertical", fontFamily: "inherit", boxSizing: "border-box" }} />
                          <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                            <button onClick={() => { setSignalSlotNotes({ ...signalSlotNotes, [idx]: signalNoteText }); setEditingSignalNote(null); }} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Save</button>
                            <button onClick={() => setEditingSignalNote(null)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11 }}>Cancel</button>
                          </div>
                        </div>
                      )}
                    </div>
                  ) : (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "14px", gap: 8 }}>
                      <span style={{ fontSize: 16, fontWeight: 800, color: c.textMuted, opacity: 0.3 }}>{idx + 1}</span>
                      <span style={{ fontSize: 12, color: c.textMuted, opacity: 0.4 }}>Drag a task here</span>
                    </div>
                  )}
                </div>
              ))}
            </div>

            {/* Completed section */}
            {signalDone.length > 0 && (
              <div style={{ padding: "0 12px 12px" }}>
                <div style={{ borderTop: `1px solid ${c.border}`, paddingTop: 12, marginTop: 4 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: c.success, letterSpacing: "0.05em", marginBottom: 8, textTransform: "uppercase" }}>Completed ({signalDone.length})</div>
                  {signalDone.map(task => (
                    <div key={task.id + "-done"} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", marginBottom: 3, borderRadius: 6, background: "rgba(34,197,94,0.05)", border: `1px solid rgba(34,197,94,0.2)` }}>
                      <Icon type="check" size={14} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, color: c.textMuted, textDecoration: "line-through" }}>{task.name}</div>
                        {task.note && <div style={{ fontSize: 10, color: c.textSecondary, marginTop: 2, fontStyle: "italic" }}>{task.note}</div>}
                      </div>
                      {task.source === "clickup" && !task.clickupDone && (
                        <button onClick={() => markClickUpDone(task.id)} style={{ background: c.warningBg, border: `1px solid rgba(245,158,11,0.3)`, color: c.warning, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 9, fontWeight: 700 }}>
                          Complete on ClickUp
                        </button>
                      )}
                      {task.clickupDone && <span style={{ fontSize: 9, color: c.success, fontWeight: 700 }}>CLICKUP DONE</span>}
                      {task.source === "quickjob" && <span style={{ fontSize: 9, color: c.success, fontWeight: 700 }}>DONE</span>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* RIGHT: ClickUp Task Pool */}
        <div>
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, overflow: "hidden" }}>
            <div style={{ padding: "12px 16px", borderBottom: `1px solid ${c.border}`, background: c.surface }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: c.text }}>ClickUp Tasks ({filteredClickUp.length})</span>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {[{ k: "priority", l: "Priority" }, { k: "dueDate", l: "Due Date" }, { k: "space", l: "Workspace" }].map(f => (
                  <button key={f.k} onClick={() => setSignalTaskFilter(f.k)} style={{
                    background: signalTaskFilter === f.k ? c.accentBg : "transparent", border: `1px solid ${signalTaskFilter === f.k ? c.accent : c.border}`,
                    color: signalTaskFilter === f.k ? c.accent : c.textSecondary, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 10, fontWeight: 600,
                  }}>{f.l}</button>
                ))}
                <select value={signalSpaceFilter} onChange={e => setSignalSpaceFilter(e.target.value)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 4, padding: "3px 6px", fontSize: 10, marginLeft: 4 }}>
                  <option value="all">All Spaces</option>
                  {spaces.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div style={{ maxHeight: 600, overflowY: "auto", padding: 8 }}>
              {filteredClickUp.map(task => {
                const inSlot = signalSlots.some(s => s && s.id === task.id) || signalDone.some(s => s.id === task.id);
                return (
                  <div key={task.id} draggable={!inSlot}
                    onDragStart={e => { setDraggingSignalTask(task); e.dataTransfer.effectAllowed = "copy"; }}
                    onDragEnd={() => setDraggingSignalTask(null)}
                    style={{
                      display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", marginBottom: 3, borderRadius: 6,
                      background: inSlot ? c.surface : c.card, border: `1px solid ${inSlot ? c.border : task.priority === "urgent" ? "rgba(239,68,68,0.2)" : c.border}`,
                      cursor: inSlot ? "default" : "grab", opacity: inSlot ? 0.4 : 1, transition: "opacity 0.15s",
                    }}>
                    <PriorityBadge priority={task.priority} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 500, color: c.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{task.name}</div>
                      <div style={{ fontSize: 10, color: c.textMuted }}>{task.space}{task.dueDate ? ` · ${task.dueDate}` : ""}</div>
                    </div>
                    {task.url && <a href={task.url} target="_blank" rel="noopener" onClick={e => e.stopPropagation()} style={{ color: c.textMuted, flexShrink: 0 }}><Icon type="link" size={12} /></a>}
                    {inSlot && <span style={{ fontSize: 9, color: c.accent, fontWeight: 700 }}>IN SIGNAL</span>}
                  </div>
                );
              })}
              {/* Quick job signal items */}
              {quickJobSignal.length > 0 && (
                <>
                  <div style={{ padding: "8px 4px 4px", fontSize: 10, fontWeight: 700, color: c.accent, letterSpacing: "0.05em" }}>QUICK JOBS</div>
                  {quickJobSignal.map(task => {
                    const inSlot = signalSlots.some(s => s && s.id === task.id) || signalDone.some(s => s.id === task.id);
                    return (
                      <div key={task.id} draggable={!inSlot}
                        onDragStart={e => { setDraggingSignalTask(task); e.dataTransfer.effectAllowed = "copy"; }}
                        onDragEnd={() => setDraggingSignalTask(null)}
                        style={{
                          display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", marginBottom: 3, borderRadius: 6,
                          background: inSlot ? c.surface : c.accentBg, border: `1px solid rgba(99,102,241,0.2)`,
                          cursor: inSlot ? "default" : "grab", opacity: inSlot ? 0.4 : 1,
                        }}>
                        <Icon type="zap" size={12} />
                        <span style={{ fontSize: 12, color: c.text, flex: 1 }}>{task.name}</span>
                        {inSlot && <span style={{ fontSize: 9, color: c.accent, fontWeight: 700 }}>IN SIGNAL</span>}
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );

                  const existingNames = new Set(docs.map(d => d.name));
                  const missingDocs = KYB_STD.filter(d => !existingNames.has(d));
                  const updateEntDoc = (docId, field, val) => updateEnt(entId, "kybDocuments", docs.map(d => d.id === docId ? { ...d, [field]: val } : d));

                  return (<>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      {isSubEntity && <div style={{ gridColumn: "1 / -1" }}><label style={labelStyle}>Entity Name</label><input value={ent.uboEntityName || ""} onChange={e => updateEnt(entId, "uboEntityName", e.target.value)} placeholder="Entity name..." style={{ ...inputStyle, width: "100%" }} /></div>}
                      {!isSubEntity && <div style={{ gridColumn: "1 / -1" }}><label style={labelStyle}>Entity Name</label><input value={ent.entityName || ""} onChange={e => updateEnt(entId, "entityName", e.target.value)} placeholder="Entity name..." style={{ ...inputStyle, width: "100%" }} /></div>}
                      <div><label style={labelStyle}>Jurisdiction</label><input value={ent.jurisdiction || ""} onChange={e => updateEnt(entId, "jurisdiction", e.target.value)} placeholder="Jurisdiction..." style={{ ...inputStyle, width: "100%" }} /></div>
                      <div><label style={labelStyle}>Company Number</label><input value={ent.companyNumber || ""} onChange={e => updateEnt(entId, "companyNumber", e.target.value)} placeholder="Company number..." style={{ ...inputStyle, width: "100%" }} /></div>
                      <div style={{ gridColumn: "1 / -1" }}><label style={labelStyle}>Registered Address</label><input value={ent.registeredAddress || ""} onChange={e => updateEnt(entId, "registeredAddress", e.target.value)} placeholder="Registered address..." style={{ ...inputStyle, width: "100%" }} /></div>

                      {/* Licensed */}
                      <div style={{ gridColumn: "1 / -1" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                          <label style={labelStyle}>Licensed</label>
                          <div style={{ display: "flex", gap: 4 }}>
                            {["Yes", "No"].map(opt => (
                              <button key={opt} onClick={() => updateEnt(entId, "isLicensed", opt === "Yes")} style={{
                                background: (ent.isLicensed === true && opt === "Yes") || (ent.isLicensed === false && opt === "No") ? `${c.accent}20` : "transparent",
                                border: `1px solid ${(ent.isLicensed === true && opt === "Yes") || (ent.isLicensed === false && opt === "No") ? c.accent : c.border}`,
                                color: (ent.isLicensed === true && opt === "Yes") || (ent.isLicensed === false && opt === "No") ? c.accent : c.textMuted,
                                borderRadius: 5, padding: "2px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600,
                              }}>{opt}</button>
                            ))}
                          </div>
                        </div>
                        {ent.isLicensed && (
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                            <div><label style={labelStyle}>License Jurisdiction</label><input value={ent.licenseJurisdiction || ""} onChange={e => updateEnt(entId, "licenseJurisdiction", e.target.value)} style={{ ...inputStyle, width: "100%" }} /></div>
                            <div><label style={labelStyle}>License Number</label><input value={ent.licenseNumber || ""} onChange={e => updateEnt(entId, "licenseNumber", e.target.value)} style={{ ...inputStyle, width: "100%" }} /></div>
                            <div>
                              <label style={labelStyle}>License Expiry</label>
                              <input type="date" value={ent.licenseExpiry || ""} onChange={e => updateEnt(entId, "licenseExpiry", e.target.value)} style={{ ...inputStyle, width: "100%" }} />
                              {ent.licenseExpiry && (() => {
                                const exp = new Date(ent.licenseExpiry); const now = new Date(); const daysLeft = Math.ceil((exp - now) / (1000*60*60*24));
                                const ac = daysLeft <= 0 ? "#ef4444" : daysLeft <= 30 ? "#f59e0b" : daysLeft <= 90 ? "#eab308" : "#22c55e";
                                const at = daysLeft <= 0 ? "EXPIRED" : daysLeft <= 30 ? `${daysLeft}d — EXPIRING` : daysLeft <= 90 ? `${daysLeft}d — Review` : `${daysLeft}d`;
                                return <span style={{ fontSize: 9, color: ac, fontWeight: 700, marginTop: 2, display: "block" }}>{at}</span>;
                              })()}
                            </div>
                          </div>
                        )}
                      </div>

                      {/* UBO */}
                      <div>
                        <label style={labelStyle}>UBO</label>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                          <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: c.textMuted, cursor: "pointer" }}>
                            <input type="checkbox" checked={ent.uboIsEntity || false} onChange={e => updateEnt(entId, "uboIsEntity", e.target.checked)} style={{ accentColor: c.accent }} /> Owned by entity
                          </label>
                        </div>
                        {!ent.uboIsEntity && <input value={ent.ubo || ""} onChange={e => updateEnt(entId, "ubo", e.target.value)} placeholder="UBO name..." style={{ ...inputStyle, width: "100%" }} />}
                      </div>

                      {/* Director */}
                      <div><label style={labelStyle}>Director</label><input value={ent.director || ""} onChange={e => updateEnt(entId, "director", e.target.value)} placeholder="Director name..." style={{ ...inputStyle, width: "100%" }} /></div>
                    </div>

                    {/* UBO owned by entity — show full nested entity fields */}
                    {ent.uboIsEntity && (
                      <div style={{ marginTop: 10, background: `${c.accent}08`, border: `1px solid ${c.accent}25`, borderRadius: 8, padding: 14 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: c.accent, marginBottom: 8, textTransform: "uppercase" }}>UBO Entity Details</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                          {[["uboEntityName", "Entity Name"], ["uboEntJurisdiction", "Jurisdiction"], ["uboEntCompanyNumber", "Company Number"]].map(([key, label]) => (
                            <div key={key}><label style={labelStyle}>{label}</label><input value={ent[key] || ""} onChange={e => updateEnt(entId, key, e.target.value)} placeholder={`${label}...`} style={{ ...inputStyle, width: "100%" }} /></div>
                          ))}
                          <div style={{ gridColumn: "1 / -1" }}><label style={labelStyle}>Registered Address</label><input value={ent.uboEntAddress || ""} onChange={e => updateEnt(entId, "uboEntAddress", e.target.value)} placeholder="Address..." style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>UBO</label><input value={ent.uboEntUbo || ""} onChange={e => updateEnt(entId, "uboEntUbo", e.target.value)} placeholder="UBO of parent entity..." style={{ ...inputStyle, width: "100%" }} /></div>
                          <div><label style={labelStyle}>Director</label><input value={ent.uboEntDirector || ""} onChange={e => updateEnt(entId, "uboEntDirector", e.target.value)} placeholder="Director..." style={{ ...inputStyle, width: "100%" }} /></div>
                        </div>
                        {/* UBO Entity KYB Documents */}
                        <div style={{ marginTop: 10, borderTop: `1px solid ${c.border}`, paddingTop: 10 }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: c.accent, marginBottom: 6, textTransform: "uppercase" }}>UBO Entity — KYB Documents</div>
                          {(ent.uboEntKybDocs || []).map(doc => (
                            <div key={doc.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: `1px solid ${c.border}` }}>
                              <span style={{ fontSize: 12, color: c.text, flex: 1 }}>{doc.name || "Untitled"}</span>
                              {doc.fileUrl ? <a href={doc.fileUrl} target="_blank" rel="noopener" style={{ fontSize: 10, color: c.accent, fontWeight: 600, textDecoration: "none" }}>↓ {doc.fileName}</a> : <span style={{ fontSize: 10, color: c.textMuted }}>No file</span>}
                              <label style={{ cursor: "pointer" }}><input type="file" style={{ display: "none" }} onChange={ev => {
                                if (!ev.target.files[0] || !supabaseUrl || !supabaseKey) return;
                                const file = ev.target.files[0];
                                const safeName = cl.name.replace(/[^a-zA-Z0-9]/g, "_");
                                const filePath = "clients/" + safeName + "/ubo_ent/" + doc.id + "_" + Date.now() + "_" + file.name;
                                fetch(supabaseUrl + "/storage/v1/object/documents/" + filePath, { method: "POST", headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" }, body: file }).then(r => {
                                  if (r.ok) { const url = supabaseUrl + "/storage/v1/object/public/documents/" + filePath; updateEnt(entId, "uboEntKybDocs", (ent.uboEntKybDocs || []).map(d => d.id === doc.id ? { ...d, fileName: file.name, fileUrl: url } : d)); }
                                });
                              }} /><span style={{ fontSize: 10, color: c.accent, border: `1px solid ${c.accent}`, borderRadius: 4, padding: "2px 6px" }}>Upload</span></label>
                              <button onClick={() => updateEnt(entId, "uboEntKybDocs", (ent.uboEntKybDocs || []).filter(d => d.id !== doc.id))} style={{ background: "transparent", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 12 }}>✕</button>
                            </div>
                          ))}
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
                            {KYB_STD.filter(d => !(ent.uboEntKybDocs || []).some(x => x.name === d)).slice(0, 4).map(d => (
                              <button key={d} onClick={() => updateEnt(entId, "uboEntKybDocs", [...(ent.uboEntKybDocs || []), { id: `ukd-${Date.now()}-${Math.random().toString(36).slice(2,5)}`, name: d, fileName: "", fileUrl: "" }])} style={{ background: "transparent", border: `1px solid ${c.accent}40`, color: c.accent, borderRadius: 4, padding: "2px 6px", cursor: "pointer", fontSize: 9 }}>+ {d.length > 30 ? d.slice(0,28) + "..." : d}</button>
                            ))}
                            <button onClick={() => updateEnt(entId, "uboEntKybDocs", [...(ent.uboEntKybDocs || []), { id: `ukd-${Date.now()}`, name: "", fileName: "", fileUrl: "" }])} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 9, fontWeight: 600 }}>+ Add</button>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* KYB Documents for this entity */}
                    <div style={{ marginTop: 12, borderTop: `1px solid ${c.border}`, paddingTop: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: c.accent, textTransform: "uppercase" }}>KYB Documents <span style={{ fontWeight: 400, color: c.textMuted, textTransform: "none" }}>{docs.filter(d => d.fileUrl).length}/{docs.length} uploaded</span></div>
                        <button onClick={async () => {
                          if (!window.JSZip) { alert("JSZip not loaded"); return; }
                          const zip = new window.JSZip();
                          const withFiles = docs.filter(d => d.fileUrl);
                          if (withFiles.length === 0) { alert("No documents uploaded yet"); return; }
                          for (const doc of withFiles) { try { const r = await fetch(doc.fileUrl); if (r.ok) zip.file(doc.fileName || doc.name + ".pdf", await r.blob()); } catch(e){} }
                          const blob = await zip.generateAsync({ type: "blob" });
                          window.saveAs(blob, cl.name.replace(/[^a-zA-Z0-9]/g, "_") + "_Entity" + (isSubEntity ? "_UBO" : "") + "_KYB.zip");
                        }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 4, padding: "3px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>↓ Download KYB Pack</button>
                      </div>
                      {/* Missing docs quick-add */}
                      {missingDocs.length > 0 && (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8 }}>
                          {missingDocs.map(d => (
                            <button key={d} onClick={() => updateEnt(entId, "kybDocuments", [...docs, { id: `kd-${Date.now()}-${Math.random().toString(36).slice(2,5)}`, name: d, startDate: "", renewalMonths: "", fileName: "", fileSize: 0, fileUrl: "", uploadStatus: null }])} style={{ background: "transparent", border: `1px solid ${c.accent}40`, color: c.accent, borderRadius: 4, padding: "2px 6px", cursor: "pointer", fontSize: 9 }}>+ {d.length > 35 ? d.slice(0,33) + "..." : d}</button>
                          ))}
                        </div>
                      )}
                      {docs.length === 0 && <div style={{ fontSize: 11, color: c.textMuted, marginBottom: 6 }}>No KYB documents — use buttons above to add standard docs</div>}
                      {docs.map(doc => {
                        const isEd = editingClientField === `kd-${doc.id}`;
                        const renewal = doc.startDate && doc.renewalMonths ? (() => { const d = new Date(doc.startDate); d.setMonth(d.getMonth() + parseInt(doc.renewalMonths)); return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }); })() : null;
                        const sc = doc.fileUrl ? "#22c55e" : "#f59e0b";
                        return (
                          <div key={doc.id}
                            onDragOver={e => { e.preventDefault(); e.currentTarget.style.outline = `2px solid ${c.accent}`; }}
                            onDragLeave={e => { e.currentTarget.style.outline = "none"; }}
                            onDrop={e => { e.preventDefault(); e.currentTarget.style.outline = "none"; if (e.dataTransfer.files[0]) handleEntKybUpload(entId, doc.id, e.dataTransfer.files[0]); }}
                            style={{ borderLeft: `3px solid ${sc}`, padding: "8px 12px", marginBottom: 6, background: `${sc}08`, borderRadius: "0 6px 6px 0", border: `1px solid ${sc}25` }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                              <div style={{ flex: 1 }}>
                                <div style={{ fontSize: 12, fontWeight: 600, color: c.text }}>{doc.name || "Untitled"}</div>
                                {!isEd && <div style={{ fontSize: 10, color: c.textMuted }}>
                                  {doc.startDate && <span>{doc.startDate}</span>}{renewal && <span> · Renews {renewal}</span>}
                                  {doc.fileName && <span> · <a href={doc.fileUrl} target="_blank" rel="noopener" style={{ color: c.accent, textDecoration: "none" }}>↓ {doc.fileName}</a> {formatFileSize(doc.fileSize)}</span>}
                                </div>}
                              </div>
                              <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                                {doc.fileUrl && <a href={doc.fileUrl} target="_blank" rel="noopener" style={{ fontSize: 9, color: c.accent, fontWeight: 600, textDecoration: "none", padding: "2px 6px", border: `1px solid ${c.accent}`, borderRadius: 4 }}>↓</a>}
                                <button onClick={() => setEditingClientField(isEd ? null : `kd-${doc.id}`)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, cursor: "pointer", fontSize: 9, borderRadius: 4, padding: "2px 6px" }}>{isEd ? "Done" : "Edit"}</button>
                                <button onClick={() => updateEnt(entId, "kybDocuments", docs.filter(d => d.id !== doc.id))} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 4, padding: "2px 5px", cursor: "pointer", fontSize: 9 }}>✕</button>
                              </div>
                            </div>
                            {isEd && (
                              <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 6 }}>
                                <div><label style={labelStyle}>Document Name</label><input value={doc.name || ""} onChange={e => updateEntDoc(doc.id, "name", e.target.value)} style={{ ...inputStyle, width: "100%" }} /></div>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                                  <div><label style={labelStyle}>Start Date</label><input type="date" value={doc.startDate || ""} onChange={e => updateEntDoc(doc.id, "startDate", e.target.value)} style={{ ...inputStyle, width: "100%" }} /></div>
                                  <div><label style={labelStyle}>Renewal (months)</label><input type="number" min="0" value={doc.renewalMonths || ""} onChange={e => updateEntDoc(doc.id, "renewalMonths", e.target.value)} placeholder="No renewal" style={{ ...inputStyle, width: "100%" }} />{renewal && <div style={{ fontSize: 9, color: c.accent, marginTop: 2 }}>Renews: {renewal}</div>}</div>
                                </div>
                                <div
                                  onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.accent; }}
                                  onDragLeave={e => { e.currentTarget.style.borderColor = c.border; }}
                                  onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.border; if (e.dataTransfer.files[0]) handleEntKybUpload(entId, doc.id, e.dataTransfer.files[0]); }}
                                  style={{ border: `2px dashed ${c.border}`, borderRadius: 6, padding: "10px 12px", textAlign: "center", cursor: "pointer" }}
                                  onClick={() => { const inp = document.createElement("input"); inp.type = "file"; inp.onchange = ev => { if (ev.target.files[0]) handleEntKybUpload(entId, doc.id, ev.target.files[0]); }; inp.click(); }}
                                >
                                  {doc.uploadStatus === "uploading" ? <span style={{ fontSize: 11, color: c.accent }}>Uploading...</span> : doc.fileName ? <span style={{ fontSize: 11, color: "#22c55e" }}>{doc.fileName} — click to replace</span> : <span style={{ fontSize: 11, color: c.textMuted }}>Drop file or click to upload</span>}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                      <button onClick={() => {
                        const newDoc = { id: `kd-${Date.now()}`, name: "", startDate: "", renewalMonths: "", fileName: "", fileSize: 0, fileUrl: "", uploadStatus: null };
                        updateEnt(entId, "kybDocuments", [...docs, newDoc]);
                        setEditingClientField(`kd-${newDoc.id}`);
                      }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 10, fontWeight: 600, marginTop: 4 }}>+ Add Document</button>
                    </div>
                  </>);
                };

                return ents.map((ent, idx) => (
                  <div key={ent.id} style={{ background: c.surface, borderRadius: 8, border: `1px solid ${c.border}`, padding: 14, marginBottom: idx < ents.length - 1 ? 10 : 0 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: c.text }}>Entity {idx + 1}{ent.entityName ? ` — ${ent.entityName}` : ""}</span>
                      {ents.length > 1 && <button onClick={() => updateClient(cl.id, "entities", ents.filter(e => e.id !== ent.id))} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 10 }}>Remove</button>}
                    </div>
                    {renderEntityFields(ent, ent.id, false)}
                  </div>
                ));
              })()}
            </div>

            {/* Client Type */}
            <div style={sectionCard}>
              <SectionHeader sectionKey="type" title="Client Type" badge={cl.clientType || ""} />
              {!collapsed.type && (
                <select value={cl.clientType || ""} onChange={e => updateClient(cl.id, "clientType", e.target.value)} style={{ ...inputStyle, width: "100%" }}>
                  <option value="">— Select Type —</option>
                  {CLIENT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              )}
            </div>

            {/* Agreements */}
            <div style={sectionCard}>
              <SectionHeader sectionKey="agreements" title="Agreements" badge={`${(cl.agreements || []).length}`} extra={
                !collapsed.agreements && <button onClick={() => {
                  const newAg = { id: `clag-${Date.now()}`, name: "", startDate: "", renewalMonths: "" };
                  updateClient(cl.id, "agreements", [...(cl.agreements || []), newAg]);
                  setEditingClientField(`ag-${newAg.id}`);
                }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>+ Add</button>
              } />
              {!collapsed.agreements && (<>
                {(cl.agreements || []).length === 0 && <div style={{ fontSize: 12, color: c.textMuted }}>No agreements</div>}
                {(cl.agreements || []).map(ag => {
                  const isEd = editingClientField === `ag-${ag.id}`;
                  const renewal = renewalCalc(ag.startDate, ag.renewalMonths);
                  return (
                    <div key={ag.id} style={{ background: c.surface, borderRadius: 8, border: `1px solid ${c.border}`, padding: 12, marginBottom: 8 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{ag.name || "Untitled Agreement"}</div>
                          <div style={{ fontSize: 11, color: c.textMuted, marginTop: 2 }}>
                            {ag.startDate && <span>Started {ag.startDate}</span>}
                            {renewal && <span> · Renews {renewal}</span>}
                            {ag.startDate && !ag.renewalMonths && <span> · No renewal</span>}
                          </div>
                        </div>
                        <div style={{ display: "flex", gap: 4 }}>
                          <button onClick={() => setEditingClientField(isEd ? null : `ag-${ag.id}`)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, cursor: "pointer", fontSize: 10, borderRadius: 4, padding: "3px 8px" }}>{isEd ? "Done" : "Edit"}</button>
                          <button onClick={() => updateClient(cl.id, "agreements", (cl.agreements || []).filter(a => a.id !== ag.id))} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 4, padding: "3px 6px", cursor: "pointer", fontSize: 10 }}>✕</button>
                        </div>
                      </div>
                      {isEd && (
                        <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 10 }}>
                          <div><label style={labelStyle}>Agreement Name</label><input value={ag.name || ""} onChange={e => {
                            const upd = (cl.agreements || []).map(a => a.id === ag.id ? { ...a, name: e.target.value } : a);
