                <div key={`done-${i}`} style={{ display: "flex", alignItems: "center", gap: 10, background: c.card, border: `1px solid ${c.border}`, borderRadius: 8, padding: "8px 16px", marginBottom: 3, opacity: 0.6 }}>
                  <span style={{ color: c.success, fontSize: 14 }}>✓</span>
                  <span style={{ fontSize: 12, color: c.textMuted, flex: 1, textDecoration: "line-through" }}>{t.text}</span>
                  <span style={{ fontSize: 10, color: c.textMuted }}>{t.completedAt ? new Date(t.completedAt).toLocaleDateString() : ""}</span>
                  <button onClick={() => setDelegatedTasks(delegatedTasks.filter(d => d.id !== t.id))} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer", fontSize: 10 }}><Icon type="trash" size={12} /></button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      <h3 style={{ fontSize: 13, fontWeight: 700, color: c.textSecondary, margin: "0 0 12px 0", textTransform: "uppercase", letterSpacing: "0.05em" }}>ClickUp Tasks</h3>
      {CLICKUP_SOPHIE_TASKS.map(task => (
        <div key={task.id} style={{ display: "flex", alignItems: "center", gap: 12, background: c.card, border: `1px solid ${c.border}`, borderRadius: 8, padding: "10px 16px", marginBottom: 4 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, color: c.text, fontWeight: 500 }}>{task.name}</div>
            <div style={{ fontSize: 11, color: c.textMuted, marginTop: 2 }}>{task.dueDate ? `Due ${task.dueDate}` : "No due date"}</div>
          </div>
          <StatusBadge status={task.status} />{task.priority && <PriorityBadge priority={task.priority} />}
          <a href={task.url} target="_blank" rel="noopener" style={{ color: c.textMuted }}><Icon type="link" size={14} /></a>
        </div>
      ))}
    </div>
  );

  // ===== PERSONAL JOBS =====
  const PJ_PRIORITIES = { urgent: { color: "#ef4444", bg: "rgba(239,68,68,0.12)", border: "rgba(239,68,68,0.3)", label: "Urgent" }, high: { color: "#f59e0b", bg: "rgba(245,158,11,0.12)", border: "rgba(245,158,11,0.3)", label: "High" }, normal: { color: "#3b82f6", bg: "rgba(59,130,246,0.12)", border: "rgba(59,130,246,0.3)", label: "Normal" }, low: { color: "#6b7280", bg: "rgba(107,114,128,0.12)", border: "rgba(107,114,128,0.3)", label: "Low" } };
  const pjSortOrder = { urgent: 0, high: 1, normal: 2, low: 3 };
  const renderPersonalJobs = () => {
    const addPJ = () => {
      if (!newPersonalJob.trim()) return;
      setPersonalJobs([...personalJobs, { id: `pj${Date.now()}`, text: newPersonalJob.trim(), done: false, priority: newPJPriority, createdAt: new Date().toISOString() }]);
      setNewPersonalJob("");
    };
    const filtered = pjFilter === "all" ? personalJobs.filter(j => !j.done) : pjFilter === "done" ? personalJobs.filter(j => j.done) : personalJobs.filter(j => !j.done && j.priority === pjFilter);
    const sorted = [...filtered].sort((a, b) => (pjSortOrder[a.priority] || 2) - (pjSortOrder[b.priority] || 2));
    const counts = { all: personalJobs.filter(j => !j.done).length, urgent: personalJobs.filter(j => !j.done && j.priority === "urgent").length, high: personalJobs.filter(j => !j.done && j.priority === "high").length, normal: personalJobs.filter(j => !j.done && j.priority === "normal").length, low: personalJobs.filter(j => !j.done && j.priority === "low").length, done: personalJobs.filter(j => j.done).length };
    return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 6px 0" }}>Personal Job List</h2>
      <p style={{ color: c.textSecondary, fontSize: 13, margin: "0 0 16px 0" }}>Personal tasks, errands, and non-work items. Send to calendar, delegate to Sophie, or add to Signal.</p>

      {/* Summary cards */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
        {[
          { label: "Total Active", value: counts.all, color: "#eab308", bg: "rgba(234,179,8,0.1)" },
          { label: "Urgent", value: counts.urgent, color: "#ef4444", bg: "rgba(239,68,68,0.1)" },
          { label: "High Priority", value: counts.high, color: "#f59e0b", bg: "rgba(245,158,11,0.1)" },
          { label: "Completed", value: counts.done, color: "#22c55e", bg: "rgba(34,197,94,0.1)" },
        ].map(card => (
          <div key={card.label} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, textAlign: "center" }}>
            <div style={{ fontSize: 28, fontWeight: 800, color: card.color }}>{card.value}</div>
            <div style={{ fontSize: 11, color: c.textMuted, marginTop: 4, fontWeight: 600 }}>{card.label}</div>
          </div>
        ))}
      </div>

      {/* Add new job form */}
      <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={newPersonalJob} onChange={e => setNewPersonalJob(e.target.value)} onKeyDown={e => { if (e.key === "Enter") addPJ(); }} placeholder="Add personal task..." style={{ flex: 1, background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 8, padding: "10px 14px", fontSize: 13, outline: "none" }} />
          <select value={newPJPriority} onChange={e => setNewPJPriority(e.target.value)} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.text, borderRadius: 8, padding: "8px 10px", fontSize: 12 }}>
            {Object.entries(PJ_PRIORITIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
          </select>
          <button onClick={addPJ} style={{ background: "#eab308", border: "none", color: "#000", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontWeight: 600, display: "flex", alignItems: "center", gap: 6, fontSize: 13 }}>
            <Icon type="plus" size={14} /> Add
          </button>
        </div>
      </div>

      {/* Priority filter tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
        {[{ k: "all", l: "All Active" }, { k: "urgent", l: "Urgent" }, { k: "high", l: "High" }, { k: "normal", l: "Normal" }, { k: "low", l: "Low" }, { k: "done", l: "Completed" }].map(f => {
          const pc = PJ_PRIORITIES[f.k];
          return (
          <button key={f.k} onClick={() => setPjFilter(f.k)} style={{
            background: pjFilter === f.k ? (pc ? pc.bg : f.k === "all" ? "rgba(234,179,8,0.12)" : "rgba(34,197,94,0.12)") : "transparent",
            border: `1px solid ${pjFilter === f.k ? (pc ? pc.border : f.k === "all" ? "rgba(234,179,8,0.3)" : "rgba(34,197,94,0.3)") : c.border}`,
            color: pjFilter === f.k ? (pc ? pc.color : f.k === "all" ? "#eab308" : "#22c55e") : c.textSecondary,
            borderRadius: 6, padding: "5px 14px", cursor: "pointer", fontSize: 11, fontWeight: 600,
          }}>{f.l} ({counts[f.k]})</button>
          );
        })}
      </div>

      {/* Jobs list */}
      {sorted.length === 0 ? (
        <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 32, textAlign: "center" }}>
          <div style={{ color: c.textMuted, fontSize: 13 }}>{pjFilter === "done" ? "No completed tasks yet." : "No tasks in this filter."}</div>
        </div>
      ) : sorted.map(job => {
        const pp = PJ_PRIORITIES[job.priority] || PJ_PRIORITIES.normal;
        return (
        <div key={job.id} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: "12px 16px", marginBottom: 6, borderLeft: `4px solid ${pp.color}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <input type="checkbox" checked={job.done} onChange={() => setPersonalJobs(personalJobs.map(j => j.id === job.id ? { ...j, done: !j.done, completedAt: !j.done ? new Date().toISOString() : null } : j))} style={{ accentColor: pp.color, width: 16, height: 16, flexShrink: 0 }} />
            <span style={{ flex: 1, fontSize: 13, color: job.done ? c.textMuted : c.text, textDecoration: job.done ? "line-through" : "none", fontWeight: 500 }}>{job.text}</span>
            {/* Priority badge */}
            <span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 4, background: pp.bg, color: pp.color, border: `1px solid ${pp.border}`, fontWeight: 700, textTransform: "uppercase" }}>{pp.label}</span>
            {/* Priority selector */}
            <select value={job.priority || "normal"} onChange={e => setPersonalJobs(personalJobs.map(j => j.id === job.id ? { ...j, priority: e.target.value } : j))} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, borderRadius: 4, padding: "2px 4px", fontSize: 9, width: 65 }}>
              {Object.entries(PJ_PRIORITIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          {/* Action buttons row */}
          {!job.done && (
            <div style={{ display: "flex", gap: 6, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${c.border}` }}>
              <button onClick={() => { setUnscheduledItems([...unscheduledItems, { id: `u${Date.now()}`, text: job.text, type: "call" }]); setPersonalJobs(personalJobs.filter(j => j.id !== job.id)); setSection("calendar"); }} style={{ background: "rgba(234,179,8,0.1)", border: "1px solid rgba(234,179,8,0.3)", color: "#eab308", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}>
                <Icon type="calendar" size={11} /> Send to Calendar
              </button>
              <button onClick={() => { setDelegatedTasks([...delegatedTasks, { id: job.id, text: job.text, cat: "personal", delegatedAt: new Date().toISOString() }]); setPersonalJobs(personalJobs.filter(j => j.id !== job.id)); }} style={{ background: c.accentBg, border: "1px solid rgba(99,102,241,0.3)", color: c.accent, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}>
                <Icon type="delegate" size={11} /> Delegate to Sophie
              </button>
              <button onClick={() => { setQuickJobs([...quickJobs, { id: `qj${Date.now()}`, text: job.text, done: false, inSignal: true, cat: "personal", onCalendar: false, note: "", createdAt: new Date().toISOString() }]); setPersonalJobs(personalJobs.filter(j => j.id !== job.id)); }} style={{ background: "rgba(6,182,212,0.1)", border: "1px solid rgba(6,182,212,0.3)", color: "#06b6d4", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}>
                <Icon type="signal" size={11} /> Add to Signal
              </button>
              <div style={{ flex: 1 }} />
              <button onClick={() => setPersonalJobs(personalJobs.filter(j => j.id !== job.id))} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer" }}><Icon type="trash" size={13} /></button>
            </div>
          )}
          {job.done && (
            <div style={{ display: "flex", gap: 6, marginTop: 6, alignItems: "center" }}>
              <span style={{ fontSize: 10, color: c.textMuted }}>Completed {job.completedAt ? new Date(job.completedAt).toLocaleDateString() : ""}</span>
              <div style={{ flex: 1 }} />
              <button onClick={() => setPersonalJobs(personalJobs.filter(j => j.id !== job.id))} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer" }}><Icon type="trash" size={13} /></button>
            </div>
          )}
        </div>
        );
      })}
    </div>
    );
  };

  // ===== GATEWAY CLIENTS =====
  const renderClients = () => {
    if (selectedClient) {
      const client = GATEWAY_CLIENTS.find(cl => cl.name === selectedClient);
      return (
        <div>
          <button onClick={() => setSelectedClient(null)} style={{ background: "transparent", border: "none", color: c.accent, cursor: "pointer", fontSize: 13, marginBottom: 16, padding: 0 }}>&larr; Back</button>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 24px 0" }}>{client?.name}</h2>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
              <h3 style={{ fontSize: 14, fontWeight: 700, color: c.text, margin: "0 0 12px 0" }}>Agreement Details</h3>
              <div style={{ fontSize: 13, color: c.textSecondary, lineHeight: 1.8 }}>
                <div>Status: <StatusBadge status={client?.status} /></div>
                <div style={{ marginTop: 8 }}>Commercials: Payment processing via Gateway.io</div>
                <div>Contract: Master Service Agreement</div>
              </div>
            </div>
            <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
              <h3 style={{ fontSize: 14, fontWeight: 700, color: c.text, margin: "0 0 12px 0" }}>Ongoing Management</h3>
              {["Daily settlement reconciliation", "Weekly volume reporting", "Monthly invoice generation", "Quarterly compliance review"].map((t, i) => (
                <div key={i} style={{ fontSize: 12, color: c.textSecondary, padding: "6px 0", borderBottom: `1px solid ${c.border}`, display: "flex", justifyContent: "space-between" }}><span>{t}</span><span style={{ color: c.accent, fontSize: 11 }}>Aleksandra</span></div>
              ))}
            </div>
          </div>
        </div>
      );
    }
    return (
      <div>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 6px 0" }}>Gateway.io Client Portal</h2>
        <p style={{ color: c.textSecondary, fontSize: 13, margin: "0 0 24px 0" }}>{GATEWAY_CLIENTS.filter(cl => cl.status === "active").length} active · {GATEWAY_CLIENTS.filter(cl => cl.status === "onboarding").length} onboarding</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
          {GATEWAY_CLIENTS.map(client => (
            <div key={client.name} onClick={() => setSelectedClient(client.name)} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 20, cursor: "pointer", borderLeft: `3px solid ${client.statusColor}` }}
              onMouseEnter={e => e.currentTarget.style.background = c.cardHover} onMouseLeave={e => e.currentTarget.style.background = c.card}>
              <div style={{ fontSize: 15, fontWeight: 600, color: c.text, marginBottom: 8 }}>{client.name}</div>
              <StatusBadge status={client.status} />
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ===== INTEGRATION ROADMAP =====
  const renderRoadmap = () => (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: "0 0 24px 0" }}>Integration Roadmap</h2>
      {INTEGRATION_ROADMAP.sort((a, b) => (a.dueDate || "").localeCompare(b.dueDate || "")).map((item, idx) => (
        <div key={idx} style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, marginBottom: 8 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
            <div><span style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{item.name}</span><span style={{ fontSize: 11, color: c.textMuted, marginLeft: 8 }}>{item.brand}</span></div>
            <div style={{ display: "flex", gap: 8 }}><StatusBadge status={item.status} /><PriorityBadge priority={item.priority} /></div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ flex: 1, height: 6, background: c.surface, borderRadius: 3, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${item.progress}%`, background: item.progress >= 60 ? c.success : item.progress >= 30 ? c.warning : c.accent, borderRadius: 3 }} />
            </div>
            <span style={{ fontSize: 11, color: c.textMuted }}>{item.progress}%</span>
            {item.dueDate && <span style={{ fontSize: 11, color: c.textMuted }}>{item.dueDate}</span>}
          </div>
        </div>
      ))}
    </div>
  );

  // ===== ENTITY DETAIL =====
  const renderEntityDetail = (entity, category) => {
    // Merge base entity data with overrides
    const merged = { ...entity, ...(entityOverrides[entity.name] || {}) };

    // Helper: calculate document status
    // Use global doc status calculator
    const getDocStatus = (doc) => getDocStatusGlobal(doc);

    // Standard document list for suggestions
    const standardDocs = ["Certificate of Incorporation", "Gaming License", "UBO Declaration", "Register of Directors", "Certificate of Good Standing", "Proof of Address", "Operational Manual", "AML Policy", "Shareholder Register", "Board Resolution", "Tax Compliance Certificate", "Power of Attorney"];

    // Get all docs: only from entityDocs (user-added), not hardcoded placeholders
    const allUserDocs = entityDocs[entity.name] || [];
    const allDocNames = new Set(allUserDocs.map(d => d.name));
    const missingDocs = standardDocs.filter(d => !allDocNames.has(d));

    // Service providers: use saved ones or default to csp
    const providers = entityServiceProviders[entity.name] || (entity.csp ? [{ id: "csp-default", name: entity.csp.name, company: "CSP", email: entity.csp.contact, phone: "", notes: "Default CSP" }] : []);

    // Footer text
    const footerText = entityFooters[entity.name] !== undefined ? entityFooters[entity.name] : (entity.footerText || "");

    // Editable field helper — click anywhere on the row to edit
    const EditableField = ({ label, value, fieldKey, onSave }) => {
      const [editing, setEditing] = useState(false);
      const [inputVal, setInputVal] = useState(value || "");
      const [hovered, setHovered] = useState(false);
      const handleSave = () => {
        const updated = { ...entityOverrides[entity.name] || {}, [fieldKey]: inputVal };
        setEntityOverrides({ ...entityOverrides, [entity.name]: updated });
        setEditing(false);
      };
      return (
        <div
          onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
          onClick={() => { if (!editing) setEditing(true); }}
          style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", marginBottom: 2, borderRadius: 6, fontSize: 13, cursor: editing ? "default" : "pointer", background: hovered && !editing ? `${c.accent}12` : "transparent", transition: "background 0.15s" }}
        >
          <span style={{ color: c.textSecondary, fontSize: 12 }}>{label}</span>
          {!editing ? (
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ color: value ? c.text : c.textMuted, fontWeight: 500, fontStyle: value ? "normal" : "italic" }}>{value || "Click to add"}</span>
              <span style={{ color: hovered ? c.accent : c.textMuted, fontSize: 11, opacity: hovered ? 1 : 0.4, transition: "all 0.15s" }}>✎</span>
            </div>
          ) : (
            <div style={{ display: "flex", gap: 6, alignItems: "center" }} onClick={e => e.stopPropagation()}>
              <input type="text" value={inputVal} onChange={e => setInputVal(e.target.value)} onKeyDown={e => { if (e.key === "Enter") handleSave(); if (e.key === "Escape") setEditing(false); }} autoFocus style={{ fontSize: 12, padding: "5px 10px", borderRadius: 6, border: `1px solid ${c.accent}`, background: c.surface, color: c.text, width: 220, outline: "none" }} />
              <button onClick={handleSave} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 5, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Save</button>
              <button onClick={() => { setInputVal(value || ""); setEditing(false); }} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 5, padding: "4px 8px", cursor: "pointer", fontSize: 11 }}>✕</button>
            </div>
          )}
        </div>
      );
    };

    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <button onClick={() => { setSelectedEntity(null); setSelectedCategory(null); }} style={{ background: "transparent", border: "none", color: c.accent, cursor: "pointer", fontSize: 13, padding: 0 }}>&larr; Back</button>
          <button onClick={() => downloadEntityPack(entity.name)} disabled={packDownloading} style={{ background: packDownloading ? c.surface : c.accent, border: "none", color: packDownloading ? c.textMuted : "#fff", padding: "6px 14px", borderRadius: 6, fontSize: 12, cursor: packDownloading ? "wait" : "pointer", fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>{packDownloading ? "⟳ Building Pack..." : "↓ Download Company Pack"}</button>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>{entity.name}</h2>
          <span style={{ fontSize: 12, color: c.textMuted, background: c.surface, padding: "4px 10px", borderRadius: 6 }}>{category}</span>
        </div>

        {/* A: Editable Company Details */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
            <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Company Details</h3>
            <EditableField label="Name" value={merged.name} fieldKey="name" />
            <EditableField label="Jurisdiction" value={merged.jurisdiction} fieldKey="jurisdiction" />
            <EditableField label="Company No." value={merged.companyNumber} fieldKey="companyNumber" />
            <EditableField label="License No." value={merged.licenseNumber || ""} fieldKey="licenseNumber" />
            <EditableField label="Address" value={merged.address || ""} fieldKey="address" />
            <EditableField label="UBO" value={merged.ubo || ""} fieldKey="ubo" />
            <EditableField label="Director" value={merged.director || ""} fieldKey="director" />
          </div>

          {/* B: Service Providers */}
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: 0, textTransform: "uppercase" }}>Service Providers</h3>
              <button onClick={() => {
                const newProvider = { id: `sp-${Date.now()}`, name: "New Provider", company: "", email: "", phone: "", notes: "" };
                const updated = [...providers, newProvider];
                setEntityServiceProviders({ ...entityServiceProviders, [entity.name]: updated });
              }} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Add</button>
            </div>
            {providers.length === 0 && <div style={{ fontSize: 12, color: c.textMuted, padding: "8px 0" }}>No service providers added</div>}
            {providers.map(p => {
              const isEditingSP = editingEntityField === `sp-${p.id}`;
              const updateSP = (field, val) => {
                const updated = providers.map(sp => sp.id === p.id ? { ...sp, [field]: val } : sp);
                setEntityServiceProviders({ ...entityServiceProviders, [entity.name]: updated });
              };
              return (
              <div key={p.id} style={{ padding: "8px 0", borderBottom: `1px solid ${c.border}`, fontSize: 12 }}>
                {isEditingSP ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {[["Name", "name"], ["Company", "company"], ["Email", "email"], ["Phone", "phone"], ["Notes", "notes"]].map(([label, key]) => (
                      <div key={key} style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <label style={{ fontSize: 10, color: c.textMuted, width: 50 }}>{label}</label>
                        <input value={p[key] || ""} onChange={e => updateSP(key, e.target.value)} style={{ flex: 1, fontSize: 11, padding: "3px 6px", borderRadius: 4, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" }} />
                      </div>
                    ))}
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => setEditingEntityField(null)} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 4, padding: "3px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Done</button>
                      <button onClick={() => { setEntityServiceProviders({ ...entityServiceProviders, [entity.name]: providers.filter(sp => sp.id !== p.id) }); setEditingEntityField(null); }} style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", color: "#ef4444", borderRadius: 4, padding: "3px 10px", cursor: "pointer", fontSize: 10 }}>Delete</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontWeight: 600, color: c.text, marginBottom: 2 }}>{p.name || "Unnamed"}</div>
                      <div style={{ fontSize: 11, color: c.textMuted }}>{[p.company, p.email].filter(Boolean).join(" • ")}</div>
                      {p.phone && <div style={{ fontSize: 11, color: c.textMuted }}>{p.phone}</div>}
                      {p.notes && <div style={{ fontSize: 11, color: c.textMuted, fontStyle: "italic" }}>{p.notes}</div>}
                    </div>
                    <button onClick={() => setEditingEntityField(`sp-${p.id}`)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 10 }}>Edit</button>
                  </div>
                )}
              </div>
              );
            })}
          </div>
        </div>

        {/* C: Document Matrix */}
        <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: 0, textTransform: "uppercase" }}>Document Matrix</h3>
            <button onClick={() => downloadEntityPack(entity.name)} disabled={packDownloading} style={{ background: packDownloading ? c.surface : c.accent, border: "none", color: packDownloading ? c.textMuted : c.white, borderRadius: 6, padding: "6px 14px", cursor: packDownloading ? "wait" : "pointer", fontSize: 11, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}><Icon type="download" size={12} /> {packDownloading ? "Building..." : "Download Pack"}</button>
          </div>

          {/* Summary bar */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 12 }}>
            {[
              { label: "Documents", value: allUserDocs.length, color: "#3b82f6" },
              { label: "Expiring", value: allUserDocs.filter(d => getDocStatus(d) === "expiring").length, color: "#ef4444" },
              { label: "Review Soon", value: allUserDocs.filter(d => getDocStatus(d) === "review_soon").length, color: "#f59e0b" },
              { label: "Missing", value: missingDocs.length, color: "#8b5cf6" },
            ].map(s => (
              <div key={s.label} style={{ background: c.surface, borderRadius: 8, padding: "10px 12px", textAlign: "center" }}>
                <div style={{ fontSize: 20, fontWeight: 800, color: s.color }}>{s.value}</div>
                <div style={{ fontSize: 10, color: c.textMuted, marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* AI Suggestions */}
          {missingDocs.length > 0 && (
            <div style={{ background: `${c.accent}15`, border: `1px solid ${c.accent}40`, borderRadius: 8, padding: 12, marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: c.accent, marginBottom: 6 }}>Missing Standard Documents</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {missingDocs.slice(0, 5).map(d => (
                  <button key={d} onClick={() => {
                    const newDoc = { id: `doc-${Date.now()}`, name: d, issueDate: "", noRenewal: false, notarised: false, notarisedDate: "", renewalMonths: 12, delayedUntil: null, fileName: "", fileSize: 0, fileUrl: "", previousVersions: [], renewalNotes: "" };
                    const updated = [...(entityDocs[entity.name] || []), newDoc];
                    setEntityDocs({ ...entityDocs, [entity.name]: updated });
                  }} style={{ background: "transparent", border: `1px solid ${c.accent}`, color: c.accent, borderRadius: 4, padding: "4px 8px", cursor: "pointer", fontSize: 10 }}>+ {d}</button>
                ))}
              </div>
            </div>
          )}

          {/* Document list */}
          {allUserDocs.length === 0 && (
            <div style={{ background: c.surface, borderRadius: 8, padding: 24, textAlign: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 13, color: c.textMuted, marginBottom: 8 }}>No documents added yet</div>
              <div style={{ fontSize: 11, color: c.textMuted }}>Click "Add Document" below or use the suggestions above to get started.</div>
            </div>
          )}
          {allUserDocs.map((doc, i) => {
            const status = getDocStatus(doc);
            const renewalDateStr = getDocRenewalDate(doc);
            const statusColors = { expired: "#ef4444", expiring: "#f59e0b", review_soon: "#eab308", valid: "#22c55e", unknown: "#6b7280" };
            const sc = statusColors[status] || statusColors.unknown;
            const isEditing = editingEntityField === `doc-${doc.id}`;
            const isShowingHistory = editingEntityField === `hist-${doc.id}`;
            const updateDoc = (field, val) => {
              const updated = allUserDocs.map(d => d.id === doc.id ? { ...d, [field]: val } : d);
              setEntityDocs({ ...entityDocs, [entity.name]: updated });
            };

            // File upload handler
            const handleFileUpload = async (file, isNewVersion) => {
              if (!file) return;
              if (!supabaseUrl || !supabaseKey) { alert("Connect to Supabase database first (use Connect Database button above)"); return; }
              const safeName = entity.name.replace(/[^a-zA-Z0-9]/g, "_");
              const ts = Date.now();
              const filePath = safeName + "/" + doc.id + "_" + ts + "_" + file.name;
              updateDoc("uploadStatus", "uploading");
              try {
                const uploadResp = await fetch(supabaseUrl + "/storage/v1/object/documents/" + filePath, {
                  method: "POST",
                  headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" },
                  body: file,
                });
                if (!uploadResp.ok) {
                  const errText = await uploadResp.text();
                  if (errText.includes("Bucket not found")) {
                    const createBucket = await fetch(supabaseUrl + "/storage/v1/bucket", {
                      method: "POST",
                      headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey, "Content-Type": "application/json" },
                      body: JSON.stringify({ id: "documents", name: "documents", public: true }),
                    });
                    if (createBucket.ok || (await createBucket.text()).includes("already exists")) {
                      const retry = await fetch(supabaseUrl + "/storage/v1/object/documents/" + filePath, {
                        method: "POST",
                        headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" },
                        body: file,
                      });
                      if (!retry.ok) throw new Error("Upload failed after creating bucket");
                    } else { throw new Error("Could not create storage bucket"); }
                  } else { throw new Error(errText.slice(0, 100)); }
                }
                const publicUrl = supabaseUrl + "/storage/v1/object/public/documents/" + filePath;
                if (isNewVersion && doc.fileUrl) {
                  const prevVersions = doc.previousVersions || [];
                  prevVersions.push({ fileName: doc.fileName, fileSize: doc.fileSize, fileUrl: doc.fileUrl, uploadedAt: doc.uploadedAt || new Date().toISOString(), renewalDate: doc.expiry || "" });
                  const updated = allUserDocs.map(d => d.id === doc.id ? { ...d, fileName: file.name, fileSize: file.size, fileUrl: publicUrl, uploadedAt: new Date().toISOString(), previousVersions: prevVersions, uploadStatus: null } : d);
                  setEntityDocs({ ...entityDocs, [entity.name]: updated });
                } else {
                  const updated = allUserDocs.map(d => d.id === doc.id ? { ...d, fileName: file.name, fileSize: file.size, fileUrl: publicUrl, uploadedAt: new Date().toISOString(), uploadStatus: null } : d);
                  setEntityDocs({ ...entityDocs, [entity.name]: updated });
                }
              } catch (e) { updateDoc("uploadStatus", null); alert("Upload failed: " + e.message); }
            };

            const formatFileSize = (bytes) => { if (!bytes) return ""; if (bytes < 1024) return bytes + " B"; if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB"; return (bytes / 1048576).toFixed(1) + " MB"; };

            return (
              <div key={doc.id}
                onDragOver={e => { if (!isEditing) { e.preventDefault(); e.currentTarget.style.outline = `2px solid ${c.accent}`; } }}
                onDragLeave={e => { e.preventDefault(); e.currentTarget.style.outline = "none"; }}
                onDrop={e => { e.preventDefault(); e.currentTarget.style.outline = "none"; if (!isEditing && e.dataTransfer.files[0]) handleFileUpload(e.dataTransfer.files[0], !!doc.fileUrl); }}
                style={{ borderLeft: `4px solid ${sc}`, padding: "12px 16px", marginBottom: 8, background: `${sc}08`, borderRadius: "0 8px 8px 0", border: `1px solid ${sc}30`, transition: "outline 0.15s" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ flex: 1 }}>
                    {isEditing ? (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                          <label style={{ fontSize: 10, color: c.textMuted, width: 90 }}>Document Name</label>
                          <input value={doc.name} onChange={e => updateDoc("name", e.target.value)} style={{ flex: 1, fontSize: 12, padding: "4px 8px", borderRadius: 4, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" }} />
                        </div>

                        {/* No renewal checkbox */}
                        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                          <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: c.text, cursor: "pointer" }}>
                            <input type="checkbox" checked={doc.noRenewal || false} onChange={e => updateDoc("noRenewal", e.target.checked)} style={{ accentColor: c.accent }} /> No renewal needed
                          </label>
                        </div>

                        {/* Issue date + renewal cycle — only shown if renewal is needed */}
                        {!doc.noRenewal && (
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <label style={{ fontSize: 10, color: c.textMuted, width: 90 }}>Issue Date</label>
                            <input type="date" value={doc.issueDate || doc.expiry || ""} onChange={e => updateDoc("issueDate", e.target.value)} style={{ fontSize: 12, padding: "4px 8px", borderRadius: 4, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" }} />
                          </div>
                        )}
                        {!doc.noRenewal && (
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <label style={{ fontSize: 10, color: c.textMuted, width: 90 }}>Renewal Cycle</label>
                            <select value={doc.renewalMonths || 12} onChange={e => updateDoc("renewalMonths", parseInt(e.target.value))} style={{ fontSize: 11, padding: "3px 6px", borderRadius: 4, border: `1px solid ${c.border}`, background: c.surface, color: c.text }}>
                              {[3,6,9,12,18,24,36].map(m => <option key={m} value={m}>{m} months</option>)}
                            </select>
                            {(doc.issueDate || doc.expiry) && <span style={{ fontSize: 10, color: c.textMuted }}>Renewal due: <span style={{ color: c.accent, fontWeight: 600 }}>{getDocRenewalDate(doc)}</span></span>}
                          </div>
                        )}

                        {/* File upload drop zone */}
                        <div
                          onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.accent; e.currentTarget.style.background = `${c.accent}15`; }}
                          onDragLeave={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.border; e.currentTarget.style.background = c.surface; }}
                          onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.border; e.currentTarget.style.background = c.surface; if (e.dataTransfer.files[0]) handleFileUpload(e.dataTransfer.files[0], false); }}
                          style={{ border: `2px dashed ${c.border}`, borderRadius: 8, padding: doc.fileName ? "8px 12px" : "16px 12px", textAlign: "center", background: c.surface, cursor: "pointer", transition: "all 0.2s" }}
                          onClick={() => { const inp = document.createElement("input"); inp.type = "file"; inp.onchange = ev => { if (ev.target.files[0]) handleFileUpload(ev.target.files[0], false); }; inp.click(); }}
                        >
                          {doc.uploadStatus === "uploading" ? (
                            <span style={{ fontSize: 11, color: c.accent }}>Uploading...</span>
                          ) : doc.fileName ? (
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                              <span style={{ fontSize: 11, color: c.success, fontWeight: 500 }}>{doc.fileName}</span>
                              <span style={{ fontSize: 10, color: c.textMuted }}>{formatFileSize(doc.fileSize)}</span>
                              <span style={{ fontSize: 10, color: c.textMuted }}>— click or drag to replace</span>
                            </div>
                          ) : (
                            <div>
                              <div style={{ fontSize: 12, color: c.textSecondary, marginBottom: 2 }}>Drop file here or click to browse</div>
                              <div style={{ fontSize: 10, color: c.textMuted }}>PDF, image, or any document file</div>
                            </div>
                          )}
                        </div>

                        {/* Notarised */}
                        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                          <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: c.text, cursor: "pointer" }}>
                            <input type="checkbox" checked={doc.notarised || false} onChange={e => updateDoc("notarised", e.target.checked)} style={{ accentColor: c.accent }} /> Notarised
                          </label>
                          {doc.notarised && (
                            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                              <label style={{ fontSize: 10, color: c.textMuted }}>Date of Notary:</label>
                              <input type="date" value={doc.notarisedDate || ""} onChange={e => updateDoc("notarisedDate", e.target.value)} style={{ fontSize: 11, padding: "3px 6px", borderRadius: 4, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" }} />
                            </div>
                          )}
                        </div>

                        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                          <label style={{ fontSize: 10, color: c.textMuted, width: 90 }}>Notes</label>
                          <input value={doc.renewalNotes || ""} onChange={e => updateDoc("renewalNotes", e.target.value)} placeholder="Any notes..." style={{ flex: 1, fontSize: 12, padding: "4px 8px", borderRadius: 4, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" }} />
                        </div>
                        <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
                          <button onClick={() => setEditingEntityField(null)} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Done</button>
                          <button onClick={() => { setEntityDocs({ ...entityDocs, [entity.name]: allUserDocs.filter(d => d.id !== doc.id) }); setEditingEntityField(null); }} style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", color: "#ef4444", borderRadius: 4, padding: "4px 12px", cursor: "pointer", fontSize: 11 }}>Delete Document</button>
                        </div>
                      </div>
                    ) : (
                      <div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                          <span style={{ fontSize: 13, color: c.text, fontWeight: 600 }}>{doc.name || "Untitled"}</span>
                          {doc.uploadStatus === "uploading" && <span style={{ fontSize: 10, color: c.accent }}>Uploading...</span>}
                        </div>
                        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", fontSize: 11, marginBottom: 4 }}>
                          {doc.noRenewal ? (
                            <span style={{ color: c.textMuted }}>No renewal needed</span>
                          ) : (
                            <span style={{ color: c.textMuted }}>
                              {(doc.issueDate || doc.expiry) && <span>Issued: {doc.issueDate || doc.expiry}</span>}
                              {renewalDateStr && renewalDateStr !== "No renewal" && <span> · Due: <span style={{ color: sc, fontWeight: 600 }}>{renewalDateStr}</span></span>}
                              <span> · {doc.renewalMonths || 12}mo cycle</span>
                            </span>
                          )}
                          {doc.notarised && <span style={{ color: c.accent }}>Notarised{doc.notarisedDate ? ` ${doc.notarisedDate}` : ""}</span>}
                          {doc.delayedUntil > 0 && <span style={{ color: c.textMuted }}>Delayed +{doc.delayedUntil}mo</span>}
                          {doc.renewalNotes && <span style={{ color: c.textMuted, fontStyle: "italic" }}>{doc.renewalNotes}</span>}
                        </div>
                        {doc.fileName && (
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                            <a href={doc.fileUrl} target="_blank" rel="noopener" style={{ fontSize: 11, color: c.accent, textDecoration: "none", display: "flex", alignItems: "center", gap: 4 }}>
                              <Icon type="download" size={10} /> {doc.fileName}
                            </a>
                            <span style={{ fontSize: 10, color: c.textMuted }}>{formatFileSize(doc.fileSize)}</span>
                            {doc.uploadedAt && <span style={{ fontSize: 10, color: c.textMuted }}>{new Date(doc.uploadedAt).toLocaleDateString()}</span>}
                          </div>
                        )}
                        {(doc.previousVersions || []).length > 0 && (
                          <div style={{ marginTop: 4 }}>
                            <button onClick={() => setEditingEntityField(isShowingHistory ? null : `hist-${doc.id}`)} style={{ background: "transparent", border: "none", color: c.textMuted, cursor: "pointer", fontSize: 10, padding: 0 }}>
                              {isShowingHistory ? "▾ Hide" : "▸ Show"} {doc.previousVersions.length} previous version{doc.previousVersions.length > 1 ? "s" : ""}
                            </button>
                            {isShowingHistory && (
                              <div style={{ marginTop: 4, paddingLeft: 12, borderLeft: `2px solid ${c.border}` }}>
                                {doc.previousVersions.map((v, vi) => (
                                  <div key={vi} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0", fontSize: 10 }}>
                                    <a href={v.fileUrl} target="_blank" rel="noopener" style={{ color: c.textMuted, textDecoration: "none" }}><Icon type="download" size={10} /> {v.fileName}</a>
                                    <span style={{ color: c.textMuted }}>{formatFileSize(v.fileSize)}</span>
                                    {v.renewalDate && <span style={{ color: c.textMuted }}>Renewed: {v.renewalDate}</span>}
                                    <span style={{ color: c.textMuted }}>{v.uploadedAt ? new Date(v.uploadedAt).toLocaleDateString() : ""}</span>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                  {!isEditing && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 4, alignItems: "flex-end", flexShrink: 0 }}>
                      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <DocStatusBadge status={status} />
                        <button onClick={() => setEditingEntityField(`doc-${doc.id}`)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>Edit</button>
                      </div>
                      <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                        <label style={{ position: "relative", cursor: "pointer" }}>
                          <input type="file" style={{ position: "absolute", opacity: 0, width: 0, height: 0 }} onChange={e => { if (e.target.files[0]) handleFileUpload(e.target.files[0], true); }} />
                          <span style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.accent, borderRadius: 4, padding: "3px 8px", fontSize: 10, fontWeight: 600, display: "inline-block" }}>
                            {doc.fileUrl ? "↑ New Version" : "↑ Upload"}
                          </span>
                        </label>
                        <select value="" onChange={e => { if (e.target.value) { updateDoc("delayedUntil", (doc.delayedUntil || 0) + parseInt(e.target.value)); e.target.value = ""; } }} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textMuted, borderRadius: 4, padding: "3px 4px", fontSize: 10, width: 70 }}>
                          <option value="">Delay...</option>
                          {[1,2,3,6,12].map(m => <option key={m} value={m}>+{m}mo</option>)}
                        </select>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {/* Add document */}
          <div style={{ display: "flex", gap: 8, marginTop: 12, alignItems: "center" }}>
            <button onClick={() => {
              const newDoc = { id: `doc-${Date.now()}`, name: "", issueDate: "", noRenewal: false, notarised: false, notarisedDate: "", renewalMonths: 12, delayedUntil: 0, fileName: "", fileSize: 0, fileUrl: "", previousVersions: [], renewalNotes: "" };
              setEntityDocs({ ...entityDocs, [entity.name]: [...allUserDocs, newDoc] });
              setEditingEntityField(`doc-${newDoc.id}`);
            }} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 6, padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
              <Icon type="plus" size={12} /> Add Document
            </button>
            {dbConnected && <span style={{ fontSize: 10, color: c.success }}>Documents synced to Supabase database</span>}
            {!dbConnected && <span style={{ fontSize: 10, color: c.textMuted }}>Connect database to sync documents centrally</span>}
          </div>
        </div>

        {/* D: Domains & License Seals */}
        {(() => {
          const domains = entitySeals[entity.name] || [];
          const updateDomains = (updated) => setEntitySeals({ ...entitySeals, [entity.name]: updated });
          const updateDomain = (domId, field, val) => updateDomains(domains.map(d => d.id === domId ? { ...d, [field]: val } : d));

          // Domain proof upload handler
          const handleProofUpload = async (domId, file) => {
            if (!file) return;
            if (!supabaseUrl || !supabaseKey) { alert("Connect to Supabase database first"); return; }
            const safeName = entity.name.replace(/[^a-zA-Z0-9]/g, "_");
            const filePath = safeName + "/proofs/" + domId + "_" + Date.now() + "_" + file.name;
            updateDomain(domId, "uploadStatus", "uploading");
            try {
              const resp = await fetch(supabaseUrl + "/storage/v1/object/documents/" + filePath, {
                method: "POST", headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" }, body: file,
              });
              if (!resp.ok) throw new Error("Upload failed: " + resp.status);
              const publicUrl = supabaseUrl + "/storage/v1/object/public/documents/" + filePath;
              updateDomains(domains.map(d => d.id === domId ? { ...d, proofFileName: file.name, proofFileUrl: publicUrl, uploadStatus: null } : d));
            } catch (e) {
              alert("Upload error: " + e.message);
              updateDomain(domId, "uploadStatus", null);
            }
          };

          // Helper: generate mirror list display
          const getMirrorSummary = (dom) => {
            if (!dom.domainName || (!dom.mirrorRangeStart && !dom.mirrorRangeEnd)) return null;
            const base = dom.domainName.replace(/\.([^.]+)$/, "");
            const ext = dom.domainName.match(/\.([^.]+)$/)?.[0] || ".com";
            const start = parseInt(dom.mirrorRangeStart) || 1;
            const end = parseInt(dom.mirrorRangeEnd) || start;
            const count = end - start + 1;
            return { base, ext, start, end, count, example: base + start + ext + " → " + base + end + ext };
          };

          return (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20, marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: 0, textTransform: "uppercase" }}>Domains & License Seals</h3>
              <button onClick={() => {
                const newDom = { id: `dom-${Date.now()}`, domainName: "", proofFileName: "", proofFileUrl: "", mirrorRangeStart: "", mirrorRangeEnd: "", licenseSeals: [], collapsed: false };
                updateDomains([...domains, newDom]);
              }} style={{ background: c.accent, border: "none", color: "#fff", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>+ Add Domain</button>
            </div>

            {domains.length === 0 && <div style={{ fontSize: 12, color: c.textMuted, padding: "12px 0", textAlign: "center" }}>No domains added yet. Click "Add Domain" to get started.</div>}

            {domains.map((dom, di) => {
              const mirrorInfo = getMirrorSummary(dom);
              return (
              <div key={dom.id} style={{ background: c.surface, borderRadius: 10, border: `1px solid ${c.border}`, padding: 16, marginBottom: 10 }}>
                {/* Domain header — always visible */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 15, fontWeight: 600, color: c.text }}>{dom.domainName || "New Domain"}</span>
                    {dom.proofFileUrl && <span style={{ fontSize: 9, color: "#22c55e", background: "rgba(34,197,94,0.12)", padding: "2px 6px", borderRadius: 4, fontWeight: 600 }}>PROOF ✓</span>}
                    {mirrorInfo && <span style={{ fontSize: 9, color: c.accent, background: `${c.accent}15`, padding: "2px 6px", borderRadius: 4, fontWeight: 600 }}>{mirrorInfo.count} MIRRORS</span>}
                    {(dom.licenseSeals || []).length > 0 && <span style={{ fontSize: 9, color: "#f59e0b", background: "rgba(245,158,11,0.12)", padding: "2px 6px", borderRadius: 4, fontWeight: 600 }}>{dom.licenseSeals.length} SEAL{dom.licenseSeals.length > 1 ? "S" : ""}</span>}
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => updateDomain(dom.id, "collapsed", !dom.collapsed)} style={{ background: "transparent", border: `1px solid ${c.border}`, color: c.textMuted, cursor: "pointer", fontSize: 10, borderRadius: 4, padding: "3px 10px" }}>{dom.collapsed ? "Edit ▾" : "Collapse ▴"}</button>
                    <button onClick={() => updateDomains(domains.filter(d => d.id !== dom.id))} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 10 }}>✕</button>
                  </div>
                </div>

                {/* Expanded edit view */}
                {!dom.collapsed && (
                  <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
                    {/* Domain Name */}
                    <div>
                      <label style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, display: "block", marginBottom: 4, textTransform: "uppercase" }}>Domain Name</label>
                      <input value={dom.domainName || ""} onChange={e => updateDomain(dom.id, "domainName", e.target.value)} placeholder="e.g. sharkcasino.com" style={{ fontSize: 13, padding: "8px 12px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.card, color: c.text, width: "100%", outline: "none", boxSizing: "border-box" }} />
                    </div>

                    {/* Domain Proof */}
                    <div>
                      <label style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, display: "block", marginBottom: 4, textTransform: "uppercase" }}>Domain Proof</label>
                      {dom.proofFileUrl ? (
                        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: "rgba(34,197,94,0.08)", borderRadius: 6, border: "1px solid rgba(34,197,94,0.2)" }}>
                          <span style={{ fontSize: 12, color: "#22c55e", fontWeight: 500, flex: 1 }}>📄 {dom.proofFileName || "proof"}</span>
                          <a href={dom.proofFileUrl} target="_blank" rel="noopener" style={{ fontSize: 10, color: c.accent, fontWeight: 600, textDecoration: "none", padding: "3px 8px", border: `1px solid ${c.accent}`, borderRadius: 4 }}>Download</a>
                          <button onClick={() => { updateDomain(dom.id, "proofFileUrl", ""); updateDomain(dom.id, "proofFileName", ""); }} style={{ fontSize: 10, color: "#ef4444", background: "transparent", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 4, padding: "3px 8px", cursor: "pointer" }}>Remove</button>
                        </div>
                      ) : (
                        <div
                          onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.accent; }}
                          onDragLeave={e => { e.currentTarget.style.borderColor = c.border; }}
                          onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.border; handleProofUpload(dom.id, e.dataTransfer.files[0]); }}
                          style={{ border: `2px dashed ${c.border}`, borderRadius: 8, padding: "14px 16px", textAlign: "center", cursor: "pointer", transition: "border-color 0.15s" }}
                          onClick={() => { const inp = document.createElement("input"); inp.type = "file"; inp.onchange = (ev) => handleProofUpload(dom.id, ev.target.files[0]); inp.click(); }}
                        >
                          {dom.uploadStatus === "uploading" ? (
                            <span style={{ fontSize: 11, color: c.accent }}>⟳ Uploading...</span>
                          ) : (
                            <span style={{ fontSize: 11, color: c.textMuted }}>Drop proof file here or click to upload</span>
                          )}
                        </div>
                      )}
                    </div>

                    {/* Mirror Domains */}
                    <div>
                      <label style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, display: "block", marginBottom: 4, textTransform: "uppercase" }}>Mirror Domains</label>
                      <div style={{ fontSize: 11, color: c.textMuted, marginBottom: 6 }}>
                        {dom.domainName ? `Mirrors of ${dom.domainName} — specify number range (e.g. 1–200 = ${dom.domainName.replace(/\.([^.]+)$/, "")}1${dom.domainName.match(/\.([^.]+)$/)?.[0] || ".com"} through ${dom.domainName.replace(/\.([^.]+)$/, "")}200${dom.domainName.match(/\.([^.]+)$/)?.[0] || ".com"})` : "Enter domain name first to configure mirrors"}
                      </div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <span style={{ fontSize: 11, color: c.textSecondary }}>From</span>
                        <input type="number" value={dom.mirrorRangeStart || ""} onChange={e => updateDomain(dom.id, "mirrorRangeStart", e.target.value)} placeholder="1" min="1" style={{ fontSize: 12, padding: "6px 10px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.card, color: c.text, width: 80, outline: "none" }} />
                        <span style={{ fontSize: 11, color: c.textSecondary }}>to</span>
                        <input type="number" value={dom.mirrorRangeEnd || ""} onChange={e => updateDomain(dom.id, "mirrorRangeEnd", e.target.value)} placeholder="200" min="1" style={{ fontSize: 12, padding: "6px 10px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.card, color: c.text, width: 80, outline: "none" }} />
                        {mirrorInfo && <span style={{ fontSize: 11, color: c.accent, fontWeight: 500 }}>= {mirrorInfo.count} mirrors</span>}
                      </div>
                      {mirrorInfo && (
                        <div style={{ fontSize: 10, color: c.textMuted, marginTop: 6, fontFamily: "monospace", background: c.card, padding: "6px 10px", borderRadius: 4 }}>
                          {mirrorInfo.example}
                        </div>
                      )}
                    </div>

                    {/* License Seals — document uploads */}
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <label style={{ fontSize: 10, color: c.textMuted, fontWeight: 600, textTransform: "uppercase" }}>License Seals</label>
                        <button onClick={() => {
                          const newSeal = { id: `ls-${Date.now()}`, name: "", fileName: "", fileUrl: "", uploadStatus: null };
                          const updatedSeals = [...(dom.licenseSeals || []), newSeal];
                          updateDomain(dom.id, "licenseSeals", updatedSeals);
                        }} style={{ background: `${c.accent}20`, border: `1px solid ${c.accent}40`, color: c.accent, borderRadius: 4, padding: "3px 10px", cursor: "pointer", fontSize: 10, fontWeight: 600 }}>+ Add Seal</button>
                      </div>
                      {(dom.licenseSeals || []).length === 0 && <div style={{ fontSize: 11, color: c.textMuted, padding: "6px 0" }}>No license seals added</div>}
                      {(dom.licenseSeals || []).map((seal, si) => {
                        const handleSealUpload = async (file) => {
                          if (!file) return;
                          if (!supabaseUrl || !supabaseKey) { alert("Connect to Supabase database first"); return; }
                          const safeName = entity.name.replace(/[^a-zA-Z0-9]/g, "_");
                          const filePath = safeName + "/seals/" + seal.id + "_" + Date.now() + "_" + file.name;
                          const updatingSeals = (dom.licenseSeals || []).map(s => s.id === seal.id ? { ...s, uploadStatus: "uploading" } : s);
                          updateDomain(dom.id, "licenseSeals", updatingSeals);
                          try {
                            const resp = await fetch(supabaseUrl + "/storage/v1/object/documents/" + filePath, {
                              method: "POST", headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" }, body: file,
                            });
                            if (!resp.ok) throw new Error("Upload failed: " + resp.status);
                            const publicUrl = supabaseUrl + "/storage/v1/object/public/documents/" + filePath;
                            const doneSeals = (dom.licenseSeals || []).map(s => s.id === seal.id ? { ...s, fileName: file.name, fileUrl: publicUrl, uploadStatus: null } : s);
                            updateDomain(dom.id, "licenseSeals", doneSeals);
                          } catch (e) {
                            alert("Upload error: " + e.message);
                            const errSeals = (dom.licenseSeals || []).map(s => s.id === seal.id ? { ...s, uploadStatus: null } : s);
                            updateDomain(dom.id, "licenseSeals", errSeals);
                          }
                        };
                        return (
                        <div key={seal.id} style={{ background: c.card, borderRadius: 6, border: `1px solid ${c.border}`, padding: 10, marginBottom: 6 }}>
                          <div style={{ display: "flex", gap: 6, marginBottom: 8, alignItems: "center" }}>
                            <input value={seal.name || ""} onChange={e => {
                              const updatedSeals = (dom.licenseSeals || []).map(s => s.id === seal.id ? { ...s, name: e.target.value } : s);
                              updateDomain(dom.id, "licenseSeals", updatedSeals);
                            }} placeholder="Seal name / label" style={{ flex: 1, fontSize: 11, padding: "5px 8px", borderRadius: 4, border: `1px solid ${c.border}`, background: c.surface, color: c.text, outline: "none" }} />
                            <button onClick={() => {
                              const updatedSeals = (dom.licenseSeals || []).filter(s => s.id !== seal.id);
                              updateDomain(dom.id, "licenseSeals", updatedSeals);
                            }} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", color: "#ef4444", borderRadius: 4, padding: "4px 8px", cursor: "pointer", fontSize: 10 }}>✕</button>
                          </div>
                          {seal.fileUrl ? (
                            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: "rgba(34,197,94,0.08)", borderRadius: 6, border: "1px solid rgba(34,197,94,0.2)" }}>
                              <span style={{ fontSize: 12, color: "#22c55e", fontWeight: 500, flex: 1 }}>📄 {seal.fileName || "seal document"}</span>
                              <a href={seal.fileUrl} target="_blank" rel="noopener" style={{ fontSize: 10, color: c.accent, fontWeight: 600, textDecoration: "none", padding: "3px 8px", border: `1px solid ${c.accent}`, borderRadius: 4 }}>Download</a>
                              <button onClick={() => {
                                const updatedSeals = (dom.licenseSeals || []).map(s => s.id === seal.id ? { ...s, fileUrl: "", fileName: "" } : s);
                                updateDomain(dom.id, "licenseSeals", updatedSeals);
                              }} style={{ fontSize: 10, color: "#ef4444", background: "transparent", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 4, padding: "3px 8px", cursor: "pointer" }}>Remove</button>
                            </div>
                          ) : (
                            <div
                              onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.accent; }}
                              onDragLeave={e => { e.currentTarget.style.borderColor = c.border; }}
                              onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = c.border; handleSealUpload(e.dataTransfer.files[0]); }}
                              style={{ border: `2px dashed ${c.border}`, borderRadius: 8, padding: "12px 16px", textAlign: "center", cursor: "pointer", transition: "border-color 0.15s" }}
                              onClick={() => { const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".doc,.docx,.pdf,.png,.jpg,.jpeg"; inp.onchange = (ev) => handleSealUpload(ev.target.files[0]); inp.click(); }}
                            >
                              {seal.uploadStatus === "uploading" ? (
                                <span style={{ fontSize: 11, color: c.accent }}>⟳ Uploading...</span>
                              ) : (
                                <span style={{ fontSize: 11, color: c.textMuted }}>Drop seal document here or click to upload (.docx, .pdf, etc.)</span>
                              )}
                            </div>
                          )}
                        </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
              );
            })}
          </div>
          );
        })()}

        {/* E: Footer Display Text */}
        <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20, marginBottom: 16 }}>
          <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Footer Display Text</h3>
          <textarea value={footerText} onChange={e => setEntityFooters({ ...entityFooters, [entity.name]: e.target.value })} placeholder="Enter the licensing footer text for this entity..." style={{ fontSize: 12, padding: "10px 12px", borderRadius: 6, border: `1px solid ${c.border}`, background: c.surface, color: c.text, width: "100%", minHeight: 80, fontFamily: "system-ui", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <button onClick={() => copyToClipboard(footerText)} style={{ background: c.accent, border: "none", color: c.white, borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>{copiedText === footerText ? "Copied!" : "Copy"}</button>
          </div>
        </div>

        {/* F: Contracts & Agreements */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
          {[["Contracts", entity.contracts], ["Corporate Agreements", entity.agreements]].map(([title, items]) => (
            <div key={title} style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
              <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>{title}</h3>
              {(items || []).length === 0 ? <div style={{ fontSize: 12, color: c.textMuted }}>None recorded</div> : items.map((item, i) => <div key={i} style={{ fontSize: 13, color: c.text, padding: "6px 0", borderBottom: `1px solid ${c.border}` }}>{item}</div>)}
            </div>
          ))}
        </div>

        {/* G: Bank Accounts — from central banking system */}
        {(() => {
          const linkedAccounts = bankAccountsList.filter(a => a.entityName === entity.name);
          return (
          <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, padding: 20 }}>
            <h3 style={{ fontSize: 13, fontWeight: 700, color: c.accent, margin: "0 0 12px 0", textTransform: "uppercase" }}>Bank Accounts</h3>
            {linkedAccounts.length === 0 ? (
              <div style={{ fontSize: 12, color: c.textMuted }}>No accounts linked to this entity. <span style={{ color: c.accent, cursor: "pointer", textDecoration: "underline" }} onClick={() => { setActiveSection("banks"); }}>Go to Banking →</span></div>
            ) : linkedAccounts.map(acct => {
              const rel = bankRelationships.find(r => r.id === acct.bankRelId);
              return (
                <div key={acct.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: `1px solid ${c.border}` }}>
                  <div>
                    <div style={{ fontSize: 13, color: c.text, fontWeight: 500 }}>{rel ? rel.bankName : "Unknown Bank"}</div>
                    <div style={{ fontSize: 11, color: c.textMuted }}>{(acct.accountPurpose || []).join(", ") || "No purpose set"}{acct.dateOpened ? ` · Opened ${acct.dateOpened}` : ""}</div>
                  </div>
                  {rel && rel.mainContact && <span style={{ fontSize: 10, color: c.textMuted }}>{rel.mainContact}</span>}
                </div>
              );
            })}
          </div>
          );
        })()}
      </div>
    );
  };

  // ===== ENTITIES =====
  const renderEntities = () => {
    if (selectedEntity && selectedCategory) {
      const ent = CORPORATE_ENTITIES[selectedCategory]?.find(e => e.name === selectedEntity);
      if (ent) return renderEntityDetail(ent, selectedCategory);
    }
    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.text, margin: 0 }}>Corporate Entity Matrix</h2>
            <p style={{ color: c.textSecondary, fontSize: 13, margin: "4px 0 0 0" }}>{Object.values(CORPORATE_ENTITIES).flat().length} entities across {Object.keys(CORPORATE_ENTITIES).length} categories</p>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {dbConnected && (
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                {dbSyncStatus === "syncing" && <span style={{ fontSize: 11, color: c.accent }}>⟳ Syncing...</span>}
                {dbSyncStatus === "success" && <span style={{ fontSize: 11, color: c.success }}>{dbSyncMessage}</span>}
                {dbSyncStatus === "error" && <span style={{ fontSize: 11, color: c.danger }}>{dbSyncMessage}</span>}
                <button onClick={syncFromDb} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, fontSize: 11, padding: "5px 10px", borderRadius: 6, cursor: "pointer" }}>↓ Pull</button>
                <button onClick={syncToDb} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, fontSize: 11, padding: "5px 10px", borderRadius: 6, cursor: "pointer" }}>↑ Push</button>
              </div>
            )}
            <button onClick={() => setShowDbSetup(!showDbSetup)}
              style={{ background: dbConnected ? c.accentBg : c.surface, border: `1px solid ${dbConnected ? c.accent + "40" : c.border}`, color: dbConnected ? c.accent : c.textSecondary, fontSize: 11, padding: "5px 12px", borderRadius: 6, cursor: "pointer", fontWeight: 500 }}>
              {dbConnected ? "⚙ Database Connected" : supabaseUrl ? "⚙ Database Setup" : "⚙ Connect Database"}
            </button>
          </div>
        </div>

        {showDbSetup && (
          <div style={{ background: c.card, border: `1px solid ${c.border}`, borderRadius: 10, padding: 20, marginBottom: 20 }}>
            <h3 style={{ fontSize: 14, fontWeight: 600, color: c.text, margin: "0 0 12px 0" }}>Supabase Database Connection</h3>
            <p style={{ fontSize: 12, color: c.textSecondary, margin: "0 0 16px 0" }}>
              Documents are stored in a central Supabase database so all users can access them from anywhere.
            </p>
            <div style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 4 }}>Project URL</label>
              <input value={supabaseUrl} onChange={e => setSupabaseUrl(e.target.value.trim())}
                placeholder="https://xxxxx.supabase.co"
                style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, padding: "8px 12px", borderRadius: 6, fontSize: 12, outline: "none" }} />
            </div>
            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 4 }}>Anon Key (public)</label>
              <input value={supabaseKey} onChange={e => setSupabaseKey(e.target.value.trim())}
                placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                style={{ width: "100%", background: c.surface, border: `1px solid ${c.border}`, color: c.text, padding: "8px 12px", borderRadius: 6, fontSize: 12, outline: "none", fontFamily: "monospace" }} />
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <button onClick={async () => {
                if (!supabaseUrl || !supabaseKey) { setDbSyncStatus("error"); setDbSyncMessage("Enter both URL and Key"); setTimeout(() => setDbSyncStatus("idle"), 3000); return; }
                setDbSyncStatus("syncing"); setDbSyncMessage("Testing connection...");
                try {
                  const r = await fetch(supabaseUrl + "/rest/v1/entity_documents?select=count&limit=0", { headers: { "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey } });
                  if (r.ok) { setDbConnected(true); setDbSyncStatus("success"); setDbSyncMessage("Connected to Supabase!"); }
                  else { const t = await r.text(); setDbConnected(false); setDbSyncStatus("error"); setDbSyncMessage("Error " + r.status + ": " + (t.includes("does not exist") ? "Run the SQL schema first" : t.slice(0, 80))); }
                } catch (err) { setDbConnected(false); setDbSyncStatus("error"); setDbSyncMessage("Connection failed: " + err.message); }
                setTimeout(() => setDbSyncStatus("idle"), 5000);
              }} style={{ background: c.accent, border: "none", color: "#fff", padding: "8px 16px", borderRadius: 6, fontSize: 12, cursor: "pointer", fontWeight: 600 }}>Test Connection</button>
              {dbConnected && <button onClick={syncFromDb} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, padding: "8px 16px", borderRadius: 6, fontSize: 12, cursor: "pointer" }}>↓ Pull from DB</button>}
              {dbConnected && <button onClick={syncToDb} style={{ background: c.surface, border: `1px solid ${c.border}`, color: c.textSecondary, padding: "8px 16px", borderRadius: 6, fontSize: 12, cursor: "pointer" }}>↑ Push to DB</button>}
            </div>
            {dbSyncStatus !== "idle" && (
              <div style={{ fontSize: 12, color: dbSyncStatus === "success" ? c.success : dbSyncStatus === "error" ? c.danger : c.accent, marginBottom: 12 }}>
                {dbSyncMessage}
              </div>
            )}
            <div style={{ fontSize: 11, color: c.textMuted, lineHeight: 1.8, background: c.surface, borderRadius: 8, padding: 12 }}>
              <strong style={{ color: c.textSecondary }}>Quick setup:</strong><br />
              1. Go to <span style={{ color: c.accent }}>supabase.com</span> → Create free account → New Project<br />
              2. Go to <strong style={{ color: c.textSecondary }}>SQL Editor</strong> → paste and run the schema SQL provided<br />
              3. Go to <strong style={{ color: c.textSecondary }}>Settings → API</strong> → copy Project URL and anon key<br />
              4. Paste both above and Test Connection
            </div>
          </div>
        )}
        {allDocAlerts.length > 0 && (
          <div style={{ background: c.card, border: `1px solid rgba(239,68,68,0.25)`, borderRadius: 10, marginBottom: 20, overflow: "hidden" }}>
            <div onClick={() => setEntityAlertsCollapsed(!entityAlertsCollapsed)}
              style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", cursor: "pointer", background: "rgba(239,68,68,0.06)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <Icon type="alert" size={14} />
                <span style={{ fontSize: 13, fontWeight: 600, color: c.danger }}>{allDocAlerts.length} Document{allDocAlerts.length !== 1 ? "s" : ""} Need Attention</span>
              </div>
              <span style={{ fontSize: 11, color: c.textMuted }}>{entityAlertsCollapsed ? "▸ Show" : "▾ Hide"}</span>
            </div>
            {!entityAlertsCollapsed && (
              <div style={{ padding: "8px 16px 12px" }}>
                {allDocAlerts.map((a, i) => (
