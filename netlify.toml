[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."metabase-proxy"]
  timeout = 26

[context.production.environment]
  AWS_LAMBDA_JS_RUNTIME = "nodejs18.x"
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
